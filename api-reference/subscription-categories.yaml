openapi: 3.0.3
info:
  title: MoEngage Subscription Categories API
  description: |
    Enables you to fetch and update email subscription preferences on your MoEngage dashboard.
    
    This API provides endpoints for:
    * **Get Preferences**: Fetches subscription preferences for a specific user.
    * **Update Preferences**: Updates preferences for a specific user (e.g., from a landing page).
    * **Bulk Update Preferences**: Updates preferences for a batch of users.
    
    Authentication is handled via Basic Auth (Workspace ID as username, Data API Key as password).
  version: '1.0'
servers:
  - url: 'https://api-{dc}.moengage.com/v1'
    description: 'MoEngage API Server. {dc} is your data center number (e.g., 01, 02, 03).'
    variables:
      dc:
        default: '01'
        description: 'The data center number for your account (e.g., 01, 02, 03).'
tags:
  - name: Subscription Preferences
    description: Manage user email subscription preferences.
paths:
  /category-subscription/user-preferences:
    get:
      tags:
        - Subscription Preferences
      summary: Get Subscription Preferences
      operationId: getSubscriptionPreferences
      description: Fetches the subscription category preferences information for a specific user.
      x-ratelimit:
        limit: 100
        period: minute
        unit: requests
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/UserIdQuery'
        - $ref: '#/components/parameters/CidQuery'
        - name: Content-Type
          in: header
          required: true
          description: Must be set to application/json.
          schema:
            type: string
            default: application/json
      responses:
        '200':
          description: Success. This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    $ref: '#/components/schemas/SubscriptionCategories'
              example:
                categories:
                  Promotional: true
                  Product Update: true
                  Newsletter: true
                  Artist Updates: true
                  Playlist Updates: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Subscription Preferences
      summary: Update Subscription Preferences
      operationId: updateSubscriptionPreferences
      description: Updates the subscription category preferences for a specific user who navigates from an email.
      x-ratelimit:
        limit: 100
        period: minute
        unit: requests
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/UserIdQuery'
        - $ref: '#/components/parameters/CidQuery'
        - $ref: '#/components/parameters/MoeEventIdQuery'
      requestBody:
        required: true
        description: The user's updated preferences.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: Success. This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Success"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Subscription Preferences
      summary: Bulk Update Subscription Preferences
      operationId: bulkUpdateSubscriptionPreferences
      description: >
        Updates subscription category preferences in bulk for a batch of up to 50 users.
        Use this API for updating the user preferences to MoEngage in large volumes.
      x-ratelimit:
        limit: 100
        period: minute
        unit: requests
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
      requestBody:
        required: true
        description: A list of preference updates for multiple users.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUpdatePreferencesRequest'
      responses:
        '200':
          description: Your request has been processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Your request has been processed"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: 'Uses **Workspace ID** as username and **Data API Key** as password. Found in Settings > Account > APIs > Data.'
  parameters:
    AppKeyHeader:
      name: MOE-APPKEY
      in: header
      required: true
      description: >
        This is your MoEngage account's APP ID that has to be passed along with the request.
        You can find your MoEngage Workspace ID at **Settings** -> **Account** -> **APIs** -> **Workspace ID** (earlier app id).
      schema:
        type: string
    UserIdQuery:
      name: user_id
      in: query
      required: true
      description: >
        The MoEngage ID that uniquely identifies the customer.
        This is encrypted using 16 bits DES and is encoded in the URL of the landing page. The same can be fetched from the URL of the landing page.
      schema:
        type: string
    CidQuery:
      name: cid
      in: query
      required: true
      description: >
        The campaign ID of the email campaign. This field contains the information about the email campaign received by the customer.
        The campaign ID is encrypted using 16 bits DES and is encoded in the URL of the landing page. The same can be fetched from the URL of the landing page.
      schema:
        type: string
    MoeEventIdQuery:
      name: moe_event_id
      in: query
      required: false
      description: This is used to update the unsubscribe event when the user chooses the 'unsubscribe all' option.
      schema:
        type: string
  schemas:
    SubscriptionCategories:
      type: object
      description: A map of category names to their subscription status (**true** for subscribed, **false** for unsubscribed).
      additionalProperties:
        type: boolean
      example:
        Promotions: true
        Updates: false
        Recommendations: true
    UpdatePreferencesRequest:
      type: object
      required:
        - categories
        - unsubscribe_all
      properties:
        categories:
          $ref: '#/components/schemas/SubscriptionCategories'
          description: This field contains the details about the updated subscription preferences of the user.
        unsubscribe_all:
          type: boolean
          description: "Set to **true** to unsubscribe the user from all categories. When true, the user is unsubscribed from all categories, irrespective of the categories marked as true in the category JSON object."
      example:
        unsubscribe_all: false
        categories:
          Promotional: true
          Transactional: false
          Special Offers: true
    UserPreferenceEntry:
      type: object
      required:
        - customer_id
        - categories
        - unsubscribe_all
      properties:
        customer_id:
          type: string
          description: The unique identifier denoting the customer (ID on the user profile page) for whom you are updating the subscription preferences.
          example: "john@example.com"
        categories:
          $ref: '#/components/schemas/SubscriptionCategories'
          description: A JSON Object that contains the subscription preferences of the customer.
        unsubscribe_all:
          type: boolean
          description: "Set to **true** to unsubscribe the user from all categories. When true, the user is unsubscribed from all categories, irrespective of the categories marked as true in the category JSON object."
    BulkUpdatePreferencesRequest:
      type: object
      required:
        - channel
        - user_preferences
      properties:
        channel:
          type: string
         
          enum: [email]
          example: "email"
        user_preferences:
          type: array
          description: A list of user preference objects to update. Maximum 50 per request.
          maxItems: 50
          items:
            $ref: '#/components/schemas/UserPreferenceEntry'
      example:
        channel: "email"
        user_preferences:
          - customer_id: "john@example.com"
            categories:
              Promotional: false
              Special Offers: true
            unsubscribe_all: false
          - customer_id: "mike@example.com"
            categories:
              Transactional: true
              Promotional: false
            unsubscribe_all: false
    Error:
      type: object
      properties:
        title:
          type: string
          description: The error type (present only when the request is unsuccessful).
          nullable: true
        description:
          type: string
          description: The error description (present only when the request is unsuccessful).
          nullable: true
        message:
          type: string
          description: A brief description of the request status in case of success.
          nullable: true
  responses:
    BadRequest:
      description: Bad Request. This response is returned when required parameters are missing or invalid, or when the payload limit is exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalid_params_get:
              summary: Invalid Params (GET)
              value:
                message: "Invalid Params Received"
            payload_limit_post:
              summary: Payload Limit Exceeded (POST)
              value:
                title: "Payload Limit Exceeded"
                description: "Payload limit is set to 50"
    Unauthorized:
      description: Authorization Failure. This response is returned when authorization fails due to incorrect APP KEY/HTTP Auth Header values.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            auth_required:
              summary: Auth Failure
              value:
                title: "Authentication required"
                description: "No identity information found."
            missing_appkey:
              summary: Missing Header
              value:
                title: "Header required"
                description: "MOE-APPKEY missing in Header"
    Conflict:
      description: Conflict. This response is returned when the authorization fails due to the APP SECRET key not being set on the Dashboard.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            title: "API SECRET not configured"
            description: "This response is returned when the authorization fails due to the APP SECRET key not being set on the Dashboard."
    TooManyRequests:
      description: Rate Limit Breach. The number of requests per minute has exceeded the limit (100 RPM).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            title: "Rate-Limit Reached"
            description: "Exceeded rate limit for this url"
    InternalServerError:
      description: Internal Server Error. This response is returned when the system runs into an unexpected error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            title: "Internal Error"
            description: "Please Contact Moengage Team"
security:
  - basicAuth: []