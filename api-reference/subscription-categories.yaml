<p>
  <span style="font-weight: 400;">Subscription Categories help your brand provide options to customers to choose the kind of communication they want to receive from you. For more information, refer to </span><a href="https://help.moengage.com/hc/en-us/articles/11053939178004" target="_blank" rel="noopener noreferrer"><span style="font-weight: 400;">Subscription Categories</span></a><span style="font-weight: 400;">.&nbsp;</span>
</p>
<p>
  <span style="font-weight: 400;">The Subscription Categories API </span><span style="font-weight: 400;">enables you to fetch and update email subscription preferences on your MoEngage dashboard.</span>
</p>
<p>
  <span style="font-weight: 400;">The following APIs are available:&nbsp;</span>
</p>
<h1 id="h_01KAJDJ70FD7X7GH2ASCWH1RYY">
  <span style="font-weight: 400;">Get subscription preferences</span>
</h1>
<p>
  <span style="font-weight: 400;">This API fetches the subscription category preferences information for a specific user. For more information, refer to </span><a href="https://developers.moengage.com/hc/en-us/articles/11170240459668" target="_blank" rel="noopener noreferrer"><span style="font-weight: 400;">Get Subscription Preferences</span></a><span style="font-weight: 400;">.</span>
</p>
<h1 id="h_01KAJDJ70FXE9PEKBZ5Y7E0XZ4">
  <span style="font-weight: 400;">Update subscription preferences</span>
</h1>
<p>
  <span style="font-weight: 400;">This API updates the subscription category preferences information for a specific user who navigates to the custom landing page from the email notification sent to them and updates their preferences. For more information, refer to </span><a href="https://developers.moengage.com/hc/en-us/articles/11169263815828" target="_blank" rel="noopener noreferrer"><span style="font-weight: 400;">Update Subscription Preferences</span></a><span style="font-weight: 400;">.</span>
</p>
<p>
  <span style="font-weight: 400;">Note: In this case, campaign ID information is required along with user ID.</span>
</p>
<h1 id="h_01KAJDJ70FZFCK8XARJTWXD3RY">
  <span style="font-weight: 400;">Bulk update subscription preferences</span>
</h1>
<p>
  <span style="font-weight: 400;">This API updates subscription category preferences in bulk. Use this API for updating the user preferences to MoEngage in large volumes. For more information, refer to </span><a href="https://developers.moengage.com/hc/en-us/articles/11165605769364-Bulk-Update-Preferences-API" target="_blank" rel="noopener noreferrer"><span style="font-weight: 400;">Bulk Update Subscription Preferences</span></a><span style="font-weight: 400;">.</span>
</p>