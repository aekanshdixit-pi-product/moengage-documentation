openapi: 3.0.3
info:
  title: MoEngage Campaign Stats and Reports API
  description: API for fetching detailed campaign stats and downloading campaign reports.
  version: '1.0'
servers:
  - url: 'https://api-0{X}.moengage.com/core-services/v1'
    description: MoEngage Core Services API Server (for Stats).
    variables:
      X:
        default: '1'
        description: 'Your MoEngage Data Center (DC) number. Refer to MoEngage docs for your correct DC.'
  - url: 'https://api.moengage.com'
    description: MoEngage Campaign Reports API Server
tags:
  - name: Stats
    description: Fetch detailed, real-time campaign statistics.
  - name: Campaign Reports
    description: Download campaign report files.
paths:
  /campaign-stats:
    post:
      tags:
        - Stats
      summary: Get Campaign Stats
      description: |
        The **Stats API** allows you to fetch detailed campaign statistics synchronized in real time.
        This API fetches data at the platform level and provides stats for all types of campaigns.
      operationId: getCampaignStats
      security:
        - basicAuth: []
      parameters:
        - name: MOE-APPKEY
          in: header
          required: true
          schema:
            type: string
          description: |
            This is the **Workspace ID** (earlier APP ID) of your MoEngage workspace, which must be passed in the request.

            You can find your MoEngage Workspace ID in the MoEngage Dashboard under **Settings** -> **Account** -> **APIs** -> **Workspace ID**.
          example: 'YOUR_WORKSPACE_ID_XXXX'
      requestBody:
        $ref: '#/components/requestBodies/CampaignStatsRequest'
      responses:
        '200':
          description: Successful response containing campaign stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignStatsResponse'
              examples:
                android-push-stats:
                  summary: Example for Android Push
                  value:
                    response_id: 'abc'
                    total_campaigns: 1
                    current_page: 1
                    total_pages: 1
                    data:
                      '66e933029ff25f3322d8279d':
                        - platforms:
                            android:
                              locales:
                                all_locales:
                                  variations:
                                    all_variations:
                                      performance_stats:
                                        attempted: 2
                                        sent: 2
                                        failed: 0
                                        impression: 2
                                        click: 4
                                        ctr: 200
                                        delivery_rate: 100
                                        sent_rate: 100
                                        failure_rate: 0
                                      conversion_goal_stats:
                                        'Goal 1':
                                          conversions: 0
                                          cvr: 0
                                          uplift: 0
                                      delivery_funnel:
                                        reachable_users_in_segment: 2
                                        segment_after_uninstall: 2
                                        after_fc: 2
                                        users_after_dup: 2
                                        sent: 2
                                        user_devices: 2
                                        impressions: 2
                                        active_device_token: 2
                                      failure_breakdown: {}
                                    campaign_control_group:
                                      conversion_goal_stats:
                                        'Goal 1':
                                          conversions: 0
                                          cvr: 0
                                          uplift: 0
                                      delivery_funnel:
                                        reachable_users_in_segment: 0
                                      failure_breakdown:
                                        user_removed_due_to_campaing_control_group: 1
                                    global_control_group:
                                      conversion_goal_stats:
                                        'Goal 1':
                                          conversions: 0
                                          cvr: 0
                                          uplift: 0
                                      delivery_funnel:
                                        reachable_users_in_segment: 0
                                      failure_breakdown:
                                        user_removed_due_to_global_control_group: 1
                email-stats:
                  summary: Example for Email
                  value:
                    response_id: abc
                    total_campaigns: 1
                    current_page: 1
                    total_pages: 1
                    data:
                      '6763f09a1f53871780a63623':
                        - platforms:
                            EMAIL:
                              locales:
                                all_locale:
                                  variations:
                                    all_variations:
                                      performance_stats:
                                        attempted: 338095
                                        sent: 330285
                                        open: 138131
                                        delivered: 321226
                                        click: 51
                                        unsubscribe: 135
                                        complaint: 1
                                        hard_bounce: 4
                                        soft_bounce: 9071
                                        bounce: 9075
                                        failed: 5695
                                        ctr: 0.02
                                        open_rate: 38.18
                                        delivery_rate: 97.26
                                        ctor: 0.03
                                        unsub_rate: 0.04
                                        bounce_rate: 2.75
                                        complaints_rate: 0
                                        sent_rate: 97.69
                                        failure_rate: 1.68
                                      conversion_goal_stats:
                                        'Order Confirmation Status':
                                          goal_name: 'Goal 1'
                                      delivery_funnel:
                                        sent: 330285
                                        user_with_email: 338095
                                        user_with_email_after__h_b: 333017
                                        user_after_duplicate_removal: 330285
                                        after_invalid_removal: 330285
                                        after_fc: 330285
                                        delivered: 321226
                                      failure_breakdown:
                                        'bounces,__unsubscribes,__complaints_removed': 5078
                                        duplicate__emails_removed: 617
                                    global_control_group:
                                      conversion_goal_stats:
                                        'Order Confirmation Status':
                                          goal_name: 'Goal 1'
                                      delivery_funnel: {}
                                      failure_breakdown:
                                        users_removed_due_to__global__control__group: 2100
        '400':
          $ref: '#/components/responses/Error400Stats'
        '401':
          $ref: '#/components/responses/Error401Stats'
        '403':
          $ref: '#/components/responses/Error403Stats'
        '429':
          $ref: '#/components/responses/Error429Stats'
        '500':
          $ref: '#/components/responses/Error500Stats'
  /campaign_reports/rest_api/{APP_ID}/{FILENAME}:
    get:
      tags:
        - Campaign Reports
      summary: Download Campaign Report
      description: 'Download a campaign report file. The API uses a custom Signature header for authentication, generated by hashing (SHA256) a combination of your API_ID, the FILENAME, and your SECRET_KEY.'
      operationId: downloadCampaignReport
      security:
        - apiKeySignature: []
      parameters:
        - name: APP_ID
          in: path
          required: true
          schema:
            type: string
          description: 'Your MoEngage App ID (Workspace ID).'
          example: 'YOUR-APP-ID'
        - name: FILENAME
          in: path
          required: true
          schema:
            type: string
          description: 'The name of the report file to download (e.g., Report_-_test_20210217.zip).'
          example: 'Report_-_test_20210217.zip'
      responses:
        '200':
          description: Successful API request. The report file is returned.
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        '400':
          description: 'Bad Request. Invalid report file name, file name format, report is older than 7 days, or incorrect App Id.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseCampaignReport'
        '401':
          description: 'Unauthorized. Invalid Signature or Signature Missing.'
          content:
            application/json:
              schema:
                type: object
                description: Empty body.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic Authentication uses your **Workspace ID** (username) and your **Campaign Report API Key** (password).
        These credentials can be found in the MoEngage Dashboard under **Settings** > **Account** > **APIs**.
    apiKeySignature:
      type: apiKey
      in: header
      name: Signature
      description: 'A custom signature generated by SHA256(Api_ID + "|" + FILENAME + "|" + SECRET_KEY).'
  requestBodies:
    CampaignStatsRequest:
      description: Request body to fetch campaign stats.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CampaignStatsRequest'
          examples:
            with-campaign-ids:
              summary: With Campaign IDs
              value:
                request_id: 'abc'
                campaign_ids:
                  - 6643773d4fe37fe7a10b718e
                  - 6645fbae1101e4c6611b15c7
                  - 67c1cfc8c1b46a5ad5022de7
                start_date: '2024-12-22'
                end_date: '2024-12-23'
                attribution_type: VIEW_THROUGH
                metric_type: TOTAL
            without-campaign-ids:
              summary: Without Campaign IDs
              value:
                request_id: 'abc'
                start_date: '2024-12-22'
                end_date: '2024-12-23'
                attribution_type: VIEW_THROUGH
                metric_type: TOTAL
  responses:
    Error400Stats:
      description: 'Bad Request. Possible issues include duplicates, invalid data types, or missing mandatory attributes.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseSimple'
          example:
            title: Invalid Field Value
            description: 'app_key - Some of the field values are invalid: app_key : None'
            code: wUcwPRZF
    Error401Stats:
      description: 'Unauthorized. Provide appropriate authentication credentials.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseSimple'
          example:
            title: Authentication required
            description: Invalid identity information found.
            code: wUcwPRZF
    Error403Stats:
      description: 'Forbidden. Your account does not have access to this feature.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseSimple'
          example:
            title: Forbidden Request
            description: null
            code: kmqLuuHM
    Error429Stats:
      description: |
        **Too many requests.**
        This response is returned when the number of requests per minute
        has exceeded the rate limit (100 API calls/min/workspace).
      content: {}
    Error500Stats:
      description: 'Internal Server Error. The system ran into an unexpected error.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseSimple'
          example:
            title: Server Error
            description: An unexpected error was encountered while processing this request. Please contact MoEngage Team
            code: jDTGSxjd
  schemas:
    CampaignStatsRequest:
      type: object
      required:
        - request_id
        - start_date
        - end_date
        - attribution_type
        - metric_type
      properties:
        request_id:
          type: string
          description: This field shows the request ID created by a user. Helps to know the API calls made by the client.
        campaign_ids:
          type: array
          items:
            type: string
          description: A list of campaign IDs (up to 10 max per call).
          maxItems: 10
        start_date:
          type: string
          format: date
          description: The start date of the campaign in YYYY-MM-DD format.
          example: '2024-12-22'
        end_date:
          type: string
          format: date
          description: |
            The campaign's end date in YYYY-MM-DD format. 
            The days between the start and end dates should not exceed 30 days.
          example: '2024-12-23'
        attribution_type:
          type: string
          description: The attribution type that should be picked to show conversion stats.
          enum:
            - VIEW_THROUGH
            - CLICK_THROUGH
            - IN_SESSION
            - TOTAL_CONVERSIONS
            - CLICK_CONVERSIONS
        offset:
          type: integer
          description: |
            The position of a record in a dataset (for pagination). Default is 0. 
            For example, set the offset to 50 to see the data from page 51.
          default: 0
        limit:
          type: integer
          description: The maximum number of campaigns to return. The default and maximum limit is **10** campaigns.
          default: 10
          maximum: 10
        metric_type:
          type: string
          description: Whether to show total or unique values for metrics.
          enum:
            - TOTAL
            - UNIQUE
    CampaignStatsResponse:
      type: object
      properties:
        response_id:
          type: string
          description: The response ID, which is the same as the request ID passed in the payload.
        total_campaigns:
          type: integer
          description: The total number of campaigns that are requested in the payload.
        current_page:
          type: integer
          description: The current page number.
        total_pages:
          type: integer
          description: |
            The total number of pages. It is equal to the total campaigns,
            which is limited to 10 for each call and 10 to be displayed for each page.
        data:
          type: object
          description: 'A map where each key is a Campaign ID. The value is an array of campaign stat objects.'
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/CampaignStatsDetails'
    CampaignStatsDetails:
      type: object
      properties:
        platforms:
          $ref: '#/components/schemas/Platforms'
    Platforms:
      type: object
      description: |
        An object where keys are platform names (e.g., "android", "EMAIL", "WEB"). 
        This field indicates the platforms where the user has engaged with your communication.
      additionalProperties:
        $ref: '#/components/schemas/PlatformStats'
    PlatformStats:
      type: object
      properties:
        locales:
          $ref: '#/components/schemas/Locales'
    Locales:
      type: object
      description: 'An object where keys are locale names (e.g., "all_locales"). This field indicates the details of the locales configured.'
      additionalProperties:
        $ref: '#/components/schemas/LocaleStats'
    LocaleStats:
      type: object
      properties:
        variations:
          $ref: '#/components/schemas/Variations'
    Variations:
      type: object
      description: |
        This object contains details of the variations of your locale. It includes:
        - `all_variations`
        - `campaign_control_group`
        - `global_control_group`
      properties:
        all_variations:
          $ref: '#/components/schemas/VariationDetails'
        campaign_control_group:
          $ref: '#/components/schemas/VariationDetails'
        global_control_group:
          $ref: '#/components/schemas/VariationDetails'
    VariationDetails:
      type: object
      description: Contains all stats for a specific variation or control group.
      properties:
        performance_stats:
          $ref: '#/components/schemas/PerformanceStats'
        conversion_goal_stats:
          $ref: '#/components/schemas/ConversionGoalStats'
        delivery_funnel:
          $ref: '#/components/schemas/DeliveryFunnel'
        failure_breakdown:
          $ref: '#/components/schemas/FailureBreakdown'
    PerformanceStats:
      type: object
      description: Campaign performance metrics.
      properties:
        attempted:
          type: integer
          description: This field shows the number of communication attempts made from a campaign.
        sent:
          type: integer
          description: This field shows the number of communications sent from a campaign.
        failed:
          type: integer
          description: This field shows the number of communications that failed to reach customers from a campaign.
        bounced:
          type: integer
          description: This field shows the number of communications bounced for various reasons (Email channel only).
        impression:
          type: integer
          description: This field shows the number of times your communication appeared to the user from your campaign.
        click:
          type: integer
          description: This field shows the number of times your users clicked the message from your communication.
        opened:
          type: integer
          description: This field shows the number of communications opened by the user (Email channel only).
        delivered:
          type: integer
          description: This field shows the number of communications delivered to the customer.
        read:
          type: integer
          description: This field shows the number of customers who read your communications (WhatsApp channel only).
        closed_click:
          type: integer
          description: This field shows the number of messages closed by your customers by clicking the close button.
        unsubscribe:
          type: integer
          description: This field shows the number of customers who have unsubscribed from your email (Email channel only).
        ctr:
          type: number
          format: double
          description: |
            This field shows the click-through rates (CTR) from your communication.
            Calculated as **CTR = Clicks / Impressions**.
        delivery_rate:
          type: number
          format: double
          description: This field shows the rate of delivery of your communication to the customers.
        read_rate:
          type: number
          format: double
          description: |
            This field shows the message rate of your communication that your customers have read (WhatsApp channel only).
            Calculated as **UniqueRead / UniqueDelivered * 100**.
        successfully_synced:
          type: integer
          description: Number of users successfully synced to the audience (FB Audience, Google Ads Audience).
        sent_rate:
          type: number
          format: double
          description: |
            This field shows the rate of your communication sent to your customers.
            Calculated as **Sent / Attempted * 100**.
        failure_rate:
          type: number
          format: double
          description: |
            This field shows the rate of failures of your communication.
            Calculated as **(Attempted - Sent) / Attempted * 100**.
        eligible_users:
          type: integer
          description: This field shows the number of eligible users for your campaign (FB Audience, Google Ads Audience).
        complaint:
          type: integer
          description: This field shows the count of complaints registered by your customers (Email channel only).
        hard_bounce:
          type: integer
          description: This field shows the hard bounces for the Emails you sent (Email channel only).
        soft_bounce:
          type: integer
          description: This field shows the soft bounces for the Emails you sent (Email channel only).
        open_rate:
          type: number
          format: double
          description: This field shows the open rates of the Emails you sent (Email channel only).
        ctor:
          type: number
          format: double
          description: This field shows the click-through open rates (CTOR) of the Emails you sent (Email channel only).
        unsub_rate:
          type: number
          format: double
          description: This field shows the unsubscription rates for your Emails (Email channel only).
        bounce_rate:
          type: number
          format: double
          description: This field shows the bounce rates for the Emails you sent (Email channel only).
        complaints_rate:
          type: number
          format: double
          description: This field shows the complaint rates for the Emails you sent (Email channel only).
    ConversionGoalStats:
      type: object
      description: 'A map where keys are conversion goal names (e.g., "Goal 1"). This object shows the conversion goal stats of your campaign.'
      additionalProperties:
        $ref: '#/components/schemas/ConversionGoal'
    ConversionGoal:
      type: object
      description: Stats for a specific conversion goal.
      properties:
        goal_name:
          type: string
        conversions:
          type: integer
          description: This field shows the number of conversions from your communication.
        cvr:
          type: number
          format: double
          description: This field shows the conversion rate (CVR) for your communication.
        uplift:
          type: number
          format: double
          description: This field shows the percentage change in the performance metrics.
        total:
          type: integer
        unique:
          type: integer
        revenue:
          type: number
        average_order_value:
          type: number
        average_revenue_per_user:
          type: number
        gcg_uplift:
          type: number
    DeliveryFunnel:
      type: object
      description: Funnel metrics for message delivery.
      properties:
        reachable_users_in_segment:
          type: integer
          description: This field shows the number of reachable customers in a segment.
        segment_after_uninstall:
          type: integer
          description: This field shows the count of customers after uninstall (Push channel only).
        after_fc:
          type: integer
          description: |
            This field shows the number of users obtained after removing emails
            that have crossed Frequency Capping (FC) from the After Invalid/Duplicate removal count.
        users_after_dup:
          type: integer
          description: This field shows the customer count after duplication (Push channel only).
        sent:
          type: integer
          description: This field shows the count of communications you have sent.
        user_devices:
          type: integer
          description: This field shows the details of the devices used by the customer (Push channel only).
        impressions:
          type: integer
          description: This field shows the number of impressions made by your communication (Push channel only).
        active_device_token:
          type: integer
          description: This field shows the count of active device tokens (Push channel only).
        after_invalid_removal:
          type: integer
          description: This field shows the count of customers after invalid removal.
        total_user_in_segment:
          type: integer
        user_with_email:
          type: integer
        user_with_email_after__h_b:
          type: integer
        user_after_duplicate_removal:
          type: integer
        after_personalization_removal:
          type: integer
        delivered:
          type: integer
    FailureBreakdown:
      type: object
      description: 'A map where keys are failure reasons (e.g., "duplicate__emails_removed"). This object shows the failure breakdown of your campaign.'
      additionalProperties:
        type: integer
    ErrorResponseSimple:
      type: object
      description: Standard error response for the Stats API.
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        code:
          type: string
    ErrorResponseCampaignReport:
      type: object
      description: Standard error response for the Campaign Report API 400 error.
      properties:
        error:
          type: object
          properties:
            attribute:
              type: string
            message:
              type: string
            type:
              type: string
              example: BAD REQUEST
            request_id:
              type: string