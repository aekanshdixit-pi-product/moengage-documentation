openapi: 3.0.3
info:
  title: MoEngage Campaign Stats and Reports API
  description: API for fetching detailed campaign stats and downloading campaign reports.
  version: '1.0'
servers:
  - url: https://api-0{X}.moengage.com/core-services/v1
    description: MoEngage Core Services API Server (for Stats)
    variables:
      X:
        default: '1'
        description: Your MoEngage Data Center (DC) number. Refer to MoEngage docs for your correct DC.
  - url: https://api.moengage.com
    description: MoEngage Campaign Reports API Server
tags:
  - name: Stats
    description: Fetch detailed, real-time campaign statistics.
  - name: Campaign Reports
    description: Download campaign report files.
paths:
  /campaign-stats:
    post:
      tags:
        - Stats
      summary: Get Campaign Stats
      description: >
        Stats API allows you to fetch detailed campaign stats synchronized in real time. 
        This API fetches data at the platform level and provides data for all types of campaigns.
      operationId: getCampaignStats
      x-mint-content: |
        <Note>
        Each customer is hosted on a different data center; you can find your data center number (value of X) by checking the [data center and API endpoint mapping page](https://help.moengage.com/hc/en-us/articles/360057030512-Data-Centers-in-MoEngage#01G5DQVXGT2KZMXTJPF77QPJ25).
        </Note>

        ### Authentication
        The API request will be authenticated through Basic Authentication. Basic Authentication sends a Base64-encoded string containing your username and password with every API request.
        `{"Authorization": "Basic Base64_ENCODED_APPKEY_APIKEY"}`

        ### Rate Limit
        This API provides all version stats, and the call rate is limited to **100 API calls per minute or workspace**.

        ### FAQ
        **1. What will the API response be if I pass the start date alone?**
        Answer: If only the start date is passed without the end date, the API will return an error response. Both the start and end dates are required to retrieve the desired response.

        **2. If I pass the start and end dates without any campaign ID, will I also get the child campaign stats?**
        Answer: When providing the start and end dates without any campaign ID, the API will return the stats for both the parent and child campaigns.

        **3. How do we identify the stats belonging to the parent campaign in the response?**
        Answer: Use the "Campaign Details and Reachability" API. The parent campaign ID field will not be available for the parent campaign.
      security:
        - basicAuth: []
      parameters:
        - name: MOE-APPKEY
          in: header
          required: true
          schema:
            type: string
          description: |
            This is the workspace ID (earlier APP ID) of your MoEngage workspace. 
            Found in: Settings -> Account -> APIs -> Workspace ID.
          example: YOUR_WORKSPACE_ID_XXXX
      requestBody:
        $ref: '#/components/requestBodies/CampaignStatsRequest'
      responses:
        '200':
          description: Successful response. Returned upon a successful request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignStatsResponse'
        '400':
          description: Bad request. Possible issues include duplicates, invalid data types, or missing mandatory attributes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseSimple'
        '401':
          description: Unauthorized. Provide appropriate authentication credentials.
        '403':
          description: Forbidden. Returned when your account does not have access to the campaign stats management features.
        '429':
          description: Too many requests. Returned when the number of requests per minute has exceeded the rate limit.
        '500':
          description: Internal server error. Returned when the system runs into an unexpected error.
  /campaign_reports/rest_api/{APP_ID}/{FILENAME}:
    get:
      tags:
        - Campaign Reports
      summary: Download Campaign Report
      description: |
        Campaign Report API lets you download campaign reports for any specific date range. 
        You can fetch reports for one-time and periodic campaigns.
      operationId: downloadCampaignReport
      x-mint-content: |
        <Info>
        Ensure some buffer time from the scheduled time, as the reports are generated using the API. The generated report expires within seven days.
        </Info>

        ### FAQ
        **1. Why am I not receiving any response for the selected date?**
        Campaigns might not be available to run on the selected date to fetch the report, which could result in an error message.

        **2. Can I retrieve the report file whenever needed?**
        The reports generated will expire in 7 days from the date of creation.

        **3. What is the maximum number of days I can choose to generate reports?**
        You can generate reports for up to 90 days.
      security:
        - apiKeySignature: []
      parameters:
        - name: APP_ID
          in: path
          required: true
          schema:
            type: string
          description: Your MoEngage App ID (Workspace ID), fetched from Settings > Account > APIs.
          example: YOUR-APP-ID
        - name: FILENAME
          in: path
          required: true
          schema:
            type: string
          description: |
            A combination of the report name (spaces replaced by underscores), generation date (YYYYMMDD), and extension (.zip).
            Example: Report_-_test_20210217.zip
          example: Report_-_test_20210217.zip
      responses:
        '200':
          description: Successful API request automatically downloads the report file.
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        '400':
          description: |
            Bad Request. Reasons include:
            1. Invalid Report file name/format.
            2. Report is older than 7 days.
            3. Incorrect App Id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseCampaignReport'
        '401':
          description: Unauthorized. Invalid Signature or Signature Missing.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic Authentication using Workspace ID (username) and Campaign Report API Key (password).
    apiKeySignature:
      type: apiKey
      in: header
      name: Signature
      description: 'A custom signature: hex(sha256(Api_ID + "|" + FILENAME + "|" + SECRET_KEY)).'
  requestBodies:
    CampaignStatsRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CampaignStatsRequest'
  schemas:
    CampaignStatsRequest:
      type: object
      required:
        - request_id
        - start_date
        - end_date
        - attribution_type
        - metric_type
      properties:
        request_id:
          type: string
          description: User-created ID to help track API calls made by the client.
        campaign_ids:
          type: array
          items:
            type: string
          description: List of campaign IDs, up to 10 max per call.
          maxItems: 10
        start_date:
          type: string
          format: date
          description: The start date of the campaign in YYYY-MM-DD format.
        end_date:
          type: string
          format: date
          description: The campaign's end date in YYYY-MM-DD format. Range must not exceed 30 days.
        attribution_type:
          type: string
          description: Attribution type to show conversion stats.
          enum:
            - VIEW_THROUGH
            - CLICK_THROUGH
            - IN_SESSION
            - TOTAL_CONVERSIONS
            - CLICK_CONVERSIONS
        offset:
          type: integer
          description: Position of a record in a dataset. Default is 0.
          default: 0
        limit:
          type: integer
          description: Maximum number of campaigns displayed on a page. Max is 10.
          default: 10
          maximum: 10
        metric_type:
          type: string
          description: Total or unique values of all the metrics.
          enum:
            - TOTAL
            - UNIQUE
    CampaignStatsResponse:
      type: object
      properties:
        response_id:
          type: string
          description: Same as the request ID passed in the payload.
        total_campaigns:
          type: integer
          description: Total number of campaigns requested.
        current_page:
          type: integer
          description: Current page number.
        total_pages:
          type: integer
          description: Total pages (limited to 10 campaigns per page).
        data:
          type: object
          description: Contains the campaign stats.
    ErrorResponseSimple:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        code:
          type: string
    ErrorResponseCampaignReport:
      type: object
      properties:
        error:
          type: object
          properties:
            attribute:
              type: string
            message:
              type: string
            type:
              type: string
              example: BAD REQUEST
            request_id:
              type: string