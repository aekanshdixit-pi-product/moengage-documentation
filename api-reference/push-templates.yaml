  /custom-templates/push/search:
    post:
      tags:
        - Templates
      summary: Search for Push Templates
      description: |
        Searches for push templates based on a variety of filter criteria. Sending an empty request body will fetch all templates.
        
        **Rate Limit:** 100 RPM.
      operationId: searchPushTemplates
      requestBody:
        description: A JSON object containing filters for the search.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page: 
                  type: integer
                  description: "The page number for pagination."
                  default: 1
                entries: 
                  type: integer
                  description: "Number of entries per page."
                  default: 10
                template_name: 
                  type: string
                  description: "Filter by template name (partial match supported)."
                platform: 
                  type: array
                  items: 
                    type: string
                    enum: [ANDROID, IOS]
                template_source: 
                  type: array
                  items: 
                    type: string
                    enum: [API, MOENGAGE]
                template_style: 
                  type: array
                  items: 
                    type: string
                    enum: [BASIC, STYLIZED]
                template_type: 
                  type: array
                  items: 
                    type: string
                    enum: [CUSTOM, PRE_BUILT]
                created_by: 
                  type: array
                  items: 
                    type: string
                    format: email
                updated_by: 
                  type: array
                  items: 
                    type: string
                    format: email
                sort_params:
                  type: array
                  items:
                    type: object
                    properties:
                      template_name: { type: string, enum: [ASCENDING, DESCENDING] }
                      last_modified_date: { type: string, enum: [ASCENDING, DESCENDING] }
                      last_modified_by: { type: string, enum: [ASCENDING, DESCENDING] }
                template_ids:
                  type: array
                  items:
                    type: object
                    properties:
                      external_template_id: { type: string, format: uuid }
                      version: { type: integer }
            examples:
              ComplexSearch:
                summary: Complex Search Filter
                value:
                  page: 1
                  entries: 10
                  template_name: "NAME_OF_THE_TEMPLATE"
                  platform: ["ANDROID", "IOS"]
                  template_source: ["API","MOENGAGE"]
                  template_style: ["BASIC", "STYLIZED"]
                  template_type: ["CUSTOM", "PRE_BUILT"]
                  created_by: ["user1@moengage.com", "user2@moengage.com"]
                  updated_by: ["user1@moengage.com", "user2@moengage.com"]
                  sort_params: [{"last_modified_date": "DESCENDING"}]

      responses:
        '200':
          description: Search completed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        external_template_id: { type: string, format: uuid }
                        version: { type: integer }
                        ANDROID: { $ref: '#/components/schemas/AndroidPayload' }
                        IOS: { $ref: '#/components/schemas/IosPayload' }
                        meta_info: { type: object }
                        created_by: { type: string }
                        created_at: { type: string, format: date-time }
                        updated_by: { type: string }
                        updated_at: { type: string, format: date-time }
              example:
                data:
                  - external_template_id: "9b09875c-edda-42e9-8f9f-a7d0a9a2aa26"
                    version: 2
                    ANDROID:
                      basic_details:
                        background_color_code: "#ffffff"
                        notification_control_color: "Dark"
                        apply_background_color: false
                        title: "Winter Sale 50% Off"
                        message: "Sample Message"
                        summary: "Sample Summary"
                        image_url: ""
