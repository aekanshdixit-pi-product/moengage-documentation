openapi: 3.0.3
info:
  title: Push Templates API
  description: |
    An API for creating, updating, and searching for push notification templates for Android and iOS platforms.

    ## External Links
    * [Postman Collection](https://www.postman.com/moengage-dev/workspace/api-docs/collection/3182294-7980d47d-248a-4060-96d2-a7d9ebc3e22d?action=share&creator=3182294&ctx=documentation)
    * [MoEngage Help Center](https://help.moengage.com/hc/en-us/articles/4415622460948-Push-Templates)

    ## FAQs
    * **Can I create a template that is supported only on iOS?**
      Yes, you can send only the iOS payload if you want to create a template for iOS.
    * **What are the different types of image, video, and audio files supported?**
      * Audio/Video: All formats supported by standard FCM/APNS.
      * Images: png, jpeg, jpg, gif.
    * **Can I create multiple templates with the same name?**
      Yes, provided they have different versions.
  version: "1.0"
  x-logo:
    url: "https://images.g2crowd.com/uploads/product/image/social_landscape/social_landscape_4cb13a53c5240c218206532439a2f15a/moengage.png"
    altText: "MoEngage Logo"

x-tagGroups:
  - name: Push Templates
    tags:
      - Templates

servers:
  - url: https://api-0{data_center}.moengage.com/v1.0
    description: MoEngage API Server.
    variables:
      data_center:
        default: '1'
        description: 'Your account''s data center number (e.g., 1 for US, 2 for EU, 3 for India).'

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: "HTTP Basic Authentication using your Workspace ID as the username and API Key as the password."

  schemas:
    # --- Shared Components ---
    KeyValue:
      type: object
      properties:
        key:
          type: string
          description: The key for the data pair.
        value:
          type: string
          description: The value for the data pair.
      required:
        - key
        - value

    # --- Android Components ---
    AndroidButton:
      type: object
      properties:
        btn_name:
          type: string
          description: The name/label of the button.
        click_action_type:
          type: string
          description: |
            The type of action to perform when the button is clicked.
          enum:
            - NAVIGATE_TO_A_SCREEN
            - DEEPLINKING
            - RICH_LANDING
            - CALL
            - SHARE
            - COPY
            - SET_USER_ATTRIBUTE
            - TRACK_EVENT
            - CUSTOM_ACTION
            - SNOOZE
            - REMIND_LATER
        click_action_name:
          type: string
          description: Required when click_action_type is SET_USER_ATTRIBUTE or TRACK_EVENT. This is the key for the key-value pair.
        click_action_value:
          type: string
          description: The value associated with the click action (e.g., URL, screen name).
        key_value_pairs:
          type: array
          items:
            $ref: '#/components/schemas/KeyValue'
      required:
        - btn_name
        - click_action_type
        - click_action_value

    AndroidPayload:
      type: object
      description: Definition of the template for the Android platform.
      properties:
        basic_details:
          type: object
          required:
            - title
            - message
            - default_click_action
            - default_click_action_value
          properties:
            title: 
              type: string
              description: "The title of the message."
            message: 
              type: string
              description: "The message content."
            summary: 
              type: string
              description: "A brief description of the message content."
            app_name_color_code: 
              type: string
              description: "Hexadecimal color code for the app name (e.g., #5450ea). Not available for Basic Notification template."
            notification_control_color: 
              type: string
              enum: [Light, Dark]
              description: "Color theme for notification controls. Not available for Basic Notification template."
            background_color_code: 
              type: string
              description: "Hexadecimal color code for the notification background (e.g., #f5e6cd). Not available for Basic Notification template."
            apply_background_color: 
              type: boolean
              description: "If true, applies the background color to text fields (Title, Message, Summary). Recommended for lighter font colors. Not available for Basic Notification template."
            image_url: 
              type: string
              format: uri
              description: "URL for the image to be added. Allowed formats: jpg, jpeg, png, gif."
            input_gif_url: 
              type: string
              format: uri
              description: "URL for a GIF. Supported only for Android Basic Template."
            default_click_action: 
              type: string
              enum: [NAVIGATE_TO_A_SCREEN, DEEPLINKING, RICH_LANDING]
              description: "Default action when user clicks the notification."
            default_click_action_value: 
              type: string
              description: "The value for the click action (e.g., screen name, URL, or Rich Landing URL)."
            key_value_pairs: 
              type: array
              items: 
                $ref: '#/components/schemas/KeyValue'
        buttons:
          type: array
          items:
            $ref: '#/components/schemas/AndroidButton'
        advanced:
          type: object
          properties:
            coupon_code: 
              type: string
              description: "Coupon code to be sent with the notification."
            icon_type_in_notification: 
              type: string
              enum: [appicon, upload, url]
              description: "Type of icon to be used."
            large_icon_url: 
              type: string
              format: uri
              description: "URL for the large icon."
            auto_dismiss_notification: 
              type: boolean
              description: "Whether notification should be auto-dismissed."
            dismissal_time_multiplier: 
              type: string
              enum: [DAYS, HOURS, MINUTES]
              description: "Unit of time for auto-dismissal."
            dismissal_time_value: 
              type: integer
              description: "Value of time for auto-dismissal."
            make_notification_sticky: 
              type: boolean
              description: "If true, notification cannot be dismissed by swiping. Not available for Basic Notification template."
            dismiss_button_text: 
              type: string
              description: "Text for the dismiss button (required if sticky)."
            group_key: 
              type: string
              description: "Key to group related notifications. Max 45 chars (ASCII only)."
            collapse_replace_key: 
              type: string
              description: "Key to identify notifications that should be replaced by newer ones."
        template_backup:
          type: object
          description: "Fallback for Android SDK versions below 10.3.00. Applicable only to Stylized Basic template."
          properties:
            title: { type: string, description: "Title of the backup message." }
            message: { type: string, description: "Content of the backup message." }
            summary: { type: string, description: "Summary of the backup message." }
            image_url: { type: string, format: uri }
            default_click_action: { type: string, enum: [NAVIGATE_TO_A_SCREEN, DEEPLINKING, RICH_LANDING] }
            default_click_action_value: { type: string }
            key_value_pairs: { type: array, items: { $ref: '#/components/schemas/KeyValue' } }
          required:
            - title
            - message
            - default_click_action
            - default_click_action_value

    # --- iOS Components ---
    IosButton:
      type: object
      properties:
        button_category:
          type: string
          description: The category of the button, which corresponds to an actionable notification category implemented in the app.

    IosPayload:
      type: object
      description: Definition of the template for the iOS platform.
      properties:
        basic_details:
          type: object
          required:
            - title
            - message
            - default_click_action_value
          properties:
            title: { type: string, description: "The title of the message." }
            subtitle: { type: string, description: "The subtitle of the message." }
            message: { type: string, description: "The message content." }
            background_color_code: { type: string, example: "#f5e6cd", description: "Hex background color. Not available for Basic Notification template." }
            apply_background_color: { type: boolean, description: "Apply background color to text fields. Not available for Basic Notification template." }
            default_click_action: { type: string, enum: [NAVIGATE_TO_A_SCREEN, DEEPLINKING, RICH_LANDING], description: "Default action on click." }
            default_click_action_value: { type: string, description: "Screen name, deep-link URI, or rich landing URL." }
            key_value_pairs: { type: array, items: { $ref: '#/components/schemas/KeyValue' } }
            rich_media_type: { type: string, enum: [IMAGE, AUDIO, VIDEO, GIF], description: "Type of rich media. Not available for Stylized Basic template." }
            rich_media_value: { type: string, format: uri, description: "URL of the rich media." }
            allow_bg_refresh: { type: boolean, description: "Allow app background refresh." }
        buttons:
          type: array
          items:
            $ref: '#/components/schemas/IosButton'
        advanced:
          type: object
          properties:
            coupon_code: { type: string }
            sound_file: { type: string, description: "Name of the sound file to play." }
            enable_ios_badge: { type: boolean, description: "Show badge count on app icon." }
            group_key: { type: string, description: "Group key (thread-id)." }
            collapse_replace_key: { type: string, description: "Update key (collapse-id)." }
        template_backup:
          type: object
          description: "Fallback for iOS SDK versions below 6.2.0. Applicable only to Stylized Basic template."
          properties:
            title: { type: string }
            subtitle: { type: string }
            message: { type: string }
            default_click_action: { type: string, enum: [NAVIGATE_TO_A_SCREEN, DEEPLINKING, RICH_LANDING] }
            default_click_action_value: { type: string }
            key_value_pairs: { type: array, items: { $ref: '#/components/schemas/KeyValue' } }
            rich_media_type: { type: string, enum: [IMAGE, AUDIO, VIDEO] }
            rich_media_value: { type: string, format: uri }
            allow_bg_refresh: { type: boolean }
          required:
            - title
            - message
            - default_click_action
            - default_click_action_value

    # --- Meta Info ---
    MetaInfoCreate:
      type: object
      description: Metadata associated with the template creation.
      required:
        - platform
        - template_style
        - template_id
        - template_name
        - template_version
        - created_by
      properties:
        platform:
          type: array
          items:
            type: string
            enum: [ANDROID, IOS]
          description: List of platforms (ANDROID, IOS).
        template_style:
          type: string
          enum: [BASIC, STYLIZED]
          description: Style of the template.
        template_id:
          type: string
          description: "Unique ID generated by you."
        template_name:
          type: string
          description: "Name of the template."
        template_version:
          type: string
          description: "Version of the template."
        created_by:
          type: string
          description: "Identifier of the creator (e.g., email)."

    MetaInfoUpdate:
      type: object
      description: Metadata associated with the template update.
      required:
        - platform
        - template_style
        - updated_by
        - template_name
      properties:
        platform:
          type: array
          items:
            type: string
            enum: [ANDROID, IOS]
        template_style:
          type: string
          enum: [BASIC, STYLIZED]
        updated_by:
          type: string
          description: "Identifier of the user updating the template."
        template_name:
          type: string
        template_version:
          type: string
          description: "The new version identifier."
        vendor_template_id:
          type: string
          description: "Your internal unique ID for the template (Optional)."

    # --- Error Responses ---
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "400 Bad Request"
            message:
              type: string
              example: "Validation failed because of invalid request data"
            details:
              type: array
              items:
                type: object
                properties:
                  code: { type: string, example: "MissingValue" }
                  target: { type: string, example: "template_name" }
                  message: { type: string, example: "template_name value is required but value is passed empty." }
            request_id:
              type: string
              example: "jUxStmFn"
    
    SimpleErrorResponse:
      type: object
      properties:
        title:
          type: string
          example: "Authentication required"
        description:
          type: string
          example: "MOE-APPKEY missing in Authentication Header"

security:
  - BasicAuth: []

paths:
  /custom-templates/push:
    post:
      tags:
        - Templates
      summary: Create Push Template
      description: |
        Creates a new push notification template. You can specify payloads for ANDROID, IOS, or both.
        
        **Rate Limit:** 100 RPM (Requests Per Minute).
      operationId: createPushTemplate
      requestBody:
        description: A JSON object containing the template definitions.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ANDROID:
                  $ref: '#/components/schemas/AndroidPayload'
                IOS:
                  $ref: '#/components/schemas/IosPayload'
                meta_info:
                  $ref: '#/components/schemas/MetaInfoCreate'
              required:
                - meta_info
            examples:
              # --- Stylized Examples ---
              Stylized_Android_iOS:
                summary: 1. Stylized (Android & iOS)
                value:
                  ANDROID:
                    basic_details:
                      app_name_color_code: "APP_NAME_COLOR_CODE"
                      notification_control_color: "Light/Dark"
                      background_color_code: "BG_COLOR_CODE"
                      title: "TITLE_OF_ANDROID_TEMPLATE"
                      message: "MESSAGE_OF_ANDROID_TEMPLATE"
                      summary: "SUMMARY"
                      image_url: "IMAGE_URL"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "CLICK_ACTION_URL_HERE"
                      key_value_pairs: [{ "key": "KEY", "value": " VALUE" }]
                    buttons:
                      - btn_name: "NAME_OF_THE_BUTTON"
                        click_action_type: "NAVIGATE_TO_A_SCREEN"
                        click_action_name: "VALID_CLICK_ACTION_NAME_HERE"
                        click_action_value: "CLICK_ACTION_URL_HERE"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      icon_type_in_notification: "appicon"
                      auto_dismiss_notification: true
                      dismissal_time_multiplier: "hours"
                      dismissal_time_value: 1
                      make_notification_sticky: true
                      dismiss_button_text: "DISMISS_BUTTON_TEXT_HERE"
                    template_backup:
                      title: "TITLE_OF_ANDROID_BACKUP_TEMPLATE"
                      message: "MESSAGE_OF_ANDROID_BACKUP_TEMPLATE"
                      summary: "SUMMARY"
                      image_url: "IMAGE_URL"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "CLICK_ACTION_URL_HERE"
                      key_value_pairs: [{ "key": "KEY", "value": " VALUE" }]
                  IOS:
                    basic_details:
                      background_color_code: "BG_COLOR_CODE"
                      title: "TITLE_OF_IOS_TEMPLATE"
                      subtitle: "SUBTITLE_OF_IOS_TEMPLATE"
                      message: "MESSAGE_OF_IOS_TEMPLATE"
                      rich_media_value: "RICH_MEDIA_URL_HERE"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "CLICK_ACTION_URL_HERE"
                      allow_bg_refresh: true
                    buttons:
                      - button_category: "CATEGORY_OF_BUTTON"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      sound_file: "SOUND_FILE"
                      enable_ios_badge: true
                    template_backup:
                      title: "TITLE_OF_IOS_TEMPLATE"
                      subtitle: "SUBTITLE_OF_IOS_TEMPLATE"
                      message: "MESSAGE_OF_IOS_TEMPLATE"
                      rich_media_value: "RICH_MEDIA_URL_HERE"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "CLICK_ACTION_URL_HERE"
                      allow_bg_refresh: true
                  meta_info:
                    platform: ["ANDROID", "IOS"]
                    template_style: "STYLIZED"
                    template_id: "1234567890"
                    template_name: "NAME_OF_THE_TEMPLATE"
                    template_version: "VERSION_OF_THE_TEMPLATE"
                    created_by: "USER_CREATED"

              Stylized_Android_Only:
                summary: 2. Stylized (Android Only)
                value:
                  ANDROID:
                    basic_details:
                      app_name_color_code: "#ffffff"
                      notification_control_color: "Light"
                      background_color_code: "#ffffff"
                      title: "TITLE_OF_ANDROID_TEMPLATE"
                      message: "MESSAGE_OF_ANDROID_TEMPLATE"
                      summary: "SUMMARY"
                      image_url: "https://images.pexels.com/photos/248797/pexels-photo-248797.jpeg"
                      default_click_action: "NAVIGATE_TO_A_SCREEN"
                      default_click_action_value: "com.moengage.sampleapp.info.InfoActivity"
                      key_value_pairs: [{ "key": "page", "value": " 28" }]
                    buttons:
                      - btn_name: "button1"
                        click_action_type: "DEEPLINKING"
                        click_action_name: "click"
                        click_action_value: "https://www.google.com"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      icon_type_in_notification: "appicon"
                      auto_dismiss_notification: true
                      dismissal_time_multiplier: "minutes"
                      dismissal_time_value: 1
                      make_notification_sticky: true
                      dismiss_button_text: "DISMISS"
                    template_backup:
                      title: "TITLE_OF_ANDROID_BACKUP_TEMPLATE"
                      message: "MESSAGE_OF_ANDROID_BACKUP_TEMPLATE"
                      summary: "SUMMARY"
                      image_url: "https://images.pexels.com/photos/248797/pexels-photo-248797.jpeg"
                      default_click_action: "NAVIGATE_TO_A_SCREEN"
                      default_click_action_value: "com.moengage.sampleapp.info.InfoActivity"
                      key_value_pairs: [{ "key": "KEY", "value": " VALUE" }]
                  meta_info:
                    platform: ["ANDROID"]
                    template_style: "STYLIZED"
                    template_id: "12340"
                    template_name: "BT1"
                    template_version: "1"
                    created_by: "User"

              Stylized_iOS_Only:
                summary: 3. Stylized (iOS Only)
                value:
                  IOS:
                    basic_details:
                      background_color_code: "#ffffff"
                      title: "TITLE_OF_IOS_TEMPLATE"
                      subtitle: "SUBTITLE_OF_IOS_TEMPLATE"
                      message: "MESSAGE_OF_IOS_TEMPLATE"
                      rich_media_value: "RICH_MEDIA_URL_HERE"
                      default_click_action: "RICH_LANDING"
                      default_click_action_value: "https://www.google.com"
                      allow_bg_refresh: true
                    buttons:
                      - button_category: "CATEGORY_OF_BUTTON"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      sound_file: "SOUND_FILE"
                      enable_ios_badge: true
                    template_backup:
                      title: "TITLE_OF_IOS_TEMPLATE"
                      subtitle: "SUBTITLE_OF_IOS_TEMPLATE"
                      message: "MESSAGE_OF_IOS_TEMPLATE"
                      rich_media_value: "RICH_MEDIA_URL_HERE"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "https://www.google.com"
                      allow_bg_refresh: true
                  meta_info:
                    platform: ["IOS"]
                    template_style: "STYLIZED"
                    template_id: "123404"
                    template_name: "only IOS"
                    template_version: "2"
                    created_by: "User"

              # --- Basic Examples ---
              Basic_Android_iOS:
                summary: 4. Basic (Android & iOS)
                value:
                  ANDROID:
                    basic_details:
                      title: "TITLE_OF_ANDROID_TEMPLATE"
                      message: "MESSAGE_OF_ANDROID_TEMPLATE"
                      summary: "SUMMARY"
                      image_url: "https://images.pexels.com/photos/248797/pexels-photo-248797.jpeg"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "https://www.google.com"
                      key_value_pairs: [{ "key": "KEY", "value": " VALUE" }]
                    buttons:
                      - btn_name: "NAME_OF_THE_BUTTON"
                        click_action_type: "DEEPLINKING"
                        click_action_name: "Bhuvan"
                        click_action_value: "https://www.google.com"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      icon_type_in_notification: "appicon"
                      auto_dismiss_notification: true
                      dismissal_time_multiplier: "minutes"
                      dismissal_time_value: 1
                  IOS:
                    basic_details:
                      title: "TITLE_OF_IOS_TEMPLATE"
                      subtitle: "SUBTITLE_OF_IOS_TEMPLATE"
                      message: "MESSAGE_OF_IOS_TEMPLATE"
                      rich_media_value: "RICH_MEDIA_URL_HERE"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "https://www.google.com"
                      allow_bg_refresh: true
                    buttons:
                      - button_category: "CATEGORY_OF_BUTTON"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      sound_file: "SOUND_FILE"
                      enable_ios_badge: true
                  meta_info:
                    platform: ["ANDROID", "IOS"]
                    template_style: "BASIC"
                    template_id: "12345"
                    template_name: "Basic template - Android and IOS"
                    template_version: "1"
                    created_by: "User1"

              Basic_Android_Only:
                summary: 5. Basic (Android Only)
                value:
                  ANDROID:
                    basic_details:
                      title: "TITLE_OF_ANDROID_TEMPLATE"
                      message: "MESSAGE_OF_ANDROID_TEMPLATE"
                      summary: "SUMMARY"
                      image_url: "https://images.pexels.com/photos/248797/pexels-photo-248797.jpeg"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "https:wwww.google.com"
                      key_value_pairs: [{ "key": "KEY", "value": " VALUE" }]
                    buttons:
                      - btn_name: "NAME_OF_THE_BUTTON"
                        click_action_type: "DEEPLINKING"
                        click_action_name: "Bhuvan"
                        click_action_value: "https:wwww.google.com"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      icon_type_in_notification: "appicon"
                      auto_dismiss_notification: true
                      dismissal_time_multiplier: "minutes"
                      dismissal_time_value: 1
                  meta_info:
                    platform: ["ANDROID"]
                    template_style: "BASIC"
                    template_id: "12345642"
                    template_name: "Basic_template-Only Android"
                    template_version: "1"
                    created_by: "User11"

              Basic_iOS_Only:
                summary: 6. Basic (iOS Only)
                value:
                  IOS:
                    basic_details:
                      title: "TITLE_OF_IOS_TEMPLATE"
                      subtitle: "SUBTITLE_OF_IOS_TEMPLATE"
                      message: "MESSAGE_OF_IOS_TEMPLATE"
                      rich_media_value: "RICH_MEDIA_URL_HERE"
                      default_click_action: "DEEPLINKING"
                      default_click_action_value: "https://www.google.com"
                      allow_bg_refresh: true
                    buttons:
                      - button_category: "CATEGORY_OF_BUTTON"
                    advanced:
                      coupon_code: "COUPON_CODE"
                      sound_file: "SOUND_FILE"
                      enable_ios_badge: true
                  meta_info:
                    platform: ["IOS"]
                    template_style: "BASIC"
                    template_id: "1234567"
                    template_name: "Basic template - Only IOS"
                    template_version: "1"
                    created_by: "User1"

      responses:
        '200':
          description: Template created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  external_template_id:
                    type: string
                    format: uuid
                    description: A unique system-generated ID for the created template.
                    example: "d05a44f0-a7cf-471a-bcb6-63054800a367"
        '400':
          description: Bad Request (Invalid Data or Duplicate).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationFailure:
                  summary: Validation Failure
                  value:
                    error:
                      code: "400 Bad Request"
                      message: "Validation failed because of invalid request data"
                      details:
                        - code: "MissingValue"
                          target: "template_name"
                          message: "template_name value is required but value is passed empty."
                      request_id: "jUxStmFn"
                DuplicateTemplate:
                  summary: Duplicate Template
                  value:
                    error:
                      code: "400 Bad Request"
                      message: "Duplicate - template_id and template_version"
                      details:
                        - code: "InvalidValue"
                          target: "Duplicate - template_id and template_version"
                          message: "template_id:basicios12 template_version:12 is already present."
                      request_id: "cLCcgLQj"
        '401':
          description: Authorization Failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                title: "Authentication required"
                description: "MOE-APPKEY missing in Authentication Header"
        '415':
          description: Unsupported Media Type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                title: "Unsupported media type"
                description: "Content type is not supported"
        '429':
          description: Rate Limit Breach.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                response_id: "OUUkHvcn"
