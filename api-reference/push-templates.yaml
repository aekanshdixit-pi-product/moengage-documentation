openapi: 3.0.3
info:
  title: Push API
  description: |
    ### Overview
    Push API is used to:
    * Create campaigns (targeting all users or a group of users) to send notifications.
    * Target a single user using a unique user attribute.
    * Personalize payload for each user.

    ### API Endpoint
    The 'X' in the API Endpoint URL refers to the MoEngage Data Center (DC). MoEngage hosts each customer in a different DC. You can find your DC number (value of X) and replace the value of 'X' in the URL by referring to the DC and API endpoint mapping [here](https://help.moengage.com/hc/en-us/articles/360057030512-Data-Centers-in-MoEngage#01G5DQVXGT2KZMXTJPF77QPJ25).

    ### Postman Collection
    We have made it easy for you to test the APIs. Click [here](https://www.postman.com/moengage-dev/api-docs/collection/acmujor/moengage-transaction-push-api?action=share&source=copy-link&creator=5883765) to view it in Postman.

    ### FAQs
    **Does the Push API support silent notifications?**
    No, MoEngage Push API doesn't support silent notifications.

    **Can I use HTML to format notification text?**
    Yes, the basic template supports HTML tags.
  version: "2.0"
  x-logo:
    url: "https://images.g2crowd.com/uploads/product/image/social_landscape/social_landscape_4cb13a53c5240c218206532439a2f15a/moengage.png"
    altText: "MoEngage Logo"

externalDocs:
  description: Postman Collection
  url: https://www.postman.com/moengage-dev/api-docs/collection/acmujor/moengage-transaction-push-api?action=share&source=copy-link&creator=5883765

servers:
  - url: https://pushapi-0{data_center}.moengage.com/v2
    description: MoEngage API Server
    variables:
      data_center:
        default: '1'
        description: "Your account's data center number (e.g., 1 for US, 2 for EU, 3 for India)."

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: |
        The API request will be authenticated through Basic Authentication. Basic Authentication sends a Base64-encoded string containing your username and password with every API request. It encodes a 'username: password' string in Base64 and appends the encoded string with 'Basic '. This string is included in the authorization header as shown below:
        
        `{"Authorization":"Basic Base64_ENCODED_APPKEY_APIKEY=="}`
        
        You can obtain the username and password details from the MoEngage dashboard.
        1. On the left navigation menu in the MoEngage dashboard, go to **Settings** > **Account** > **APIs**.
        2. Copy the following details:
           * Username: Under **Workspace ID (earlier app id)**, click the copy icon to copy the username.
           * Password: In the **API keys** section, click the copy icon in the **Push** templates tile to copy the API key.
        3. Use these details to authenticate the API requests.

  schemas:
    # --- Helper Schemas ---
    KeyValue:
      type: object
      additionalProperties:
        type: string
      description: Key-value pairs for extra data.

    # --- Action Schemas ---
    DefaultAction:
      type: object
      properties:
        type:
          type: string
          enum: [navigation, richlanding, deeplinking]
          description: "Supported values: navigation, richlanding, deeplinking"
        value:
          type: string
          description: The value associated with the action.
        kvPairs:
          $ref: '#/components/schemas/KeyValue'
      description: This helps you define the default action triggered when the user interacts with the notification.

    AdditionalAction:
      type: object
      properties:
        type:
          type: string
          enum: [call, snooze, copy, share]
          description: "Supported actions are: Call, Snooze, Copy, Share."
        value:
          type: string
          description: Respective value.
        name:
          type: string
          description: Action name, displayed on notification.
        iconURL:
          type: string
          description: URL for icon to be displayed.
        category:
          type: string
          description: The category of the button.
      description: |
        This object contains a list of extra actions or buttons that the user can perform, providing more functionality for the notification. Supported actions are:
        * Call
        * Snooze
        * Copy
        * Share

    # --- Rich Content Schemas ---
    RichContent:
      type: object
      properties:
        type:
          type: string
          enum: [image, coupon, sound, gif, audio, video]
          description: "Supported values: Coupon, Image, Sound, GIF, Audio, Video."
        value:
          type: string
          description: URL or resource name.

    # --- Platform Payloads ---
    AndroidPayload:
      type: object
      required:
        - message
        - title
      properties:
        groupKey:
          type: string
          description: |
            This field denotes the group key used to identify and categorize related push notifications.
            
            **Note**:
            * Ensure you use the same group key for all push notifications you want to group.
            * MoEngage automatically modifies the group key to ensure it does not exceed the 45-character limit. MoEngage removes non-Latin scripts, special characters, and spaces to restrict the key composition to ASCII characters exclusively.
        collapseReplaceKey:
          type: string
          description: This field denotes the update key used to identify and update related push notifications. Ensure you use the same update key for all push notifications intended to update each other.
        message:
          type: string
          description: This field denotes the main content or text to be displayed in the notification/message.
        title:
          type: string
          description: This field denotes the headline or subject of the notification/message.
        channel_Id:
          type: string
          description: This field denotes the channel identifier for the campaign.
        summary:
          type: string
          description: This field denotes the brief summary or condensed version of the content. Typically displayed in collapsed notifications.
        richContent:
          type: array
          items:
            $ref: '#/components/schemas/RichContent'
          description: |
            An object or HTML string containing rich text, images, or other multimedia to enhance the message. Supported values are:
            * Coupon
            * Image
            * Sound
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
        additionalActions:
          type: array
          maxItems: 2
          items:
            $ref: '#/components/schemas/AdditionalAction'
          description: |
            This object contains a list of extra actions or buttons that the user can perform, providing more functionality for the notification.
            A maximum of two additional action buttons can be used at a time.
        fallback:
          type: object
          description: This JSON object contains the fallback values for the values mentioned above.

    IosPayload:
      type: object
      required:
        - message
        - title
      properties:
        groupKey:
          type: string
          description: |
            This field denotes the group key used to identify and categorize related push notifications.
            
            **Note**:
            * Ensure you use the same group key for all push notifications you want to group.
            * MoEngage automatically modifies the group key to ensure it does not exceed the 45-character limit. MoEngage removes non-Latin scripts, special characters, and spaces to restrict the key composition to ASCII characters exclusively.
        collapseReplaceKey:
          type: string
          description: This field denotes the update key used to identify and update related push notifications. Ensure you use the same update key for all push notifications intended to update each other.
        message:
          type: string
          description: This field denotes the primary text or body of the notification/message.
        title:
          type: string
          description: This field denotes the title or subject line of the notification/message.
        subtitle:
          type: string
          description: This field denotes the subtitle of the notification/message.
        enableIosBadge:
          type: boolean
          description: This field specifies whether a notification should automatically update the iOS app’s badge count with push notifications. Supported values are 'true' and 'false'.
        richContent:
          type: array
          items:
            $ref: '#/components/schemas/RichContent'
          description: |
            This field denotes a resource, such as an image or multimedia attachment, to provide additional visual or interactive elements. Supported contents are:
            * GIF
            * Coupon
            * Sound
            * Image
            * Audio
            * Video
            
            Image, video, and audio are only supported after iOS-10.
            To use emoticons (emojis), just copy-paste it where required (for example, ❤️ )
            **Note**: Image, video, and audio can not be used together.
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
          description: |
            This object contains a set of default actions associated with the notifications. Supported values are:
            * Navigation
            * Richlanding
            * Deeplinking
        additionalActions:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalAction'
          description: This object contains a set of supplementary actions or buttons associated with the notification, enabling users to perform specific tasks. You can add only one category for additional actions.
        fallback:
          type: object
          description: This JSON object contains the fallback values for the values mentioned above.

    WebPayload:
      type: object
      required:
        - message
        - title
        - redirectURL
        - iconURL
      properties:
        message:
          type: string
          description: This field denotes the main text content or notification body displayed to users.
        title:
          type: string
          description: This field denotes the subject or heading of the notification.
        redirectURL:
          type: string
          description: This field denotes the URL to which the user will be redirected upon interacting with the notification.
        iconURL:
          type: string
          description: This field denotes the URL of an icon image representing the notification, usually displayed alongside the title and message.
        imageURL:
          type: string
          description: This field denotes the URL of an additional image to be shown in the notification, providing further context or visual appeal.
        autoDismiss:
          type: boolean
          description: This field specifies whether to dismiss the notification automatically after 8 seconds.
        fallback:
          type: object
          description: This JSON object contains the fallback values for the values mentioned above.

    # --- Main Request Components ---
    TargetUserAttributes:
      type: object
      properties:
        attribute:
          type: string
          description: |
            This field denotes a unique identifier or characteristic of an entity or object used to specify the target users. This value is required when the **targetAudience** value is *User*. Other fields used are:
            * for unique ID: USER_ATTRIBUTE_UNIQUE_ID
            * for email:  USER_ATTRIBUTE_USER_EMAIL
            * For mobile number: USER_ATTRIBUTE_USER_MOBILE
            * for Google Advertising identifier: MOE_GAID
            * for iOS Identifier for advertising: ADVERTISING_IDENTIFIER
            * for device push token: PUSH_ID (the same key is used for Android GCM ID, iOS push token)
        comparisonParameter:
          type: string
          enum: [is, in]
          description: |
            This field denotes a condition or operator that compares the user attributes against a specific value. Supported values are:
            * The "is" query type
            * The "in" query type
            
            **Note**: The maximum number of parameters that can be added while using the "in" comparisonParameter is 50. This value is required when the **targetAudience** value is *User*.
        attributeValue:
          type: string
          description: This field denotes the actual value assigned to an attribute, which is used for comparison or filtering. This value is required when the **targetAudience** value is *User*.
        isCustom:
          type: boolean
          description: This field denotes whether a custom attribute has been added. For custom attributes, targeting is done on any custom attribute with the available fields. Set the key "isCustom" to true.

    CampaignDelivery:
      type: object
      required:
        - type
      description: |
        This field helps decide when the campaign should be sent.
        
        **Note**:
        * All notifications targeted to a single user will be sent as soon as possible (ASAP).
        * Scheduling campaigns for Later or Periodic is applied only for segmented or *All users* campaigns.
        * The **timezone** field can be used to pass the timezone for scheduled campaigns. This is not mandatory, and if it is not passed, the default timezone will be set to IST (and not UTC/GMT).
        * For more information on allowed timezone values, refer here.
      properties:
        type:
          type: string
          enum: [soon, later, periodic]
        date:
          type: string
          example: "11/07/2016"
        time:
          type: string
          example: "04:33 PM"
        timezone:
          type: string
          example: "Asia/Calcutta"
        endDate:
          type: string
        repeatAfter:
          type: string
          description: campaign will be recurring sent after every 1 day.

    ConversionGoal:
      type: object
      required:
        - name
        - eventName
      description: |
        This object contains the conversion goals details. For more information, refer to Conversion Goals.
        
        **Note**:
        * You can pass a single conversion goal or multiple conversion goals.
        * If you are passing multiple conversion goals, the first conversion goal in the list is considered the primary conversion goal for the campaign.
        * A Push campaign supports a maximum of five conversion goals on its list.
      properties:
        name:
          type: string
          description: This field denotes the readable name of the conversion goal for the Campaign Info.
        eventName:
          type: string
          description: This field denotes the actual event name.
        attrs:
          type: object
          description: |
            This field denotes the event attribute filters. It contains the following elements:
            * *name*: Event attribute name. This is mandatory.
            * *filter*: Event attribute filter operator. This is mandatory.
            * *value*: Event attribute filter value.
            * *type*: Event attribute data type. This is mandatory.
            
            The following are the supported filter types:
            **String Event Attribute Filter Operators**
            * is
            * is not
            * contains
            * does not contain
            * starts with
            * does not start with
            * ends with
            * does not end with
            * in the following
            * not in the following
            * exists
            * does not exist
            
            **Number or Double Event Attribute Filter Operators**
            * is equal to
            * is not equal to
            * is between
            * is not between
            * is less than
            * is greater than
            * exists
            * does not exist
          properties:
            name:
              type: string
            filter:
              type: string
              enum: 
                - is
                - is not
                - contains
                - does not contain
                - starts with
                - does not start with
                - ends with
                - does not end with
                - in the following
                - not in the following
                - exists
                - does not exist
                - is equal to
                - is not equal to
                - is between
                - is not between
                - is less than
                - is greater than
            value:
              type: string
            type:
              type: string
              enum: [string, numeric]

    AdvancedSettings:
      type: object
      description: This object contains information about advanced settings. For more information, refer to Advanced Settings.
      properties:
        ttl:
          type: object
          description: This field denotes the duration for which the push notification service keeps a push message before it's discarded if it can't be delivered. If not delivered, Push Services (GCM/WEB) retry to send the message until the TTL (in minutes) does not expire. Send ‘0’ if it is not applicable to you. After the TTL has expired, push notifications will not be shown to the user. The default value for TTL is 36 hours and applies only to Android push or Web push notifications.
          properties:
            ANDROID: 
              type: integer
            WEB:
              type: integer
        ignoreFC:
          type: string
          enum: ["true", "false"]
          description: |
            This field denotes if the ignoreFC is enabled. Supported values are:
            * true
            * false
            
            **Note**: This field is case-sensitive. When passing the value in the request, follow the case as described in the allowed values above.
            * "true" value: Bypasses frequency capping set on the dashboard and sends the notifications to everyone in the target segment.
            * "false" value: Applies the frequency capping set on the dashboard and does not send the notification after the limit is reached.
            * If the key is not present, it will be treated as ignoreFC="false." While testing your API, ensure that you set this flag as "true"; otherwise, you might not receive a few notifications.
        countFC:
          type: string
          enum: ["true", "false"]
          description: |
            This field denotes if the countFC is enabled. Supported values are:
            * true
            * false
            
            Values are "true" or "false" only when ignoreFC value is set to true.
            * "true" value - Only Push campaigns are counted in the frequency cap count.
            * "false" value - Push campaigns are not counted in the frequency cap count.
        notificationPrioritySettings:
          type: object
          description: This field denotes whether the notification priority settings are configured. Supported values are "true" or "false" only for Android push / Web push notifications. It uses the GCM/FCM flag to send time-critical messages with high priority and drains the user's device battery more than normal messages. This object contains information about notification priority settings.
          properties:
            Android:
              type: string
              enum: [High, Low]
              description: |
                This field denotes the notification priority configured for Android devices for this campaign.
                Supported values are:
                * High
                * Low
            iOS:
              type: integer
              enum: [1, 5, 10]
              description: |
                This field denotes the notification priority configured for iOS devices for this campaign. Supported values are:
                * 1
                * 5
                * 10
        pushAmp+:
          type: string
          enum: ["true", "false"]
          description: This field denotes whether the pushAmp+ is enabled. Supported values are "true" or "false." For more information about Push Amp+, refer to Push Amp+ help documentation.
        preCacheSegment:
          type: string
          enum: ["true", "false"]
          description: This field denotes whether the preCacheSegment is enabled. Supported values are "true" or "false." Applicable for scheduled and periodic campaigns. If enabled, pre-caches the segmentation and improves campaign sending time. For caching, it is recommended that the campaign be created at least 2 hours before the scheduled time.
        campaignThrottleTime:
          type: integer
          minimum: 1
          maximum: 360
          description: This field denotes if the campaign throttle time is configured. Push throttling allows you to control the rate of sending a push notification. The value to be passed can be between 1 and 360 (minutes).
        campaignThrottleRpm:
          type: integer
          description: |
            The default throughput for the Push API is 100K RPM. You can send either of the key-value pairs in the Push API payload between campaignThrottleRpm and campaignThrottleTime. Both of the key-value pairs are optional.
            * If you send both, the value for campaignThrottleRpm takes precedence over the value for campaignThrottleTime.
            * If you send either of them, the value you send is considered.
            * If you do not send any of them, the value defined in settings is considered (the **Limit to** <> **Push notifications per minute** setting at **Settings** > **Channels** > **Delivery controls** > **Throttling** > **Campaign Throttling Limits** > **Push**). If the RPM value is defined in settings, the defined value is considered.
            * If the RPM value is not defined in settings, the default RPM for Push channel (that is, 100K) is enforced. For personalized campaigns, the maximum RPM value MoEngage supports is 250K.
        useJinjaPersonalization:
          type: string
          enum: ["true", "false"]
          description: |
            This field denotes whether Jinja personalization can be used in the payload. Values are "true" or "false." A boolean value is used to indicate if Jinja personalization is applied to the message payloads. It is recommended that this personalization format be used. For example, you can add the following Jinja code to personalize the user name.
            "title": "Hello {{UserAttribute['userName']}}"
        ignoreMinimumDelay:
          type: string
          enum: ["true", "false"]
          description: This field denotes whether *ignore minimum delay* is enabled. Supported values are "true" or "false." This is a boolean value to indicate if the Client level Minimum Delay setting should be applied for the campaign. The default value is true, if this field is not passed in the API.
        inboxExpiry:
          type: integer
          description: This field specifies the expiry value for the push notification in hours.
        iOSTargetDevice:
          type: string
          enum: [apns_device_default_push, apns_device_provisional_push, apns_device_non_provisional_push]
          description: |
            Supported values are:
            * apns_device_default_push
            * apns_device_provisional_push
            * apns_device_non_provisional_push
        deliverWhenActive:
          type: string
          enum: ["true", "false"]
          description: This field specifies whether the push notifications will be delivered when the device is in an active state. supported value, "true" and "false".
        bypassDND:
          type: boolean
          description: This field specifies whether to deliver the notification immediately, bypassing device restrictions such as battery optimizations or low-power modes.

    # --- Main Payload ---
    SendPushRequest:
      type: object
      required:
        - appId
        - campaignName
        - signature
        - targetPlatform
        - targetAudience
        - payload
        - campaignDelivery
      properties:
        appId:
          type: string
          description: This field denotes the app ID that you must pass to create the campaign. You can find it by selecting **Settings** > **Account** > **APIs** -> **Workspace ID (earlier app id)** on the MoEngage dashboard. MoEngage recommends that you test API integration in the Test Environment. The App ID for TEST ACCOUNT is suffixed with *_DEBUG*.
        campaignName:
          type: string
          description: |
            This field denotes the campaign name. The campaign name should be unique for *All Users* and *Custom Segment* campaigns.
            **Note**:
            * API automatically creates a campaign with the given name. You need not create a campaign from the dashboard to use the name.
            * For User type *targetAudience* API requests, reuse this campaign name for requests that should be clubbed in the same campaign.
        campaignTags:
          type: array
          items:
            type: string
          description: |
            Used to add more context to campaigns. Context can be descriptive names or campaign themes such as onboarding, retention, country, and all users. Tags can also be used to filter campaigns or identify the behaviors of users who received these campaigns. The list of tags should be passed in this field.
            For example,
            `“campaignTags“ : [“Transactional“, “Accounts“]`
        signature:
          type: string
          description: |
            A signature is required to verify whether the client is authorized to make the API call. It is generated from a hash of the campaign name, app ID, and API key. MoEngage uses the SHA 256 method to generate this hash. Python code is used to generate the signature for your test account, and use your account's app_id.
            
            Python code to generate the signature for your test account, use the app_id that is appropriate for your account.
            
            [Image of Python signature generation code]
            
            **Python 3.x Code:**
            ```python
            from hashlib import sha256
            app_id = "XXXXXXXXXXXXXXXXXXXXXX_DEBUG" #(Please refer to required parameters section)
            campaign_name = "TEST"
            api_key = "XXXXXXXXXXXX" # This is the sample key. Each app has a different API key
            signature_key = app_id+'|'+ campaign_name+'|'+ api_key
            signature = sha256(signature_key.encode('utf-8')).hexdigest()
            print(signature)
            ```
            
            Generated Signature: 
            `{{Signature}}`
        requestType:
          type: string
          default: push
          description: The value of this key is used to indicate the intention of an API request. The default value is *push*.
        targetPlatform:
          type: array
          items:
            type: string
            enum: [ANDROID, IOS, WEB]
          description: This field denotes the platform devices that are targeted by your campaign. The Push API allows you to target users on Android, iOS, and Web platforms. You can target one or more platforms. If you want to send Web (Chrome) push notifications through the API, you should choose *Web* as the platform.
        targetAudience:
          type: string
          enum: ["All Users", "Custom Segment", "User"]
          description: |
            This field denotes the target segment for the campaign. Supported values are:
            * *All Users*: Pass this value to target all users of your App/Website.
            * *Custom Segment*: Pass this value to target pre-created user segments. Custom segments can be created using the MoEngage dashboard or custom segment API. Note that the custom segment name should exactly match the name of the target segment.
            * *User*: Pass this value to target a user with an attribute. It will target a maximum of 100 users of the associated **targetUserAttributes** definition.
        customSegmentName:
          type: string
          description: Required if targetAudience is "Custom Segment". Note that the custom segment name should exactly match the name of the target segment.
        targetUserAttributes:
          $ref: '#/components/schemas/TargetUserAttributes'
          description: |
            This object contains the target user attribute details. For more information, refer to Target User Attributes.
            
            **Note**:
            * This value is required when the **targetAudience** value is *User*.
            * For API requests where the target audience is a specific user, if a campaign with the given name already exists, existing campaign data corresponding to the given name will be used to send notifications.
            * Any edits in other parts of campaign data except payload within the API request parameters will be ignored. 
            * If any changes are required in the campaign data, change the campaign name in the API request to create a new campaign.
        payload:
          type: object
          description: |
            This object contains the payload details. Supported values are:
            * Android. For more information, refer to Android.
            * iOS. For more information, refer to IOS.
            * Web. For more information, refer to Web.
          properties:
            ANDROID:
              $ref: '#/components/schemas/AndroidPayload'
            IOS:
              $ref: '#/components/schemas/IosPayload'
            WEB:
              $ref: '#/components/schemas/WebPayload'
        campaignDelivery:
          $ref: '#/components/schemas/CampaignDelivery'
        conversionGoals:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/ConversionGoal'
        advancedSettings:
          $ref: '#/components/schemas/AdvancedSettings'

security:
  - BasicAuth: []

paths:
  /transaction/sendpush:
    post:
      tags:
        - Transactions
      summary: Send Push Notification
      description: Send a transactional, scheduled, or periodic push notification to Android, iOS, or Web users.
      operationId: sendPush
      parameters:
        - in: header
          name: MOE-APPKEY
          required: true
          schema:
            type: string
          description: |
            This is the workspace ID (earlier APP ID) of your MoEngage workspace. The MOE-APPKEY must be passed in the request. You can find your MoEngage Workspace ID in the MoEngage dashboard: **Settings** > **Account** > **APIs** -> **Workspace ID (earlier app id)**. For more information, refer to Authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendPushRequest'
            examples:
              Example1_MultiplePlatforms:
                summary: Android, iOS, Web
                value:
                  appId: "XXXXXXXXXXXXXXXXXXXXXXXX"
                  campaignName: "Test Push"
                  signature: "{{Signature}}"
                  requestType: "push"
                  targetPlatform: ["ANDROID", "IOS", "WEB"]
                  targetAudience: "All Users"
                  payload:
                    ANDROID:
                      message: "Android Message"
                      title: "Android Message Title"
                      Summary: "summary"
                      richContent:
                        - type: "image"
                          value: "https://images.iimg.in/c"
                        - type: "coupon"
                          value: "free"
                        - type: "sound"
                          value: "tring"
                      defaultAction:
                        type: "richlanding"
                        value: "https://www.google.co.in"
                      additionalActions:
                        - type: "call"
                          value: "12345678"
                          name: "Call button"
                          iconURL: "abc"
                        - type: "copy"
                          value: "12345678"
                          name: "Copy button"
                          iconURL: "abc"
                    IOS:
                      message: "iOS Message"
                      title: "iOS Message Title"
                      richContent:
                        - type: "sound"
                          value: "custSound4.wav"
                      additionalActions:
                        - category: "INVITE_CATEGORY"
                    WEB:
                      message: "Web Message"
                      title: "Web Message Title"
                      redirectURL: "https://www.google.com"
                      iconURL: "sbc.jpeg"
                      imageURL: "https://cdn.dribbble.com/users/146881/screenshots/1180383/despicable_me_1x.jpg"
                      fallback: {}
                  campaignDelivery:
