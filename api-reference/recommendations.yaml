openapi: 3.0.3
info:
  title: MoEngage Recommendation API
  description: |
    API for fetching recommendation metadata and recommendation results for users.
    Authentication is via Basic Auth.
  version: '1.0'
servers:
  - url: 'https://api-{dc}.moengage.com/v1'
    variables:
      dc:
        default: '01'
        description: 'The data center number for your account (e.g., 01, 02, 03).'
tags:
  - name: Recommendations
    description: Operations related to fetching recommendation configurations and results.
paths:
  /recommendations/{recommendations_id}:
    get:
      tags:
        - Recommendations
      summary: Fetch Recommendation Metadata
      operationId: fetchRecommendationMetadata
      description: |
        Retrieves the metadata associated with a specific recommendation setup using its unique ID. 
        The metadata can include the recommendation name, model type, status, creation and update time, and so on.
      x-mint:
        content: |
          <Note>
            **Information**

            The response keys may vary depending on the filters used in the recommendation.
          </Note>

          ## Rate Limit
          You can fetch 1,000 recommendations per minute.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/RecommendationIdPath'
      responses:
        '200':
          description: Successfully retrieved recommendation metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Recommendation Not Found. The specified recommendation ID does not exist or archived. Please check recommendation_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error-code: "recommendation does not exist"
                message: "Recommendation does not exist or archived. Please check recommendation_id."
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /recommendations/{recommendations_id}/items:
    post:
      tags:
        - Recommendations
      summary: Fetch Recommendation Results
      operationId: fetchRecommendationResults
      description: |
        This API lets you fetch/retrieve the metadata results of any recommendations for a user based on their user ID and item ID.
      x-mint:
        content: |
          ## Rate Limit
          You can fetch 10,000 recommendations per minute.

          <Note>
            The maximum size of the payload is 1 MB.
          </Note>
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/RecommendationIdPath'
        - name: RECOMMENDATION-TYPE
          in: header
          required: true
          description: It represents the type of recommendations from which the results are fetched.
          schema:
            type: string
            enum:
              - user_action
              - item_attribute
              - catalog_alert
              - similar_item
              - frequently_viewed_together
              - frequently_bought_together
              - trending_item
              - user_personalization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchResultsRequest'
            example:
              user_id": "user123@example.com"
              item_id": "product_sku_abc" # Required for similar_item, frequently_*, etc.
              include_fields": ["title", "image_link", "price"]
      responses:
        '200':
          description: Successfully retrieved recommendation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecommendationResultItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Recommendation Not Found. The specified recommendation ID does not exist or is archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        The API request will be authenticated through Basic Authentication. 
        
        It encodes a 'username:password' string in Base64 and appends the encoded string with 'Basic '. This string is included in the `Authorization` header.

        You can obtain the username and password details from the MoEngage Dashboard:
        1.  Navigate to **Settings > Account > APIs**.
        2.  **Username**: Under **Workspace ID**, copy your username.
        3.  **Password**: In the **API keys** section, copy the API key from the **Campaign report** / **Business events** / **Custom templates** / **Catalog API** tile.
  parameters:
    AppKeyHeader:
      name: MOE-APPKEY
      in: header
      required: true
      description: |
        This is the workspace ID (earlier APP ID) of your MoEngage workspace. The MOE-APPKEY has to be passed in the request.
        
        You can find your MoEngage Workspace ID in the MoEngage Dashboard:
        **Settings** > **Account** > **APIs** > **Workspace ID** (earlier app id)
      schema:
        type: string
    RecommendationIdPath:
      name: recommendations_id
      in: path
      required: true
      description: |
        This parameter indicates the unique identifier associated with the recommendation created in the recommendation module.
        
        You can obtain the `recommendation_id` from the recommendation you created on the recommendation page.
      schema:
        type: string
      example: "a1b2c3d4e5f6a7b8c9d0e1f2"
  schemas:
    Filter:
      type: object
      properties:
        executed: { type: boolean }
        filter_type: { type: string, example: "product_filter" }
        operator_fe: { type: string, example: "exists" }
        name: { type: string, example: "product_id" }
        data_type: { type: string, example: "string" }
        operator: { type: string, example: "exists" }
        value: { type: string, nullable: true }
        negate: { type: boolean }
        case_sensitive: { type: boolean }
        hasError: { type: boolean }
    IncludeExcludeFilters:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
        filter_operator:
          type: string
          enum: [and, or]
    SortCriteria:
      type: object
      properties:
        data_type: { type: string, example: "double" }
        param_type: { type: string, example: "product_attribute" }
        param: { type: string, example: "price" }
        direction: { type: string, enum: ["1", "-1"], description: "1 for ascending, -1 for descending" }
    TrendSettings:
      type: object
      description: "Defines the trend type and duration (Specific fields depend on implementation)."
      properties: {}
      example: { trend_type: "most_viewed", duration_days: 7 }
    CustomSettings:
      type: object
      properties:
        item_filters:
          type: object
          properties:
            user_actions:
              type: object
      description: "Defines custom filters applied to recommendations."
    RecommendationMetadata:
      type: object
      properties:
        id: { type: string, description: "It is the unique recommendation ID." }
        db_name: { type: string, description: "This is your workspace name." }
        recommendation_type:
          type: string
          enum: [user_action, item_attribute, similar_item, frequently_viewed_together, frequently_bought_together, trending_item, user_personalization]
          description: |
            It represents the type of recommendations from which the results will be fetched.
            The supported values are:
            - `user_action`
            - `item_attribute`
            - `similar_item`
            - `frequently_viewed_together`
            - `frequently_bought_together`
            - `trending_item`
            - `user_personalization`
        name: { type: string, description: "This field represents the name of the recommendation for which you want to fetch the details." }
        description: { type: string, nullable: true, description: "This field describes the recommendation given at the time of its creation." }
        catalog: { type: string, description: "This is the unique identifier of the catalog assigned to the requested recommendation." }
        catalog_name: { type: string, description: "Name of the associated catalog." }
        status: { type: string, enum: [Active, Archived], description: "The recommendation's status indicates whether it is active or archived." }
        created_time: { type: string, format: date-time, description: "This field shows the timestamp when a recommendation was created." }
        updated_time: { type: string, format: date-time, description: "This field shows the timestamp when a recommendation setting was last modified." }
        all_user_actions:
          type: boolean
          description: |
            This key represents whether all user actions are being considered to find the most recently interacted item. If this is true, the most recently interacted ID from any of the user action set-ups will be considered to find the related items as per the recommendation type.
            
            **Note**: This key is available with the `similar_item`, `frequently_viewed_together`, and `frequently_bought_together` recommendation types.
          nullable: true
        include_filters:
          $ref: '#/components/schemas/IncludeExcludeFilters'
          nullable: true
        exclude_filters:
          $ref: '#/components/schemas/IncludeExcludeFilters'
          nullable: true
        custom_settings:
          $ref: '#/components/schemas/CustomSettings'
          nullable: true
          description: "This key defines the customization applied to the recommendation results as per the recommendation setup. Currently, you can apply the user action and item attribute filters over recommendations."
        sort:
          $ref: '#/components/schemas/SortCriteria'
          nullable: true
          description: |
            This key defines the sorting logic based on which recommendation results will be ordered. This object's value provides the attributes' details and sorting order.
            
            **Note**: This key is available with the `user_action` and `item_attribute` recommendation types.
        trends:
          $ref: '#/components/schemas/TrendSettings'
          nullable: true
          description: |
            This key defines the trend type for `trending_item` recommendations and the duration of trend computation.
            
            **Note**: This key is available with the `trending_item` recommendation type.
    FetchResultsRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          description: >
            A user ID is a unique identifier that represents a user. You can obtain the user_id from the user info page.
        item_id:
          type: string
          description: |
            An `item_id` is a unique identifier assigned to each item in the catalog.

            If the `RECOMMENDATION-TYPE` is any of the `similar_item`, `frequently_viewed_together`, or `frequently_bought_together`, you must provide the `item_id`.
            
            This `item_id` acts as the anchor to serve recommended items based on the `RECOMMENDATION-TYPE`.
            
            We expect the user's most recently interacted `item_id` to serve contextually recommended items.
          nullable: true
        include_fields:
          type: array
          items:
            type: string
          description: |
            You can define the attributes of items you require from the catalog in the recommendation response. For example, `title`, `price`, `link`, `image_link`, and so on.

            If the attributes above are not defined, all item attributes in the catalog will be included in the response. The response size may increase depending on the number of attributes in the catalog. Therefore, it is recommended that only the necessary attributes be specified.
          nullable: true
          example: ["title", "price", "image_link"]
    RecommendationResultItem:
      type: object
      description: The items JSON object contains the key-value pairs of all the requested attributes.
      properties:
        item_id: { type: string, description: "This field shows the ID of the item." }
        title: { type: string, description: "This field shows the title of the item." }
        link: { type: string, format: uri, description: "This field shows a link to the item." }
        image_link: { type: string, format: uri, description: "This field shows a link to the image." }
        catalog_id: { type: string }
        feed_id: { type: string }
        description: { type: string }
        price_currency: { type: string }
        creation_date: { type: string, format: date-time }
        last_updated: { type: string, format: date-time }
        price: { type: number, format: double }
        date: { type: string, format: date }
      additionalProperties: true
      example:
        item_id: "prod_xyz"
        title": "Stylish Red Scarf"
        link": "https://example.com/products/prod_xyz"
        image_link": "https://example.com/images/prod_xyz.jpg"
        price": 19.99
    ErrorResponse:
      type: object
      properties:
        error-code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
  responses:
    BadRequest:
      description: Bad Request. Possible issues include a recommendation, the user does not exist, or the wrong format provided.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error-code: "invalid-request-format"
            message": "Invalid format provided for recommendation_id."
    Unauthorized:
      description: Unauthorized. Your request is unauthorized. Verify your credentials and try again.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error-code: "request-unauthenticated"
            message: "Your request is unauthorized. Please verify your credentials and try again."
    PayloadTooLarge:
      description: Request Entity Too Large. The request body can be large in terms of size (bytes) or length of items (1MB limit for POST).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error-code: "payload-size-exceeded"
            message: "Your payload size exceeds the 1MB limit. Please reduce the payload size and try again."
    TooManyRequests:
      description: Too Many Requests. Rate limit exceeded.
      headers:
        x-ratelimit-limit:
          schema: { type: integer }
          description: The request limit per time window.
        x-ratelimit-remaining:
          schema: { type: integer }
          description: The remaining requests in the current window.
        x-ratelimit-reset:
          schema: { type: integer }
          description: UTC epoch seconds when the limit resets.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error-code: "too-many-requests"
            message: "Rate limit exceeded."
    InternalServerError:
      description: Internal Server Error. This response is returned when the system runs into an unexpected error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error-code: "unexpected-error"
            message: "Something went wrong with your request. Contact the MoEngage team."
security:
  - basicAuth: []