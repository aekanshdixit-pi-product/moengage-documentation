openapi: 3.0.3
info:
  title: MoEngage Inform API
  version: '1.0'
  description: |-
    API for MoEngage Inform, a unified messaging infrastructure for building and managing transactional alerts across multiple channels like SMS, Email, and Push.
tags:
  - name: Transactional Alerts
    description: Send transactional alerts using pre-configured templates.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1.0'
    description: Live Alerts Endpoint
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
  - url: 'https://sandbox-api-0{dc}.moengage.com/v1.0'
    description: Test/Sandbox Alerts Endpoint
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
paths:
  /alerts/send:
    post:
      tags:
        - Transactional Alerts
      summary: Send Transactional Alert
      # FIX: Using x-mint to safely render MDX components and Lists
      x-mint:
        content: |
          This API sends a transactional alert to a user on one or more channels using a pre-configured Alert ID or Alert Reference Name.

          <Note>Use the Live endpoint for production and the Test/Sandbox endpoint for testing.</Note>

          ### Supported Scenarios
          Transactional Alerts are designed for critical user communications, including:
          * Order/Booking/Purchase confirmations
          * Shipping/Delivery confirmations and updates
          * Security and account alerts
          * Password resets
          * OTP (one-time password)
          * User invitations and shares
      description: "Sends a transactional alert to a user."
      security:
        - basicAuth: []
          moeAppKey: []
      requestBody:
        required: true
        description: The payload containing the alert identifier, transaction details, and recipient information for each channel.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InformRequest'
            examples:
              multiChannelWithPersonalization:
                summary: Multi-Channel with Personalization
                value:
                  alert_id: "636b77e6e2cf83277195fb60"
                  alert_reference_name: "Demo_ID"
                  user_id: "USER_12345"
                  transaction_id: "TXN_987654321"
                  payloads:
                    PUSH:
                      recipient: "<push-token>"
                      personalized_attributes:
                        firstname: "John"
                        orderid: "ORD_554433"
                    EMAIL:
                      recipient: "john.doe@moengage.com"
                      personalized_attributes:
                        firstname: "John"
                        orderid: "ORD_554433"
              singleChannelNoPersonalization:
                summary: Single Channel (SMS) without Personalization
                value:
                  alert_id: "636b77e6e2cf83277195fb60"
                  alert_reference_name: "Demo_ID"
                  user_id: "USER_12345"
                  transaction_id: "TXN_ABCDEF123"
                  payloads:
                    SMS:
                      recipient: "1234567890"
      responses:
        '200':
          description: Request has been received and processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformSuccessResponse'
        '400':
          description: Bad Request. Invalid payload format, incorrect JSON, or invalid Alert ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformErrorResponse'
        '401':
          description: Unauthorized. Invalid authentication credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformErrorResponse'
        '409':
          description: Duplicate Request. A request with the same transaction_id was received recently.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformErrorResponse'
        '429':
          description: Rate Limit Reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformErrorResponse'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic Authentication
    moeAppKey:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: Your MoEngage Workspace ID (App ID).

  schemas:
    PayloadChannel:
      type: object
      required:
        - recipient
      properties:
        recipient:
          type: string
          description: 'Target: mobile number for SMS, email for EMAIL, or push token for PUSH.'
        personalized_attributes:
          type: object
          additionalProperties: true
          description: Key-value map for personalization.
        sender_attributes:
          type: array
          items:
            type: string
          description: List of attributes for sender evaluation.
        personalized_attachments:
          type: object
          additionalProperties:
            type: string
            format: byte
            description: Map of attachment identifiers to Base64 strings.

    InformRequest:
      type: object
      required:
        - transaction_id
        - payloads
      properties:
        alert_id:
          type: string
          description: Unique Alert ID.
        alert_reference_name:
          type: string
          description: Reference Name (alternative to Alert ID).
        user_id:
          type: string
          description: Unique user identifier (Client ID).
        transaction_id:
          type: string
          description: Unique transaction ID (max 50 chars). Used for idempotency.
        payloads:
          type: object
          description: Channel-level information.
          properties:
            SMS:
              $ref: '#/components/schemas/PayloadChannel'
            EMAIL:
              $ref: '#/components/schemas/PayloadChannel'
            PUSH:
              $ref: '#/components/schemas/PayloadChannel'

    ChannelStatus:
      type: object
      properties:
        message:
          type: string
        err_code:
          type: string
        status_code:
          type: integer

    InformSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: "Successfully Received"
        request_id:
          type: string
        SMS:
          $ref: '#/components/schemas/ChannelStatus'
        EMAIL:
          $ref: '#/components/schemas/ChannelStatus'
        PUSH:
          $ref: '#/components/schemas/ChannelStatus'

    InformErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Invalid Alert ID"
        err_code:
          type: string
          example: "BAD_REQUEST"
        status_code:
          type: integer
          example: 120002