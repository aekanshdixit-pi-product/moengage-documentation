openapi: 3.0.3
info:
  title: MoEngage In-app Template API
  version: '1.0'
  description: API for creating, updating, and searching In-app templates (Self-Handled and HTML) within the MoEngage platform.
tags:
  - name: In-app Templates
    description: Operations to manage In-app templates.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1.0'
    description: MoEngage Custom Templates API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
security:
  - basicAuth: []

paths:
  /custom-templates/inapp:
    post:
      tags:
        - In-app Templates
      summary: Create In-app Template
      description: Creates a new In-app template in MoEngage. This API supports `SELF_HANDLED` and `INAPP_HTML` template types.
      requestBody:
        required: true
        description: The details of the In-app template to be created.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInAppTemplateRequest'
            examples:
              self_handled:
                summary: Self-Handled Template
                value:
                  basic_details:
                    payload: "{'jsonKey': 'jsonValue', 'title': 'hello world'}"
                    inapp_template_type: "SELF_HANDLED"
                  meta_info:
                    created_by: "test@example.com"
                    template_id: "self_handled_123"
                    template_name: "My Self-Handled Template"
                    template_version: "1"
              html:
                summary: HTML Template
                value:
                  basic_details:
                    payload: "<html><body><h1>Hello World</h1></body></html>"
                    inapp_template_type: "INAPP_HTML"
                  meta_info:
                    created_by: "test@example.com"
                    template_id: "html_promo_456"
                    template_name: "My HTML Promo"
                    template_version: "1"
      responses:
        '200':
          description: Template created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  external_template_id:
                    type: string
                    format: uuid
                    description: This field contains the unique ID corresponding to a successful custom template creation. This template ID is used as header input for update, search, or any kind of template modifications in later stage.
                    example: "4a1afbc5-4c31-4f19-8c23-793e27af01aa"
        '400':
          description: Bad Request. This response is returned when the required parameters are missing from the request, when the provided parameters are invalid, or when a template already exists with the same version, name, or ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authorization Failure. This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate Limit Breach. This response is returned when the number of requests per minute has exceeded the rate limit, or the number of templates has exceeded the allowed quota per channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '5XX':
          description: Internal Server Error. This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - In-app Templates
      summary: Update In-app Template
      description: Updates an existing In-app template by specifying its `external_template_id`.
      requestBody:
        required: true
        description: The updated details for the In-app template.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInAppTemplateRequest'
            example:
              external_template_id: "4a1afbc5-4c31-4f19-8c23-793e27af01aa"
              update_campaigns: false
              basic_details:
                payload: "<html><body><h1>Hello Updated World!</h1></body></html>"
                inapp_template_type: "INAPP_HTML"
              meta_info:
                template_name: "My Updated HTML Promo"
                updated_by: "jane.doe@example.com"
      responses:
        '200':
          description: Template updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  external_template_id:
                    type: string
                    format: uuid
                    description: This field contains the unique ID corresponding to a successful custom template update. This template ID is used as header input for updates, searches, or any kind of template modifications in a later stage.
                    example: "4a1afbc5-4c31-4f19-8c23-793e27af01aa"
        '400':
          description: Bad Request. This response is returned when the required parameters are missing from the request, when the provided parameters are invalid, or when a template already exists with the same version, name, or ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '5XX':
          description: Internal Server Error. This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /custom-templates/inapp/search:
    post:
      tags:
        - In-app Templates
      summary: Search In-app Templates
      description: Searches and retrieves a list of In-app templates based on specified filter criteria.
      requestBody:
        required: true
        description: Search filters for finding In-app templates. An empty body will fetch all templates. Pagination is mandatory after November 15, 2025.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchInAppTemplateRequest'
            example:
              page: 1
              entries: 15
              template_source: ["API"]
              sort_params:
                - template_name: "ASCENDING"
      responses:
        '200':
          description: The template was searched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchInAppTemplateResponse'
        '400':
          description: Bad Request. This response is returned when the required parameters are missing from the request or when the provided parameters are invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate Limit Breach. This response is returned when the number of requests per minute has exceeded the rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '5XX':
          description: Internal Server Error. This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic Authentication using Workspace ID as username and the 'Campaign report/Business events/Custom templates' API key as the password.

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "400 Bad Request"
            message:
              type: string
              example: "Duplicate - template_id and template_version"
            details:
              type: array
              items:
                type: object
                properties:
                  code: { type: string, example: "InvalidValue" }
                  target: { type: string, example: "Duplicate - template_id and template_version" }
                  message: { type: string, example: "template_id:BasicTemplate1 template_version:1 is already present." }
            request_id:
              type: string
              example: "cLCcgLQj"
        title:
          type: string
          description: An alternative error title format.
          example: "Authentication required"
        description:
          type: string
          description: An alternative error description format.
          example: "MOE-APPKEY missing in Authentication Header"

    CreateInAppTemplateRequest:
      type: object
      required:
        - basic_details
        - meta_info
      properties:
        basic_details:
          type: object
          required:
            - payload
            - inapp_template_type
          description: This field contains details about the template to be created, including its payload and template type. Payload should be stringified JSON or HTML depending on the type of template. The inapp_template_type field can either be SELF_HANDLED or INAPP_HTML.
          properties:
            payload:
              type: string
              description: A stringified JSON or HTML content for the template. For the payload structure, refer to the documentation. Payload should be stringify JSON or HTML depending on the type of template.
            inapp_template_type:
              type: string
              enum: [SELF_HANDLED, INAPP_HTML]
              description: The template type. Can be either SELF_HANDLED or INAPP_HTML.
        meta_info:
          type: object
          required:
            - created_by
            - template_id
            - template_name
            - template_version
          description: This field contains information about the template being created, such as its name, version, and ID and the creator's details.
          properties:
            created_by:
              type: string
              description: Identifier for the creator of the template.
            template_id:
              type: string
              description: A unique ID for the template provided by you.
            template_name:
              type: string
              description: The name of the template.
            template_version:
              type: string
              description: The version of the template.

    UpdateInAppTemplateRequest:
      type: object
      required:
        - external_template_id
        - basic_details
        - meta_info
      properties:
        external_template_id:
          type: string
          format: uuid
          description: The external template ID that needs to be updated. This field contains the unique identifier that is generated during the creation of the template.
        update_campaigns:
          type: boolean
          default: false
          description: This field contains a flag that is used to update all the campaigns that are currently using the template being updated to the newer version (that is being updated in this request). The default value for this flag is false. When the update_campaigns flag is true, all the campaigns running with this template will get updated to the latest version of the template, and when it is false, the new version of the template will be created, but there will be no change made to the template used in the existing campaigns.
        basic_details:
          type: object
          required:
            - payload
            - inapp_template_type
          description: Details about the template, including its payload and template type. The payload should be stringified JSON or HTML depending on the template type. The inapp_template_type can be either SELF_HANDLED or INAPP_HTML.
          properties:
            payload:
              type: string
              description: Stringified JSON or HTML content. The data type will be a string. No limit restriction on field length.
            inapp_template_type:
              type: string
              enum: [SELF_HANDLED, INAPP_HTML]
              description: String value, two options possible - SELF_HANDLED or INAPP_HTML.
        meta_info:
          type: object
          required:
            - template_name
            - updated_by
          description: This field will update template information, such as the name of the template and the update's details. The version of the templates will be increased by 1 after every template update.
          properties:
            template_name:
              type: string
              description: The name of the template being updated.
            updated_by:
              type: string
              format: email
              description: The email ID of the person updating the template.
            template_version:
              type: string
              description: Optional new version for the template. If provided, a new version is created. If omitted, the existing version is updated.

    SearchInAppTemplateRequest:
      type: object
      description: All fields are optional. An empty request body will fetch all templates.
      properties:
        page:
          type: integer
          description: This field contains the index of the pages to be returned in the search result. Mandatory after November 15, 2025.
        entries:
          type: integer
          description: This field contains the number of entries per page in the search result. Maximum value is 15. Mandatory after November 15, 2025.
          maximum: 15
        template_name:
          type: string
          description: This field indicates the name of the template. When this value is specified, the template that matches the name specified in this field will be returned. Partial search is supported.
        template_source:
          type: array
          description: This field indicates the template source that created the template. When specified, the templates whose source matches that specified in this list will be returned.
          items:
            type: string
            enum: [API, MOENGAGE]
        template_type:
          type: array
          description: This field indicates whether the template is a custom one or a pre-built one. When specified, the templates whose template type matches that specified in this list will be returned. Allowed values: CUSTOM, PRE_BUILT.
          items:
            type: string
            enum: [CUSTOM, PRE_BUILT]
        created_by:
          type: array
          description: This field indicates the user who created the template. When specified, the templates for which the created_by user information matches that specified in this list will be returned.
          items:
            type: string
            format: email
        updated_by:
          type: array
          description: This field indicates the user who updated the template. When specified, the templates for which the updated_by user information matches that specified in this list will be returned.
          items:
            type: string
            format: email
        sort_params:
          type: array
          description: Sort the templates by multiple fields in ASCENDING or DESCENDING order. Supported fields: template_name, last_modified_date, last_modified_by. First, ordering preference will be done according to template_name in the ASC order, followed by last_modified_date in the DESC order.
          items:
            type: object
            properties:
              template_name:
                type: string
                enum: [ASCENDING, DESCENDING]
              last_modified_date:
                type: string
                enum: [ASCENDING, DESCENDING]
              last_modified_by:
                type: string
                enum: [ASCENDING, DESCENDING]
        template_ids:
          type: array
          description: Search multiple templates using pairs of external_template_id and version.
          items:
            type: object
            properties:
              external_template_id:
                type: string
                format: uuid
              version:
                type: integer

    InAppTemplate:
      type: object
      properties:
        external_template_id:
          type: string
          format: uuid
        version:
          type: integer
        basic_details:
          type: object
          properties:
            payload:
              type: string
            preview_image:
              type: string
              format: uri
            inapp_template_type:
              type: string
              enum: [SELF_HANDLED, INAPP_HTML]
        meta_info:
          type: object
          properties:
            template_id: { type: string }
            template_name: { type: string }
            template_version: { type: string }
            created_by: { type: string }
            channel: { type: string, example: "INAPP" }
            template_source: { type: string, enum: [API, MOENGAGE] }
            template_type: { type: string, enum: [CUSTOM, PRE_BUILT] }
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_by:
          type: string
        updated_at:
          type: string
          format: date-time

    SearchInAppTemplateResponse:
      type: object
      properties:
        data:
          type: array
          description: This field contains all the details of the template searched, such as the meta info, template ID, template version, payload, date and time the template was created or updated, and the user attribute of the user who created or updated the template.
          items:
            $ref: '#/components/schemas/InAppTemplate'