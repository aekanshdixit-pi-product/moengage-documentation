openapi: 3.0.3
info:
  title: MoEngage Push API
  version: '2.0'
  description: |
    API for sending transactional and targeted push notifications to users across Android, iOS, and Web platforms.
tags:
  - name: Push
    description: Operations to create and send push notification campaigns.
servers:
  - url: 'https://pushapi-0{dc}.moengage.com/v2'
    description: MoEngage Push API Server
    variables:
      dc:
        default: '1'
        description: "Your MoEngage Data Center (DC). Replace 'X' in the URL with your DC number (1, 2, 3, etc.)."
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
security:
  - basicAuth: []
    apiKeyAuth: []

paths:
  /transaction/sendpush:
    post:
      tags:
        - Push
      summary: Send Push Notification
      operationId: sendPushNotification
      description: |
        ### Overview
        The Push API is used to:
        * Create campaigns (targeting all users or a group of users) to send notifications.
        * Target a single user using a unique user attribute.
        * Personalize payload for each user.

        <Note>
          **Rate Limit**: You can create up to **10,000 requests per minute**.
        </Note>

        ### API Endpoint
        The endpoint URL follows the format: `https://pushapi-0X.moengage.com/v2/transaction/sendpush`.
        
        The **'X'** in the URL refers to your MoEngage Data Center (DC). You must replace 'X' with your specific DC number (e.g., 01, 02, 03).

        ### Authentication
        The API uses **Basic Authentication**. You must send a Base64-encoded string containing your `Workspace ID` (username) and `API Key` (password).

        **Header Format:**
        `{"Authorization":"Basic Base64_ENCODED_APPKEY_APIKEY=="}`

        <Info>
        **How to obtain credentials:**
        1. On the left navigation menu in the MoEngage dashboard, go to **Settings > Account > APIs**.
        2. Copy the following details:
           * **Username**: Under **Workspace ID (earlier app id)**, click the copy icon to copy the username.
           * **Password**: In the **API keys** section, click the copy icon in the **Push templates** tile to copy the API key.
        3. Use these details to authenticate the API requests.
        </Info>

        ### Sample cURL Request
        <CodeGroup>
        ```bash cURL
        curl --location '[https://pushapi-0X.moengage.com/v2/transaction/sendpush](https://pushapi-0X.moengage.com/v2/transaction/sendpush)' \
              --header 'content-type: application/json' \
              --header 'MOE-APPKEY: {{Workspace_ID or APP_ID}}' \
              --header 'Authorization: Basic {{Authorization_Key}}' \
              --data '{
              "appId": "ABC123",
              "campaignName": "Test_Campaign",
              "signature": "{{Signature}}",
              "requestType": "push",
              "targetPlatform": [
              "ANDROID"
              ],
              "targetAudience": "User",
              "targetUserAttributes": {
              "attribute": "USER_ATTRIBUTE_USER_EMAIL",
              "comparisonParameter": "is",
              "attributeValue": "abc@example.com"
        }
              ,
              "payload": {
              "ANDROID": {
              "groupKey": "thisisgroupkey",
              "collapseReplaceKey": "this is update key",
              "message": "this is message",
              "title": "this is title",
              "Summary": "this is summary",
              "richContent": [
              {
              "type": "image",
              "value": "[https://images.iimg.in/c](https://images.iimg.in/c)"
              },
              {
                                    "type": "gif",
                                    "value": "sun-18283_256.gif"
              }
              ],
              "defaultAction": {
              "type": "richlanding",
              "value": "[https://www.moengage.com](https://www.moengage.com)"
              },
              "additionalActions": [
              {
              "type": "call",
              "value": "123123",
              "name": "call button",
              "iconURL": "abc"
              }
              ]
              },
              "IOS": {
              "groupKey": "thisisgroupkey",
              "collapseReplaceKey": "this is update key",
              "message": "this is ios message",
              "title": "this is ios title",
              "richContent": [
              {
              "type": "sound",
              "value": "custSound4.wav"
              }
              ],
              "additionalActions": [
              {
              "category": "INVITE_CATEGORY"
              }
              ]
              },
              "WEB": {
              "message": "this is web message",
              "title": "this is web title",
              "redirectURL": "[https://www.google.com](https://www.google.com)",
              "iconURL": "sbc.jpeg",
              "imageURL": "[https://cdn.dribbble.com/users/146881/screenshots/1180383/despicable_me_1x.jpg](https://cdn.dribbble.com/users/146881/screenshots/1180383/despicable_me_1x.jpg)"
              }
              },
              "campaignDelivery": {
              "type": "soon"
              },
              "conversionGoals": [
              {
              "name": "amount1",
              "eventName": "AddedTocart",
              "attrs": {
              "filter": "is between",
              "name": "amount",
              "value": "10,100",
              "type": "numeric"
              }
              }
              ],
              "advancedSettings": {
              "ttl": {
              "ANDROID": 12,
              "WEB": 24
              },
              "ignoreFC": false,
              "sendAtHighPriority": true,
              "inboxExpiry": 360
              }
              }'
        ```
        </CodeGroup>

        ### FAQs
        <AccordionGroup>
          <Accordion title="Does the Push API support silent notifications?">
            No, MoEngage Push API doesn't support silent notifications.
          </Accordion>
          <Accordion title="Can I use HTML to format notification text?">
            Yes, the basic template supports HTML tags.
          </Accordion>
        </AccordionGroup>

