openapi: 3.0.3
info:
  title: MoEngage Push API
  version: '2.0'
  description: |
    API for sending transactional and targeted push notifications to users across Android, iOS, and Web platforms.
tags:
  - name: Push
    description: Operations to create and send push notification campaigns.
servers:
  - url: 'https://pushapi-0{dc}.moengage.com/v2'
    description: MoEngage Push API Server
    variables:
      dc:
        default: '1'
        description: "Your MoEngage Data Center (DC). Replace 'X' in the URL with your DC number (1, 2, 3, etc.)."
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
security:
  - basicAuth: []
    apiKeyAuth: []

paths:
  /transaction/sendpush:
    post:
      tags:
        - Push
      summary: Send Push Notification
      operationId: sendPushNotification
      description: |
        # Overview
        The Push API is used to:
        * Create campaigns (targeting all users or a group of users) to send notifications.
        * Target a single user using a unique user attribute.
        * Personalize payload for each user.

        <Note>
          **Rate Limit**: You can create up to **10,000 requests per minute**.
        </Note>

        ## API Endpoint
        The endpoint URL follows the format: `https://pushapi-0X.moengage.com/v2/transaction/sendpush`.
        
        The **'X'** in the URL refers to your MoEngage Data Center (DC). You must replace 'X' with your specific DC number (e.g., 01, 02, 03).

        ## Authentication
        The API uses **Basic Authentication**. You must send a Base64-encoded string containing your `Workspace ID` (username) and `API Key` (password).

        **Header Format:**
        `{"Authorization":"Basic Base64_ENCODED_APPKEY_APIKEY=="}`

        <Info>
        **How to obtain credentials:**
        1. Go to **Settings > Account > APIs** in the MoEngage Dashboard.
        2. **Username**: Copy the **Workspace ID**.
        3. **Password**: Copy the Key from the **Push templates** tile in the API Keys section.
        </Info>

        ## FAQs
        <AccordionGroup>
          <Accordion title="Does the Push API support silent notifications?">
            No, MoEngage Push API doesn't support silent notifications.
          </Accordion>
          <Accordion title="Can I use HTML to format notification text?">
            Yes, the basic template supports HTML tags.
          </Accordion>
        </AccordionGroup>

      requestBody:
        required: true
        description: The configuration for the push campaign.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushRequest'
            examples:
              TargetSingleUser:
                summary: Target Single User
                value:
                  appId: "ABC123_DEBUG"
                  campaignName: "Test_Campaign_Single_User"
                  signature: "{{Signature}}"
                  requestType: "push"
                  targetPlatform: ["ANDROID"]
                  targetAudience: "User"
                  targetUserAttributes:
                    attribute: "USER_ATTRIBUTE_USER_EMAIL"
                    comparisonParameter: "is"
                    attributeValue: "abc@example.com"
                  payload:
                    ANDROID:
                      groupKey: "promo_group"
                      collapseReplaceKey: "promo_update"
                      message: "Welcome to our platform!"
                      title: "Welcome"
                      summary: "Welcome Message"
                      richContent:
                        - type: "image"
                          value: "https://images.example.com/welcome.png"
                      defaultAction:
                        type: "richlanding"
                        value: "https://www.moengage.com"
                  campaignDelivery:
                    type: "soon"
                  conversionGoals:
                    - name: "Purchase"
                      eventName: "PurchaseSuccess"
                      attrs:
                        name: "price"
                        filter: "is greater than"
                        value: "100"
                        type: "numeric"
                  advancedSettings:
                    ttl:
                      ANDROID: 12
                    ignoreFC: false
                    sendAtHighPriority: true
              TargetAllUsers:
                summary: Target All Users (Multi-platform)
                value:
                  appId: "ABC123_DEBUG"
                  campaignName: "Global_Announcement"
                  signature: "{{Signature}}"
                  requestType: "push"
                  targetPlatform: ["ANDROID", "IOS", "WEB"]
                  targetAudience: "All Users"
                  payload:
                    ANDROID:
                      message: "Big Sale Starts Now!"
                      title: "Flash Sale"
                      defaultAction:
                        type: "richlanding"
                        value: "https://www.example.com/sale"
                    IOS:
                      message: "Big Sale Starts Now!"
                      title: "Flash Sale"
                      richContent:
                        - type: "sound"
                          value: "default"
                    WEB:
                      message: "Big Sale Starts Now!"
                      title: "Flash Sale"
                      redirectURL: "https://www.example.com/sale"
                      iconURL: "https://www.example.com/icon.png"
                  campaignDelivery:
                    type: "soon"
              TargetCustomSegment:
                summary: Target Custom Segment
                value:
                  appId: "ABC123_DEBUG"
                  campaignName: "Re-engagement Campaign"
                  signature: "{{Signature}}"
                  requestType: "push"
                  targetPlatform: ["ANDROID"]
                  targetAudience: "Custom Segment"
                  customSegmentName: "Inactive_Users_30_Days"
                  payload:
                    ANDROID:
                      message: "We miss you! Come back for 20% off."
                      title: "We miss you"
                      defaultAction:
                        type: "richlanding"
                        value: "https://www.example.com/comeback"
                  campaignDelivery:
                    type: "soon"

      responses:
        '200':
          description: |
            The request was received. The status in the body indicates whether it was successfully processed or failed.
            
            **Common Error Messages:**
            * `Invalid JSON`
            * `Invalid Request Type`
            * `Invalid appId`
            * `Campaign name is missing`
            * `Signature is not verified`
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PushSuccessResponse'
                  - $ref: '#/components/schemas/PushFailureResponse'
              examples:
                success:
                  summary: Success Response
                  value:
                    requestId: "06418699-2534-4f53-b297-8c1489948382"
                    responseId: "5f7c3b2a-1e4d-4a9c-8b2e-7d1f6a5c9e3d"
                    cid: "29384756"
                    status: "Success"
                failure:
                  summary: Failure Response
                  value:
                    responseId: "5f7c3b2a-1e4d-4a9c-8b2e-7d1f6a5c9e3d"
                    Error_Message: "Campaign Name not found"
                    status: "Fail"
                    Payload error: "Campaign Name not found"
        '401':
          description: Unauthorized. Invalid authentication credentials.

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic Authentication using Workspace ID as username and Push API Key as password.
    apiKeyAuth:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: Your MoEngage Workspace ID.

  schemas:
    # --- Main Request Schema ---
    PushRequest:
      type: object
      required:
        - appId
        - campaignName
        - signature
        - targetPlatform
        - targetAudience
        - payload
        - campaignDelivery
      properties:
        appId: 
          type: string
          description: "The App ID / Workspace ID. (Suffixed with `_DEBUG` for test accounts)."
        campaignName: 
          type: string
          minLength: 5
          description: |
            Unique name for the campaign.
            * API automatically creates a campaign with this name.
            * For `User` target audience, reuse this name to club requests into the same campaign.
        campaignTags: 
          type: array
          description: "Tags to add context (e.g., Transactional, Accounts)."
          items: { type: string }
        signature: 
          type: string
          description: |
            SHA256 hash of `appId|campaignName|apiKey`.
            
            **Python 3.x Generation:**
            ```python
            from hashlib import sha256
            app_id = "XXXXXXXXXXXXXXXXXXXXXX_DEBUG"
            campaign_name = "TEST"
            api_key = "XXXXXXXXXXXX"
            signature_key = app_id+'|'+ campaign_name+'|'+ api_key
            signature = sha256(signature_key.encode('utf-8')).hexdigest()
            print(signature)
            ```
        requestType: 
          type: string
          default: "push"
          description: "Indicates the intention of the API request. Default: `push`."
        targetPlatform:
          type: array
          description: "List of platforms to target."
          items:
            type: string
            enum: [ANDROID, IOS, WEB]
        targetAudience:
          type: string
          description: |
            * `All Users`: Target all users.
            * `Custom Segment`: Target pre-created segments.
            * `User`: Target a specific user attribute.
          enum: ["All Users", "Custom Segment", "User"]
        customSegmentName:
          type: string
          description: "Required if `targetAudience` is **Custom Segment**."
        targetUserAttributes:
          $ref: '#/components/schemas/TargetUserAttributes'
        payload:
          $ref: '#/components/schemas/Payload'
        campaignDelivery:
          $ref: '#/components/schemas/CampaignDelivery'
        conversionGoals:
          type: array
          maxItems: 5
          description: "Supports a maximum of 5 conversion goals. The first goal is primary."
          items:
            $ref: '#/components/schemas/ConversionGoal'
        advancedSettings:
          $ref: '#/components/schemas/AdvancedSettings'

    # --- Main Response Schemas ---
    PushSuccessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Success]
          description: "Indicates the campaign status."
        requestId: 
          type: string
          description: "The request ID."
        responseId: 
          type: string
          description: "The response ID."
        cid: 
          type: string
          description: "The campaign ID."

    PushFailureResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Fail]
        Error_Message: { type: string, example: "Campaign Name not found" }
        "Payload error": { type: string, example: "Campaign Name not found" }
        responseId: { type: string }
        requestId: { type: string }

    # --- Support Schemas ---
    TargetUserAttributes:
      type: object
      required:
        - attribute
        - comparisonParameter
        - attributeValue
      properties:
        attribute:
          type: string
          description: |
            The unique identifier or characteristic used to specify target users. Required when `targetAudience` is **User**.
            
            **Supported Values:**
            * `USER_ATTRIBUTE_UNIQUE_ID`
            * `USER_ATTRIBUTE_USER_EMAIL`
            * `USER_ATTRIBUTE_USER_MOBILE`
            * `MOE_GAID` (Google Advertising ID)
            * `ADVERTISING_IDENTIFIER` (iOS IDFA)
            * `PUSH_ID` (Device push token)
          enum: [USER_ATTRIBUTE_UNIQUE_ID, USER_ATTRIBUTE_USER_EMAIL, USER_ATTRIBUTE_USER_MOBILE, MOE_GAID, ADVERTISING_IDENTIFIER, PUSH_ID]
        comparisonParameter:
          type: string
          description: |
            The condition or operator that compares attributes against the value. Required when `targetAudience` is **User**.
            
            **Note**: The "in" operator supports a maximum of 50 parameters.
          enum: [is, in]
        attributeValue:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: "The actual value assigned to the attribute for comparison. Required when `targetAudience` is **User**."
        isCustom:
          type: boolean
          description: "Set to `true` if targeting a custom user attribute. Default is `false`."
          default: false

    DefaultAction:
      type: object
      description: "Defines the default action triggered when the user interacts with the notification."
      properties:
        type:
          type: string
          description: "Supported values: `richlanding`, `navigation`, `deeplinking`."
          enum: [richlanding, navigation, deeplinking]
        value:
          type: string
          description: "The URL or deep link path."
        kvPairs:
          type: object
          additionalProperties:
            type: string
          description: "Additional key-value pairs to pass with the action."

    AndroidPayload:
      type: object
      required: [message, title]
      properties:
        groupKey: 
          type: string
          description: |
            Used to identify and categorize related push notifications.
            * **Note:** MoEngage automatically modifies this key to ensure it does not exceed 45 ASCII characters (removing non-Latin scripts/spaces).
        collapseReplaceKey: 
          type: string
          description: "Update key used to identify and update related push notifications."
        channel_id:
          type: string
          description: "The channel identifier for the campaign."
        message: 
          type: string
          description: "The main content or text to be displayed in the notification body."
        title: 
          type: string
          description: "The headline or subject of the notification."
        summary: 
          type: string
          description: "Brief summary or condensed version of the content (typically for collapsed views)."
        richContent:
          type: array
          description: "List of rich media objects. Supported types: `coupon`, `image`, `sound`."
          items:
            type: object
            properties:
              type: { type: string, enum: [image, coupon, sound] }
              value: { type: string }
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
        additionalActions:
          type: array
          description: "List of extra action buttons (Max 2). Supported types: `call`, `snooze`, `copy`, `share`."
          maxItems: 2
          items:
            type: object
            properties:
              type: { type: string, enum: [call, snooze, copy, share] }
              value: { type: string }
              name: { type: string }
              iconURL: { type: string }
        fallback: 
          type: object
          description: "JSON object containing fallback values if personalization fails."

    IOSPayload:
      type: object
      required: [message, title]
      properties:
        groupKey: 
          type: string
          description: |
            Used to identify and categorize related push notifications.
            * **Note:** MoEngage automatically modifies this key to ensure it does not exceed 45 ASCII characters.
        collapseReplaceKey: 
          type: string
          description: "Update key used to identify and update related push notifications."
        message: 
          type: string
          description: "The primary text or body of the notification."
        title: 
          type: string
          description: "The title or subject line of the notification."
        subtitle: 
          type: string
          description: "The subtitle of the notification."
        enableIosBadge: 
          type: boolean
          description: "Specifies whether the notification should automatically update the iOS app’s badge count. Values: `true`, `false`."
        richContent:
          type: array
          description: |
            Multimedia attachments. Supported: `gif`, `coupon`, `sound`, `image`, `audio`, `video`.
            * **Note:** Image, video, and audio cannot be used together.
          items:
            type: object
            properties:
              type: { type: string, enum: [gif, coupon, sound, image, audio, video] }
              value: { type: string }
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
        additionalActions:
          type: array
          description: "Supplementary action buttons. You can add only one category."
          items:
            type: object
            properties:
              category: { type: string }
        fallback: 
          type: object
          description: "JSON object containing fallback values if personalization fails."

    WebPayload:
      type: object
      required: [message, title, redirectURL, iconURL]
      properties:
        message: 
          type: string
          description: "The main text content or notification body."
        title: 
          type: string
          description: "The subject or heading of the notification."
        redirectURL: 
          type: string
          format: uri
          description: "URL to redirect the user to upon interaction."
        iconURL: 
          type: string
          format: uri
          description: "URL of the icon image displayed alongside the title/message."
        imageURL: 
          type: string
          format: uri
          description: "URL of an additional image to be shown in the notification."
        autoDismiss: 
          type: boolean
          description: "Specifies whether to dismiss the notification automatically after 8 seconds."
        fallback: 
          type: object
          description: "JSON object containing fallback values if personalization fails."

    Payload:
      type: object
      description: Contains platform-specific notification payloads. At least one platform is required based on `targetPlatform`.
      properties:
        ANDROID:
          $ref: '#/components/schemas/AndroidPayload'
        IOS:
          $ref: '#/components/schemas/IOSPayload'
        WEB:
          $ref: '#/components/schemas/WebPayload'

    CampaignDelivery:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: "Decides when the campaign should be sent."
          enum: [soon, later, periodic]
        date:
          type: string
          description: "Required for 'later' type. Format: `MM/DD/YYYY`"
        time:
          type: string
          description: "Required for 'later' and 'periodic' types. Format: `HH:MM AM/PM`"
        endDate:
          type: string
          description: "Required for 'periodic' type. Format: `MM/DD/YYYY`"
        repeatAfter:
          type: string
          description: "Repeat interval in days for 'periodic' type."
        timezone:
          type: string
          description: "Timezone for scheduling (e.g., 'Asia/Kolkata'). Defaults to IST if not provided."

    ConversionGoal:
      type: object
      required: [name, eventName]
      properties:
        name: { type: string, description: "Display name for the goal." }
        eventName: { type: string, description: "The raw event name to track." }
        attrs:
          type: object
          description: "Event attribute filters."
          properties:
            name: 
              type: string
              description: "Event attribute name."
            filter: 
              type: string
              description: "Operators: `is`, `is not`, `contains`, `starts with`, `is equal to`, `is greater than`, `exists`, etc."
            value: 
              oneOf: [{ type: string }, { type: number }, { type: array, items: { type: string } }]
              description: "Event attribute filter value."
            type: 
              type: string
              enum: [string, numeric]
              description: "Event attribute data type."

    AdvancedSettings:
      type: object
      properties:
        ttl:
          type: object
          description: "Duration (in minutes) to keep the message before discarding. Default: 36 hours (2160 mins). Send 0 if not applicable."
          properties:
            ANDROID: { type: integer }
            WEB: { type: integer }
        ignoreFC:
          type: boolean
          description: |
            Enable to bypass frequency capping.
            * `true`: Bypasses frequency capping.
            * `false`: Applies frequency capping.
        countFC:
          type: boolean
          description: |
            Controls whether this push counts towards the frequency cap.
            * `true`: Counts towards the cap.
            * `false`: Does not count.
        notificationPrioritySettings:
          type: object
          description: "Configures notification priority."
          properties:
            Android:
              type: string
              enum: [High, Low]
            iOS:
              type: integer
              enum: [1, 5, 10]
        "pushAmp+":
          type: boolean
          description: "Enable Push Amplification Plus."
        preCacheSegment:
          type: boolean
          description: "Pre-caches segmentation for scheduled campaigns. Recommended to create 2 hours before schedule."
        campaignThrottleTime:
          type: integer
          description: "Time in minutes (1-360) to spread out delivery."
        campaignThrottleRpm:
          type: integer
          description: "Requests per minute for throttling. Max 250k for personalized campaigns."
        useJinjaPersonalization:
          type: boolean
          description: "Set to `true` to enable Jinja personalization in payloads (e.g., `{{UserAttribute['userName']}}`)."
        ignoreMinimumDelay:
          type: boolean
          default: true
          description: "If `true`, ignores client-level minimum delay settings."
        inboxExpiry:
          type: integer
          description: "Expiry for the push notification in the App Inbox (in hours)."
        iOSTargetDevice:
          type: string
          enum: [apns_device_default_push, apns_device_provisional_push, apns_device_non_provisional_push]
        deliverWhenActive:
          type: boolean
          description: "If `true`, delivers only when the device is in an active state."
        bypassDND:
          type: boolean
          description: "If `true`, bypasses device restrictions like battery optimization or low-power modes."