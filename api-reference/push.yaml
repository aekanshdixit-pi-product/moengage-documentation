openapi: 3.0.3
info:
  title: MoEngage Push API
  version: '2.0'
  description: |
    API for sending transactional and targeted push notifications to users across Android, iOS, and Web platforms.
    
    **Overview**
    * Create campaigns (targeting all users or a group of users).
    * Target a single user using a unique user attribute.
    * Personalize payload for each user.
tags:
  - name: Push
    description: Operations to create and send push notification campaigns.
servers:
  - url: 'https://pushapi-0{dc}.moengage.com/v2'
    description: MoEngage Push API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, 4, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
security:
  - basicAuth: []
    apiKeyAuth: []

paths:
  /transaction/sendpush:
    post:
      tags:
        - Push
      summary: Send Push Notification
      description: |-
        Creates and sends a push notification campaign.
        
        **Authentication**
        The API request is authenticated via Basic Authentication (`Authorization: Basic Base64_ENCODED_APPKEY_APIKEY==`) and requires the `MOE-APPKEY` header.
      x-mint:
        content: |
          <Note>
            **Rate Limit**: You can create up to **10,000 requests per minute**.
          </Note>
      requestBody:
        required: true
        description: The complete configuration for the push campaign.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushRequest'
            examples:
              Example2_TargetAllUsers:
                summary: Target All Users (Android, iOS, Web)
                value:
                  appId: "XXXXXXXXXXXXXXXXXXXXXXXX"
                  campaignName: "Test Push"
                  campaignTags: ["Transactional"]
                  signature: "{{Signature}}"
                  requestType: "push"
                  targetPlatform: ["ANDROID", "IOS", "WEB"]
                  targetAudience: "All Users"
                  payload:
                    ANDROID:
                      message: "Android Message"
                      title: "Android Message Title"
                      summary: "Android Summary"
                      richContent:
                        - type: "image"
                          value: "https://images.iimg.in/c"
                        - type: "coupon"
                          value: "free"
                        - type: "sound"
                          value: "tring"
                      defaultAction:
                        type: "richlanding"
                        value: "https://www.google.co.in"
                      additionalActions:
                        - type: "call"
                          value: "12345678"
                          name: "Call button"
                          iconURL: "abc"
                        - type: "copy"
                          value: "12345678"
                          name: "Copy button"
                          iconURL: "abc"
                    IOS:
                      message: "iOS Message"
                      title: "iOS Message Title"
                      richContent:
                        - type: "sound"
                          value: "custSound4.wav"
                      additionalActions:
                        - category: "INVITE_CATEGORY"
                    WEB:
                      message: "Web Message"
                      title: "Web Message Title"
                      redirectURL: "https://www.google.com"
                      iconURL: "sbc.jpeg"
                      imageURL: "https://cdn.dribbble.com/users/146881/screenshots/1180383/despicable_me_1x.jpg"
                      fallback: {}
                  campaignDelivery:
                    type: "soon"
                  conversionGoals:
                    - name: "amount 1"
                      eventName: "AddedTocart"
                      attrs:
                        filter: "is between"
                        name: "amount"
                        value: "10,100"
                        type: "numeric"
                  advancedSettings:
                    ttl:
                      ANDROID: 12
                      WEB: 24
                    ignoreFC: false
                    sendAtHighPriority: true
                    inboxExpiry: 360
              Example3_TargetSingleUser:
                summary: Target Single User
                value:
                  appId: "XXXXXXXXXXXXXXXXXXXXXXXX"
                  campaignName: "Test Push User"
                  signature: "{{Signature}}"
                  requestType: "push"
                  targetPlatform: ["ANDROID"]
                  targetAudience: "User"
                  targetUserAttributes:
                    attribute: "USER_ATTRIBUTE_USER_EMAIL"
                    comparisonParameter: "is"
                    attributeValue: "abc@example.com"
                  payload:
                    ANDROID:
                      message: "Android Message"
                      title: "Android Message Title"
                      summary: "Android Summary"
                      richContent:
                        - type: "image"
                          value: "https://images.iimg.in/c"
                      defaultAction:
                        type: "richlanding"
                        value: "https://www.google.co.in"
                  campaignDelivery:
                    type: "soon"
              Example3_TargetCustomSegment:
                summary: Target Custom Segment
                value:
                  appId: "XXXXXXXXXXXXXXXXXXXXXXXX"
                  campaignName: "Test Push Segment"
                  signature: "{{Signature}}"
                  requestType: "push"
                  targetPlatform: ["ANDROID", "IOS", "WEB"]
                  targetAudience: "Custom Segment"
                  customSegmentName: "Android_TranV2"
                  payload:
                    ANDROID:
                      message: "testing txn v2"
                      title: "testing txn v2"
                      summary: "summary"
                      richContent:
                        - type: "image"
                          value: "https://images.iimg.in/c"
                    IOS:
                      message: "7th"
                      title: "Test Case custom segment5"
                      richContent:
                        - type: "sound"
                          value: "custSound4.wav"
                    WEB:
                      message: "Test Case WEB"
                      title: "Test Case WEB"
                      redirectURL: "https://www.google.com"
                      iconURL: "sbc.jpeg"
                      imageURL: "https://cdn.dribbble.com/users/146881/screenshots/1180383/despicable_me_1x.jpg"
                  campaignDelivery:
                    type: "soon"
      responses:
        '200':
          description: |
            The request was received. The body indicates if the processing was a Success or Fail.
            
            **Common Error Messages:**
            * `Invalid JSON`
            * `Invalid Request Type`
            * `Invalid appId`
            * `Campaign name is missing`
            * `Signature is not verified`
            * `Campaign With this name already exists.`
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PushSuccessResponse'
                  - $ref: '#/components/schemas/PushFailureResponse'
              examples:
                success:
                  summary: Success Response
                  value:
                    requestId: "06418699-2534-4f53-b297-8c1489948382"
                    responseId: "5f7c3b2a-1e4d-4a9c-8b2e-7d1f6a5c9e3d"
                    cid: "29384756"
                    status: "Success"
                failure:
                  summary: Failure Response
                  value:
                    responseId: "5f7c3b2a-1e4d-4a9c-8b2e-7d1f6a5c9e3d"
                    Error_Message: "Campaign Name not found"
                    status: "Fail"
                    Payload error: "Campaign Name not found"
        '401':
          description: Unauthorized. Invalid authentication credentials.

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic Authentication using Workspace ID as username and Push API Key as password.
    apiKeyAuth:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: Your MoEngage Workspace ID.

  schemas:
    TargetUserAttributes:
      type: object
      required:
        - attribute
        - comparisonParameter
        - attributeValue
      properties:
        attribute:
          type: string
          description: The user attribute to target.
          enum: [USER_ATTRIBUTE_UNIQUE_ID, USER_ATTRIBUTE_USER_EMAIL, USER_ATTRIBUTE_USER_MOBILE, MOE_GAID, ADVERTISING_IDENTIFIER, PUSH_ID]
        comparisonParameter:
          type: string
          description: The comparison operator.
          enum: [is, in]
        attributeValue:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: The value(s) to match. Use an array for the 'in' operator.
        isCustom:
          type: boolean
          description: Set to true if targeting a custom user attribute.
          default: false

    DefaultAction:
      type: object
      properties:
        type:
          type: string
          enum: [richlanding, navigation, deeplinking]
        value:
          type: string
          description: The URL or deep link path.
        kvPairs:
          type: object
          additionalProperties:
            type: string
          description: Additional key-value pairs to pass with the action.

    AndroidPayload:
      type: object
      required: [message, title]
      properties:
        message: { type: string }
        title: { type: string }
        summary: { type: string }
        groupKey: 
          type: string
          description: "Max 45 characters. ASCII only. Used to group notifications."
        collapseReplaceKey: 
          type: string
          description: "Update key used to identify and update related push notifications."
        channel_id: 
          type: string
          description: "Channel identifier for the campaign."
        richContent:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [image, coupon, sound] }
              value: { type: string }
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
        additionalActions:
          type: array
          maxItems: 2
          items:
            type: object
            properties:
              type: { type: string, enum: [call, snooze, copy, share] }
              value: { type: string }
              name: { type: string }
              iconURL: { type: string }
        fallback: { type: object }

    IOSPayload:
      type: object
      required: [message, title]
      properties:
        message: { type: string }
        title: { type: string }
        subtitle: { type: string }
        groupKey: 
          type: string
          description: "Max 45 characters. ASCII only. Used to group notifications."
        collapseReplaceKey: 
          type: string
          description: "Update key used to identify and update related push notifications."
        enableIosBadge: 
          type: boolean
          description: "Specifies whether a notification should automatically update the iOS app’s badge count."
        richContent:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [gif, coupon, sound, image, audio, video] }
              value: { type: string }
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
        additionalActions:
          type: array
          items:
            type: object
            properties:
              category: { type: string }
        fallback: { type: object }

    WebPayload:
      type: object
      required: [message, title, redirectURL, iconURL]
      properties:
        message: { type: string }
        title: { type: string }
        redirectURL: { type: string, format: uri }
        iconURL: { type: string, format: uri }
        imageURL: { type: string, format: uri }
        autoDismiss: 
          type: boolean
          description: "Specifies whether to dismiss the notification automatically after 8 seconds."
        fallback: { type: object }

    Payload:
      type: object
      description: Contains platform-specific notification payloads. At least one platform is required based on `targetPlatform`.
      properties:
        ANDROID:
          $ref: '#/components/schemas/AndroidPayload'
        IOS:
          $ref: '#/components/schemas/IOSPayload'
        WEB:
          $ref: '#/components/schemas/WebPayload'

    CampaignDelivery:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [soon, later, periodic]
        date:
          type: string
          description: "Required for 'later' type. Format: MM/DD/YYYY"
        time:
          type: string
          description: "Required for 'later' and 'periodic' types. Format: HH:MM AM/PM"
        endDate:
          type: string
          description: "Required for 'periodic' type. Format: MM/DD/YYYY"
        repeatAfter:
          type: string
          description: "Repeat interval in days for 'periodic' type."
        timezone:
          type: string
          description: "Timezone for scheduling, e.g., 'Asia/Kolkata'. Defaults to IST if not provided."

    ConversionGoal:
      type: object
      required: [name, eventName]
      properties:
        name: { type: string, description: "Display name for the goal." }
        eventName: { type: string, description: "The raw event name to track." }
        attrs:
          type: object
          properties:
            name: { type: string }
            filter: 
              type: string
              description: "Operators: is, is not, contains, starts with, ends with, is greater than, is between, exists, etc."
            value: { oneOf: [{ type: string }, { type: number }, { type: array, items: { type: string } }] }
            type: { type: string, enum: [string, numeric] }

    AdvancedSettings:
      type: object
      properties:
        ttl:
          type: object
          description: "TTL in minutes. Default 36 hours (2160 mins). Send 0 if not applicable."
          properties:
            ANDROID: { type: integer }
            WEB: { type: integer }
        ignoreFC:
          type: boolean
          description: "Set to true to bypass frequency capping."
        countFC:
          type: boolean
          description: "If ignoreFC is true, set this to true to count this push in the frequency cap."
        notificationPrioritySettings:
          type: object
          properties:
            Android:
              type: string
              enum: [High, Low]
            iOS:
              type: integer
              enum: [1, 5, 10]
        "pushAmp+":
          type: boolean
          description: "Enable Push Amplification Plus."
        preCacheSegment:
          type: boolean
          description: "Pre-caches segmentation for scheduled campaigns."
        campaignThrottleTime:
          type: integer
          description: "Time in minutes (1-360) to spread out delivery."
        campaignThrottleRpm:
          type: integer
          description: "Requests per minute for throttling. Max 250k for personalized."
        useJinjaPersonalization:
          type: boolean
          description: "Set to true to enable Jinja personalization in payloads."
        ignoreMinimumDelay:
          type: boolean
          default: true
        inboxExpiry:
          type: integer
          description: "Expiry for the push notification in the App Inbox, in hours."
        iOSTargetDevice:
          type: string
          enum: [apns_device_default_push, apns_device_provisional_push, apns_device_non_provisional_push]
        deliverWhenActive:
          type: boolean
          description: "Deliver only when device is in active state."
        bypassDND:
          type: boolean
          description: "Bypass device restrictions like battery optimization."

    PushRequest:
      type: object
      required:
        - appId
        - campaignName
        - signature
        - targetPlatform
        - targetAudience
        - payload
        - campaignDelivery
      properties:
        appId: { type: string }
        campaignName: { type: string, minLength: 5 }
        campaignTags: { type: array, items: { type: string } }
        signature: 
          type: string
          description: |
            SHA256 hash of `appId|campaignName|apiKey`.
            
            **Python 3.x Generation:**
            ```python
            from hashlib import sha256
            app_id = "XXXXXXXXXXXXXXXXXXXXXX_DEBUG"
            campaign_name = "TEST"
            api_key = "XXXXXXXXXXXX"
            signature_key = app_id+'|'+ campaign_name+'|'+ api_key
            signature = sha256(signature_key.encode('utf-8')).hexdigest()
            print(signature)
            ```
        requestType: { type: string, default: "push" }
        targetPlatform:
          type: array
          items:
            type: string
            enum: [ANDROID, IOS, WEB]
        targetAudience:
          type: string
          enum: ["All Users", "Custom Segment", "User"]
        customSegmentName:
          type: string
          description: "Required if targetAudience is 'Custom Segment'."
        targetUserAttributes:
          $ref: '#/components/schemas/TargetUserAttributes'
        payload:
          $ref: '#/components/schemas/Payload'
        campaignDelivery:
          $ref: '#/components/schemas/CampaignDelivery'
        conversionGoals:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/ConversionGoal'
        advancedSettings:
          $ref: '#/components/schemas/AdvancedSettings'

    PushSuccessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Success]
        requestId: { type: string }
        responseId: { type: string }
        cid: { type: string }

    PushFailureResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Fail]
        Error_Message: { type: string, example: "Campaign Name not found" }
        "Payload error": { type: string, example: "Campaign Name not found" }
        responseId: { type: string }
        requestId: { type: string }