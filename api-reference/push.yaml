openapi: 3.0.3
info:
  title: MoEngage Push API
  version: '2.0'
  description: |
    The MoEngage Push API is used to:
    * Create campaigns (targeting all users or a group of users) to send notifications.
    * Target a single user using a unique user attribute.
    * Personalize payload for each user.
    
    ### Important Notes
    * **Silent Notifications:** The Push API **does not** support silent notifications.
    * **HTML Support:** The basic template and message body support HTML tags for formatting.
    * **Rate Limit:** You can create 10,000 requests per minute.
tags:
  - name: Push
    description: Operations to create and send push notification campaigns.
servers:
  - url: 'https://pushapi-0{dc}.moengage.com/v2'
    description: MoEngage Push API Server
    variables:
      dc:
        default: '1'
        description: >-
          Your MoEngage Data Center (DC). Corresponds to the 'X' in the
          `pushapi-0X` part of the URL. Find your DC number (e.g., 1, 2, 3, 4)
          in your MoEngage dashboard.
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
security:
  - basicAuth: []
  - apiKeyAuth: []
paths:
  /transaction/sendpush:
    post:
      tags:
        - Push
      summary: Send Push Notification
      description: >-
        The MoEngage Push API is used to create campaigns, target users, and personalize payloads.
      x-mint:
        content: |
          ### Authentication
          The API request will be authenticated through Basic Authentication. Basic Authentication sends a Base64-encoded string containing your username and password with every API request.
          
          It encodes a `username: password` string in Base64 and appends the encoded string with 'Basic '. This string is included in the authorization header as shown below:
          
          `{"Authorization":"Basic Base64_ENCODED_APPKEY_APIKEY=="}`

          **How to obtain credentials:**
          1.  On the left navigation menu in the MoEngage dashboard, go to **Settings** > **Account** > **APIs**.
          2.  **Username**: Under **Workspace ID (earlier app id)**, click the copy icon to copy the username.
          3.  **Password**: In the **API keys** section, click the copy icon in the **Push** templates tile to copy the API key.
          
          ---

          <Note>
            **Rate Limit:** You can create 10,000 requests per minute.
          </Note>
      requestBody:
        required: true
        description: >-
          The complete configuration for the push campaign, including targeting,
          platform-specific payloads, and delivery options.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushRequest'
            examples:
              targetSingleUser:
                summary: Target a Single User
                value:
                  appId: YOUR_WORKSPACE_ID
                  campaignName: Welcome_Push_To_User_123
                  signature: GENERATED_SHA256_SIGNATURE
                  targetPlatform:
                    - ANDROID
                  targetAudience: User
                  targetUserAttributes:
                    attribute: USER_ATTRIBUTE_USER_EMAIL
                    comparisonParameter: is
                    attributeValue: test@example.com
                  payload:
                    ANDROID:
                      title: Welcome to our App!
                      message: >-
                        Thanks for signing up. Here is a special offer for you.
                  campaignDelivery:
                    type: soon
                  advancedSettings:
                    ignoreFC: true
              targetAllUsers:
                summary: Target All Users
                value:
                  appId: YOUR_WORKSPACE_ID
                  campaignName: Holiday_Sale_Announcement
                  signature: GENERATED_SHA256_SIGNATURE
                  targetPlatform:
                    - ANDROID
                    - IOS
                    - WEB
                  targetAudience: All Users
                  payload:
                    ANDROID:
                      title: Holiday Sale is LIVE!
                      message: Get up to 50% off on all items. Shop now!
                    IOS:
                      title: Holiday Sale is LIVE!
                      message: Get up to 50% off on all items. Shop now!
                    WEB:
                      title: Holiday Sale is LIVE!
                      message: Get up to 50% off on all items. Shop now!
                      redirectURL: 'https://example.com/sale'
                      iconURL: 'https://example.com/icon.png'
                  campaignDelivery:
                    type: soon
      responses:
        '200':
          description: >-
            Request processed. The `status` field in the response body will be
            either 'Success' or 'Fail'. If 'Fail', an `Error_Message` field will
            provide details.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PushSuccessResponse'
                  - $ref: '#/components/schemas/PushFailureResponse'
        '401':
          description: Unauthorized. Invalid authentication credentials.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        The API request is authenticated through Basic Authentication. Use your MoEngage Workspace ID as the **username** and the Push API Key as the **password**.
    apiKeyAuth:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: |
        This is the workspace ID (formerly APP ID) of your MoEngage workspace.

        You can find your MoEngage Workspace ID in the MoEngage dashboard:
        **Settings** > **Account** > **APIs** -> **Workspace ID (earlier app id)**
  schemas:
    TargetUserAttributes:
      type: object
      required:
        - attribute
        - comparisonParameter
        - attributeValue
      properties:
        attribute:
          type: string
          description: |
            This field denotes a unique identifier or characteristic of an entity or object used to specify the target users. This value is required when the `targetAudience` value is `User`.

            Supported values are:
            * `USER_ATTRIBUTE_UNIQUE_ID`: for unique ID
            * `USER_ATTRIBUTE_USER_EMAIL`: for email
            * `USER_ATTRIBUTE_USER_MOBILE`: for mobile number
            * `MOE_GAID`: for Google Advertising identifier
            * `ADVERTISING_IDENTIFIER`: for iOS Identifier for advertising
            * `PUSH_ID`: for device push token (Android GCM ID, iOS push token)
          enum:
            - USER_ATTRIBUTE_UNIQUE_ID
            - USER_ATTRIBUTE_USER_EMAIL
            - USER_ATTRIBUTE_USER_MOBILE
            - MOE_GAID
            - ADVERTISING_IDENTIFIER
            - PUSH_ID
        comparisonParameter:
          type: string
          description: |
            This field denotes a condition or operator that compares the user attributes against a specific value. Required when `targetAudience` is `User`.

            * `is`: The query type is "is".
            * `in`: The query type is "in".

            <Note>
            The maximum number of parameters that can be added while using the "in" `comparisonParameter` is 50.
            </Note>
          enum:
            - is
            - in
        attributeValue:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: >-
            The value(s) to match. Use a string for the 'is' operator and an
            array of strings for the 'in' operator. Required when
            `targetAudience` is `User`.
        isCustom:
          type: boolean
          description: >-
            This field denotes whether a custom attribute has been added. For
            custom attributes, set this key to `true`.
          default: false
    DefaultAction:
      type: object
      properties:
        type:
          type: string
          enum:
            - richlanding
            - navigation
            - deeplinking
        value:
          type: string
          description: The URL or deep link path.
        kvPairs:
          type: object
          additionalProperties:
            type: string
          description: Additional key-value pairs to pass with the action.
    AndroidPayload:
      type: object
      required:
        - message
        - title
      properties:
        message:
          type: string
          description: >-
            This field denotes the main content or text to be displayed in the notification/message. 
            **Note:** Supports HTML tags.
        title:
          type: string
          description: This field denotes the headline or subject of the notification/message.
        summary:
          type: string
          description: >-
            This field denotes the brief summary or condensed version of the
            content. Typically displayed in collapsed notifications.
        groupKey:
          type: string
          description: |
            This field denotes the group key used to identify and categorize related push notifications.

            **Note**:
            * Ensure you use the same group key for all push notifications you want to group.
            * MoEngage automatically modifies the group key to ensure it does not exceed the 45-character limit.
        collapseReplaceKey:
          type: string
          description: >-
            This field denotes the update key used to identify and update
            related push notifications. Ensure you use the same update key for
            all push notifications intended to update each other.
        channel_id:
          type: string
          description: This field denotes the channel identifier for the campaign.
        richContent:
          type: array
          description: |
            An object or HTML string containing rich text, images, or other multimedia to enhance the message. Supported values are:
            * `Coupon`
            * `Image`
            * `Sound`
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - image
                  - coupon
                  - sound
              value:
                type: string
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
          description: >-
            This helps you define the default action triggered when the user
            interacts with the notification.
        additionalActions:
          type: array
          maxItems: 2
          description: |
            This object contains a list of extra actions or buttons that the user can perform. A maximum of two additional action buttons can be used.

            Supported actions are:
            * `Call`
            * `Snooze`
            * `Copy`
            * `Share`
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - call
                  - snooze
                  - copy
                  - share
              value:
                type: string
              name:
                type: string
              iconURL:
                type: string
        fallback:
          type: object
          description: >-
            This JSON object contains the fallback values for the payload, in
            case personalization fails.
    IOSPayload:
      type: object
      required:
        - message
        - title
      properties:
        message:
          type: string
          description: >-
            This field denotes the primary text or body of the notification/message.
            **Note:** Supports HTML tags.
        title:
          type: string
          description: This field denotes the title or subject line of the notification/message.
        subtitle:
          type: string
          description: This field denotes the subtitle of the notification/message.
        groupKey:
          type: string
          description: |
            This field denotes the group key used to identify and categorize related push notifications.

            **Note**:
            * Ensure you use the same group key for all push notifications you want to group.
            * MoEngage automatically modifies the group key to ensure it does not exceed the 45-character limit.
        collapseReplaceKey:
          type: string
          description: >-
            This field denotes the update key used to identify and update
            related push notifications. Ensure you use the same update key for
            all push notifications intended to update each other.
        enableIosBadge:
          type: boolean
          description: >-
            Specifies whether a notification should automatically update the
            iOS app’s badge count. Supported values are 'true' and 'false'.
        richContent:
          type: array
          description: |
            A resource, such as an image or multimedia attachment, to provide additional visual or interactive elements. Supported contents are:
            * `GIF`
            * `Coupon`
            * `Sound`
            * `Image`
            * `Audio`
            * `Video`

            **Note**: Image, video, and audio are only supported after iOS 10 and cannot be used together.
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - gif
                  - coupon
                  - sound
                  - image
                  - audio
                  - video
              value:
                type: string
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
          description: |
            This object contains a set of default actions associated with the notifications. Supported values are:
            * `Navigation`
            * `Richlanding`
            * `Deeplinking`
        additionalActions:
          type: array
          description: >-
            Contains supplementary actions or buttons. You can add only one
            category for additional actions.
          items:
            type: object
            properties:
              category:
                type: string
        fallback:
          type: object
          description: >-
            This JSON object contains the fallback values for the payload, in
            case personalization fails.
    WebPayload:
      type: object
      required:
        - message
        - title
        - redirectURL
        - iconURL
      properties:
        message:
          type: string
          description: >-
            This field denotes the main text content or notification body
            displayed to users.
            **Note:** Supports HTML tags.
        title:
          type: string
          description: This field denotes the subject or heading of the notification.
        redirectURL:
          type: string
          format: uri
          description: >-
            This field denotes the URL to which the user will be redirected
            upon interacting with the notification.
        iconURL:
          type: string
          format: uri
          description: >-
            This field denotes the URL of an icon image representing the
            notification, usually displayed alongside the title and message.
        imageURL:
          type: string
          format: uri
          description: >-
            This field denotes the URL of an additional image to be shown in
            the notification, providing further context or visual appeal.
        autoDismiss:
          type: boolean
          description: >-
            This field specifies whether to dismiss the notification
            automatically after 8 seconds.
        fallback:
          type: object
          description: >-
            This JSON object contains the fallback values for the payload, in
            case personalization fails.
    Payload:
      type: object
      description: >-
        Contains platform-specific notification payloads. At least one platform
        is required based on `targetPlatform`.
      properties:
        ANDROID:
          $ref: '#/components/schemas/AndroidPayload'
        IOS:
          $ref: '#/components/schemas/IOSPayload'
        WEB:
          $ref: '#/components/schemas/WebPayload'
    CampaignDelivery:
      type: object
      description: >-
        This object helps decide when the campaign should be sent.
        Scheduling for 'later' or 'periodic' only applies to 'All Users' or
        'Custom Segment' campaigns. All 'User' targeted notifications are
        sent as soon as possible.
      required:
        - type
      properties:
        type:
          type: string
          description: Defines the delivery schedule.
          enum:
            - soon
            - later
            - periodic
        date:
          type: string
          description: 'Required for "later" type. Format: MM/DD/YYYY'
        time:
          type: string
          description: 'Required for "later" and "periodic" types. Format: HH:MM AM/PM'
        endDate:
          type: string
          description: 'Required for "periodic" type. Format: MM/DD/YYYY'
        repeatAfter:
          type: string
          description: Repeat interval in days for 'periodic' type.
        timezone:
          type: string
          description: >-
            Timezone for scheduling, e.g., 'Asia/Kolkata'. This is not
            mandatory. If not passed, the default timezone will be set to IST
            (and not UTC/GMT).
    ConversionGoal:
      type: object
      description: >-
        This object contains the conversion goal details. A maximum of five
        goals are supported.
      required:
        - name
        - eventName
      properties:
        name:
          type: string
          description: >-
            This field denotes the readable name of the conversion goal for the
            Campaign Info.
        eventName:
          type: string
          description: This field denotes the actual event name to track.
        attrs:
          type: object
          description: >-
            This field denotes the event attribute filters. It contains `name`,
            `filter`, `value`, and `type`.
          properties:
            name:
              type: string
              description: Event attribute name. (Mandatory if `attrs` is used)
            filter:
              type: string
              description: >-
                Event attribute filter operator. (Mandatory if `attrs` is used). 
                
                **String Operators:** `is`, `is not`, `contains`, `does not contain`, `starts with`, `does not start with`, `ends with`, `does not end with`, `in the following`, `not in the following`, `exists`, `does not exist`.
                
                **Numeric Operators:** `is equal to`, `is not equal to`, `is between`, `is not between`, `is less than`, `is greater than`, `exists`, `does not exist`.
              enum:
                - is
                - is not
                - contains
                - does not contain
                - starts with
                - does not start with
                - ends with
                - does not end with
                - in the following
                - not in the following
                - exists
                - does not exist
                - is equal to
                - is not equal to
                - is between
                - is not between
                - is less than
                - is greater than
            value:
              oneOf:
                - type: string
                - type: number
                - type: array
                  items:
                    type: string
              description: Event attribute filter value. Note that for `exists` and `does not exist` filters, this key is not required.
            type:
              type: string
              description: >-
                Event attribute data type. (Mandatory if `attrs` is used)
              enum:
                - string
                - numeric
    AdvancedSettings:
      type: object
      description: This object contains information about advanced settings for the campaign.
      properties:
        ttl:
          type: object
          description: >-
            Time-to-live duration in minutes. If not delivered, the push
            service will retry until the TTL expires. The default is 36 hours.
            Send ‘0’ if it is not applicable.
          properties:
            ANDROID:
              type: integer
              description: TTL in minutes for Android.
            WEB:
              type: integer
              description: TTL in minutes for Web.
        ignoreFC:
          type: boolean
          description: >-
            Set to `true` to bypass frequency capping set on the dashboard. If
            not present, defaults to `false`.
        countFC:
          type: boolean
          description: >-
            If `ignoreFC` is true, set this to `true` to count this push in the
            frequency cap.
            * `true`: Only Push campaigns are counted in the frequency cap count.
            * `false`: Push campaigns are not counted in the frequency cap count.
        notificationPrioritySettings:
          type: object
          description: >-
            Set notification priority. For Android, this uses the GCM/FCM flag
            to send time-critical messages.
          properties:
            Android:
              type: string
              enum:
                - High
                - Low
            iOS:
              type: integer
              description: 'Supported values: 1, 5, 10.'
              enum:
                - 1
                - 5
                - 10
        sendAtHighPriority:
          type: boolean
          description: >-
            Legacy field found in some examples. Equivalent to setting high priority in `notificationPrioritySettings`.
          deprecated: true
        'pushAmp+':
          type: boolean
          description: >-
            Enable Push Amplification Plus. Supported values are 'true' or
            'false'.
        preCacheSegment:
          type: boolean
          description: >-
            Applicable for scheduled and periodic campaigns. If enabled,
            pre-caches the segmentation and improves campaign sending time.
        campaignThrottleTime:
          type: integer
          description: >-
            Time in minutes (1-360) to spread out the campaign delivery.
            Controls the rate of sending.
        campaignThrottleRpm:
          type: integer
          description: >-
            Requests per minute for throttling. Overrides
            `campaignThrottleTime` if both are sent. If neither is sent,
            dashboard settings (default 100K RPM) are used.
        useJinjaPersonalization:
          type: boolean
          description: >-
            Set to `true` to enable Jinja personalization in payloads (e.g.,
            `"title": "Hello {{UserAttribute['userName']}}"`).
        ignoreMinimumDelay:
          type: boolean
          description: >-
            Boolean to indicate if the Client level Minimum Delay setting
            should be applied. Defaults to `true` if not passed.
          default: true
        inboxExpiry:
          type: integer
          description: Expiry for the push notification in the App Inbox, in hours.
        iOSTargetDevice:
          type: string
          enum:
            - apns_device_default_push
            - apns_device_provisional_push
            - apns_device_non_provisional_push
        deliverWhenActive:
          type: boolean
          description: >-
            Specifies whether the push notifications will be delivered when the
            device is in an active state.
        bypassDND:
          type: boolean
          description: >-
            Specifies whether to deliver the notification immediately,
            bypassing device restrictions.
    PushRequest:
      type: object
      required:
        - appId
        - campaignName
        - signature
        - targetPlatform
        - targetAudience
        - payload
        - campaignDelivery
      properties:
        appId:
          type: string
          description: >-
            This field denotes the app ID. You can find it on the MoEngage
            dashboard: **Settings** > **Account** > **APIs** -> **Workspace ID
            (earlier app id)**. The App ID for TEST ACCOUNT is suffixed with
            `_DEBUG`.
        campaignName:
          type: string
          minLength: 5
          description: |
            This field denotes the campaign name.
            * The campaign name should be unique for `All Users` and `Custom Segment` campaigns.
            * For `User` type `targetAudience` requests, reuse this campaign name for requests that should be clubbed in the same campaign.
        campaignTags:
          type: array
          items:
            type: string
          description: |
            Used to add more context to campaigns (e.g., onboarding, retention, country). Tags can be used to filter campaigns.
            Example: `“campaignTags“ : [“Transactional“, “Accounts“]`
        signature:
          type: string
          description: >-
            A SHA256 hash of `appId|campaignName|apiKey`. See the 'Signature
            Generation' section in the main guide for details on how to create
            this.
          x-mint:
            content: |
              A signature is required to verify whether the client is authorized to make the API call. It is generated from a hash of the campaign name, app ID, and API key using the SHA 256 method.

              The signature key is a concatenation of `app_id + '|' + campaign_name + '|' + api_key`.
          x-mint:
            content: |  

              <Tabs>
              <Tab title="Python 3.x">
              ```python
              from hashlib import sha256
              app_id = "YOUR_WORKSPACE_ID_DEBUG"
              campaign_name = "TEST"
              api_key = "YOUR_PUSH_API_KEY"
              signature_key = app_id+'|'+ campaign_name+'|'+ api_key
              signature = sha256(signature_key.encode('utf-8')).hexdigest()
              print(signature)
              ```
              </Tab>
              <Tab title="Python 2.x">
              ```python
              from hashlib import sha256
              app_id = "YOUR_WORKSPACE_ID_DEBUG"
              campaign_name = "TEST"
              api_key = "YOUR_PUSH_API_KEY"
              signature_key = app_id+'|'+ campaign_name+'|'+ api_key
              signature = sha256(signature_key).hexdigest()
              print(signature)
              ```
              </Tab>
              </Tabs>

              **Generated Signature Example:**
              ```text
              Generated Signature: 
              {{Signature}}
              ```
        requestType:
          type: string
          description: >-
            The value of this key is used to indicate the intention of an API
            request. The default value is `push`.
          default: push
        targetPlatform:
          type: array
          description: >-
            This field denotes the platform devices that are targeted by your
            campaign. You can target one or more platforms (Android, iOS, Web).
          items:
            type: string
            enum:
              - ANDROID
              - IOS
              - WEB
        targetAudience:
          type: string
          description: |
            This field denotes the target segment for the campaign. Supported values are:
            * `All Users`: Pass this value to target all users of your App/Website.
            * `Custom Segment`: Pass this value to target pre-created user segments.
            * `User`: Pass this value to target a specific user (or up to 100 users) with an attribute.
          enum:
            - All Users
            - Custom Segment
            - User
        customSegmentName:
          type: string
          description: >-
            Required if `targetAudience` is 'Custom Segment'. Note that the
            custom segment name must exactly match the name of the target
            segment.
        targetUserAttributes:
          $ref: '#/components/schemas/TargetUserAttributes'
          description: >-
            This object contains the target user attribute details. Required
            when the `targetAudience` value is `User`.
        payload:
          $ref: '#/components/schemas/Payload'
          description: >-
            This object contains the payload details for one or more platforms
            (ANDROID, IOS, WEB).
        campaignDelivery:
          $ref: '#/components/schemas/CampaignDelivery'
          description: |
            This field helps decide when the campaign should be sent.
            * All notifications targeted to a single `User` will be sent as soon as possible (ASAP).
            * Scheduling campaigns for `later` or `periodic` is applied only for `Custom Segment` or `All Users` campaigns.
        conversionGoals:
          type: array
          maxItems: 5
          description: |
            This object contains the conversion goals details.
            * You can pass a single conversion goal or multiple conversion goals (max 5).
            * If passing multiple, the first goal in the list is considered the primary conversion goal.
            * **Note:** Selected Attribution window must be within limits (1 - 36 hours).
          items:
            $ref: '#/components/schemas/ConversionGoal'
        advancedSettings:
          $ref: '#/components/schemas/AdvancedSettings'
          description: This object contains information about advanced settings.
    PushSuccessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - Success
        requestId:
          type: string
          description: This field indicates the request ID.
        responseId:
          type: string
          description: This field indicates the response ID.
        cid:
          type: string
          description: This field indicates the campaign ID.
    PushFailureResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - Fail
        Error_Message:
          type: string
          description: A description of the error that occurred.
          example: Campaign Name not found
          enum:
            - Invalid JSON
            - Invalid Request Type
            - Invalid appId
            - appId is not present
            - Please specify a campaign name of more than or equal to 5 characters
            - Request limit exceed.
            - Campaign name is missing
            - Signature is missing
            - Signature is not verified
            - key is Mandatory
            - "Campaign With this name already exists. For targetAudience type All User or Custom Segment you can't create campaign with same campaign previous name"
            - key is not of Type List
            - "value is not a allowed value."
            - Failed to get all whitelisted event list
            - "Custom Segment Name: s_name not found in our database.Please verify same on Dashboard"
            - error or set isCustom to True.
            - Selected Attribution window is not within limits (1 - 36 hours)
            - Error parsing parameters
        responseId:
          type: string
          description: This field indicates the response ID.
        requestId:
          type: string
          description: This field indicates the request ID.