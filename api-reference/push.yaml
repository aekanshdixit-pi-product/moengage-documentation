                        "collapseReplaceKey": "this is update key",
                        "message": "this is message",
                        "title": "this is title",
                        "summary": "this is summary",
                        "richContent": [
                            {
                                "type": "image",
                                "value": "https://images.iimg.in/c"
                            },
                            {
                                "type": "gif",
                                "value": "sun-18283_256.gif"
                            }
                        ],
                        "defaultAction": {
                            "type": "richlanding",
                            "value": "https://www.moengage.com"
                        },
                        "additionalActions": [
                            {
                                "type": "call",
                                "value": "123123",
                                "name": "call button",
                                "iconUrl": "abc"
                            }
                        ]
                    },
                    "IOS": {
                        "groupKey": "thisisgroupkey",
                        "collapseReplaceKey": "this is update key",
                        "message": "this is ios message",
                        "title": "this is ios title",
                        "richContent": [
                            {
                                "type": "sound",
                                "value": "custSound4.wav"
                            }
                        ],
                        "additionalActions": [
                            {
                                "category": "INVITE_CATEGORY"
                            }
                        ]
                    },
                    "WEB": {
                        "message": "this is web message",
                        "title": "this is web title",
                        "redirectURL": "https://www.google.com",
                        "iconURL": "sbc.jpeg",
                        "imageURL": "https://cdn.dribbble.com/users/146881/screenshots/1180383/despicable_me_1x.jpg"
                    }
                },
                "campaignDelivery": {
                    "type": "soon"
                },
                "conversionGoals": [
                    {
                        "name": "amount1",
                        "eventName": "AddedTocart",
                        "attrs": {
