openapi: 3.0.3
info:
  title: MoEngage Push API
  version: '2.0'
  description: |
    # Overview
    Push API is used to:
    * Create campaigns (targeting all users or a group of users) to send notifications.
    * Target a single user using a unique user attribute.
    * Personalize payload for each user.

    # Postman Collection
    We have made it easy for you to test the APIs. [Click here to view it in Postman](https://www.postman.com/moengage-dev/api-docs/collection/acmujor/moengage-transaction-push-api?action=share&source=copy-link&creator=5883765).

    # Authentication & Signature
    A signature is required to verify whether the client is authorized to make the API call. It is generated from a hash of the campaign name, app ID, and API key using SHA 256.
    
    **Steps to Generate:**
    1. Go to **Settings > Account > APIs** on the MoEngage dashboard.
    2. Copy **Workspace ID** (app_id) and **Push API Key**.
    3. Ensure `campaign_name` matches the one used in the request body.
    
    See the code samples below for Python generation scripts.

    # FAQs
    **Does the Push API support silent notifications?**
    No, MoEngage Push API doesn't support silent notifications.

    **Can I use HTML to format notification text?**
    Yes, the basic template supports HTML tags.

tags:
  - name: Transactional
    description: Operations to create and send push notification campaigns.

servers:
  - url: 'https://pushapi-0{dc}.moengage.com/v2'
    description: MoEngage Push API Server
    variables:
      dc:
        default: '1'
        description: "The 'X' in the API Endpoint URL refers to the MoEngage Data Center (DC). Replace 'X' with your DC number. Mapping available [here](https://help.moengage.com/hc/en-us/articles/360057030512-Data-Centers-in-MoEngage#01G5DQVXGT2KZMXTJPF77QPJ25)."
        enum:
          - '1'
          - '2'
          - '3'
          - '4'

paths:
  /transaction/sendpush:
    post:
      tags:
        - Transactional
      summary: Send Push Notification
      description: |
        Creates and sends a push notification campaign. Can target all users, a pre-defined custom segment, or specific users based on their attributes.

        ## Rate Limit
        You can create **10,000 requests per minute**.
      x-code-samples:
        - lang: API Endpoint
          label: API Endpoint
          source: |
            https://pushapi-0X.moengage.com/v2/transaction/sendpush
        - lang: Python 3 (Signature)
          label: Python 3 (Signature)
          source: |
            from hashlib import sha256
            app_id = "{{Your Workspace ID}}"
            campaign_name = "{{your campaign name}}"
            api_key = "{{your push api key}}"
            signature_key = app_id+'|'+ campaign_name+'|'+ api_key
            signature = sha256(signature_key.encode('utf-8')).hexdigest()
            print(signature)
        - lang: Python 2 (Signature)
          label: Python 2 (Signature)
          source: |
            from hashlib import sha256
            app_id = "{{Your Workspace ID}}"
            campaign_name = "{{your campaign name}}"
            api_key = "{{your push api key}}"
            signature_key = app_id+'|'+ campaign_name+'|'+ api_key
            signature = sha256(signature_key).hexdigest()
            print(signature)
        - lang: cURL
          label: Sample cURL Request
          source: |
            curl --location 'https://pushapi-0X.moengage.com/v2/transaction/sendpush'
            --header 'Content-Type: application/json' \
                --data '{
                "appId": "{{your Workspace ID}}",
                "campaignName": "{{your campaign name}}",
                "signature": "{{Signature}}",
                "requestType": "push",
                "targetPlatform": ["ANDROID"],
                "targetAudience": "User",
                "targetUserAttributes": {
                    "attribute": "USER_ATTRIBUTE_USER_EMAIL",
                    "comparisonParameter": "is",
                    "attributeValue": "abc@example.com"
                },
                "payload": {
                    "ANDROID": {
                        "groupKey": "thisisgroupkey",
                        "collapseReplaceKey": "this is update key",
                        "message": "this is message",
                        "title": "this is title",
                        "summary": "this is summary",
                        "richContent": [
                            {
                                "type": "image",
                                "value": "https://images.iimg.in/c"
                            },
                            {
                                "type": "gif",
                                "value": "sun-18283_256.gif"
                            }
                        ],
                        "defaultAction": {
                            "type": "richlanding",
                            "value": "https://www.moengage.com"
                        },
                        "additionalActions": [
                            {
                                "type": "call",
                                "value": "123123",
                                "name": "call button",
                                "iconUrl": "abc"
                            }
                        ]
                    }
                },
                "campaignDelivery": {
                    "type": "soon"
                }
            }'
      requestBody:
        required: true
        description: The complete configuration for the push campaign.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushRequest'
            examples:
              Ex1_Android_App:
                summary: Ex 1 - Android App
                value:
                  ANDROID:
                    message: "Message"
                    title: "Title"
                    channel_id: "ChannelId"
                    richContent:
                      - type: "image"
                        value: "https://images.iimg.in/c"
                      - type: "coupon"
                        value: "free"
                      - type: "sound"
                        value: "tring"
                    defaultAction:
                      type: "richlanding"
                      value: "https://www.google.co.in/webhp?sourceid=chrome-instant&ion=1&espv=2&ie=UTF-8 "
                      kvPairs:
                        key1: "value1"
                        Key2: "value2"
                    additionalActions:
                      - type: "call"
                        value: "12345678"
                        name: "Call button"
                        iconURL: "abc"
                      - type: "copy"
                        value: "12345678"
                        name: "Copy button"
                        iconURL: "abc"
                    fallback: {}
              Ex1_iOS_App:
                summary: Ex 1 - iOS App
                value:
                  IOS:
                    message: "Message"
                    title: "Tittle"
                    subtitle: "Subtitle"
                    enableIosBadge: true
                    richContent:
                      - type: "sound"
                        value: "custSound4.wav"
                      - type: "coupon"
                        value: "free"
                      - type: "image"
                        value: "xyz.jpg"
                    additionalActions:
                      - category: "INVITE_CATEGORY"
                    defaultAction:
                      type: "navigation"
