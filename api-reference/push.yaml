components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic Authentication using Workspace ID as username and Push API Key as password.
    apiKeyAuth:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: Your MoEngage Workspace ID.

  schemas:
    TargetUserAttributes:
      type: object
      required:
        - attribute
        - comparisonParameter
        - attributeValue
      properties:
        attribute:
          type: string
          description: |
            The user attribute to target. Required when targetAudience is 'User'.
            Common values: USER_ATTRIBUTE_UNIQUE_ID, USER_ATTRIBUTE_USER_EMAIL, USER_ATTRIBUTE_USER_MOBILE, MOE_GAID, ADVERTISING_IDENTIFIER, PUSH_ID
        comparisonParameter:
          type: string
          description: "The comparison operator. Required when targetAudience is 'User'. Note: 'in' operator supports max 50 parameters."
          enum: [is, in]
        attributeValue:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: "The value(s) to match. Use an array for the 'in' operator. Required when targetAudience is 'User'."
        isCustom:
          type: boolean
          description: "Set to true if targeting a custom user attribute."
          default: false

    DefaultAction:
      type: object
      properties:
        type:
          type: string
          enum: [richlanding, navigation, deeplinking]
        value:
          type: string
          description: The URL or deep link path.
        kvPairs:
          type: object
          additionalProperties:
            type: string
          description: Additional key-value pairs to pass with the action.

    AndroidPayload:
      type: object
      required: [message, title]
      properties:
        message: { type: string, description: "Main content or text." }
        title: { type: string, description: "Headline or subject." }
        summary: { type: string, description: "Brief summary or condensed version." }
        groupKey: { type: string, description: "Key to identify and categorize related notifications. ASCII only." }
        collapseReplaceKey: { type: string, description: "Update key to identify and update related notifications." }
        channel_id: { type: string, description: "Channel identifier for the campaign." }
        richContent:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [image, coupon, sound] }
              value: { type: string }
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
        additionalActions:
          type: array
          maxItems: 2
          items:
            type: object
            properties:
              type: { type: string, enum: [call, snooze, copy, share] }
              value: { type: string }
              name: { type: string }
              iconURL: { type: string }
        fallback: 
          type: object
          description: "JSON object containing fallback values."

    IOSPayload:
      type: object
      required: [message, title]
      properties:
        message: { type: string }
        title: { type: string }
        subtitle: { type: string }
        groupKey: { type: string }
        collapseReplaceKey: { type: string }
        enableIosBadge: { type: boolean, description: "Automatically update iOS app badge count." }
        richContent:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [gif, coupon, sound, image, audio, video] }
              value: { type: string }
        defaultAction:
          $ref: '#/components/schemas/DefaultAction'
        additionalActions:
          type: array
          items:
            type: object
            properties:
              category: { type: string }
        fallback: { type: object }

    WebPayload:
      type: object
      required: [message, title, redirectURL, iconURL]
      properties:
        message: { type: string }
        title: { type: string }
        redirectURL: { type: string, format: uri }
        iconURL: { type: string, format: uri }
        imageURL: { type: string, format: uri }
        autoDismiss: { type: boolean, description: "Dismiss notification automatically after 8 seconds." }
        fallback: { type: object }

    Payload:
      type: object
      description: Contains platform-specific notification payloads. At least one platform is required based on `targetPlatform`.
      properties:
        ANDROID:
          $ref: '#/components/schemas/AndroidPayload'
        IOS:
          $ref: '#/components/schemas/IOSPayload'
        WEB:
          $ref: '#/components/schemas/WebPayload'

    CampaignDelivery:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [soon, later, periodic]
        date:
          type: string
          description: "Required for 'later' type. Format: MM/DD/YYYY"
        time:
          type: string
          description: "Required for 'later' and 'periodic' types. Format: HH:MM AM/PM"
        endDate:
          type: string
          description: "Required for 'periodic' type. Format: MM/DD/YYYY"
        repeatAfter:
          type: string
          description: "Repeat interval in days for 'periodic' type."
        timezone:
          type: string
          description: "Timezone for scheduling, e.g., 'Asia/Kolkata'. Defaults to IST if not provided."

    ConversionGoal:
      type: object
      required: [name, eventName]
      properties:
        name: { type: string, description: "Display name for the goal." }
        eventName: { type: string, description: "The raw event name to track." }
        attrs:
          type: object
          properties:
            name: { type: string, description: "Event attribute name." }
            filter: 
              type: string
              description: "Event attribute filter operator."
              enum: 
                - is
                - is not
                - contains
                - does not contain
                - starts with
                - does not start with
                - ends with
                - does not end with
                - in the following
                - not in the following
                - exists
                - does not exist
                - is equal to
                - is not equal to
                - is between
                - is not between
                - is less than
                - is greater than
            value: 
              oneOf: [{ type: string }, { type: number }, { type: array, items: { type: string } }] 
              description: "Event attribute filter value."
            type: { type: string, enum: [string, numeric], description: "Event attribute data type." }

    AdvancedSettings:
      type: object
      properties:
        ttl:
          type: object
          properties:
            ANDROID: { type: integer, description: "TTL in minutes for Android (Default 36 hours)." }
            WEB: { type: integer, description: "TTL in minutes for Web (Default 36 hours)." }
        ignoreFC:
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          description: "Set to true (or 'true') to bypass frequency capping."
        countFC:
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          description: "If ignoreFC is true, set this to true to count this push in the frequency cap."
        notificationPrioritySettings:
          type: object
          properties:
            Android:
              type: string
              enum: [High, Low]
            iOS:
              type: integer
              enum: [1, 5, 10]
        "pushAmp+":
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          description: "Enable Push Amplification Plus."
        preCacheSegment:
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          description: "If enabled, pre-caches segmentation. Recommended for scheduled/periodic."
        campaignThrottleTime:
          type: integer
          description: "Time in minutes to spread out the campaign delivery (1-360)."
        campaignThrottleRpm:
          type: integer
          description: "Requests per minute for throttling. Overrides campaignThrottleTime."
        useJinjaPersonalization:
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          description: "Set to true to enable Jinja personalization in payloads."
        ignoreMinimumDelay:
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          default: true
        inboxExpiry:
          type: integer
          description: "Expiry for the push notification in the App Inbox, in hours."
        iOSTargetDevice:
          type: string
          enum: [apns_device_default_push, apns_device_provisional_push, apns_device_non_provisional_push]
        deliverWhenActive:
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          description: "Deliver notification when device is in active state."
        bypassDND:
          type: boolean
          description: "Deliver notification immediately bypassing device restrictions."
        sendAtHighPriority:
          oneOf:
            - type: string
              enum: ["true", "false"]
            - type: boolean
          description: "Send at high priority (legacy flag)."

    PushRequest:
      type: object
      required:
        - appId
        - campaignName
        - signature
        - targetPlatform
        - targetAudience
        - payload
        - campaignDelivery
      properties:
        appId: { type: string, description: "Workspace ID (found in Settings > Account > APIs)." }
        campaignName: { type: string, minLength: 5, description: "Unique campaign name." }
        campaignTags: { type: array, items: { type: string }, description: "Tags to add context (e.g., Transactional, Accounts)." }
        signature: { type: string, description: "SHA256 hash of appId|campaignName|apiKey" }
        requestType: { type: string, default: "push" }
        targetPlatform:
          type: array
          items:
            type: string
            enum: [ANDROID, IOS, WEB]
        targetAudience:
          type: string
          enum: ["All Users", "Custom Segment", "User"]
        customSegmentName:
          type: string
          description: "Required if targetAudience is 'Custom Segment'."
        targetUserAttributes:
          $ref: '#/components/schemas/TargetUserAttributes'
        moe_event_id:
          type: string
          description: "The event ID. Required for event-triggered campaigns. You must pass `moe_event_id` if any event attribute is present for campaigns."
        moe_transaction_id:
          type: string
          description: "You must pass `moe_transaction_id` for alerts."
        payload:
          $ref: '#/components/schemas/Payload'
        campaignDelivery:
          $ref: '#/components/schemas/CampaignDelivery'
        conversionGoals:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/ConversionGoal'
        advancedSettings:
          $ref: '#/components/schemas/AdvancedSettings'

    PushSuccessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Success]
          description: "Indicates the campaign status."
        requestId: { type: string, description: "Indicates the request ID." }
        responseId: { type: string, description: "Indicates the response ID." }
        cid: { type: string, description: "Indicates the campaign ID." }

    PushFailureResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Fail]
        Error_Message: { type: string, example: "Campaign Name not found" }
        responseId: { type: string }
        requestId: { type: string }