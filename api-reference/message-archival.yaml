openapi: 3.0.3
info:
  title: MoEngage Message Archival API
  description: You can use this API to store any communication sent to customers for later access. For more information, refer to [Message Archival](https://help.moengage.com/hc/en-us/articles/16229242010900-Message-Archival).
  version: '1.0'
servers:
  - url: 'https://api-0{X}.moengage.com/v1'
    description: MoEngage API Server
    variables:
      X:
        default: '1'
        description: 'Your MoEngage Data Center (DC) number.'
tags:
  - name: Message Archival
    description: Retrieve archived message content.
security:
  - basicAuth: []
paths:
  /archival/view:
    post:
      tags:
        - Message Archival
      summary: View Archived Message
      operationId: viewArchivedMessage
      x-mint:
        metadata:
          title: View Archived Message
          description: You can use this API to store any communication sent to customers for later access. For more information, refer to [Message Archival](https://help.moengage.com/hc/en-us/articles/16229242010900-Message-Archival).
        content: |
          You can use this API to store any communication sent to customers for later access. For more information, refer to [Message Archival](https://help.moengage.com/hc/en-us/articles/16229242010900-Message-Archival).

          ## Sample cURL Request

          <CodeGroup>
          ```bash SMS
          curl --location '[https://api-0X.moengage.com/v1/archival/view](https://api-0X.moengage.com/v1/archival/view)' \
          --header 'accept: application/json' \
          --header 'Content-Type: application/json' \
          --header 'MOE-APPKEY: {{Workspace_ID or APP_ID}}' \
          --header 'Authorization: Basic {{Authorization_Key}}' \
          --data '{
              "user_id": "{{User_ID}}",
              "delivery_type": "ONE_TIME",
              "campaign_type": "SMS",
              "campaign_channel": "SMS",
              "sent_epoch_time": 1716972486,
              "campaign_id": "{{Campaign_ID}}",
              "event_name": "SMS Sent",
              "platform": "SMS",
              "event_id": "{{Event_ID}}"
          }'
          ```

          ```bash Email
          curl --location '[https://api-0X.moengage.com/v1/archival/view](https://api-0X.moengage.com/v1/archival/view)' \
          --header 'accept: application/json' \
          --header 'Content-Type: application/json' \
          --header 'MOE-APPKEY: {{Workspace_ID or APP_ID}}' \
          --header 'Authorization: Basic {{Authorization_Key}}' \
          --data '{
              "user_id": "{{User_ID}}",
              "delivery_type": "ONE_TIME",
              "campaign_type": "Email Campaign",
              "campaign_channel": "EMAIL",
              "sent_epoch_time": 1717150294,
              "campaign_id": "{{Campaign_ID}}",
              "event_name": "Email Sent",
              "platform": "EMAIL"
          }'
          ```

          ```bash Push
          # Android
          curl --location '[https://api-0X.moengage.com/v1/archival/view](https://api-0X.moengage.com/v1/archival/view)' \
          --header 'accept: application/json' \
          --header 'Content-Type: application/json' \
          --header 'MOE-APPKEY: {{Workspace_ID or APP_ID}}' \
          --header 'Authorization: Basic {{Authorization_Key}}' \
          --data '{
              "user_id": "{{User_ID}}",
              "delivery_type": "ONE_TIME",
              "campaign_type": "General Push Campaign",
              "campaign_channel": "PUSH",
              "sent_epoch_time": 1716915262,
              "campaign_id": "{{Campaign_ID}}",
              "event_name": "Notification Received Android",
              "platform": "ANDROID"
          }'
          ```
          </CodeGroup>

          ## Sample Response

          <CodeGroup>
          ```json 200
          {
              "status": true,
              "data": {
                  "message_details": {
                      "message_type": "campaign",
                      "message_id": "66560c2d2880326031c474a6",
                      "channel": "push",
                      "platform": "android",
                      "delivery_type": "ONE_TIME",
                      "sent_time": "Tue, 28 May 2024 22:24:22 IST",
                      "message_to": "cZug38RqRd2-cF30bd2vda:APA91bGEG-OHMiWV3eHd_ohLs8V-yTgDJuQXNV32jO13or-R118OAC65MXdSx5ozYsIiL-RFan_iflQ62XVX7T2BiNqqQQfKd3FitlpbLR7nVBdkFF1yv_s8pqZux-HfThn-ojhpBIWd",
                      "moe_event_id": null,
                      "service": {
                          "type": "FCM"
                      },
                      "template_info": {
                          "type": "Native",
                          "version": null,
                          "id": "stylizedbasic"
                      }
                  },
                  "message_content": {
                      "title": "expiry in 1 hour",
                      "summary": "expiry in 1 hour",
                      "message": "expiry in 1 hour",
                      "related_urls": [
                          "[https://image-staging-ap1.moengage.com/checkfcsgainmoengage/20240527083246095196HE4ELHScreenshotofUploadyourAppDiawiDevelopmentandInhouseAppsWirelessInstallationjpgcheckfcsgainmoengage.jpg](https://image-staging-ap1.moengage.com/checkfcsgainmoengage/20240527083246095196HE4ELHScreenshotofUploadyourAppDiawiDevelopmentandInhouseAppsWirelessInstallationjpgcheckfcsgainmoengage.jpg)"
