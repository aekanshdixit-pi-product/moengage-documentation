          ```json 400
          {
              "status": false,
              "error_message": "This event is unsupported to view message copy. The supported events are ['Email Sent', 'SMS Sent', 'Notification Sent iOS', 'Notification Received Android', 'Notification Received Web']"
          }
          ```

          ```json 401
          {
              "status": false,
              "error": "Invalid data key"
          }
          ```

          ```json 500
          {
              "title": "Server Error",
              "description": "An unexpected error was encountered while processing this request. Please contact MoEngage Team",
              "code": "BiaFuAzn-aefa0b0e-2c88-4106-8d07-0f0c53513e48"
          }
          ```
          </CodeGroup>

          ## Rate Limit
          
          The rate limit is 1000 RPM.

          ## Postman Collections
          We have made it easy for you to test the APIs. Click [here](https://moengage-dev.postman.co/workspace/New-Team-Workspace~02fb2ecf-217a-466f-9e1a-25bfb761e352/collection/9707451-eb26aac6-94f9-48e2-ad7f-c2b930964895?action=share&creator=9707451) to view it in Postman.
      description: |
        You can use this API to store any communication sent to customers for later access. For more information, refer to [Message Archival](https://help.moengage.com/hc/en-us/articles/16229242010900-Message-Archival).
      parameters:
        - name: MOE-APPKEY
          in: header
          required: true
          schema:
            type: string
          description: |
            This is the workspace ID (earlier APP ID) of your MoEngage workspace.
            The MOE-APPKEY has to be passed in the request. You can find your MoEngage Workspace ID in the MoEngage Dashboard:
            
            **Settings -> Account -> APIs -> Workspace ID (earlier app id)**
          example: 'YOUR_WORKSPACE_ID_XXXX'
      requestBody:
        description: Request payload to identify the message to be retrieved.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchivalRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success200'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '502':
          $ref: '#/components/responses/Error502'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic Authentication using Workspace ID (username) and Data API Key (password) from MoEngage Dashboard > Settings > Account > APIs.
  schemas:
    ArchivalRequest:
      type: object
      required:
        - user_id
        - delivery_type
        - campaign_type
        - campaign_channel
        - sent_epoch_time
        - campaign_id
        - event_name
        - platform
      properties:
        user_id:
          type: string
          description: This field denotes the unique identifier of the user.
        delivery_type:
          type: string
          description: |
            This field denotes the delivery type of the channel. Supported values are:
            * ONE_TIME
            * PERIODIC
            * EVENT_TRIGGERED
            * LOCATION_TRIGGERED
            * DEVICE_TRIGGERED
            * API_TRIGGERED
            * BUSINESS_EVENT_TRIGGERED
            * API_TRIGGERED
          enum:
            - ONE_TIME
            - PERIODIC
            - EVENT_TRIGGERED
            - LOCATION_TRIGGERED
            - DEVICE_TRIGGERED
            - API_TRIGGERED
            - BUSINESS_EVENT_TRIGGERED
        campaign_type:
          type: string
          description: |
            This field denotes the campaign type. Supported values are:
            
            **Push:**
            * General Push Campaign (General Push)
            * Autotrigger Campaign (Event Triggered Push)
            * Geo-fencing Campaign (Location Triggered Push)
            * Business Event Trigger Push Campaign (Business Event Triggered Push)
            
            **SMS:**
            * sms (all SMS campaigns except Business Event Triggered campaign)
            * Business Event Trigger SMS Campaign (Business Event Triggered campaign)
            
            **Email:**
            * Email Campaign (all Email campaigns except Event triggered and Business Event Triggered campaigns)
            * Email Triggers (Event triggered campaigns)
            * Business Event Trigger Email Campaign (Business Event Triggered campaigns)
            
            **Alerts/Inform:**
            * Inform Email (for Email Campaign)
            * Inform SMS (for SMS Campaign)
            * Inform Push (for Push Campaign)
          enum:
            - General Push Campaign
            - Autotrigger Campaign
            - Geo-fencing Campaign
            - Business Event Trigger Push Campaign
            - sms
            - Business Event Trigger SMS Campaign
            - Email Campaign
            - Email Triggers
            - Business Event Trigger Email Campaign
            - Inform Email
            - Inform SMS
            - Inform Push
        campaign_channel:
          type: string
          description: |
            This field denotes the campaign channel. Supported values are:
            * EMAIL
            * SMS
            * PUSH
            * FLOWS
          enum:
            - EMAIL
            - SMS
            - PUSH
            - FLOWS
        sent_epoch_time:
          type: integer
          format: int64
          description: This field denotes the sent time of the campaign.
          example: 1716972486
        campaign_id:
          type: string
          description: This field denotes the campaign ID.
        event_name:
          type: string
          description: |
            This field denotes the name of the event. Supported event names are:
            * Email Sent
            * SMS Sent
            * Notification Sent iOS
            * Notification Received Android
            * Notification Received Web
          enum:
            - Email Sent
            - SMS Sent
            - Notification Sent iOS
            - Notification Received Android
            - Notification Received Web
        platform:
          type: string
          description: |
            This field denotes the target platform of the campaign. Supported values are:
            * IOS
            * ANDROID
            * WEB
            * EMAIL
            * SMS
            * MWEB
          enum:
            - IOS
            - ANDROID
            - WEB
            - EMAIL
            - SMS
            - MWEB
        event_id:
          type: string
          description: |
            This field denotes the event ID.
            This field is required for event-triggered campaigns.
            * You must pass `moe_event_id` if any event attribute is present for campaigns.
            * You must pass `moe_transaction_id` for alerts, which is mandatory.
    ArchivalResponseSuccess:
      type: object
      properties:
        status:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ArchivalData'
    ArchivalData:
      type: object
      properties:
        message_details:
          $ref: '#/components/schemas/MessageDetails'
        message_content:
          $ref: '#/components/schemas/MessageContent'
        backup_content:
          $ref: '#/components/schemas/MessageContent'
        file_info:
          $ref: '#/components/schemas/FileInfo'
    MessageDetails:
      type: object
      properties:
        message_type:
          type: string
          example: campaign
        message_id:
          type: string
          example: 66560c2d2880326031c474a6
        channel:
          type: string
          example: push
        platform:
          type: string
          example: android
        delivery_type:
          type: string
          example: ONE_TIME
        sent_time:
          type: string
          example: 'Tue, 28 May 2024 22:24:22 IST'
        message_to:
          type: string
          example: 'cZug38RqRd2-cF30bd2vda:APA91bGEG-OHMiWV3eHd_ohLs8V-yTgDJuQXNV32jO13or-R118OAC65MXdSx5ozYsIiL-RFan_iflQ62XVX7T2BiNqqQQfKd3FitlpbLR7nVBdkFF1yv_s8pqZux-HfThn-ojhpBIWd'
        moe_event_id:
          type: string
          nullable: true
          example: null
        service:
          type: object
          properties:
            type:
              type: string
              example: FCM
        template_info:
          type: object
          properties:
            type:
              type: string
              example: Native
            version:
              type: string
              nullable: true
              example: null
            id:
              type: string
              example: stylizedbasic
    MessageContent:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
          nullable: true
        message:
          type: string
          description: This field contains a brief description of the request status in the case of success.
        related_urls:
          type: array
          items:
            type: string
            format: uri
    FileInfo:
      type: object
      properties:
        version:
          type: string
          example: v2
        file_name:
          type: string
          example: '66560c2d2880326031c474a6_pramodseg_1716915262_push_android.json'
    ErrorResponse400:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error_message:
          type: string
          example: 'This event is unsupported to view message copy. The supported events are [...]'
    ErrorResponse401:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error:
          type: string
          example: Invalid data key
    ErrorResponse500:
      type: object
      properties:
        title:
          type: string
          example: Server Error
        description:
          type: string
          example: An unexpected error was encountered while processing this request. Please contact MoEngage Team
        code:
          type: string
          example: 'BiaFuAzn-aefa0b0e-2c88-4106-8d07-0f0c53513e48'
  responses:
    Success200:
      description: |
        Success.
        The server successfully processed the request, but is not returning any content.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ArchivalResponseSuccess'
    Error400:
      description: |
        Bad Request.
        This response is returned when the required parameters are missing from the request, or when the provided parameters are invalid, or when a template already exists with the same version, name, or id.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse400'
    Error401:
      description: |
        Authentication Failure.
        This response is returned when the authorization parameters are missing in the HTTP Auth Header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse401'
    Error429:
      description: |
        Too Many Requests.
        A number of headers are returned in case of a rate-limit breach.
    Error500:
      description: |
        Internal Server Error.
        This response is returned when the system runs into an unexpected error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse500'
    Error502:
      description: |
        Server Error.
        Something went wrong on MoEngage.