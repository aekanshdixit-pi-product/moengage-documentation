openapi: 3.0.3
info:
  title: MoEngage Message Archival API
  description: |
    This API allows you to store and access any communication sent to customers for later access. 
    
    For more information, refer to [Message Archival](https://help.moengage.com/hc/en-us/articles/16229242010900-Message-Archival).
  version: '1.0'
servers:
  - url: 'https://api-0{X}.moengage.com/v1'
    description: MoEngage API Server
    variables:
      X:
        default: '1'
        description: |
          Your MoEngage Data Center (DC) number. 
          
          Each customer is hosted on a different data center. You can find your data center number (value of X) by checking the [data center and API endpoint mapping page](https://help.moengage.com/hc/en-us/articles/360057030512-Data-Centers-in-MoEngage#01G5DQVXGT2KZMXTJPF77QPJ25).
tags:
  - name: Message Archival
    description: Retrieve archived message content.
security:
  - basicAuth: []
paths:
  /archival/view:
    post:
      tags:
        - Message Archival
      summary: View Archived Message
      x-mint:
        metadata:
          title: View Archived Message
          description: Retrieve specific message content sent to users via MoEngage.
        content: |
          <Note>
            **Rate Limit**: The rate limit for this endpoint is **1000 RPM**.
          </Note>

          ## Authentication Setup
          The API request is authenticated through **Basic Authentication**. You must send a Base64-encoded string containing your `Workspace ID` (username) and `Data API Key` (password).

          To obtain these credentials from the MoEngage Dashboard:
          1. Navigate to **Settings** -> **Account** -> **APIs**.
          2. **Username**: Under **Workspace ID** (earlier App ID), click the copy icon.
          3. **Password**: In the **API keys** section, click the copy icon in the **Data** tile.

          ## Postman Collection
          We have made it easy for you to test the APIs. [Click here to view the collection in Postman](https://moengage-dev.postman.co/workspace/New-Team-Workspace~02fb2ecf-217a-466f-9e1a-25bfb761e352/collection/9707451-eb26aac6-94f9-48e2-ad7f-c2b930964895?action=share&creator=9707451).
      description: |
        Use this API to store any communication sent to customers for later access.
      operationId: viewArchivedMessage
      parameters:
        - name: MOE-APPKEY
          in: header
          required: true
          schema:
            type: string
          description: |
            This is the workspace ID (earlier APP ID) of your MoEngage workspace.
            
            Found in **Settings -> Account -> APIs -> Workspace ID**.
          example: 'YOUR_WORKSPACE_ID_XXXX'
      requestBody:
        description: Request payload to identify the message to be retrieved.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchivalRequest'
            examples:
              smsExample:
                summary: SMS Archival Request
                value:
                  user_id: 'USER_ID_123'
                  delivery_type: ONE_TIME
                  campaign_type: SMS
                  campaign_channel: SMS
                  sent_epoch_time: 1716972486
                  campaign_id: 'CAMPAIGN_ID_XYZ'
                  event_name: SMS Sent
                  platform: SMS
                  event_id: 'EVENT_ID_ABC'
              emailExample:
                summary: Email Archival Request
                value:
                  user_id: 'USER_ID_123'
                  delivery_type: ONE_TIME
                  campaign_type: Email Campaign
                  campaign_channel: EMAIL
                  sent_epoch_time: 1717150294
                  campaign_id: 'CAMPAIGN_ID_XYZ'
                  event_name: Email Sent
                  platform: EMAIL
              pushAndroidExample:
                summary: Push (Android) Archival Request
                value:
                  user_id: 'USER_ID_123'
                  delivery_type: ONE_TIME
                  campaign_type: General Push Campaign
                  campaign_channel: PUSH
                  sent_epoch_time: 1716915262
                  campaign_id: 'CAMPAIGN_ID_XYZ'
                  event_name: Notification Received Android
                  platform: ANDROID
              pushIosExample:
                summary: Push (iOS) Archival Request
                value:
                  user_id: 'USER_ID_123'
                  delivery_type: ONE_TIME
                  campaign_type: General Push Campaign
                  campaign_channel: PUSH
                  sent_epoch_time: 1717060428
                  campaign_id: 'CAMPAIGN_ID_XYZ'
                  event_name: Notification Sent iOS
                  platform: IOS
              pushWebExample:
                summary: Push (Web) Archival Request
                value:
                  user_id: 'USER_ID_123'
                  delivery_type: ONE_TIME
                  campaign_type: General Push Campaign
                  campaign_channel: PUSH
                  sent_epoch_time: 1717056071
                  campaign_id: 'CAMPAIGN_ID_XYZ'
                  event_name: Notification Received Web
                  platform: WEB
      responses:
        '200':
          $ref: '#/components/responses/Success200'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '502':
          $ref: '#/components/responses/Error502'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic Authentication using Workspace ID (username) and Data API Key (password).
        
        Obtain from **MoEngage Dashboard > Settings > Account > APIs**.
  schemas:
    ArchivalRequest:
      type: object
      required:
        - user_id
        - delivery_type
        - campaign_type
        - campaign_channel
        - sent_epoch_time
        - campaign_id
        - event_name
        - platform
      properties:
        user_id:
          type: string
          description: Unique identifier of the user.
        delivery_type:
          type: string
          description: |
            Delivery type of the channel. Supported values are:
            * `ONE_TIME`
            * `PERIODIC`
            * `EVENT_TRIGGERED`
            * `LOCATION_TRIGGERED`
            * `DEVICE_TRIGGERED`
            * `API_TRIGGERED`
            * `BUSINESS_EVENT_TRIGGERED`
          enum:
            - ONE_TIME
            - PERIODIC
            - EVENT_TRIGGERED
            - LOCATION_TRIGGERED
            - DEVICE_TRIGGERED
            - API_TRIGGERED
            - BUSINESS_EVENT_TRIGGERED
        campaign_type:
          type: string
          description: |
            The campaign type.
            
            **Push:**
            * General Push Campaign
            * Autotrigger Campaign
            * Geo-fencing Campaign
            * Business Event Trigger Push Campaign
            
            **SMS:**
            * sms
            * Business Event Trigger SMS Campaign
            
            **Email:**
            * Email Campaign
            * Email Triggers
            * Business Event Trigger Email Campaign
            
            **Alerts/Inform:**
            * Inform Email
            * Inform SMS
            * Inform Push
          enum:
            - General Push Campaign
            - Autotrigger Campaign
            - Geo-fencing Campaign
            - Business Event Trigger Push Campaign
            - sms
            - Business Event Trigger SMS Campaign
            - Email Campaign
            - Email Triggers
            - Business Event Trigger Email Campaign
            - Inform Email
            - Inform SMS
            - Inform Push
        campaign_channel:
          type: string
          description: |
            The campaign channel.
          enum:
            - EMAIL
            - SMS
            - PUSH
            - FLOWS
        sent_epoch_time:
          type: integer
          format: int64
          description: The sent time of the campaign as a Unix epoch timestamp.
          example: 1716972486
        campaign_id:
          type: string
          description: The campaign ID.
        event_name:
          type: string
          description: |
            The name of the event. Supported values:
            * Email Sent
            * SMS Sent
            * Notification Sent iOS
            * Notification Received Android
            * Notification Received Web
          enum:
            - Email Sent
            - SMS Sent
            - Notification Sent iOS
            - Notification Received Android
            - Notification Received Web
        platform:
          type: string
          description: |
            The target platform of the campaign.
          enum:
            - IOS
            - ANDROID
            - WEB
            - EMAIL
            - SMS
            - MWEB
        event_id:
          type: string
          description: |
            The event ID. **Required for event-triggered campaigns.**
            
            * You must pass `moe_event_id` if any event attribute is present for campaigns.
            * You must pass `moe_transaction_id` for alerts.
    ArchivalResponseSuccess:
      type: object
      properties:
        status:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ArchivalData'
    ArchivalData:
      type: object
      properties:
        message_details:
          $ref: '#/components/schemas/MessageDetails'
        message_content:
          $ref: '#/components/schemas/MessageContent'
        backup_content:
          $ref: '#/components/schemas/MessageContent'
        file_info:
          $ref: '#/components/schemas/FileInfo'
    MessageDetails:
      type: object
      properties:
        message_type:
          type: string
          example: campaign
        message_id:
          type: string
          example: 66560c2d2880326031c474a6
        channel:
          type: string
          example: push
        platform:
          type: string
          example: android
        delivery_type:
          type: string
          example: ONE_TIME
        sent_time:
          type: string
          example: 'Tue, 28 May 2024 22:24:22 IST'
        message_to:
          type: string
          example: 'cZug38RqRd2-cF30bd2vda:APA91bGEG-OHMiWV3eHd_ohLs8V-yTgDJuQXNV32jO13or-R118OAC65MXdSx5ozYsIiL-RFan_iflQ62XVX7T2BiNqqQQfKd3FitlpbLR7nVBdkFF1yv_s8pqZux-HfThn-ojhpBIWd'
        moe_event_id:
          type: string
          nullable: true
          example: null
        service:
          type: object
          properties:
            type:
              type: string
              example: FCM
        template_info:
          type: object
          properties:
            type:
              type: string
              example: Native
            version:
              type: string
              nullable: true
              example: null
            id:
              type: string
              example: stylizedbasic
    MessageContent:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
          nullable: true
        message:
          type: string
          description: A brief description of the request status in case of success.
        related_urls:
          type: array
          items:
            type: string
            format: uri
    FileInfo:
      type: object
      properties:
        version:
          type: string
          example: v2
        file_name:
          type: string
          example: '66560c2d2880326031c474a6_pramodseg_1716915262_push_android.json'
    ErrorResponse400:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error_message:
          type: string
          example: 'This event is unsupported to view message copy. The supported events are [...]'
    ErrorResponse401:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error:
          type: string
          example: Invalid data key
    ErrorResponse500:
      type: object
      properties:
        title:
          type: string
          example: Server Error
        description:
          type: string
          example: An unexpected error was encountered while processing this request. Please contact MoEngage Team
        code:
          type: string
          example: 'BiaFuAzn-aefa0b0e-2c88-4106-8d07-0f0c53513e48'
  responses:
    Success200:
      description: Success. The message content is returned.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ArchivalResponseSuccess'
          example:
            status: true
            data:
              message_details:
                message_type: campaign
                message_id: 66560c2d2880326031c474a6
                channel: push
                platform: android
                delivery_type: ONE_TIME
                sent_time: 'Tue, 28 May 2024 22:24:22 IST'
                message_to: 'cZug38RqRd2-cF30bd2vda:APA91bGEG-OHMiWV3eHd_ohLs8V-yTgDJuQXNV32jO13or-R118OAC65MXdSx5ozYsIiL-RFan_iflQ62XVX7T2BiNqqQQfKd3FitlpbLR7nVBdkFF1yv_s8pqZux-HfThn-ojhpBIWd'
                moe_event_id: null
                service:
                  type: FCM
                template_info:
                  type: Native
                  version: null
                  id: stylizedbasic
              message_content:
                title: expiry in 1 hour
                summary: expiry in 1 hour
                message: expiry in 1 hour
                related_urls:
                  - 'https://image-staging-ap1.moengage.com/checkfcsgainmoengage/20240527083246095196HE4ELHScreenshotofUploadyourAppDiawiDevelopmentandInhouseAppsWirelessInstallationjpgcheckfcsgainmoengage.jpg'
              backup_content:
                title: Stylized Android Template
                summary: null
                message: Sample Stylized Android Template
                related_urls: []
              file_info:
                version: v2
                file_name: '66560c2d2880326031c474a6_pramodseg_1716915262_push_android.json'
    Error400:
      description: |
        Bad Request.
        
        Required parameters are missing, invalid, or unsupported.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse400'
          example:
            status: false
            error_message: "This event is unsupported to view message copy. The supported events are ['Email Sent', 'SMS Sent', 'Notification Sent iOS', 'Notification Received Android', 'Notification Received Web']"
    Error401:
      description: Authentication Failure. Invalid data key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse401'
          example:
            status: false
            error: Invalid data key
    Error429:
      description: Too Many Requests. Rate limit breached (1000 RPM).
    Error500:
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse500'
          example:
            title: Server Error
            description: An unexpected error was encountered while processing this request. Please contact MoEngage Team
            code: 'BiaFuAzn-aefa0b0e-2c88-4106-8d07-0f0c53513e48'
    Error502:
      description: Server Error. Something went wrong on MoEngage.