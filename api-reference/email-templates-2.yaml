openapi: 3.1.0
info:
  title: Email Templates API V2
  version: 1.0.0
  description: |
    The Email Templates API allows you to create, update, and search for email templates within MoEngage. 
    
    These templates can be edited in the Froala editor (custom HTML editor) on the MoEngage Dashboard.

servers:
  - url: https://api-0{dc}.moengage.com/v1.0
    description: MoEngage API Server
    variables:
      dc:
        default: "1"
        description: "Your Data Center number (e.g., 1, 2, 3). You can find this in your MoEngage Dashboard URL or settings."

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic Authentication using your Workspace ID (Username) and API Key (Password).
        Header format: `Authorization: Basic <Base64_ENCODED_WORKSPACEID_APIKEY>`

  schemas:
    # Reusable Error Schema
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: A brief explanation of the error (e.g., "400 Bad Request").
            message:
              type: string
              description: Description of why the request failed.
            request_id:
              type: string
              description: Unique identifier for the request.
            details:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: string
                  target:
                    type: string
                  message:
                    type: string

    # Reusable Basic Details Object
    BasicDetails:
      type: object
      required:
        - email_content
        - subject
        - thumbnail_url
        - sender_name
      properties:
        email_content:
          type: string
          description: The HTML content of the email.
        subject:
          type: string
          description: The subject line of the email campaign.
        attachments:
          type: array
          description: |
            Array of URLs to be included as attachments. 
            * Max 10 attachments.
            * Only valid URLs (https).
            * Max size 6MB per file, 20MB total.
            * forbidden extensions: .dmg, .exe, .xls, .ddl, .class, .obj, .int, .gnt, .o, .so, .lbr, .net
          items:
            type: string
            format: uri
        thumbnail_url:
          type: string
          description: Image URL used to generate a preview in the Dashboard.
        sender_name:
          type: string
          description: The name displayed in the recipient's inbox.
        preview_text:
          type: string
          description: Text that appears below the subject line in the inbox.

    # Reusable Meta Info Object
    MetaInfo:
      type: object
      required:
        - template_id
        - template_name
        - template_version
        - created_by
      properties:
        template_id:
          type: string
          description: Unique ID for the template (generated by you).
        template_name:
          type: string
          description: Name of the template.
        template_version:
          type: string
          description: Version string of the template (generated by you).
        created_by:
          type: string
          description: Email ID or identifier of the creator.
        updated_by:
          type: string
          description: Email ID or identifier of the updater.
        locale:
          type: string
          description: Locale associated with the template (e.g., from MoEngage Advanced Settings).
        variation:
          type: integer
          description: Variation of the template (Max 5 variations).
        group_id:
          type: string
          description: |
            Group ID. 
            * **Parent**: Not required (external_template_id acts as group_id).
            * **Child**: Pass the Group ID of the parent.

security:
  - basicAuth: []

tags:
  - name: Email Templates
    description: Manage custom email templates.

paths:
  /custom-templates/email:
    post:
      summary: Create Email Template
      description: |
        Upload email templates created outside the MoEngage ecosystem. These templates can be used for campaign creation and edited via the Froala editor.
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - basic_details
                - meta_info
              properties:
                basic_details:
                  $ref: '#/components/schemas/BasicDetails'
                meta_info:
                  $ref: '#/components/schemas/MetaInfo'
            examples:
              parent_template:
                summary: Parent Template Example
                value:
                  basic_details:
                    subject: "Email_Subject"
                    email_content: "<!DOCTYPE html><html><head><title>My Short HTML</title></head><body><h1>Hello, World!</h1><p>This is a simple HTML example.</p></body></html>"
                    thumbnail_url: "https://example.com/thumbnail.jpg"
                    sender_name: "Sender_Name"
                    preview_text: "Preview_text"
                    attachments: []
                  meta_info:
                    created_by: "john.doe@example.com"
                    template_id: "template_id_1"
                    template_name: "template_name"
                    template_version: "1.0"
                    locale: "en_US"
                    variation: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  external_template_id:
                    type: string
                    description: Unique template ID corresponding to the successful creation.
              examples:
                success:
                  value:
                    external_template_id: "d05a44f0-a7cf-471a-bcb6-63054800a367"
        '400':
          description: Bad Request (Missing parameters, duplicates, invalid data)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authorization Failure
        '429':
          description: Rate Limit Breach (Limit is 100 RPM)
    
    put:
      summary: Update Email Template
      description: |
        Update an existing email template by specifying its `external_template_id`. 
        You can choose to update active campaigns or create a new version.
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - external_template_id
                - basic_details
                - meta_info
              properties:
                external_template_id:
                  type: string
                  description: The unique identifier generated during template creation.
                update_campaigns:
                  type: boolean
                  default: false
                  description: |
                    If `true`, updates all campaigns currently using this template to the new version.
                    If `false`, a new version is created but existing campaigns remain unchanged.
                update_latest_version:
                  type: boolean
                  description: If `true`, does not create a new version but updates the content of the current version.
                basic_details:
                  $ref: '#/components/schemas/BasicDetails'
                meta_info:
                  $ref: '#/components/schemas/MetaInfo'
            examples:
              update_template:
                summary: Update Template Example
                value:
                  basic_details:
                    email_content: "<html>...updated content...</html>"
                    subject: "Test subject"
                    attachments: []
                    thumbnail_url: "https://example.com/image.jpg"
                    sender_name: "Test sender"
                    preview_text: "Sample preview text"
                  meta_info:
                    template_name: "test_template"
                    updated_by: "user1@moengage.com"
                    template_version: "2.0"
                  update_campaigns: false
                  external_template_id: "d05a44f0-a7cf-471a-bcb6-63054800a367"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  external_template_id:
                    type: string
        '400':
          description: Bad Request (Invalid template ID, missing values)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /custom-templates/email/search:
    post:
      summary: Search Email Template
      description: |
        Look up email templates created in your MoEngage account.
        
        **Note:** Mandatory pagination applies. Calls must include `page` and `entries`.
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: integer
                  description: Page number of results to fetch.
                entries:
                  type: integer
                  description: Number of templates per page (Max 15).
                template_name:
                  type: string
                  description: Partial search allowed.
                template_source:
                  type: array
                  items:
                    type: string
                  example: ["API", "MOENGAGE"]
                template_version:
                  type: string
                template_id:
                  type: string
                template_type:
                  type: array
                  items:
                    type: string
                    enum: [CUSTOM, PRE_BUILT]
                created_by:
                  type: array
                  items:
                    type: string
                    format: email
                updated_by:
                  type: array
                  items:
                    type: string
                    format: email
                group_id:
                  type: string
                  description: Group ID of the parent template.
                is_grouped_response:
                  type: boolean
                  description: If true, fetches only default template data and stats.
                is_count_required:
                  type: boolean
                  description: If true, returns total count to support UI pagination.
                sort_params:
                  type: array
                  items:
                    type: object
                    additionalProperties:
                      type: string
                      enum: [ASCENDING, DESCENDING]
                external_template_ids:
                  type: array
                  items:
                    type: object
                    properties:
                      external_template_id:
                        type: string
                      version:
                        type: integer
            examples:
              search_filter:
                summary: Search with Filters
                value:
                  page: 1
                  entries: 10
                  template_name: "SALE"
                  template_source: ["API"]
                  template_type: ["CUSTOM"]
                  sort_params: 
                    - last_modified_date: "DESCENDING"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        external_template_id:
                          type: string
                        version:
                          type: integer
                        basic_details:
                          $ref: '#/components/schemas/BasicDetails'
                        meta_info:
                          $ref: '#/components/schemas/MetaInfo'
                        created_by:
                          type: string
                        created_at:
                          type: string
                        updated_by:
                          type: string
                        updated_at:
                          type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'