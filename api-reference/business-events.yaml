openapi: 3.0.3
info:
  title: MoEngage Business Events API
  description: |
    This API allows you to create business events in MoEngage. You can use these events to trigger campaigns whenever they occur. For example, you can create business events for various situations, such as when new episodes of an OTT series become available, when there is a flight delay, or when there is a price drop on an item in a cart.

    In MoEngage, you can set up event-triggered campaigns to notify users about new episodes, flight delays, or price reductions on items they have viewed, wished for, or added to their carts.
  version: '1.0'
servers:
  - url: 'https://api-0{X}.moengage.com/v1.0'
    description: MoEngage API Server
    variables:
      X:
        default: '1'
        description: |
          Your MoEngage Data Center (DC) number. 
          Refer to MoEngage documentation to find your correct DC number (usually 1, 2, or 3).
tags:
  - name: Business Events
    description: Manage and trigger custom business events for campaign orchestration.
security:
  - basicAuth: []
paths:
  /business_event:
    post:
      tags:
        - Business Events
      summary: Create Business Event
      description: |
        This API allows you to define a new type of business event within MoEngage. Once created, this event can be used to trigger customer campaigns based on event occurrences.
      operationId: createBusinessEvent
      x-mint:
        content: |
          <Note>
            **Rate Limit**: The rate limits are at the workspace level. You can create a maximum of **50 business events** for each workspace.
          </Note>

          ### FAQs
          <AccordionGroup>
            <Accordion title="What are the different data types supported in the creation of a business event?">
              The different data types supported are integer, float, string, date, and array.
            </Accordion>
            <Accordion title="Can I create two business events with the same name and different attributes?">
              No, business event names should be unique. You cannot create two business events with the same name.
            </Accordion>
            <Accordion title="How can I see the list of all the created business events in MoEngage?">
              You can see all business events created in MoEngage using the Search API.
            </Accordion>
          </AccordionGroup>
        metadata:
          title: Create Business Event API
          description: Create custom business events to automate campaigns.
      requestBody:
        description: The full definition of the new business event, including its name and a list of structured attributes.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - event_name
                - event_attributes
                - created_by
              properties:
                event_name:
                  type: string
                  description: |
                    This field contains the name of the business event. **Business event names must be unique.**
                  example: NameOfOTTSeries
                event_attributes:
                  type: array
                  description: This field contains the event attributes of the business event being created.
                  items:
                    $ref: '#/components/schemas/EventAttributeDefinition'
                created_by:
                  type: string
                  format: email
                  description: The email address of the creator of the business event.
                  example: john.doe@example.com
            example:
              event_name: NameOfOTTSeries
              event_attributes:
                - attribute_name: season
                  attribute_data_type: string
                - attribute_name: episodes
                  attribute_data_type: int
                - attribute_name: cast
                  attribute_data_type: array
                - attribute_name: released_on
                  attribute_data_type: date
                - attribute_name: budget
                  attribute_data_type: float
              created_by: john.doe@example.com
      responses:
        '200':
          description: The business event definition has been successfully created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Information about whether the request was successful.
                    example: The business event has been created
                  event_id:
                    type: string
                    description: |
                      This field contains the unique identifier for a business event and is returned only when a request is successful. 
                      MoEngage generates this identifier upon the successful creation of a business event. You must store this value and use it when searching for an event using the search API.
                    example: 64a40cff5547a6b2c5b14404
        '400':
          description: Bad Request (e.g., missing mandatory fields, invalid data types, or event name already exists).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authorization Failure. Returned when the authorization parameters are missing or incorrect in the HTTP Auth Header.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error. Returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /business_event/trigger:
    post:
      tags:
        - Business Events
      summary: Trigger Business Event
      description: |
        This API allows you to trigger a business event in MoEngage. You can set up campaigns to be executed when these events are triggered.
      operationId: triggerBusinessEvent
      x-mint:
        content: |
          <Note>
            **Rate Limit**: You can send **200 triggers in a day**, and **50 in each hour**.
          </Note>

          ### FAQs
          <AccordionGroup>
            <Accordion title="Do I need to pass the value for all event attributes while triggering the campaign?">
              No, it is not required to pass all the attributes while triggering the business event.
            </Accordion>
            <Accordion title="How do I know if the campaign has been triggered successfully?">
              You can view the campaign analytics to see if the campaign for the business event has been triggered successfully. Navigate to *Engage -> Campaigns* on the MoEngage Dashboard and search for the campaign associated with the Business Event. You can see the child campaign's performance here with the details of all the campaigns that have run for the business event till now.
            </Accordion>
          </AccordionGroup>
        metadata:
          title: Trigger Business Event API
      requestBody:
        description: The event name and the specific attributes/values for this event occurrence.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - event_name
                - event_attributes
              properties:
                event_name:
                  type: string
                  description: This field contains the name of the business event to be triggered.
                  example: Series_Name
                event_attributes:
                  type: object
                  description: |
                    This field contains the event attributes with which the business event will be triggered.
                    Pass the attribute name as the key and the value as the value.
                  additionalProperties: true
                  example:
                    season: Season 1
                    episodes: 12
                    cast:
                      - John Doe
                      - Jane Doe
                    date: '11/11/2023'
                triggered_by:
                  type: string
                  format: email
                  description: Optional. This field contains information about who triggered the business event.
                  example: john.doe@example.com
            example:
              event_name: Series_Name
              event_attributes:
                season: Season 1
                episodes: 12
                cast:
                  - John Doe
                  - Jane Doe
                date: '11/11/2023'
              triggered_by: john.doe@example.com
      responses:
        '200':
          description: The business event has been successfully triggered and processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: This field contains information about whether the request was successful or not.
                    example: The business event has been triggered
        '400':
          description: Bad Request (e.g., event does not exist, wrong attributes sent, or no active campaign found).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authorization Failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate Limit Breach. The request rate limit has been exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /business_event/search:
    post:
      tags:
        - Business Events
      summary: Search Business Event
      description: This API allows you to search for business events by specifying their event IDs.
      operationId: searchBusinessEvents
      x-mint:
        content: |
          <Note>
            **Rate Limit**: The rate limit is **100 RPM** (Requests Per Minute).
          </Note>
        metadata:
          title: Search Business Event API
      requestBody:
        description: Search criteria. At least one of `event_ids` or `event_names` should be provided.
        content:
          application/json:
            schema:
              type: object
              properties:
                event_ids:
                  type: array
                  items:
                    type: string
                  description: |
                    This field contains the list of event ids associated with the business events that need to be fetched.
                    The event id is the unique identifier for a business event and is generated by MoEngage at the time of business event creation. You must store and use this value while looking up a business event using the search API.
                  example:
                    - 6447b078712cd8c650074840
                event_names:
                  type: array
                  items:
                    type: string
                  description: |
                    This field contains the list of event names associated with the business events that need to be fetched.
                    The event name is the name associated with the Business Event that is provided during the creation of the event.
                  example:
                    - NewMovies
            example:
              event_ids:
                - 6447b078712cd8c650074840
      responses:
        '200':
          description: A list of found business event definitions and their full metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: This field contains the business events being looked up in the request.
                    items:
                      $ref: '#/components/schemas/BusinessEvent'
              example:
                data:
                  - db_name: Sample_App
                    event_id: 647597767459c85d7d6d6dfd
                    event_name: NewMovies
                    event_attributes:
                      - attribute_name: MovieName
                        attribute_data_type: array
                      - attribute_name: rating
                        attribute_data_type: string
                    created_at: '2023-05-29T18:36:52.390000'
                    total_trigger: 0
                    users_in_segment: 0
                    usage_count: 0
                    created_by: john.doe@moengage.com
                    last_received_time: '2023-05-30T06:28:06.498000'
                    _id: 64a54500633fda13b6681163
        '400':
          description: Bad Request (e.g., additional fields provided in the search request).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authorization Failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate Limit Breach.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: 'Basic Authentication using Base64-encoded Workspace ID (username) and API Key (password) from MoEngage Dashboard.'
  schemas:
    EventAttributeDefinition:
      type: object
      description: The name and data type definition for a specific attribute within a business event.
      required:
        - attribute_name
        - attribute_data_type
      properties:
        attribute_name:
          type: string
          description: The name of the attribute (e.g., season, movie_name).
          example: season
        attribute_data_type:
          type: string
          description: 'The data type of the attribute value. **Allowed Values:** string, int, float, array, date.'
          enum:
            - string
            - int
            - float
            - array
            - date
          example: string
    BusinessEvent:
      type: object
      description: A complete business event definition object, including metadata and attributes.
      properties:
        db_name:
          type: string
          description: Name of the application database.
          example: Sample_App
        event_id:
          type: string
          description: Unique identifier for the business event.
          example: 647597767459c85d7d6d6dfd
        event_name:
          type: string
          description: Name of the business event.
          example: NewMovies
        event_attributes:
          type: array
          items:
            $ref: '#/components/schemas/EventAttributeDefinition'
        created_at:
          type: string
          format: date-time
          description: Timestamp of when the Business Event was created.
        last_updated:
          type: string
          format: date-time
          description: Timestamp of when the Business Event was last updated.
        total_trigger:
          type: integer
          description: Number of times the Business event has been triggered.
          example: 0
        total_sent_message:
          type: integer
          description: Number of campaign messages sent for the Business Event.
        users_in_segment:
          type: integer
          description: Number of users in the segment (if applicable).
          example: 0
        usage_count:
          type: integer
          description: Usage Count.
          example: 0
        created_by:
          type: string
          format: email
          description: Information about the creator of the Business Event.
          example: john.doe@moengage.com
        last_received_time:
          type: string
          format: date-time
          description: Information about when the latest trigger was received for the Business Event.
        _id:
          type: string
          description: Internal database ID.
          example: 64a54500633fda13b6681163
    ErrorResponse:
      type: object
      description: This field is present in the response only in case of an unsuccessful request.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: This field contains the error code.
              example: 400 Bad Request
            message:
              type: string
              description: This field contains the error message.
              example: Bad request
            details:
              type: array
              description: This array contains the specifics and describes the error in detail.
              items:
                type: object
                properties:
                  code:
                    type: string
                    example: InvalidValue
                  target:
                    type: string
                    example: event_name
                  message:
                    type: string
                    example: Business event does not exist
            request_id:
              type: string
              description: This field contains the request ID of the failed request.
              example: 64a54cf9633fda13b668132f
    RateLimitError:
      type: object
      properties:
        status:
          type: string
          example: error
        data:
          type: object
          properties:
            code:
              type: integer
              description: HTTP Status Code (429)
              example: 429
            title:
              type: string
              description: Error Title
              example: rate limiter exception
            description:
              type: string
              description: Description of the rate limit breach
              example: Exceeded rate limit for this app
    ServerErrorResponse:
      type: object
      properties:
        title:
          type: string
          example: Internal Server Error
        message:
          type: string
          example: An unexpected error was encountered while processing this request. Please contact MoEngage Team