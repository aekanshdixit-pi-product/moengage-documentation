openapi: 3.0.3
info:
  title: MoEngage Cards API
  description: |
    API for fetching and deleting user-specific Cards from the MoEngage database.
    Allows filtering by platform, category, and checking for updates since the last sync.
    Authentication is via Basic Auth.
    **Note:** The Delete Cards operation uses the `DELETE` HTTP method with a request body, which is non-standard and may not be supported by all tools.
  version: '1.0'
servers:
  - url: 'https://api-{dc}.moengage.com/v1'
    variables:
      dc:
        default: '01'
        description: The data center number for your account (e.g., 01, 02, 03).
tags:
  - name: Cards
    description: Operations related to fetching and deleting user cards.
paths:
  /cards/fetch:
    post:
      tags:
        - Cards
      summary: Fetch Cards for User
      operationId: fetchCards
      description: |
        Fetches cards for a specific user, identified by `uid` or `unique_id`.
        Results can be paginated and filtered by platform, category, and last update time.
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/AppKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchCardsRequest'
            example:
              uid: "user@example.com"
              platforms: ["ANDROID", "WEB"]
              # limit query param, not in body
              # page query param, not in body
              last_updated_time": 1695987441
              prev_sync_card_ids": ["6516b30d2712560fdfae50c3_F_T_CA_AB_0_P_0_L_0_web"]
              card_category": "Announcements"
      responses:
        '200':
          description: Successfully retrieved cards.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchCardsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cards/delete:
    delete:
      tags:
        - Cards
      summary: Delete Cards for User
      operationId: deleteCards
      description: |
        The Delete Cards API can be used to delete cards for a specified user (using
        the unique_id or uid) from the MoEngage Cards database. This option allows
        you to delete cards for a user without any assistance.
        **Note:** This operation uses a request body with the `DELETE` method, which is non-standard.
      x-mint:
        metadata:
          title: Delete Cards for User
          description: Delete specific card campaigns for a user by uid or unique_id from the MoEngage Cards database.
        content: |
          ### Rate Limit
          The rate limit is **50K RPM** (Requests Per Minute) and is applicable at the DB (App) level.
          
          ### Unique ID vs. UID
          The *unique_id* is the unique value that identifies the user to whom the cards need to be deleted. It is a platform-specific device identifier. The *uid* is the unique MoEngage Standard ID (Email ID, Mobile Number, or other mapped identifier) that identifies the user.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCardsRequest'
            example:
              uid: "user@example.com"
              campaign_ids": ["campaign_id1", "campaign_id2"]
              platforms": ["android", "ios"]
      responses:
        '200':
          description: Delete request processed. The response details success/failure per platform.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCardsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: 'Uses **Workspace ID** as username and **API Key** (from Campaign report/Business events/Custom templates tile) as password.'
  parameters:
    AppKeyHeader:
      name: MOE-APPKEY
      in: header
      required: true
      description: Your MoEngage Workspace ID. Found in Settings > Account > APIs.
      schema:
        type: string
    PageQuery:
      name: page
      in: query
      required: false
      description: Index of the page to return (starts from 1). Defaults to 1 if omitted.
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Number of cards per page. If omitted, potentially returns all cards (behavior might vary).
      schema:
        type: integer
        minimum: 1
  schemas:
    # --- Request Schemas ---
    FetchCardsRequest:
      type: object
      properties:
        uid:
          type: string
          description: MoEngage Standard ID (Email or Mobile Number) identifying the user. Provide either `uid` or `unique_id`.
        unique_id:
          type: string
          description: Platform-specific device identifier. Provide either `uid` or `unique_id`.
        platforms:
          type: array
          items:
            type: string
            enum: [ANDROID, IOS, WEB]
          description: Filter cards by platform. If omitted, cards for all platforms are returned.
        card_category:
          type: string
          description: Filter cards by category name. If omitted, cards of all categories are returned.
        prev_sync_card_ids:
          type: array
          items:
            type: string
          description: List of card IDs from the previous sync. Used with `last_updated_time` to fetch only updated/new cards.
        last_updated_time:
          type: integer
          format: int64
          description: Unix epoch timestamp of the last sync. Used with `prev_sync_card_ids`.
      oneOf:
        - required: [uid]
        - required: [unique_id]
      description: Must provide either 'uid' or 'unique_id'.
    DeleteCardsRequest:
      type: object
      required:
        - campaign_ids
      properties:
        uid:
          type: string
          description: MoEngage Standard ID (Email or Mobile Number) identifying the user. Provide either `uid` or `unique_id`.
        unique_id:
          type: string
          description: Platform-specific device identifier. Provide either `uid` or `unique_id`.
        campaign_ids:
          type: array
          items:
            type: string
          description: |
            List of campaign IDs whose cards should be deleted for the user.
            In the case of a periodic campaign, if the campaign ID of the parent campaign is specified,
            the cards will get deleted for the child campaigns as well.
        platforms:
          type: array
          items:
            type: string
            enum: [ANDROID, IOS, WEB, android, ios, web]
          description: |
            Specify platforms to delete cards from. If omitted, the cards specified for deletion
            will be deleted from all the platforms they are associated with.
            Allowed Values: ANDROID, IOS, WEB
      oneOf:
        - required: [uid]
        - required: [unique_id]
      description: Must provide either 'uid' or 'unique_id'.

    # --- Response & Component Schemas ---
    CardAction:
      type: object
      properties:
        type:
          type: string
          enum: [screenName, deepLink, richLanding]
          description: Type of action to perform on tap.
        name:
          type: string
          description: Name assigned to the action (e.g., "navigate").
        value:
          type: string
          description: URL, screen name, or deep link value.
        kvPairs:
          type: object
          additionalProperties: true
          description: Key-value pairs associated with the action (e.g., URL parameters).
    CardWidget:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the widget within its container.
        type:
          type: string
          enum: [text, image, button]
          description: Type of widget.
        content:
          type: string
          description: Content of the widget (HTML for text/button, URL for image).
        actions:
          type: array
          items:
            $ref: '#/components/schemas/CardAction'
          description: Actions associated with this widget (typically for buttons).
          nullable: true
    CardContainer:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the container within the card.
        type:
          type: string
          enum: [basic, illustration]
          description: Type of container layout.
        style:
          type: object
          properties:
            bgColor:
              type: string
              description: Background color hex code (e.g., "#4e3db0").
          additionalProperties: true
        widgets:
          type: array
          items:
            $ref: '#/components/schemas/CardWidget'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/CardAction'
          description: Actions associated with tapping the container itself (if any).
    CardTemplateData:
      type: object
      properties:
        type:
          type: string
          enum: [basic, illustration]
          description: Overall template type for the card.
        containers:
          type: array
          items:
            $ref: '#/components/schemas/CardContainer'
    CardMetaData:
      type: object
      properties:
        cid:
          type: string
          description: Unique identifier for the Card instance.
        moe_card_id:
          type: string
          description: Combination of cid and platform.
        moe_campaign_name:
          type: string
          description: Name of the Card campaign.
        moe_delivery_type:
          type: string
          enum: ["One Time", "Event Triggered"]
          description: Delivery type of the campaign.
        moe_campaign_id:
          type: string
          description: Unique identifier of the associated campaign.
    CardUserActivity:
      type: object
      properties:
        is_clicked:
          type: boolean
          description: Whether the user has clicked this card.
        first_seen:
          type: integer
          format: int64
          description: Epoch timestamp when the card was first seen by the user.
        first_delivered:
          type: integer
          format: int64
          description: Epoch timestamp when the card was first delivered to the user.
        show_count:
          type: object
          additionalProperties:
            type: integer
          description: Map where key is unique_id/uid and value is the number of times fetched for that identifier.
    CardDisplayControls:
      type: object
      properties:
        max_times_to_show:
          type: integer
          description: Maximum number of times the card can be shown.
          nullable: true
        expire_at:
          type: integer
          format: int64
          description: Epoch timestamp when the card expires.
          nullable: true
        expire_after_delivered:
            type: integer
            format: int64
            description: Timestamp of card expiry (alternative key name?).
            nullable: true
        is_pin:
          type: boolean
          description: Whether the card should be pinned to the top.
    Card:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the card instance, including platform.
        platform:
          type: string
          enum: [android, ios, web]
        created_at:
          type: integer
          format: int64
          description: Epoch timestamp when the card was created for the user.
        updated_at:
          type: integer
          format: int64
          description: Epoch timestamp when the card was last updated for the user.
        meta_data:
          $ref: '#/components/schemas/CardMetaData'
        template_data:
          $ref: '#/components/schemas/CardTemplateData'
        user_activity:
          $ref: '#/components/schemas/CardUserActivity'
        display_controls:
          $ref: '#/components/schemas/CardDisplayControls'
        category:
          type: string
          description: The category assigned to the card campaign.
    FetchCardsResponseData:
      type: object
      properties:
        deleted_card_ids:
          type: array
          items:
            type: string
          description: List of card IDs that have been deleted for this user since the last sync (if `last_updated_time` provided).
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
          description: List of active/updated cards matching the criteria.
    FetchCardsResponse:
      type: object
      properties:
        status:
          type: boolean
          description: Indicates if the request was successful (`true`) or unsuccessful (`false`).
        request_id:
          type: string
          description: Unique identifier for this API request.
        data:
          $ref: '#/components/schemas/FetchCardsResponseData'
          nullable: true
        error:
            type: string
            description: Error message if status is false.
            nullable: true
        title:
            type: string
            description: Error title if status is false.
            nullable: true
        description:
            type: string
            description: Error description if status is false.
            nullable: true
        code:
            type: string
            description: Error code if status is false.
            nullable: true
    DeleteCardsPlatformResult:
      type: object
      properties:
        success:
          type: array
          items:
            type: string
          description: List of campaign IDs for which cards have been successfully deleted.
        failed:
          type: array
          items:
            type: string
          description: List of campaign IDs for which the cards could not be deleted.
        invalid:
          type: array
          items:
            type: string
          description: List of campaign IDs for which cards do not exist for the specified platform for the user.
    DeleteCardsResponseData:
      type: object
      properties:
        android:
          $ref: '#/components/schemas/DeleteCardsPlatformResult'
          nullable: true
        ios:
          $ref: '#/components/schemas/DeleteCardsPlatformResult'
          nullable: true
        web:
          $ref: '#/components/schemas/DeleteCardsPlatformResult'
          nullable: true
    DeleteCardsResponse:
      type: object
      properties:
        status:
          type: boolean
          description: This field represents whether the request was successful and contains `true` when the request was successful and `false` otherwise.
        request_id:
          type: string
          description: Unique identifier that denotes the request.
        data:
          $ref: '#/components/schemas/DeleteCardsResponseData'
          description: |
            This field contains the platform-specific results of the delete operation.
          nullable: true
        title:
          type: string
          description: This field is present in the response body only when the request is unsuccessful and contains the error type.
          nullable: true
        description:
          type: string
          description: This field is present in the response body only when the request is unsuccessful and contains the error description.
          nullable: true
        code:
          type: string
          description: This field is present in the response body only when the request is unsuccessful and contains the error code.
          nullable: true
        error:
            type: string
            description: Error message if status is false.
            nullable: true
    ErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
  responses:
    BadRequest:
      description: |
        Bad Request. This response is returned when the required parameters are missing
        from the request, when the provided parameters are invalid, or when the user is not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing_uid:
              summary: Missing User ID
              value:
                status: false
                error: "Required field missing. Please include either 'uid' or 'unique_id'"
                request_id: "64f6a59ed1e36d0d57a790c1"
            user_not_found:
              summary: User Not Found
              value:
                status: false
                error: "User not found for this uid/ unique_id"
                request_id: "64f6a59ed1e36d0d57a790c1"
    Unauthorized:
      description: |
        Authorization Failure. This response is returned when the authorization parameters
        are missing or invalid (e.g., Invalid credentials or missing header).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            auth_failure:
              summary: Auth Failure
              value:
                title: "Authentication Failure"
                description: "Invalid APP_SECRET_KEY is provided"
                code: "OjueJWoh"
    TooManyRequests:
      description: |
        Rate Limit Breach. This response is returned when the number of requests per minute
        has exceeded the rate limit.
      headers:
        x-ratelimit-limit:
          schema: { type: integer }
        x-ratelimit-remaining:
          schema: { type: integer }
        x-ratelimit-reset:
          schema: { type: integer }
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            title: "Request limit reached"
            description: "This API call has exceeded the rate limit"
            code: "KMxkunyz"
    InternalServerError:
      description: |
        Internal Server Error. This response is returned when the system runs into an unexpected error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            title: "Internal Server Error"
            message: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"

security:
  - basicAuth: []