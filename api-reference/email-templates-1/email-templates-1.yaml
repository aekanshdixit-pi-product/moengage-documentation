openapi: 3.1.0
info:
  title: Email Templates API V1
  description: |
    The Email Templates API allows you to create, retrieve, and update email templates in MoEngage.
    
    <Note>
    Templates created using this API cannot be used in the Drag and Drop Editor in the MoEngage Dashboard. They are supported only for the Custom HTML Editor (Froala Editor).
    </Note>
  version: v2
servers:
  - url: https://api-{dc}.moengage.com/v2
    description: MoEngage API Server
    variables:
      dc:
        default: "01"
        description: "Your Data Center number (e.g., 01, 02, 03). Check your dashboard URL to find this."
        enum:
          - "01"
          - "02"
          - "03"

security:
  - basicAuth: []
    appKey: []

paths:
  /email-templates:
    post:
      summary: Create Email Template
      description: |
        Upload templates created outside the MoEngage ecosystem to be used for campaign creation.
      operationId: createEmailTemplate
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreateRequest'
      responses:
        '200':
          description: Template created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The unique identifier for the created template.
                        example: "63f4962d4d31f4c68d980a01"
                      msg:
                        type: string
                        example: "Custom email template saved"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      summary: Get All Templates
      description: Fetches the list of all email templates available in your MoEngage account.
      operationId: getAllTemplates
      tags:
        - Email Templates
      parameters:
        - name: page
          in: query
          description: The page number to fetch. Default is 1. Batch size is 20.
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      templates:
                        type: array
                        items:
                          $ref: '#/components/schemas/TemplateDetails'
                      no_of_templates:
                        type: integer
                        example: 13
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'

  /email-templates/{id}:
    get:
      summary: Get Specific Template
      description: Fetches a specific email template using its unique template ID.
      operationId: getTemplateById
      tags:
        - Email Templates
      parameters:
        - name: id
          in: path
          required: true
          description: The unique template ID.
          schema:
            type: string
            example: "63f30792c66ddcaac2ef9109"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDetailsFlat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      summary: Update Specific Template
      description: Updates an existing email template by specifying its template ID in the path.
      operationId: updateTemplateById
      tags:
        - Email Templates
      parameters:
        - name: id
          in: path
          required: true
          description: The unique template ID to update.
          schema:
            type: string
            example: "63f30792c66ddcaac2ef9109"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateUpdateRequest'
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "63f4962d4d31f4c68d980a01"
                      msg:
                        type: string
                        example: "Custom email template updated"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bulk/email-templates:
    put:
      summary: Bulk Create/Update Templates
      description: Create or update up to 50 templates in a single request.
      operationId: bulkCreateUpdateTemplates
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              maxItems: 50
              items:
                oneOf:
                  - $ref: '#/components/schemas/TemplateCreateRequest'
                  - $ref: '#/components/schemas/TemplateBulkUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      new_templates:
                        type: array
                        items:
                          type: string
                        description: List of IDs for newly created templates.
                      updated_templates:
                        type: array
                        items:
                          type: string
                        description: List of IDs for updated templates.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Use your Workspace ID as username and API Key as password.
    appKey:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: Your MoEngage Account APP ID / Workspace ID.

  schemas:
    # Base properties common to create and update
    TemplateBase:
      type: object
      required:
        - name
        - html
        - source
      properties:
        name:
          type: string
          minLength: 5
          maxLength: 50
          pattern: '^[a-zA-Z0-9_]+$'
          description: "Name of the template. Alphanumeric and underscores only."
          example: "End_Of_Season_Sale_Template"
        html:
          type: string
          description: "Raw HTML content of the email. SCRIPT tags are not allowed."
          example: "<!DOCTYPE html><html><body><p>Content</p></body></html>"
        subject:
          type: string
          description: "Subject of the email campaign."
          example: "End of Season Sale!"
        attachments:
          type: array
          description: "List of URL strings for attachments."
          maxItems: 10
          items:
            type: string
            format: uri
            example: "https://app-cdn.moengage.com/assets/LogoThumbnail.jpg"
        sender_name:
          type: string
          description: "Name displayed in recipient inboxes."
          example: "Your Brand Name"
        source:
          type: string
          description: "Source of creation (e.g., Partner name)."
          example: "Partner"
        updated_by:
          type: string
          description: "Email or ID of the person creating/updating."
          example: "john.doe@example.com"

    # Schema for Creating a single template
    TemplateCreateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'

    # Schema for Updating (requires ID in Bulk operations, but not in Path-based update)
    TemplateUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'

    # Schema specifically for the Bulk array where ID is required for updates
    TemplateBulkUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              description: "Required when updating a template via bulk API."

    # Schema for GET All response objects
    TemplateDetails:
      type: object
      properties:
        template_id:
          type: string
        template_name:
          type: string
        is_archived:
          type: boolean
        builder_supported:
          type: boolean
        editor:
          type: string
        created_date:
          type: string
        updated_at:
          type: string
        updated_by:
          type: string

    # Schema for GET Specific response (structure is slightly different than GET All)
    TemplateDetailsFlat:
      type: object
      properties:
        status:
          type: string
          example: success
        template_id:
          type: string
          example: "645a0cec10e0307e6d7f7716"
        template_name:
          type: string
          example: "End_of_season_sale_template"
        subject:
          type: string
        template_content:
          type: string
        attachments:
          type: array
          items:
            type: object
        source:
          type: string
        sender_name:
          type: string
        editor:
          type: string
        created_date:
          type: string
        updated_at:
          type: string
        updated_by:
          type: string

    ErrorData:
      type: object
      properties:
        code:
          type: integer
          example: 400
        title:
          type: string
          example: "Invalid request body"
        description:
          type: string
          example: "MOE-APPKEY header is invalid or empty"

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              data:
                $ref: '#/components/schemas/ErrorData'
    Unauthorized:
      description: Authentication Failure
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              data:
                $ref: '#/components/schemas/ErrorData'
    RateLimit:
      description: Rate Limit Exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              data:
                $ref: '#/components/schemas/ErrorData'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                example: "Internal Server Error"
              message:
                type: string
                example: "An unexpected error was encountered."