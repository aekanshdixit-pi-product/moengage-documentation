openapi: 3.1.0
info:
  title: Email Templates API
  description: |
    The Email Templates API allows you to create, retrieve, and update email templates in MoEngage.
    
    This API helps you upload templates created outside the MoEngage ecosystem to MoEngage and use them for campaign creation on the MoEngage Dashboard.

    <Note>
    **Important:** Templates created using this API **cannot** be used in the Drag and Drop Editor in the MoEngage Dashboard. They are supported only for the **Custom HTML Editor (Froala Editor)**.
    </Note>
  version: v2
  contact:
    name: MoEngage Support
    url: https://help.moengage.com
servers:
  - url: https://api-{dc}.moengage.com/v2
    description: MoEngage API Server
    variables:
      dc:
        default: "01"
        description: |
          Your Data Center number (e.g., 01, 02, 03). 
          Each customer is hosted on a different data center; you can find your data center number by checking the [data center and API endpoint mapping page](https://help.moengage.com/hc/en-us/articles/360057030512-Data-Centers-in-MoEngage#01G5DQVXGT2KZMXTJPF77QPJ25).
        enum:
          - "01"
          - "02"
          - "03"

security:
  - basicAuth: []
    appKey: []

tags:
  - name: Email Templates
    description: Manage your email templates programmatically.

paths:
  /email-templates:
    post:
      summary: Create Email Template
      description: |
        Upload templates created outside the MoEngage ecosystem to be used for campaign creation.
      operationId: createEmailTemplate
      tags:
        - Email Templates
      x-mint:
        content: |
          <Note>
            **Rate Limit:** The rate limits are at the app level. A maximum of **1,000 requests per minute** (sum of all API requests per app) are allowed.
          </Note>

          ### Accessing Created Templates
          You can look for the template created using this API in the second step of campaign creation in the **'My Saved Templates'** tab using the name provided in the API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreateRequest'
      responses:
        '200':
          description: Template created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                    description: Denotes whether the request was successful or not.
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The unique identifier for the created template.
                        example: "63f4962d4d31f4c68d980a01"
                      msg:
                        type: string
                        description: Information about the successful creation.
                        example: "Custom email template saved"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      summary: Get All Templates
      description: Fetches the list of all email templates available in your MoEngage account.
      operationId: getAllTemplates
      tags:
        - Email Templates
      parameters:
        - name: page
          in: query
          description: |
            The page number to fetch. 
            * If not specified, defaults to 1.
            * Batch size is 20 (20 templates returned per page).
          schema:
            type: integer
            default: 1
            example: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      templates:
                        type: array
                        items:
                          $ref: '#/components/schemas/TemplateDetails'
                      no_of_templates:
                        type: integer
                        description: Number of templates returned in the current page.
                        example: 13
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /email-templates/{id}:
    get:
      summary: Get Specific Template
      description: Fetches a specific email template using its unique template ID.
      operationId: getTemplateById
      tags:
        - Email Templates
      parameters:
        - name: id
          in: path
          required: true
          description: The unique template ID generated at the time of creation.
          schema:
            type: string
            example: "63f30792c66ddcaac2ef9109"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDetailsFlat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update Specific Template
      description: Updates an existing email template by specifying its template ID in the path.
      operationId: updateTemplateById
      tags:
        - Email Templates
      parameters:
        - name: id
          in: path
          required: true
          description: The unique template ID to update.
          schema:
            type: string
            example: "63f30792c66ddcaac2ef9109"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateUpdateRequest'
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "63f4962d4d31f4c68d980a01"
                      msg:
                        type: string
                        example: "Custom email template updated"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bulk/email-templates:
    put:
      summary: Bulk Create/Update Templates
      description: |
        Create or update up to **50 templates** in a single request.
      operationId: bulkCreateUpdateTemplates
      tags:
        - Email Templates
      x-mint:
        content: |
          ### How to differentiate Create vs Update?
          You can pass the templates to be created and/or updated as an array of JSON Objects.
          * **Update:** It is **mandatory** to pass the `id` field in the object.
          * **Create:** Do not pass the `id` field.
          
          <Note>
            **Rate Limit:** The rate limits are at the app level. A maximum of **1,000 requests per minute** (sum of all API requests per app) are allowed.
          </Note>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              description: Array of template objects. Max 50 items.
              maxItems: 50
              items:
                oneOf:
                  - $ref: '#/components/schemas/TemplateCreateRequest'
                  - $ref: '#/components/schemas/TemplateBulkUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      new_templates:
                        type: array
                        items:
                          type: string
                        description: List of IDs for newly created templates.
                        example: ["63f497844d31f4c68d980a02", "63f499344d31f4c68d720b04"]
                      updated_templates:
                        type: array
                        items:
                          type: string
                        description: List of IDs for updated templates.
                        example: ["645a2bd910e0307e6d7f7717"]
        '400':
          description: Validation Failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      new_templates:
                        type: array
                        items:
                          type: string
                        description: List of error messages for failed creations.
                      updated_templates:
                        type: array
                        items:
                          type: string
                        description: List of error messages for failed updates.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        **Basic Authentication:** Sends a Base64-encoded string containing your username and password. 
        * **Username:** Your Workspace ID.
        * **Password:** Your API Key.
        
        Navigate to `Settings -> Account -> APIs` on the MoEngage Dashboard to find these credentials.
    appKey:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: |
        Your MoEngage Account **APP ID / Workspace ID**.
        You can find this at `Settings -> Account -> APIs -> App ID/Workspace ID`.

  schemas:
    # Base properties common to create and update
    TemplateBase:
      type: object
      required:
        - name
        - html
        - source
      properties:
        name:
          type: string
          minLength: 5
          maxLength: 50
          pattern: '^[a-zA-Z0-9_]+$'
          description: |
            Name of the template used for identification. 
            * Must be **alphanumeric** and **underscore** characters only.
            * Length between **5-50 characters**.
          example: "End_Of_Season_Sale_Template"
        html:
          type: string
          description: |
            Raw HTML content of the email. 
            * `HTML` and `BODY` tags are mandatory.
            * `SCRIPT` tags are **not** allowed.
          example: "<!DOCTYPE html><html><body><p>Content</p></body></html>"
        subject:
          type: string
          description: "Subject of the email campaign."
          example: "End of Season Sale!"
        attachments:
          type: array
          description: |
            List of URL strings for attachments.
            * Max **10** attachments allowed.
            * Individual size < **6 MB**. Total size < **20 MB**.
            * Must be valid HTTPS URLs.
            * **Not Allowed:** `.dmg`, `.exe`, `.xls`, `.ddl`, `.class`, `.obj`, `.int`, `.gnt`, `.o`, `.so`, `.lbr`, `.net`.
          maxItems: 10
          items:
            type: string
            format: uri
            example: "https://app-cdn.moengage.com/assets/LogoThumbnail.jpg"
        sender_name:
          type: string
          description: "Name displayed in recipient inboxes."
          example: "Your Brand Name"
        source:
          type: string
          description: |
            Source of creation (e.g., Partner name). 
            * Only alphanumerics, spaces, and underscores allowed.
          example: "Partner"
        updated_by:
          type: string
          description: |
            Email or ID of the person creating/updating.
            * Only alphanumerics, spaces, and hyphens allowed (or valid email format).
          example: "john.doe@example.com"

    # Schema for Creating a single template
    TemplateCreateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'

    # Schema for Updating (requires ID in Bulk operations, but not in Path-based update)
    TemplateUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'

    # Schema specifically for the Bulk array where ID is required for updates
    TemplateBulkUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              description: "Required when updating a template via bulk API. Unique Identifier generated at creation."

    # Schema for GET All response objects
    TemplateDetails:
      type: object
      properties:
        template_id:
          type: string
          example: "645a2bd910e0307e6d7f7717"
        template_name:
          type: string
          example: "Coupon_code_template"
        is_archived:
          type: boolean
          example: false
        builder_supported:
          type: boolean
          description: "Always false for API-created templates (supported only in Froala editor)."
          example: false
        editor:
          type: string
          example: "Froala Editor"
        created_date:
          type: string
          example: "2023-05-09 11:17:43.112000"
        updated_at:
          type: string
          example: "2023-05-09 11:18:37.692000"
        updated_by:
          type: string
          example: "jane.doe@example.com"

    # Schema for GET Specific response (structure is slightly different than GET All)
    TemplateDetailsFlat:
      type: object
      properties:
        status:
          type: string
          example: success
        template_id:
          type: string
          example: "645a0cec10e0307e6d7f7716"
        template_name:
          type: string
          example: "End_of_season_sale_template"
        subject:
          type: string
        template_content:
          type: string
        attachments:
          type: array
          items:
            type: object
            properties:
              id:
                 type: string
              name: 
                 type: string
              type: 
                 type: string
              fileType: 
                 type: string
              url:
                 type: string
        source:
          type: string
        sender_name:
          type: string
        editor:
          type: string
        created_date:
          type: string
        updated_at:
          type: string
        updated_by:
          type: string

    ErrorData:
      type: object
      properties:
        code:
          type: integer
          example: 400
        title:
          type: string
          example: "Invalid request body"
        description:
          type: string
          example: "MOE-APPKEY header is invalid or empty"

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              data:
                $ref: '#/components/schemas/ErrorData'
    Unauthorized:
      description: Authentication Failure
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              data:
                $ref: '#/components/schemas/ErrorData'
    RateLimit:
      description: Rate Limit Exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              data:
                $ref: '#/components/schemas/ErrorData'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                example: "Internal Server Error"
              message:
                type: string
                example: "An unexpected error was encountered."