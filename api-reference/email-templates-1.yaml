openapi: 3.1.0
info:
  title: Email Templates API V1
  description: |
    The Create Email Template API can be used to create an email template in MoEngage. This API helps you upload templates created outside the MoEngage ecosystem to MoEngage and use them for campaign creation on the MoEngage Dashboard.
    
    <Note>
    Templates created using this API cannot be used in the Drag and Drop Editor in the MoEngage Dashboard. They are supported only for the Custom HTML Editor (Froala Editor).
    </Note>
  version: v2
servers:
  - url: https://api-{dc}.moengage.com/v2
    description: MoEngage API Server
    variables:
      dc:
        default: "01"
        description: "Your Data Center number (e.g., 01, 02, 03). Check your dashboard URL to find this value (value of X)."
        enum:
          - "01"
          - "02"
          - "03"

security:
  - basicAuth: []

paths:
  /email-templates:
    post:
      summary: Create Email Template
      description: |
        The Create Email Template API can be used to create an email template in MoEngage.
      x-mint:
        content: |
          <Note>
          Templates created using this API cannot be used in the Drag and Drop Editor in the MoEngage Dashboard. They are supported only for the Custom HTML Editor (Froala Editor).
          </Note>

          ### Rate Limit
          The rate limits are at the app level, and a maximum of thousand (sum of all the API requests per app)requests are allowed for an app per minute.
          
          ### FAQs
          **How do I access templates created using this API on the MoEngage Dashboard?**
          You can access templates created using the Create Email Template API in the My Saved Templates tab during the second step of campaign creation in the MoEngage Dashboard.
      operationId: createEmailTemplate
      tags:
        - Email Templates
      parameters:
        - $ref: '#/components/parameters/MoeAppKeyHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreateRequest'
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseCreate'
              examples:
                Success:
                  value:
                    status: "success"
                    data:
                      id: "63f4962d4d31f4c68d980a01"
                      msg: "Custom email template saved"
        '400':
          description: This response is returned when the required parameters are missing from the request or when the provided parameters are invalid, or when a template already exists with the same version, name, or id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InvalidRequestBody:
                  summary: Validation failure
                  value:
                    status: "error"
                    data:
                      code: 400
                      title: "Invalid request body"
                      description: "MOE-APPKEY header is invalid or empty"
                InvalidName:
                  summary: Name field empty
                  value:
                    status: "error"
                    data:
                      code: 400
                      title: "Invalid email name"
                      description: "Name field is empty"
                InvalidBody:
                  summary: HTML field empty
                  value:
                    status: "error"
                    data:
                      code: 400
                      title: "Invalid email body"
                      description: "Email body should not be empty"
        '401':
          description: This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 AuthFail:
                   value:
                     status: "error"
                     data:
                       code: 401
                       title: "Authentication required"
                       description: "Invalid APP_ID used in Authentication Header"
        '429':
          description: This response is returned when the number of requests per minute has exceeded the rate limit.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 RateLimitExceeded:
                   value:
                     status: "error"
                     data:
                       code: 429
                       title: "rate limiter exception"
                       description: "Exceeded rate limit for this app"
        '500':
          description: This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
              examples:
                ServerError:
                  value:
                    title: "Internal Server Error"
                    message: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"

    get:
      summary: Get All Templates
      description: |
        The Get All Templates API fetches the list of all the email templates available in your MoEngage account.
      operationId: getAllTemplates
      tags:
        - Email Templates
      parameters:
        - $ref: '#/components/parameters/MoeAppKeyHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - name: page
          in: query
          required: true
          description: |
            This parameter represents the page number. If this value is not specified, it will be considered as one by default. Each page will have a batch size of 20( 20 templates will be returned in a page).
            **Example**: /v2/email-templates?page=1
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      templates:
                        type: array
                        items:
                          $ref: '#/components/schemas/TemplateDetails'
                      no_of_templates:
                        type: integer
                        example: 13
                        description: The number of templates returned in the page.
              examples:
                Success:
                  value:
                    status: "success"
                    data:
                      templates:
                        - template_id: "645a2bd910e0307e6d7f7717"
                          template_name: "Coupon_code_template"
                          is_archived: false
                          builder_supported: false
                          editor: "Froala Editor"
                          created_date: "2023-05-09 11:17:43.112000"
                          updated_at: "2023-05-09 11:18:37.692000"
                          updated_by: "jane.doe@example.com"
                        - template_id: "645a2c0d10e0307e6d7f7719"
                          template_name: "Season_Sale_Template"
                          is_archived: false
                          builder_supported: false
                          editor: "Froala Editor"
                          created_date: "2023-05-09 11:18:35.398000"
                          updated_at: "2023-05-09 11:18:35.398000"
                          updated_by: "john.doe@example.com"
                      no_of_templates: 13
        '400':
          description: This response is returned when the required parameters are missing from the request or when the provided parameters are invalid, or when a template already exists with the same version, name, or id.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 InvalidId:
                   value:
                     status: "error"
                     data:
                       code: 400
                       title: "Invalid template id"
                       description: "Please provide a valid template id"
        '401':
          description: This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 AuthFail:
                   value:
                     status: "error"
                     data:
                       code: 401
                       title: "Authentication required"
                       description: "Invalid APP_ID used in Authentication Header"
        '429':
          description: This response is returned when the number of requests per minute has exceeded the rate limit or the number of templates has exceeded the allowed quota per channel.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 RateLimitExceeded:
                   value:
                     status: "error"
                     data:
                       code: 429
                       title: "rate limiter exception"
                       description: "Exceeded rate limit for this app"
        '500':
          description: This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
              examples:
                ServerError:
                  value:
                    title: "Internal Server Error"
                    message: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"

  /email-templates/{id}:
    get:
      summary: Get Specific Template
      description: |
        The Get a Specific Email Template API fetches an email template using its template id.
      x-mint:
        content: |
          ### FAQ
          **What happens when you search for a deleted template?**
          The error description contains the following message in such a case: “Template for given template id is archived”.

          ### Rate Limit
          The rate limits are at the app level, and a maximum of thousand (sum of all the API requests per app)requests are allowed for an app per minute.
      operationId: getTemplateById
      tags:
        - Email Templates
      parameters:
        - $ref: '#/components/parameters/MoeAppKeyHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - name: id
          in: path
          required: true
          description: |
            This is the Template id of the template being searched. The template id is a unique identifier that is generated at the time of template creation.
            Example: {"id": "63f30792c66ddcaac2ef9109"}
          schema:
            type: string
            example: "63f30792c66ddcaac2ef9109"
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDetailsFlat'
              examples:
                Success:
                  value:
                    status: "success"
                    template_id: "645a0cec10e0307e6d7f7716"
                    template_name: "End_of_season_sale_template"
                    subject: ""
                    template_content: "<!DOCTYPE html><html>...</html>"
                    attachments: []
                    source: "Partner"
                    sender_name: "Your Brand Name"
                    editor: "Froala Editor"
                    created_date: "2023-05-09 09:05:46.350000"
                    updated_at: "2023-05-09 10:00:57.149000"
                    updated_by: "john.doe@example.com"
        '400':
          description: This response is returned when the required parameters are missing from the request or when the provided parameters are invalid, or when a template already exists with the same version, name, or id.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 InvalidId:
                   value:
                     status: "error"
                     data:
                       code: 400
                       title: "Invalid template id"
                       description: "Please provide a valid template id"
        '401':
          description: This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 AuthFail:
                   value:
                     status: "error"
                     data:
                       code: 401
                       title: "Authentication required"
                       description: "Invalid APP_ID used in Authentication Header"
        '429':
          description: This response is returned when the number of requests per minute has exceeded the rate limit, or the number of templates has exceeded the allowed quota per channel.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 RateLimitExceeded:
                   value:
                     status: "error"
                     data:
                       code: 429
                       title: "rate limiter exception"
                       description: "Exceeded rate limit for this app"
        '500':
          description: This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
              examples:
                ServerError:
                  value:
                    title: "Internal Server Error"
                    message: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"

    put:
      summary: Update Specific Template
      description: Updates an existing email template by specifying its template ID in the path.
      operationId: updateTemplateById
      tags:
        - Email Templates
      parameters:
        - $ref: '#/components/parameters/MoeAppKeyHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - name: id
          in: path
          required: true
          description: The unique template ID to update.
          schema:
            type: string
            example: "63f30792c66ddcaac2ef9109"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateUpdateRequest'
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseCreate'
              examples:
                Success:
                  value:
                    status: "success"
                    data:
                      id: "63f4962d4d31f4c68d980a01"
                      msg: "Custom email template updated"
        '400':
          description: This response is returned when the required parameters are missing from the request or when the provided parameters are invalid, or when a template already exists with the same version, name, or id.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: This response is returned when the number of requests per minute has exceeded the rate limit.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
              examples:
                ServerError:
                  value:
                    title: "Internal Server Error"
                    message: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"

  /bulk/email-templates:
    put:
      summary: Bulk Create/Update Templates
      description: |
        The Bulk Create/Update Template API is used to create/update email templates in bulk. You can create or update up to fifty templates in a single request.
      x-mint:
        content: |
          ### FAQ
          **How is the create request differentiated from an update template request?**
          In the case of an update, the template to be updated is identified using its template id. It is mandatory to pass the id field in the required for an update template request. Otherwise, it will be treated as a create template request.

          ### Rate Limit
          The rate limits are at the app level, and a maximum of a thousand (sum of all the API requests per app)requests are allowed for an app per minute.
      operationId: bulkCreateUpdateTemplates
      tags:
        - Email Templates
      parameters:
        - $ref: '#/components/parameters/MoeAppKeyHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
      requestBody:
        required: true
        description: |
          You can pass the templates to be created and/or updated as an array of JSON Objects.
        content:
          application/json:
            schema:
              type: array
              maxItems: 50
              items:
                oneOf:
                  - $ref: '#/components/schemas/TemplateCreateRequest'
                  - $ref: '#/components/schemas/TemplateBulkUpdateRequest'
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                    description: |
                      This field contains the status of the request and denotes whether it was successful or not.
                      **Example**: "status": "success", "status": "error"
                  data:
                    type: object
                    description: |
                      This field contains the id of the created template when the request is successful and the error details in case of an unsuccessful request.
                    properties:
                      new_templates:
                        type: array
                        items:
                          type: string
                        description: |
                          This field contains the list of template ids for the newly created templates, and these need to be stored by you. The template id would be used for searching a specific template and updating it. The template id is a String.
                      updated_templates:
                        type: array
                        items:
                          type: string
                        description: |
                          This field contains the list of template ids for the updated templates.
              examples:
                Success:
                  value:
                    status: "success"
                    data:
                      new_templates: ["645a2c0d10e0307e6d7f7719"]
                      updated_templates: ["645a2bd910e0307e6d7f7717"]
                ValidationFailure:
                  summary: Validation Failure in Bulk
                  value:
                    status: "success"
                    data:
                      new_templates: ["Email attachment should be valid one with size less than 6mb & total attachments size less than 20mb"]
                      updated_templates: ["Given id is invalid email template id"]
        '400':
          description: This response is returned when the required parameters are missing from the request or when the provided parameters are invalid, or when a template already exists with the same version, name, or id.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 AuthFail:
                   value:
                     status: "error"
                     data:
                       code: 401
                       title: "Authentication required"
                       description: "Invalid APP_ID used in Authentication Header"
        '429':
          description: This response is returned when the number of requests per minute has exceeded the rate limit or the number of templates has exceeded the allowed quota per channel.
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 RateLimitExceeded:
                   value:
                     status: "error"
                     data:
                       code: 429
                       title: "rate limiter exception"
                       description: "Exceeded rate limit for this app"
        '500':
          description: This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
              examples:
                ServerError:
                  value:
                    title: "Internal Server Error"
                    message: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        The API request will be authenticated through Basic Authentication. Basic Authentication sends a Base64-encoded string containing your username and password with every API request. It encodes a 'username:password' string in Base64 and appends the encoded string with 'Basic '.
        
        **Format:** `Basic Base64_ENCODED_WORKSPACEID_APIKEY==`
        
        The username and password details can be obtained from the MoEngage Dashboard. If you're using the API for the first time, follow these steps:
        1. Navigate to **Settings -> Account -> APIs**.
        2. Copy the following details:
           * Username: Under **Workspace ID (earlier app id)**, click the copy icon to copy the username.
           * Password: In the **API keys** section, click the copy icon in the **Data** tile to copy the API key.
        3. Use these details to authenticate the API requests.

  parameters:
    MoeAppKeyHeader:
      name: MOE-APPKEY
      in: header
      required: true
      description: |
        This is your MoEngage account's APP ID that has to be passed along with the request. You can find your MoEngage APP ID at **Settings** -> **Account** -> **APIs** -> **App ID**.
      schema:
        type: string
        example: "APP ID"
    ContentTypeHeader:
      name: Content-Type
      in: header
      required: true
      description: Set the Content-Type header to application/json.
      schema:
        type: string
        example: "application/json"

  schemas:
    # Base properties common to create and update
    TemplateBase:
      type: object
      required:
        - name
        - html
        - source
      properties:
        name:
          type: string
          minLength: 5
          maxLength: 50
          pattern: '^[a-zA-Z0-9_]+$'
          description: |
            This field contains the name of the template and would be used for identifying the template. You can look for the template created using this API in the second step of campaign creation in the 'My Saved Templates' tab using this name. For more information, refer to accessing templates created via APIs on the Dashboard.
            **Example**: "End_Of_Season_Sale_Template".
            
            **Note**:
            * The name field can contain only alphanumeric and underscore characters.
            * The length of this field can be between 5-50 characters.
          example: "End_Of_Season_Sale_Template"
        html:
          type: string
          description: |
            This field contains the message body of the email. This is where you define the email template being created. The HTML tag and BODY tag (with text/tags) are mandatory. The SCRIPT tag is not allowed.
            
            **Example**:
            "html": "<!DOCTYPE html><html><head>...</head><body aria-disabled=\"false\"><p>Your Email Template Content Here</p></body></html>"
          example: "<!DOCTYPE html><html><body><p>Content</p></body></html>"
        subject:
          type: string
          description: |
            This field contains the subject of the email campaign.
            **Example**: "End of Season Sale!"
          example: "End of Season Sale!"
        attachments:
          type: array
          description: |
            This field contains the attachments to be included in the email.
            **Example**: "attachments": ["https://app-cdn.moengage.com/assets/LogoThumbnail.jpg"]
            
            **Note**:
            * Only URLs can be added as part of Email attachments.
            * A maximum of ten attachments are allowed.
            * The URL should start with https and end with a valid extension. The following extensions are not allowed: .dmg, .exe, .xls, .ddl, .class, .obj, .int, .gnt, .o, .so, .lbr, and .net
            * Individual attachments should be less than 6 MB, and the total size of the attachments should be less than 20 MB.
          maxItems: 10
          items:
            type: string
            format: uri
            example: "https://app-cdn.moengage.com/assets/LogoThumbnail.jpg"
        sender_name:
          type: string
          description: |
            This field contains the name displayed that is displayed in the inboxes of your recipients. Sender names are one of the first things people see when you send them an email.
            **Example**: "sender_name": "Your Brand Name"
          example: "Your Brand Name"
        source:
          type: string
          description: |
            This field contains information about the source of template creation. This can be the name of the email partner.
            **Example**: "source": "Partner"
            
            **Note**: Only alphanumerics, spaces, and underscores are allowed in this field.
          example: "Partner"
        updated_by:
          type: string
          description: |
            This field contains information about who created the template.
            **Example**: "updated_by": "john.doe@example.com"
            
            **Note**: Only alphanumerics, spaces, and hyphens are allowed in this field. This field can contain the email ID of the creator as well. The email id should be in the right format and a valid one.
          example: "john.doe@example.com"

    # Schema for Creating a single template
    TemplateCreateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'

    # Schema for Updating (requires ID in Bulk operations, but not in Path-based update)
    TemplateUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'

    # Schema specifically for the Bulk array where ID is required for updates
    TemplateBulkUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateBase'
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              description: |
                This is the Template id of the template being updated. It is mandatory to add this field when updating a template. The template id is a unique identifier that is generated at the time of template creation using the Create Email Template API.
                Example: {"id": "63f30792c66ddcaac2ef9109"}

    # Schema for GET All response objects
    TemplateDetails:
      type: object
      properties:
        template_id:
          type: string
          description: Template id - the unique identifier that is created at the time of template creation.
        template_name:
          type: string
          description: Name of the template being fetched.
        is_archived:
          type: boolean
          example: false
        builder_supported:
          type: boolean
          example: false
          description: For the Froala editor, the builder_supported value is false. Thus, for all the templates created using APIs, this would be false.
        editor:
          type: string
          example: "Froala Editor"
        created_date:
          type: string
          description: Timestamp of template creation.
        updated_at:
          type: string
          description: Timestamp of when the template was last updated.
        updated_by:
          type: string
          description: Details about who created or updated the template.

    # Schema for GET Specific response (structure is slightly different than GET All)
    TemplateDetailsFlat:
      type: object
      properties:
        status:
          type: string
          example: success
          description: This field contains the status of the request and denotes whether it was successful or not.
        template_id:
          type: string
          example: "645a0cec10e0307e6d7f7716"
          description: Template id - the unique identifier that is created at the time of template creation.
        template_name:
          type: string
          example: "End_of_season_sale_template"
          description: Name of the template being fetched.
        subject:
          type: string
          description: Subject of the template being fetched.
        template_content:
          type: string
          description: html content of the template.
        attachments:
          type: array
          description: |
            The attachments field is a list of JSON Objects that contain the details about an attachment, such as its type, url, name, id, and so on.
          items:
            type: object
        source:
          type: string
          description: Source of the template being fetched.
        sender_name:
          type: string
        editor:
          type: string
          example: "Froala Editor"
        created_date:
          type: string
          description: Timestamp of template creation.
        updated_at:
          type: string
          description: Timestamp of when the template was last updated.
        updated_by:
          type: string
          description: Details about who created or updated the template.

    ErrorData:
      type: object
      properties:
        code:
          type: integer
          example: 400
          description: |
            This field contains the error code and is a String. Example: 400 (for a Bad Request), 401( for Authentication failures), and so on. This field is present in the response only in the case of errors.
        title:
          type: string
          example: "Invalid request body"
          description: |
            This field contains the type of error encountered. Example: Bad Request, Authentication Required, and so on. This field is present in the response only in the case of errors.
        description:
          type: string
          example: "MOE-APPKEY header is invalid or empty"
          description: |
            This field describes why the request has failed and is a String. Example: 'MOE-APPKEY header is invalid or empty'.

    SuccessResponseCreate:
      type: object
      properties:
        status:
          type: string
          example: success
          description: |
            This field contains the status of the request and denotes whether it was successful or not.
            **Example**: "status": "success", "status": "error"
        data:
          type: object
          description: |
            This field contains the id of the created template when the request is successful and the error details in case of an unsuccessful request.
          properties:
            id:
              type: string
              description: |
                This field contains the template id and needs to be stored by you. This template id would be used for searching a specific template and updating it. The template id is a String.
                **Example**: "id": "63f4962d4d31f4c68d980a01"
              example: "63f4962d4d31f4c68d980a01"
            msg:
              type: string
              description: |
                This field contains information about the successful creation of the template.
                **Example**: "msg": "Custom email template saved"
              example: "Custom email template saved"

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        data:
          $ref: '#/components/schemas/ErrorData'

    InternalServerErrorResponse:
      type: object
      properties:
        title:
          type: string
          example: "Internal Server Error"
        message:
          type: string
          example: "An unexpected error was encountered."