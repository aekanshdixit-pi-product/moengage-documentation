          --header 'Authorization: Basic VkoNNRVNITVFBM0w3V1YxRUVLM1VSOkZJd0N5dGZ0QWpZcl9tcVlldkVPVkFtbw==' \
          --data-raw '{
              "type": "event",
              "user_identifiers":{  "moe_mobile":"{{Mobile_Number}}"                                 },
              "actions" : [
                    {
                        "action": "product_selected",
                        "attributes": {
                          "product": "Shirt",
                          "color": "Green",
                          "moe_os_type":"Xbox",
                          "arraySupport":["abc","xyz"],
                          "Brand": "Adidas"
