  /customers/export:
    post:
      tags:
        - User
      summary: Get User Details
      x-mint:
        content: |
          The 'dc' in the API Endpoint URL refers to the MoEngage Data Center (DC). MoEngage hosts each customer in a different DC. You can find your DC number (value of X) and replace the value of 'dc' in the URL by referring to the DC and API endpoint mapping.
          ### Rate Limit
          The rate limit is 20 users per payload and 1000 users per minute.
      description: Fetches user profile data for one or more specified users.
      parameters:
        - name: Workspace_ID
          in: query
          required: true
          description: 'This is the Workspace ID of your MoEngage account that has to be passed along with the request. You can find your Workspace ID at Settings > Account > APIs > Workspace ID.'
          schema:
            type: string
            example: VJ0GSMESHMQA3L7WV1EEK3UR
        - name: X-Forwarded-For
          in: header
