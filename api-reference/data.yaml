openapi: 3.0.3
info:
  title: MoEngage Data APIs
  version: '1.0'
  description: |-
    This is a comprehensive OpenAPI specification for MoEngage's Data APIs, including User, Event, and Device management.
    It's designed to power an interactive API playground on your new documentation site.
tags:
  - name: User
    description: Operations for creating, updating, retrieving, and managing user profiles.
  - name: Event
    description: Operations for tracking user events.
  - name: Device
    description: Operations for managing user devices.
  - name: Bulk
    description: Operations for importing users and events in bulk.
  - name: File Import
    description: Operations for managing asynchronous file imports.
  - name: Tracking
    description: Endpoints for tracking attribution and installs.
  - name: Utilities
    description: Utility endpoints for testing connections.
  - name: Webhooks
    description: Incoming webhook specifications from MoEngage.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1'
    description: MoEngage Core API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, 4, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
  - url: 'https://fileimports-data-api-0{dc}.moengage.com/v1.0/data'
    description: MoEngage File Imports API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, etc.'
        enum:
          - '1'
          - '2'
          - '3'

security:
  - basicAuth: []

paths:
  /customer/{Workspace_ID}:
    post:
      tags:
        - User
      summary: Create or Update User
      description: Adds new users or updates properties of existing users in MoEngage.
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account. Found in Settings > Account > APIs.'
          schema:
            type: string
            example: VJ0GSMESHMQA3L7WV1EEK3UR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              simple:
                summary: Simple User Update
                value:
                  type: customer
                  customer_id: john@example.com
                  attributes:
                    name: John
                    platforms:
                      - platform: ANDROID
                        active: "true"
              full:
                summary: Full User Update with Custom Attributes
                value:
                  type: customer
                  customer_id: john@example.com
                  update_existing_only: true
                  attributes:
                    points: 20
                    expiry_date: '2020-05-31T03:47:35Z'
                    super_user: true
                    user_persona: browsers
                    platforms:
                      - platform: ANDROID
                        active: "true"
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request - Missing parameters, invalid attributes, etc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized - Invalid authentication credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customers/export:
    post:
      tags:
        - User
      summary: Get User Details
      description: Fetches user profile data for one or more specified users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetUserRequest'
      responses:
        '200':
          description: Successfully retrieved user data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customer/merge:
    post:
      tags:
        - User
      summary: Merge Users
      description: Merges two user profiles into a single profile.
      parameters:
        - name: app_id
          in: query
          required: true
          description: The Workspace ID of your MoEngage account.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeUserRequest'
      responses:
        '200':
          description: Merge request accepted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  operation:
                    type: string
                    example: created
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customer/delete/bulk:
    post:
      tags:
        - User
      summary: Delete Users in Bulk
      description: Deletes users from MoEngage. Users are permanently deleted after a 24-hour buffer period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUserRequest'
      responses:
        '200':
          description: Delete request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /event/{Workspace_ID}:
    post:
      tags:
        - Event
      summary: Create Event
      description: Tracks actions performed by a user.
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: The Workspace ID for your MoEngage account.
          schema:
            type: string
            example: OAPQQ2AMD01MJZYZX1YPG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /device/{appId}:
    post:
      tags:
        - Device
      summary: Create or Update Device
      description: Adds a new device for an existing user or updates the properties of an existing device.
      parameters:
        - name: appId
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /devices/manage:
    post:
      tags:
        - Device
      summary: Block or Unblock Device (Opt-out)
      description: Blocks or unblocks specific devices from receiving push notifications.
      parameters:
        - name: app_id
          in: query
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceOptOutRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /installInfo:
    get:
      tags:
        - Tracking
      summary: Track App Install
      description: |
        Install attribution tracking is a great way to improve your initial relationship with your user. Knowing how, where, and even more importantly, why a user installs your app allows you to get a better understanding of who your user is and how you should introduce them to your app.

        You can use our APIs to seamlessly provide MoEngage with install data. These APIs allow you to track the install attribution data in MoEngage, which you can then use to enhance your marketing automation campaigns on MoEngage.

        # Postman Collections
        We have made it easy for you to test the APIs. Click [here](https://www.postman.com/moengage-dev/api-docs/collection/xupp3dy/moengage-install-tracking-api) to view it in Postman.
      security: []
      x-code-samples:
        - lang: Bash
          label: Android
          source: |
            curl -L -g -X GET 'https://api-0X.moengage.com/v1/installInfo?src=<partner_name>&appAttributionKey=<ENTER_ATTRIBUTION_KEY_HERE>&appId=<ENTER_Workspace_ID_HERE>&campaign_name=<campaign_name_of_install>&publisher_name=<publisher_name_of_install>&advertising_id=<device_GAID>'
        - lang: Bash
          label: iOS
          source: |
            curl -L -g -X GET 'https://api-0X.moengage.com/v1/installInfo?src=<partner_name>&appAttributionKey=<ENTER_ATTRIBUTION_KEY_HERE>&appId=<ENTER_Workspace_ID_HERE>&campaign_name=<campaign_name_of_install>&publisher_name=<publisher_name_of_install>&idfv=<device_idfv>'
      parameters:
        - name: publisher_name
          in: query
          schema:
            type: string
          description: Publisher name of the install.
        - name: campaign_name
          in: query
          schema:
            type: string
          description: Campaign name of the install.
        - name: src
          in: query
          required: true
          schema:
            type: string
          description: Partner name.
        - name: appId
          in: query
          required: true
          schema:
            type: string
          description: |
            This is your MoEngage account's Workspace ID that must be included in the request. You can find your Workspace ID in the following navigation on the dashboard:
            
            Revamped UI: **Settings > Account > APIs > Workspace ID**
        - name: advertising_id
          in: query
          schema:
            type: string
          description: Google Advertising ID of the device on which the install was detected (for Android only).
        - name: idfv
          in: query
          schema:
            type: string
          description: IDFV of the iOS device on which the install was detected (for iOS only).
        - name: appAttributionKey
          in: query
          required: true
          schema:
            type: string
          description: Available on the MoEngage dashboard by navigating to **Settings > Analytics > Acquisition Tracking > Attribution Key**.
      responses:
        '200':
          description: |
            **Success**
            This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: |
            **Bad Request**
            This response is returned when the required parameters are missing from the request, attributes are not found, and incorrect values are passed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: |
            **Unauthorized**
            This response is returned when the request does not have valid authentication credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: |
            **Account Blocked**
            This response is returned when your MoEngage account is suspended or blocked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  message:
                    type: string
                    example: Account is blocked
        '413':
          description: |
            **Payload Size Exceeded**
            This response is returned when the payload size exceeds 128 KB.
        '415':
          description: |
            **Unsupported Media Type**
            This response is returned when the content type is not supported.
        '429':
          description: |
            **Rate Limit Breach**
            This response is returned when the number of requests has exceeded the rate limit.
        '500':
          description: |
            **Internal Server Error**
            This response is returned when the system runs into an unexpected error.

  /integrations/authentication:
    post:
      tags:
        - Utilities
      summary: Test Connection API
      description: |
        The Test Connection API allows you to validate if the entered endpoint details are valid. The API verifies if the provided endpoint URL, workspace ID an data key is accessible and responds without any errors.

        **Base URL**
        `https://api-0X.moengage.com/v1/integrations/authentication`
        Here X is your MoEngage datacenter. [Know more](https://help.moengage.com/hc/en-us/articles/360057030512-Data-Centers-in-MoEngage)
      parameters:
        - name: MOE-APPKEY
          in: header
          required: true
          description: "This is your MoEngage account's data API keythat has to be passed along with the request. You can find it at **Settings** -> **Account** -> **APIs** -> **API Keys** -> **Data**."
          schema:
            type: string
            example: "{MoEngage data API key}"
        - name: Authorization
          in: header
          required: true
          description: "This authentication parameter, used for access control, must be passed along with the request. To generate the authentication header, refer to Authentication."
          schema:
            type: string
            example: "Basic bmF2ZWVua3VtYXI6bW9lbmdhZ2U=="
      requestBody:
        required: true
        description: Set the Content-Type header to application/json.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestConnectionRequest'
            examples:
               cURL_Body:
                value:
                  app_id: "********"
                  app_secret: "**********"
                  source: "test"
                  region: "01"
      responses:
        '200':
          description: |
            Success. This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: |
                      This field contains the status of the request and denotes whether it was successful or not.
                      **Example**: "status": "success", "status": "error"
                    example: success
                  app_name:
                    type: string
                    description: This field contains the workspace name of your MoEngage workspace
                    example: PI-Prod-DC01
              example:
                status: "success"
                app_name: "PI-Prod-DC01"
        '401':
          description: |
            Authorization Failure. This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "App Secret key mismatch. Please login to the dashboard to verify key"
                      type:
                        type: string
                        example: "Authentication required"
                      request_id:
                        type: string
                        example: "kKcQUqvo"
              example:
                status: "fail"
                error:
                  message: "App Secret key mismatch. Please login to the dashboard to verify key"
                  type: "Authentication required"
                  request_id: "kKcQUqvo"

  /fileimports/trigger/{schedule_id}:
    post:
      tags:
        - File Import
      summary: Trigger a File Import
      description: |
        This API can be used to trigger scheduled file imports. Periodic imports can be triggered to run using this API if the import has not expired and is in any of the following states: Scheduled, Successful, Partially Successful, and Failed.

        ### Rate Limit
        This API can be triggered once in every five minutes for a specific schedule_id. A Bad request response (400) response will be sent if this is exceeded.

        ### FAQs
        **Does the trigger API change the import schedule?**
        No, the schedule still remains the same as originally set up in the MoEngage Dashboard.
      parameters:
        - name: schedule_id
          in: path
          required: true
          description: "This field specifies the Import ID(the unique identifier for the import) of the import that needs to be triggered. You can find the Import ID in the MoEngage Dashboard on the Imports History page. Click on Actions → View import to view the Import Details.\n\nYou can also view the Import ID in the email notification received once the import has been set up."
          schema:
            type: string
            example: "YOUR_IMPORT_ID_HERE"
        - name: MOE-APPKEY
          in: header
          required: true
          description: "This is your MoEngage account's WORKSPACE ID that has to be passed along with the request. You can find your MoEngage Workspace ID at **Settings** -> **Account** -> **APIs -> Workspace ID (earlier app id)**."
          schema:
            type: string
            example: "YOUR_WORKSPACE_ID"
        - name: Authorization
          in: header
          required: true
          description: "This authentication parameter, used for access control, must be passed along with the request. To generate the authentication header, refer to Authentication."
          schema:
            type: string
            example: "Basic Base64_ENCODED_WORKSPACEID_APIKEY=="
      responses:
        '200':
          description: "This response is returned when the request is processed successfully."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: "This field contains the status of the request and specifies whether the request was successful.\n\nSupported Values: success, failure\n\nExample: \"status\": \"success\""
                    example: "success"
                  message:
                    type: string
                    description: "This field contains information about whether the request was successful or not.\n\nExample: \n\"message\": \"Trigger Import Successful\""
                    example: "Triggered Import Successfully"
        '400':
          description: "This response is returned when the Import ID/Schedule ID is missing from the request or when the provided parameters are invalid. Also, this response is returned when the rate limit (one request in five minutes) is breached."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "FAILURE"
                  error_type:
                    type: string
                    description: "This field is present in the response when the Import/Schedule ID in the request is not found in the system (either because it is invalid or has been deleted)."
                  message:
                    type: string
                    description: "This field contains the error description."
              examples:
                InvalidImportID:
                  summary: Import ID Invalid or Deleted
                  value:
                    status: "FAILURE"
                    error_type: "NOT_FOUND"
                    message: "This import is either deleted or expired."
                RateLimitExceeded:
                  summary: Rate Limit Exceeded
                  value:
                    status: "FAILURE"
                    error_type: "ALREADY_EXISTS"
                    message: "Import has run in the last 5 min."
        '401':
          description: "This response is returned when the APP Key is invalid or missing, the password is incorrect, or there are other such authorization-related errors in the request."
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: "This field is present in the response in the case of errors and contains the type of error."
                  description:
                    type: string
                    description: "This field is present in the response in the case of errors and contains the error description."
              examples:
                IncorrectPassword:
                  summary: Incorrect Password (APP_KEY)
                  value:
                    title: "AuthenticationInvalid"
                    description: "Password (APP_KEY) doesn't match the one available on the dashboard. Kindly ensure the same APP_KEY available on the dashboard is used."
                MissingHeader:
                  summary: Missing MOE-APPKEY Header
                  value:
                    title: "HeaderMissing"
                    description: "MOE-APPKEY is missing in Header"
                HeaderMismatch:
                  summary: APP Key Mismatch
                  value:
                    title: "HeaderMismatch"
                    description: "MOE_APPKEY doesn't match the Username (APP_KEY) used in Basic Auth authorization."
        '403':
          description: "This response is returned when your MoEngage account has been blocked or suspended."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "fail"
                  type:
                    type: string
                    description: "This field is present in the response in the case of 403 errors and contains the error type."
                  request_id:
                    type: string
                    description: "This field is present in the response in the case of 403 errors and contains the request-id."
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      type:
                        type: string
                      request_id:
                        type: string
              examples:
                AccountBlocked:
                  summary: Account Suspended
                  value:
                    status: "fail"
                    error:
                      message: "Your account is suspended. Please contact MoEngage team."
                      type: "BlockedClient"
                      request_id: "ofHUEaEQ"
        '404':
          description: "This response is returned when the request contains the incorrect URL (when you try to access a resource that is not present)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "fail"
                  message:
                    type: string
                    example: "Resource not found"
        '405':
          description: "This response is returned when the request contains an unsupported method. For example, if you were to use the GET method instead of POST for this request, you would result in a 405 error."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "fail"
                  message:
                    type: string
                    example: "Method not allowed"
        '500':
          description: "This response is returned when the system runs into an unexpected error."
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    example: "Server Error"
                  description:
                    type: string
                    example: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"
                  code:
                    type: string
                    description: "This field is present in the response in the case of 5xx errors and contains the error code."
                    example: "GlQhUzvM"

  /fileimports/import/run/history:
    post:
      tags:
        - File Import
      summary: Get File Import Status
      description: Fetches the processing status of files for a specific import job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileImportStatusRequest'
      responses:
        '200':
          description: Successfully retrieved import history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileImportStatusResponse'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /transition/{Workspace_ID}:
    post:
      tags:
        - Bulk
      summary: Bulk Import Users and Events
      description: 'Send multiple user, device, and event updates in a single API request. Max payload size: 100 kB.'
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkImportRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic Authentication using Workspace ID as username and Data API Key as password.
  schemas:
    GenericSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Your request has been accepted and will be processed soon.

    GenericError:
      type: object
      properties:
        status:
          type: string
          example: fail
        error:
          type: object
          properties:
            message:
              type: string
              example: App Secret key mismatch. Please login to the dashboard to verify key
            type:
              type: string
              example: Authentication required
            request_id:
              type: string
              example: PVUDFisO
            attribute:
              type: string
              description: The attribute in the payload that caused the error.
              example: customer_id

    PlatformObject:
      type: object
      properties:
        platform:
          type: string
          enum: [ANDROID, iOS, web]
        active:
          type: string
          enum: ["true", "false"]

    UserAttributes:
      type: object
      description: A dictionary of user attributes to add or update.
      properties:
        u_n:
          type: string
          description: Full name of the user.
        u_fn:
          type: string
          description: First name of the user.
        u_ln:
          type: string
          description: Last name of the user.
        u_gd:
          type: string
          description: Gender of the user.
        u_em:
          type: string
          format: email
          description: Email Address of the user (Standard).
        u_mb:
          type: string
          description: Mobile Number of the user (Standard). Example `918888444411`.
        uid:
          type: string
          description: A unique ID set by the client for a user.
        u_bd:
          type: string
          format: date-time
          description: 'Birthdate of the user in ISO 8601 format (e.g., 2019-05-21T03:47:35Z).'
        moe_wa_subscription:
          type: boolean
          description: WhatsApp subscription status of a user.
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PlatformObject'
      additionalProperties: true
      example:
        name: John
        points: 20
        expiry_date: '2020-05-31T03:47:35Z'
        super_user: true
        user_persona: browsers
        platforms:
          - platform: ANDROID
            active: "true"

    CreateUserRequest:
      type: object
      required:
        - type
        - customer_id
      properties:
        type:
          type: string
          description: 'Identifies the type of request. Must be "customer".'
          enum: [customer]
        customer_id:
          type: string
          description: 'Unique identifier for the user. Not mandatory in Identity Resolution enabled workspaces.'
        update_existing_only:
          type: boolean
          description: 'If true, only existing users will be updated; new users will not be created.'
          default: false
        attributes:
          $ref: '#/components/schemas/UserAttributes'

    IdentifierObject:
      type: object
      properties:
        identifier_type:
          type: string
          enum: [customer_id, id]
          description: '`customer_id` is the ID in the User Profile, `id` is the MoEngageID.'
        identifier:
          type: string
          description: The unique identifier value.

    GetUserRequest:
      type: object
      properties:
        data:
          type: object
          properties:
            identifiers:
              type: array
              description: 'Array of user identifiers to fetch. Max 20 users per request.'
              items:
                $ref: '#/components/schemas/IdentifierObject'
            user_fields_to_export:
              type: array
              items:
                type: string
              description: 'Specific user fields to export. If omitted, all exportable attributes are returned.'
              example: ["last_name", "customer_id", "name"]

    GetUserResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        type:
          type: string
          example: export_users
        data:
          type: object
          properties:
            users_not_found:
              type: array
              items:
                $ref: '#/components/schemas/IdentifierObject'
            users:
              type: array
              items:
                type: object
                properties:
                  user_attributes:
                    type: object
                    additionalProperties: true
                    example:
                      last_name: Doe
                      customer_id: john_doe
                      id: 62e79fb15ada55x123g987bu

    MergeUserRequest:
      type: object
      properties:
        merge_data:
          type: array
          description: A list of user pairs to merge.
          items:
            type: object
            properties:
              merged_user:
                type: string
                description: The user ID to be merged and then deleted.
              retained_user:
                type: string
                description: The user ID that will remain and absorb the merged user's data.

    DeleteUserRequest:
      type: object
      description: 'Request body to delete users. Based on the Get User API structure.'
      properties:
        identifiers:
          type: array
          description: Array of user identifiers to delete.
          items:
            $ref: '#/components/schemas/IdentifierObject'

    EventAction:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          description: The name of the event to be tracked.
        attributes:
          type: object
          additionalProperties: true
          description: A dictionary of key-value pairs associated with the event.
          example:
            price: 3999
            departure_date: '2019-05-21T03:47:35Z'
            premium_seat: true
        platform:
          type: string
          enum: [ANDROID, iOS, web, unknown]
          description: The platform on which the event occurred.
        app_version:
          type: string
          description: The version of the app where the event originated.
        user_time:
          oneOf:
            - type: number
            - type: string
          description: Local time of the event (Epoch seconds or ISO 8601 string).
        current_time:
          oneOf:
            - type: number
            - type: string
          description: UTC time of the event (Epoch seconds or ISO 8601 string).
        user_timezone_offset:
          type: number
          description: 'Timezone offset from UTC in seconds (e.g., IST is 19800).'

    CreateEventRequest:
      type: object
      required:
        - type
        - customer_id
        - actions
      properties:
        type:
          type: string
          description: 'Identifies the type of request. Must be "event".'
          enum: [event]
        customer_id:
          type: string
          description: 'Identifier for the user performing the event.'
        device_id:
          type: string
          description: 'Optional device identifier. Defaults to customer_id if not provided.'
        user_identifiers:
          type: object
          description: 'Required if Identity Resolution is enabled and customer_id is not provided.'
          additionalProperties: true
          example:
            moe_mobile: "+919876543210"
        actions:
          type: array
          items:
            $ref: '#/components/schemas/EventAction'

    DeviceAttributes:
      type: object
      required:
        - platform
        - push_id
      properties:
        model:
          type: string
          description: The model of the device.
        platform:
          type: string
          enum: [ANDROID, iOS, web, TV]
          description: The platform of the device.
        push_id:
          type: string
          description: The push token of the device.
        moe_push_opted:
          type: string
          enum: ["True", "False"]
          description: Push opt-in status.
        app_version:
          type: string
          description: Version of the app on the device.
        os_version:
          type: string
          description: The device's operating system version.
        moe_gaid:
          type: string
          description: Google Advertising ID for Android devices.
        idfv:
          type: string
          description: Identifier for Vendors for iOS devices.

    CreateDeviceRequest:
      type: object
      required:
        - type
        - customer_id
        - device_id
        - attributes
      properties:
        type:
          type: string
          enum: [device]
        customer_id:
          type: string
          description: 'The unique identifier for the user who owns the device.'
        device_id:
          type: string
          description: 'A unique identifier for the device itself.'
        attributes:
          $ref: '#/components/schemas/DeviceAttributes'

    DeviceOptOutRequest:
      type: object
      required:
        - user_identifier_type
        - user_identifier_value
        - action_type
      properties:
        user_identifier_type:
          type: string
          description: The type of user identifier (e.g., 'customer_id').
        user_identifier_value:
          type: string
          description: The value of the user identifier.
        action_type:
          type: string
          enum: [block, unblock]
          description: Whether to block or unblock the device(s).
        reason:
          type: string
          description: Optional reason for the action.
        client_reference_id:
          type: string
          description: Optional client-side reference ID.
        device_identifiers:
          type: array
          description: 'Array of device identifiers to target. If omitted, all user devices are affected.'
          items:
            type: object
            properties:
              GAID: { type: string }
              IDFV: { type: string }
              unique_id: { type: string }
              device_unique_id: { type: string }
              push_id: { type: string }

    TestConnectionRequest:
      type: object
      required:
        - app_id
        - app_secret
        - source
        - region
      properties:
        app_id:
          type: string
          description: 'This is your MoEngage workspace ID that has to be passed along with the request. You can find it at **Settings** -> **Account** -> **APIs** -> **Workspace ID**.'
        app_secret:
          type: string
          description: "This is your MoEngage account's data API key that has to be passed along with the request. You can find it at **Settings** -> **Account** -> **APIs** -> **API Keys** -> **Data**."
        source:
          type: string
          description: 'This is the data source - basically the tool from where you are sending the request to MoEngage.'
        region:
          type: string
          description: 'This is your MoEngage region where the workspace is hosted. Value will be in the format of 0X, where X is your MoEngage data center. [Know more](https://help.moengage.com/hc/en-us/articles/360057030512-Data-Centers-in-MoEngage)'

    FileImportStatusRequest:
      type: object
      properties:
        import_id:
          type: string
          description: 'The unique ID of the import job. Takes precedence over import_name if both are provided.'
        import_name:
          type: string
          description: 'The name of the import job.'
        date:
          type: object
          properties:
            start_date: { type: string, format: date-time }
            end_date: { type: string, format: date-time }
        file_status:
          type: array
          items:
            type: string
            enum: [SUCCESSFUL, FAILED, PARTIAL_SUCCESS, PROCESSING, QUEUED, WAITING]
        offset:
          type: integer
          description: 'Pagination offset. Each page returns 50 results.'
          default: 1

    FileImportStatusResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        total_count:
          type: integer
          example: 1
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              file_name: { type: string }
              scheduled_at: { type: string, format: date-time }
              completed_at: { type: string, format: date-time }
              type: { type: string, enum: [USERS, EVENTS, AUX_DATA] }
              file_size: { type: string }
              file_status: { type: string }
              total_rows: { type: integer }
              updated_rows: { type: integer }
              failed_rows: { type: integer }
        offset:
          type: integer
        more_files:
          type: boolean

    BulkImportRequest:
      type: object
      required:
        - type
        - elements
      properties:
        type:
          type: string
          enum: [transition]
        elements:
          type: array
          description: A list of customer, device, or event data points.
          items:
            oneOf:
              - $ref: '#/components/schemas/CreateUserRequest'
              - $ref: '#/components/schemas/CreateEventRequest'
              - $ref: '#/components/schemas/CreateDeviceRequest'

    StreamsWebhookPayload:
      type: object
      properties:
        app_name: 
          type: string 
          description: Your workspace name in MoEngage.
        source: 
          type: string 
          example: "MOENGAGE" 
          description: Source = MoEngage to identify the requests coming from MoEngage.
        moe_request_id: 
          type: string
          description: moengage unique request id for each request
        events:
          type: array
          items:
            type: object
            properties:
              event_name: 
                type: string
                description: Display the Name of the event. This is also the name for the event that you will see on the MoEngage dashboard.
              event_code: 
                type: string
                description: Event code as present in the MoEngage system. This is not visible on the MoEngage dashboard but is the raw event name that we save in the MoEngage database.
              event_uuid: 
                type: string
                description: This is the unique event identifier for each event added by MoEngage. You can use this for de-duplication.
              event_time: 
                type: integer 
                format: int64 
                description: "Time of event in UTC, format - epoch time in seconds. This is the time when the event happened."
              event_type: 
                type: string 
                enum: [CAMPAIGN_EVENT, USER_ACTION_EVENT] 
                description: CAMPAIGN_EVENT or USER_ACTION_EVENT to differentiate between campaign events and user action.
              event_source: 
                type: string 
                example: "MOENGAGE" 
                description: This will have value = MoEngage for you to identify that MoEngage is the source of these events.
              push_id:
                type: string
                description: Push token of the device to which the push notification was sent. This will only be available for Push-related events.
              email_id:
                type: string
                description: Email Id to which the email was sent. This will only be available for Email-related events.
              mobile_number:
                type: string
                description: Mobile Number to which the SMS was sent. This will only be available for SMS-related events.
              uid: 
                type: string 
                description: "MoEngage customer_id to uniquely identify a user in MoEngage."
              event_attributes:
                type: object
                description: Additional event attributes, dictionary.
                properties:
                    campaign_name:
                        type: string
                        description: Campaign name in MoEngage.
                    campaign_id:
                        type: string
                        description: Campaign ID in MoEngage.
                    campaign_channel:
                        type: string
                        description: Campaign Type - Push / Email / SMS.
                    campaign_type:
                        type: string
                        description: Type of campaigns such as Periodic, Active, One-time.
                    variation_id:
                        type: string
                        description: Present with event_type = CAMPAIGN_EVENT when the campaign has multiple variations.
                    locale_id:
                        type: string
                        description: Present with event_type = CAMPAIGN_EVENT when the campaign has multiple locales.
                    locale_name:
                        type: string
                        description: Present with event_type = CAMPAIGN_EVENT when the campaign has multiple locales.
                    parent_campaign_id:
                        type: string
                        description: Present with event_type = CAMPAIGN_EVENT when the campaign has multiple locales.
                    parent_flow_id:
                        type: string
                        description: Present for campaigns that are created inside a MoEngage Flow campaign.
                    parent_flow_name:
                        type: string
                        description: Present for campaigns that are created inside a MoEngage Flow campaign.
                          For the full list of updated events and attributes, refer to [Data Exports Glossary](https://help.moengage.com/hc/en-us/articles/15975781928468-Data-Export-Glossary).
                additionalProperties: true
                example:
                  campaign_id: "353df897hkbh67658"
                  campaign_name: "Name of the Campaign"
                  campaign_type: "Event Trigger"
                  campaign_channel: "Push"
              user_attributes:
                type: object
                description: Additional user properties, dictionary.
                properties:
                    moengage_user_id:
                        type: string
                        description: MoEngage internal user ID.
                additionalProperties: true
                example:
                  moengage_user_id: "moe_internal_user_id"
                  user_attr_1: "user_attr_val1"
                  user_attr_2: "user_attr_val2"
              device_attributes:
                type: object
                description: Additional device attributes, dictionary.
                properties:
                    moengage_device_id:
                        type: string
                        description: MoEngage internal device ID.
                additionalProperties: true
                example:
                  moengage_device_id: "moe_internal_device_id"
                  device_attr_1: "device_attr_val1"
                  device_attr_2: "device_attr_val2" 