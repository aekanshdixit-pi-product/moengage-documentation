openapi: 3.0.3
info:
  title: MoEngage Data APIs
  version: '1.0'
  description: |-
    This is a comprehensive OpenAPI specification for MoEngage's Data APIs, including User, Event, and Device management.
    It's designed to power an interactive API playground on your new documentation site.
tags:
  - name: User
    description: Operations for creating, updating, retrieving, and managing user profiles.
  - name: Event
    description: Operations for tracking user events.
  - name: Device
    description: Operations for managing user devices.
  - name: Bulk
    description: Operations for importing users and events in bulk.
  - name: File Import
    description: Operations for managing asynchronous file imports.
  - name: Tracking
    description: Endpoints for tracking attribution and installs.
  - name: Utilities
    description: Utility endpoints for testing connections.
  - name: Webhooks
    description: Incoming webhook specifications from MoEngage.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1'
    description: MoEngage Core API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, 4, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
  - url: 'https://fileimports-data-api-0{dc}.moengage.com/v1.0/data'
    description: MoEngage File Imports API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, etc.'
        enum:
          - '1'
          - '2'
          - '3'

security:
  - basicAuth: []

paths:
  /customer/{Workspace_ID}:
    post:
      tags:
        - User
      summary: Create or Update User
      description: Adds new users or updates properties of existing users in MoEngage.
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account. Found in Settings > Account > APIs.'
          schema:
            type: string
            example: VJ0GSMESHMQA3L7WV1EEK3UR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              simple:
                summary: Simple User Update
                value:
                  type: customer
                  customer_id: john@example.com
                  attributes:
                    name: John
                    platforms:
                      - platform: ANDROID
                        active: "true"
              full:
                summary: Full User Update with Custom Attributes
                value:
                  type: customer
                  customer_id: john@example.com
                  update_existing_only: true
                  attributes:
                    points: 20
                    expiry_date: '2020-05-31T03:47:35Z'
                    super_user: true
                    user_persona: browsers
                    platforms:
                      - platform: ANDROID
                        active: "true"
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request - Missing parameters, invalid attributes, etc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized - Invalid authentication credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customers/export:
    post:
      tags:
        - User
      summary: Get User Details
      description: Fetches user profile data for one or more specified users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetUserRequest'
      responses:
        '200':
          description: Successfully retrieved user data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customer/merge:
    post:
      tags:
        - User
      summary: Merge Users
      description: Merges two user profiles into a single profile.
      parameters:
        - name: app_id
          in: query
          required: true
          description: The Workspace ID of your MoEngage account.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeUserRequest'
      responses:
        '200':
          description: Merge request accepted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  operation:
                    type: string
                    example: created
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customer/delete/bulk:
    post:
      tags:
        - User
      summary: Delete Users in Bulk
      description: Deletes users from MoEngage. Users are permanently deleted after a 24-hour buffer period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUserRequest'
      responses:
        '200':
          description: Delete request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /event/{Workspace_ID}:
    post:
      tags:
        - Event
      summary: Create Event
      description: Tracks actions performed by a user.
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: The Workspace ID for your MoEngage account.
          schema:
            type: string
            example: OAPQQ2AMD01MJZYZX1YPG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /device/{appId}:
    post:
      tags:
        - Device
      summary: Create or Update Device
      description: Adds a new device for an existing user or updates the properties of an existing device.
      parameters:
        - name: appId
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /devices/manage:
    post:
      tags:
        - Device
      summary: Block or Unblock Device (Opt-out)
      description: Blocks or unblocks specific devices from receiving push notifications.
      parameters:
        - name: app_id
          in: query
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceOptOutRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /installInfo:
    get:
      tags:
        - Tracking
      summary: Track App Install
      description: |
        Install attribution tracking is a great way to improve your initial relationship with your user. Knowing how, where, and even more importantly, why a user installs your app allows you to get a better understanding of who your user is and how you should introduce them to your app.

        You can use our APIs to seamlessly provide MoEngage with install data. These APIs allow you to track the install attribution data in MoEngage, which you can then use to enhance your marketing automation campaigns on MoEngage.

        # Postman Collections
        We have made it easy for you to test the APIs. Click [here](https://www.postman.com/moengage-dev/api-docs/collection/xupp3dy/moengage-install-tracking-api) to view it in Postman.
      security: []
      x-code-samples:
        - lang: Bash
          label: Android
          source: |
            curl -L -g -X GET 'https://api-0X.moengage.com/v1/installInfo?src=<partner_name>&appAttributionKey=<ENTER_ATTRIBUTION_KEY_HERE>&appId=<ENTER_Workspace_ID_HERE>&campaign_name=<campaign_name_of_install>&publisher_name=<publisher_name_of_install>&advertising_id=<device_GAID>'
        - lang: Bash
          label: iOS
          source: |
            curl -L -g -X GET 'https://api-0X.moengage.com/v1/installInfo?src=<partner_name>&appAttributionKey=<ENTER_ATTRIBUTION_KEY_HERE>&appId=<ENTER_Workspace_ID_HERE>&campaign_name=<campaign_name_of_install>&publisher_name=<publisher_name_of_install>&idfv=<device_idfv>'
      parameters:
        - name: publisher_name
          in: query
          schema:
            type: string
          description: Publisher name of the install.
        - name: campaign_name
          in: query
          schema:
            type: string
          description: Campaign name of the install.
        - name: src
          in: query
          required: true
          schema:
            type: string
          description: Partner name.
        - name: appId
          in: query
          required: true
          schema:
            type: string
          description: |
            This is your MoEngage account's Workspace ID that must be included in the request. You can find your Workspace ID in the following navigation on the dashboard:
            
            Revamped UI: **Settings > Account > APIs > Workspace ID**
        - name: advertising_id
          in: query
          schema:
            type: string
          description: Google Advertising ID of the device on which the install was detected (for Android only).
        - name: idfv
          in: query
          schema:
            type: string
          description: IDFV of the iOS device on which the install was detected (for iOS only).
        - name: appAttributionKey
          in: query
          required: true
          schema:
            type: string
          description: Available on the MoEngage dashboard by navigating to **Settings > Analytics > Acquisition Tracking > Attribution Key**.
      responses:
        '200':
          description: |
            **Success**
            This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: |
            **Bad Request**
            This response is returned when the required parameters are missing from the request, attributes are not found, and incorrect values are passed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: |
            **Unauthorized**
            This response is returned when the request does not have valid authentication credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: |
            **Account Blocked**
            This response is returned when your MoEngage account is suspended or blocked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  message:
                    type: string
                    example: Account is blocked
        '413':
          description: |
            **Payload Size Exceeded**
            This response is returned when the payload size exceeds 128 KB.
        '415':
          description: |
            **Unsupported Media Type**
            This response is returned when the content type is not supported.
        '429':
          description: |
            **Rate Limit Breach**
            This response is returned when the number of requests has exceeded the rate limit.
        '500':
          description: |
            **Internal Server Error**
            This response is returned when the system runs into an unexpected error.

  /integrations/authentication:
    post:
      tags:
        - Utilities
      summary: Test Connection API
      description: |
        The Test Connection API allows you to validate if the entered endpoint details are valid. The API verifies if the provided endpoint URL, workspace ID an data key is accessible and responds without any errors.

      parameters:
        - name: MOE-APPKEY
          in: header
          required: true
          description: "This is your MoEngage account's data API keythat has to be passed along with the request. You can find it at **Settings** -> **Account** -> **APIs** -> **API Keys** -> **Data**."
          schema:
            type: string
            example: "{MoEngage data API key}"
        - name: Authorization
          in: header
          required: true
          description: "This authentication parameter, used for access control, must be passed along with the request. To generate the authentication header, refer to Authentication."
          schema:
            type: string
            example: "Basic bmF2ZWVua3VtYXI6bW9lbmdhZ2U=="
      requestBody:
        required: true
        description: Set the Content-Type header to application/json.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestConnectionRequest'
            examples:
               cURL_Body:
                value:
                  app_id: "********"
                  app_secret: "**********"
                  source: "test"
                  region: "01"
      responses:
        '200':
          description: |
            Success. This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: |
                      This field contains the status of the request and denotes whether it was successful or not.
                      **Example**: "status": "success", "status": "error"
                    example: success
                  app_name:
                    type: string
                    description: This field contains the workspace name of your MoEngage workspace
                    example: PI-Prod-DC01
              example:
                status: "success"
                app_name: "PI-Prod-DC01"
        '401':
          description: |
            Authorization Failure. This response is returned when the authorization parameters are missing in the HTTP Auth Header.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "App Secret key mismatch. Please login to the dashboard to verify key"
                      type:
                        type: string
                        example: "Authentication required"
                      request_id:
                        type: string
                        example: "kKcQUqvo"
              example:
                status: "fail"
                error:
                  message: "App Secret key mismatch. Please login to the dashboard to verify key"
                  type: "Authentication required"
                  request_id: "kKcQUqvo"

  /fileimports/trigger/{schedule_id}:
    post:
      tags:
        - File Import
      summary: Trigger a File Import
      description: |
        This API can be used to trigger scheduled file imports. Periodic imports can be triggered to run using this API if the import has not expired and is in any of the following states: Scheduled, Successful, Partially Successful, and Failed.

        ### Rate Limit
        This API can be triggered once in every five minutes for a specific schedule_id. A Bad request response (400) response will be sent if this is exceeded.

        ### FAQs
        **Does the trigger API change the import schedule?**
        No, the schedule still remains the same as originally set up in the MoEngage Dashboard.
      parameters:
        - name: schedule_id
          in: path
          required: true
          description: "This field specifies the Import ID(the unique identifier for the import) of the import that needs to be triggered. You can find the Import ID in the MoEngage Dashboard on the Imports History page. Click on Actions → View import to view the Import Details.\n\nYou can also view the Import ID in the email notification received once the import has been set up."
          schema:
            type: string
            example: "YOUR_IMPORT_ID_HERE"
        - name: MOE-APPKEY
          in: header
          required: true
          description: "This is your MoEngage account's WORKSPACE ID that has to be passed along with the request. You can find your MoEngage Workspace ID at **Settings** -> **Account** -> **APIs -> Workspace ID (earlier app id)**."
          schema:
            type: string
            example: "YOUR_WORKSPACE_ID"
        - name: Authorization
          in: header
          required: true
          description: "This authentication parameter, used for access control, must be passed along with the request. To generate the authentication header, refer to Authentication."
          schema:
            type: string
            example: "Basic Base64_ENCODED_WORKSPACEID_APIKEY=="
      responses:
        '200':
          description: "This response is returned when the request is processed successfully."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: "This field contains the status of the request and specifies whether the request was successful.\n\nSupported Values: success, failure\n\nExample: \"status\": \"success\""
                    example: "success"
                  message:
                    type: string
                    description: "This field contains information about whether the request was successful or not.\n\nExample: \n\"message\": \"Trigger Import Successful\""
                    example: "Triggered Import Successfully"
        '400':
          description: "This response is returned when the Import ID/Schedule ID is missing from the request or when the provided parameters are invalid. Also, this response is returned when the rate limit (one request in five minutes) is breached."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "FAILURE"
                  error_type:
                    type: string
                    description: "This field is present in the response when the Import/Schedule ID in the request is not found in the system (either because it is invalid or has been deleted)."
                  message:
                    type: string
                    description: "This field contains the error description."
              examples:
                InvalidImportID:
                  summary: Import ID Invalid or Deleted
                  value:
                    status: "FAILURE"
                    error_type: "NOT_FOUND"
                    message: "This import is either deleted or expired."
                RateLimitExceeded:
                  summary: Rate Limit Exceeded
                  value:
                    status: "FAILURE"
                    error_type: "ALREADY_EXISTS"
                    message: "Import has run in the last 5 min."
        '401':
          description: "This response is returned when the APP Key is invalid or missing, the password is incorrect, or there are other such authorization-related errors in the request."
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: "This field is present in the response in the case of errors and contains the type of error."
                  description:
                    type: string
                    description: "This field is present in the response in the case of errors and contains the error description."
              examples:
                IncorrectPassword:
                  summary: Incorrect Password (APP_KEY)
                  value:
                    title: "AuthenticationInvalid"
                    description: "Password (APP_KEY) doesn't match the one available on the dashboard. Kindly ensure the same APP_KEY available on the dashboard is used."
                MissingHeader:
                  summary: Missing MOE-APPKEY Header
                  value:
                    title: "HeaderMissing"
                    description: "MOE-APPKEY is missing in Header"
                HeaderMismatch:
                  summary: APP Key Mismatch
                  value:
                    title: "HeaderMismatch"
                    description: "MOE_APPKEY doesn't match the Username (APP_KEY) used in Basic Auth authorization."
        '403':
          description: "This response is returned when your MoEngage account has been blocked or suspended."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "fail"
                  type:
                    type: string
                    description: "This field is present in the response in the case of 403 errors and contains the error type."
                  request_id:
                    type: string
                    description: "This field is present in the response in the case of 403 errors and contains the request-id."
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      type:
                        type: string
                      request_id:
                        type: string
              examples:
                AccountBlocked:
                  summary: Account Suspended
                  value:
                    status: "fail"
                    error:
                      message: "Your account is suspended. Please contact MoEngage team."
                      type: "BlockedClient"
                      request_id: "ofHUEaEQ"
        '404':
          description: "This response is returned when the request contains the incorrect URL (when you try to access a resource that is not present)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "fail"
                  message:
                    type: string
                    example: "Resource not found"
        '405':
          description: "This response is returned when the request contains an unsupported method. For example, if you were to use the GET method instead of POST for this request, you would result in a 405 error."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "fail"
                  message:
                    type: string
                    example: "Method not allowed"
        '500':
          description: "This response is returned when the system runs into an unexpected error."
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    example: "Server Error"
                  description:
                    type: string
                    example: "An unexpected error was encountered while processing this request. Please contact MoEngage Team"
                  code:
                    type: string
                    description: "This field is present in the response in the case of 5xx errors and contains the error code."
                    example: "GlQhUzvM"

  /fileimports/import/run/history:
    post:
      tags:
        - File Import
      summary: Get File Import Status
      description: Fetches the processing status of files for a specific import job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileImportStatusRequest'
      responses:
        '200':
          description: Successfully retrieved import history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileImportStatusResponse'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /transition/{Workspace_ID}:
    post:
      tags:
        - Bulk
      summary: Bulk Import Users and Events
      description: 'Send multiple user, device, and event updates in a single API request. Max payload size: 100 kB.'
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkImportRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /webhooks/moengage-streams:
    post:
      tags:
        - Webhooks
      summary: MoEngage Streams Webhook
      description: |-
        # Introduction
        **Streams** enable you to forward events, such as user actions and campaign interaction events, available in MoEngage to a predefined API endpoint in near real-time.

        With MoEngage Streams, you can configure your API endpoint, define the events you want to forward, and then view a stream of data flowing into your system. You can then utilize the data to enrich your data warehouses and recommendation systems.

        # Popular Use Cases for MoEngage Streams
        The following are a few popular use cases for Streams:
        * Enrich the central data warehouse with MoEngage events such as Notification Clicked Android, Email Clicked, SMS Clicked, and so on.
        * Forward the Conversion Events, such as Purchase, Song Played, Bill Payment Done, and so on, from MoEngage to the external Analytics tool.
        * Feed campaign interaction events from MoEngage to your recommendation system.
        * Export the notification interaction data from MoEngage to your machine learning system for optimizing the performance of your algorithms.
        * Send all user events present in MoEngage to an external data lake.
          
        # Enable Streams for Your Account
        Please reach out to your Customer Success Manager to get this enabled for your account. Note that Streams is available as a part of the Streams add-on.

        ## Set Up Streams
        Streams can export data to your API endpoint or one of the partners integrated with MoEngage.

        ### Set Up Streams for Exporting Data to Your API Endpoint
        To export data from MoEngage to your servers, contact your MoEngage Customer Success Manager (CSM) or the Support team with the following information:
        1. API endpoint to send the data. It can be something like *https://api.example.com/events*.
        2. List of events that need to be sent to this API endpoint. A list of campaign events available for export is mentioned in the next section.
        3. List of user attributes and device attributes that need to be sent to the API endpoint with each event.
        4. If you need all campaign interaction events, we will export such events as mentioned in the next section.

        You can use the following template to raise a Streams enablement request:
        ```text
        Hey!

        Please enable Streams for my Workspace.

        Workspace Region: DC-01/DC-02/DC-03/DC-04
        Workspace Name: MyWorkspace
        Workspace ID: <my-workspace-id>

        API Endpoint: [https://www.example.com/api?url_param1=vaue1](https://www.example.com/api?url_param1=vaue1)

        Headers:
        header1: value1
        header2: value2

        Authentication:
        Method: No auth/Basic Auth
        [Only for basic auth] Basic Auth username: "Username"
        [Only for basic auth] Basic Auth password: "Password"

        Events to export: All/List of events
        [Optional] List of events: List of events to export

        User properties to export: All/List of user properties
        [Optional] List of user properties: List of user properties to export
        ```

        ### Set Up Streams for Exporting Data to Partners
        With Streams, you can export data directly to integrated partners so that you can enrich your marketing/analytics activities on these platforms. As of now, Streams can export data to the following partners:
        * [Mixpanel](https://partners.moengage.com/hc/en-us/articles/4410027746836-Mixpanel#01FV1SH74TEQEBE0JVVAWJSWAS)
        * [Amplitude](https://partners.moengage.com/hc/en-us/articles/4409507678228-Amplitude-Audiences#h_01HJ11HMQGHRZT4GR260D27QK3)
        * [Segment](https://partners.moengage.com/hc/en-us/articles/12661517099284-MoEngage-Source)
        * [mParticle](https://partners.moengage.com/hc/en-us/articles/10223363585428-mParticle-Inbound)
        * [Rudderstack](https://partners.moengage.com/hc/en-us/articles/12718141249556-MoEngage-Source)

        Please follow partner-specific integration documents for setting this up.

        # Campaign Interaction Events
        The following is a list of Campaign Interaction Events that MoEngage generates, which you will often need to be sent to your API endpoint:

        | Event Name | Event Code | Channel |
        | :--- | :--- | :--- |
        | Email Sent | MOE_EMAIL_SENT | Email |
        | Email Deferred | MOE_EMAIL_DEFERRED | Email |
        | Email Delivered | MOE_EMAIL_DELIVERED | Email |
        | Email Dropped | MOE_EMAIL_DROP | Email |
        | Email Bounced | MOE_EMAIL_HARD_BOUNCE | Email |
        | Email Soft Bounced | MOE_EMAIL_SOFT_BOUNCE | Email |
        | Email Opened | MOE_EMAIL_OPEN | Email |
        | Email Clicked | MOE_EMAIL_CLICK | Email |
        | Email Unsubscribed | MOE_EMAIL_UNSUBSCRIBE | Email |
        | Email Spam Complained | MOE_EMAIL_SPAM | Email |
        | SMS Sent | SMS_SENT | SMS |
        | SMS Delivered | SMS_DELIVERED | SMS |
        | Notification Received Android | NOTIFICATION_RECEIVED_MOE | Push |
        | Notification Clicked Android | NOTIFICATION_CLICKED_MOE | Push |
        | Notification Swiped Android | NOTIFICATION_CLEARED_MOE | Push |
        | Notification Sent iOS | n_i_s | Push |
        | Notification Clicked iOS | NOTIFICATION_CLICKED_IOS_MOE | Push |
        | Notification Received Web | NOTIFICATION_RECEIVED_WEB_MOE | Push |
        | Notification Clicked Web | NOTIFICATION_CLICKED_WEB_MOE | Push |
        | Connector Sent | MOE_CONNECTOR_SENT | Connector |
        | Card Sent | MOE_CARD_SENT | Cards |
        | Card Delivered | MOE_CARD_DELIVERED | Cards |
        | Card Viewed | MOE_CARD_VIEWED | Cards |
        | Card Clicked | MOE_CARD_CLICKED | Cards |
        | Mobile In-App Shown | MOE_IN_APP_SHOWN | Mobile In-Apps |
        | Mobile In-App Clicked | MOE_IN_APP_CLICKED | Mobile In-Apps |
        | Mobile In-App Closed | MOE_IN_APP_DISMISSED | Mobile In-Apps |
        | On-site Message Shown | MOE_ONSITE_MESSAGE_SHOWN | On-site Messaging |
        | On-site Message Clicked | MOE_ONSITE_MESSAGE_CLICKED | On-site Messaging |
        | On-site Message Closed | MOE_ONSITE_MESSAGE_DISMISSED | On-site Messaging |
        | User Entered Flow | USER_ENTERED_FLOW | Flows |
        | User Exited Flow | USER_EXITED_FLOW | Flows |
        | User Added to Control Group | MOE_CAMPAIGN_CONTROL_GROUP | All channels |

        * With the events above, the following event attributes will be exported by default:
            * campaign_id
            * campaign_name
            * campaign_type
            * campaign_channel
        * The following event attributes are not supported for export in streams currently:
            * email_subject
            * email_click_url
            * inapp_widget_clicked
            * onsite_message_url_clicked

        For more information on when the campaign events and attributes are tracked, refer to [this article](https://help.moengage.com/hc/en-us/articles/15975781928468).

        # Authentication Methods
        Streams supports the following types of authentications:
        * **No auth**
        * **Basic Auth:** Streams supports the standard Basic Auth implementation. You must provide us with the username and password while configuring Streams. All data related to authentication is always encrypted in our systems.

        To support other authentication methods such as API Key, Bearer Token, and so on, you can communicate the same through the enablement ticket and provide us the Header key and static value to be passed. We will not be able to support dynamically refreshing API keys and tokens.

        # API Request Format
        When Streams sends an event to your API endpoint, the request format will be as described in the request body schema.
          
        **Headers:**
        `"Content-Type":"application/json"`

        # Streams Data Glossary
        > **Information**
        > For the full list of updated events and attributes, refer to [Data Exports Glossary](https://help.moengage.com/hc/en-us/articles/15975781928468-Data-Export-Glossary).

        # Whitelist IPs
        If your endpoints are in a VPC/are not accessible publicly, you must whitelist [these](https://help.moengage.com/hc/en-us/articles/35329024618772-A-Guide-to-MoEngage-IP-Whitelisting-Mechanism#h_01JNGJBH0HCJAVHHP9MZZ8AYWM) MoEngage IPs depending on the region of your Workspace.

        # Limitations
        Please be aware of the following constraints or limitations while integrating Streams with third-party apps.
        * We can send data to only one static endpoint where the access token or link has no expiry. We cannot integrate it on a dynamic endpoint where the access token is refreshed every few hours.
        * We cannot modify the body or key names while streaming the data from MoEngage.
          
        # Syncing Events from One MoEngage App to Another
        With MoEngage Streams, it is possible to sync your events from one MoEngage App to another.

        ## Use Cases
        ### Cross-Product Promotions
        If you have teams across various product offerings, keeping two apps synced can help you cross-promote your products to upsell and increase conversion.

        ### Centralized Analysis
        Businesses with multiple apps can do cross-app analysis to unlock higher LTV, provide opportunities for cross-selling, increase brand loyalty, and many other use cases.

        ## Streaming events to another MoEngage App
        ### Step 1: Get your Streams endpoint for your destination app
        Speak to your Customer Success Manager to get your dedicated Streams endpoint for your destination app.

        ### Step 2: Set up Streams on source App
        Follow [these steps](#01H7YXY47G6F01SR4CZVRYYM31) to enable Streams on your source App. Ensure you provide the right details of your destination app:
        * **Endpoint:** Provide the MoEngage Endpoint provided to you by your Customer Success Manager for your destination app.
        * **Authentication:** Enable Basic Auth for this endpoint. Provide your destination app's Workspace ID as Username and its Data API Key as Password.
        * **Header:** Provide the following headers:
            * `"Content-Type" : "application/json"`
        * The list of events you want to stream to the destination app.
        * The list of user properties you want to stream along with the above events.
          
        Once you have enabed Streams on your source app, the events should start flowing to your destination app.

        # Frequently Asked Questions
        **What is the throughput, average volume, and batch size that can be expected?**
        The throughput and average volume of each API request depends on the volume of selected events captured into MoEngage. The default batch size (number of events for each API request) is 100.

        **What is the retry mechanism of Streams?**
        The retrial mechanism allows MoEngage to hit your provided endpoints in multiple attempts. In case a batch of events fail (anything other than a "2XX" response from the endpoint is considered failed), the entire batch is retried after some time. However, there is a limit assigned to the retrial mechanism. In total, three retry attempts are made with an interval of 30 seconds, 60 seconds, and 120 seconds.

        **If I pause Streams, can I still get the data later?**
        If you pause Streams, data is not collected for exports and hence cannot be replayed at a later date.

        **Does Streams guarantee the latest user attributes?**
        No, Streams is primarily built to export your Events in near real-time and user attributes in MoEngage are updated asynchronously so it is currently not possible to guarantee the latest values of user attributes in the exports.

        **Can I export historical data using Streams?**
        As of now, you cannot export data before configuring Streams. Once configured, you will start seeing data for each event from the time you enabled your exports.
