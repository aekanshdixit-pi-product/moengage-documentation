  /fileimports/trigger/{schedule_id}:
    post:
      tags:
        - File Import
      summary: Trigger File Imports
      description: This API can be used to trigger scheduled file imports. Periodic imports can be triggered to run using this API if the import has not expired and is in any of the following states- Scheduled, Successful, Partially Successful, and Failed.
      x-mint:
        content: |
          The ‘dc’ in the API Endpoint URL refers to the MoEngage Data Center (DC). MoEngage hosts each customer in a different DC. You can find your DC number (value of X) and replace the value of ‘dc’ in the URL by referring to the DC and API endpoint mapping.
          ### Rate Limit
              This API can be triggered once in every five minutes for a specific schedule_id. A Bad request response (400) response will be sent if this is exceeded. 
      parameters:
        - name: schedule_id
          in: path
          required: true
          description: This field specifies the Import ID(the unique identifier for the import) of the import that needs to be triggered. You can find the Import ID in the MoEngage Dashboard on the Imports History page. Click Actions → View import to view the Import Details. You can also view the Import ID in the email notification received once the import has been set up.
          schema:
            type: string
        - name: MOE-APPKEY
          in: header
          required: true
          description: This is your MoEngage account's WORKSPACE ID that has to be passed along with the request.You can find your MoEngage Workspace ID at Settings -> Account -> APIs -> Workspace ID (earlier app id).
          schema:
            type: string    
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: "This field contains the status of the request and specifies whether the request was successful."
                    example: success, failure
                  message:
                    type: string
                    description: This field contains information about whether the request was successful or not.
                    example: Trigger Import Successful 
              examples:
                success_response:
                  summary: Successful request
                  value:
                    status: "success"
                    message: "Triggered Import Successfully"
        '400':
          description: "This response is returned when the Import ID/Schedule ID is missing from the request or when the provided parameters are invalid. Also, this response is returned when the rate limit (one request in five minutes) is breached."
