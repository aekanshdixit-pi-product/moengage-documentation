type: object
required:
  - Identifiers
properties:
  Identifiers:
    type: array
    description: This field is used to specify the identifiers for the users for whom the data needs to be fetched.
    items:
      type: object
      required:
        - identifier_type
        - identifier
      properties:
        identifier_type:
          type: string
          description: This field specifies the identifier type. Identifier types can either be 'customer_id' (ID field in the User Profile) or 'id' (the MoEngageID of the user in the User Profile).
          enum:
            - customer_id
            - id
          example: customer_id
        identifier:
          type: string
          description: This field specifies the unique identifier that identifies the user.
          example: 12345moe
    minItems: 1
    example:
      - identifier_type: customer_id
        identifier: <customer_id>
      - identifier_type: id
        identifier: <MoEngageID>

  user_fields_to_export:
    type: array
    description: This field is used to specify the fields that need to be fetched for the user specified in Identifiers. Tracked standard user attributes and custom attributes can be fetched.
    items:
      type: string
      description: The name of the user attribute/field to export.
    example:
      - first_name
      - last_name
      - mo_user_created_date