openapi: 3.0.3
info:
  title: MoEngage Data APIs
  version: '1.0'
  description: |-
    This is a comprehensive OpenAPI specification for MoEngage's Data APIs, including User, Event, and Device management.
    It's designed to power an interactive API playground on your new documentation site.
tags:
  - name: User
    description: Operations for creating, updating, retrieving, and managing user profiles.
  - name: Event
    description: Operations for tracking user events.
  - name: Device
    description: Operations for managing user devices.
  - name: Tracking
    description: Endpoints for tracking attribution and installs.
  - name: Utilities
    description: Utility endpoints for testing connections.
  - name: File Import
    description: Operations for managing asynchronous file imports.
  - name: Bulk
    description: Operations for importing users and events in bulk.
  - name: Webhooks
    description: Incoming webhook specifications from MoEngage.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1'
    description: MoEngage Core API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, 4, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
  - url: 'https://fileimports-data-api-0{dc}.moengage.com/v1.0/data'
    description: MoEngage File Imports API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, etc.'
        enum:
          - '1'
          - '2'
          - '3'

security:
  - Authentication: []

paths:
  # SECTION 1: USER
  /customer/{Workspace_ID}:
    post:
      tags:
        - User
      summary: Create or Update User
      x-mint:
        content: |
          User API helps add or update users and user properties in MoEngage.
          
          **Use cases:**
          * Create a new user
          * Create new user property
          * Update existing user properties of users

          <Note>
          **Note:**
          * "id", "_id", and "" keywords are blocked and not to be used as user attribute names.
          * You can not use "moe_" as a prefix while naming user attributes. It is a system prefix and using it might result in periodic blacklisting without prior communication.
          </Note>
      description: "Adds new users or updates properties of existing users in MoEngage."
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account. Found in Settings > Account > APIs.'
          schema:
            type: string
            example: VJ0GSMESHMQA3L7WV1EEK3UR
        - name: X-Forwarded-For
          in: header
          required: false
          description: "The 'X-Forwarded-For' header is used to specify the IP address of the client that made the request. This header may be added by proxy servers or load balancers. The header value must contain the IP address of the original client that initiated the request. Multiple IP addresses may be specified in the header value, separated by commas."
          schema:
            type: string
            example: "203.0.113.195"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              simple:
                summary: Simple User Update
                value:
                  type: "customer"
                  customer_id: "john@example.com"
                  attributes:
                    name: "John"
                  platforms:
                    - platform: "ANDROID"
                      active: "true"
              full:
                summary: Full User Update with Custom Attributes
                value:
                  type: "customer"
                  customer_id: "john@example.com"
                  update_existing_only: true
                  attributes:
                    points: 20
                    expiry_date: "2020-05-31T03:47:35Z"
                    super_user: true
                    user_persona: "browsers"
                  platforms:
                    - platform: "ANDROID"
                      active: "true"
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: This response is returned when the required parameters are missing from the request, attributes are not found, and incorrect values are passed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: This response is returned when the request does not have valid authentication credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: This response is returned when your MoEngage account is suspended or blocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '413':
          description: This response is returned when the payload size exceeds 128 KB.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '415':
          description: This response is returned when the content type is not supported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '429':
          description: This response is returned when the number of requests has exceeded the rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '500':
          description: This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customers/export:
    post:
      tags:
        - User
      summary: Get User Details
      description: Fetches user profile data for one or more specified users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetUserRequest'
      responses:
        '200':
          description: Successfully retrieved user data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customer/merge:
    post:
      tags:
        - User
      summary: Merge Users
      description: Merges two user profiles into a single profile.
      parameters:
        - name: app_id
          in: query
          required: true
          description: The Workspace ID of your MoEngage account.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeUserRequest'
      responses:
        '200':
          description: Merge request accepted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  operation:
                    type: string
                    example: created
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customer/delete/bulk:
    post:
      tags:
        - User
      summary: Delete Users in Bulk
      description: Deletes users from MoEngage. Users are permanently deleted after a 24-hour buffer period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUserRequest'
      responses:
        '200':
          description: Delete request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/