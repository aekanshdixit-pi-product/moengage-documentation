openapi: 3.0.3
info:
  title: MoEngage Data APIs
  version: '1.0'
  description: |-
    This is a comprehensive OpenAPI specification for MoEngage's Data APIs, including User, Event, and Device management.
    It's designed to power an interactive API playground on your new documentation site.
tags:
  - name: User
    description: Operations for creating, updating, retrieving, and managing user profiles.
  - name: Event
    description: Operations for tracking user events.
  - name: Device
    description: Operations for managing user devices.
  - name: Tracking
    description: Endpoints for tracking attribution and installs.
  - name: Utilities
    description: Utility endpoints for testing connections.
  - name: File Import
    description: Operations for managing asynchronous file imports.
  - name: Bulk
    description: Operations for importing users and events in bulk.
  - name: Webhooks
    description: Incoming webhook specifications from MoEngage.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1'
    description: MoEngage Core API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, 4, etc.'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
  - url: 'https://fileimports-data-api-0{dc}.moengage.com/v1.0/data'
    description: MoEngage File Imports API Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC). Can be 1, 2, 3, etc.'
        enum:
          - '1'
          - '2'
          - '3'

security:
  - Authentication: []

paths:
  # SECTION 1: USER
  /customer/{Workspace_ID}:
    post:
      tags:
        - User
      summary: Create or Update User
      x-mint:
        content: |
          User API helps add or update users and user properties in MoEngage.
          
          **Use cases:**
          * Create a new user
          * Create new user property
          * Update existing user properties of users

          <Note>
          **Note:**
          * "id", "_id", and "" keywords are blocked and not to be used as user attribute names.
          * You can not use "moe_" as a prefix while naming user attributes. It is a system prefix and using it might result in periodic blacklisting without prior communication.
          </Note>
      description: "Adds new users or updates properties of existing users in MoEngage."
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account. Found in Settings > Account > APIs.'
          schema:
            type: string
            example: VJ0GSMESHMQA3L7WV1EEK3UR
        - name: X-Forwarded-For
          in: header
          required: false
          description: "The 'X-Forwarded-For' header is used to specify the IP address of the client that made the request. This header may be added by proxy servers or load balancers. The header value must contain the IP address of the original client that initiated the request. Multiple IP addresses may be specified in the header value, separated by commas."
          schema:
            type: string
            example: "203.0.113.195"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              simple:
                summary: Simple User Update
                value:
                  type: "customer"
                  customer_id: "john@example.com"
                  attributes:
                    name: "John"
                  platforms:
                    - platform: "ANDROID"
                      active: "true"
              full:
                summary: Full User Update with Custom Attributes
                value:
                  type: "customer"
                  customer_id: "john@example.com"
                  update_existing_only: true
                  attributes:
                    points: 20
                    expiry_date: "2020-05-31T03:47:35Z"
                    super_user: true
                    user_persona: "browsers"
                  platforms:
                    - platform: "ANDROID"
                      active: "true"
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
              examples:
                success_response:
                  summary: Success Response
                  value:
                    status: "success"
                    message: "Your request has been accepted and will be processed soon."
        '400':
          description: "This response is returned when the required parameters APP KEY, user_id, and so on are missing from the request or when the provided params are invalid."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: 'The type or category of the error ("MissingAttributeError").'
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
                      attribute:
                        type: string
                        description: "The attribute in the payload that caused the error."
              examples:
                missing_customer_id:
                  summary: Customer ID is missing in the payload
                  value:
                    status: "fail"
                    error:
                      attribute: "customer_id"
                      message: "customer_id is not found in the payload"
                      type: "MissingAttributeError"
                      request_id: "ZbPXtKFL"
                empty_customer_id:
                  summary: Customer ID is empty
                  value:
                    status: "fail"
                    error:
                      attribute: "customer_id"
                      message: "customer_id can not be empty Unicode String"
                      type: "MissingAttributeError"
                      request_id: "VgjtLxTu"
                array_field_error:
                  summary: Array field error
                  value:
                    status: "fail"
                    error:
                      attribute: "addValueToArrayField"
                      message: "Cannot add and remove 'first_name' at the same time"
                      type: "ArrayFieldError"
                      request_id: "WPDAbugh"
        '401':
          description: This response is returned when the request does not have valid authentication credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: 'The type or category of the error (e.g., Authentication required).'
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
                      attribute:
                        type: string
                        description: "The attribute in the payload that caused the error."
              examples:
                auth_error:
                  summary: Authorization errors
                  value:
                    status: "fail"
                    error:
                      message: "App Secret key mismatch. Please login to the dashboard to verify key"
                      type: "Authentication required"
                      request_id: "PVUDFisO"
                missing_header:
                  summary: Missing authentication header
                  value:
                    status: "fail"
                    error:
                      message: "Authentication Header Required"
                      type: "Authentication required"
                      request_id: "PisPjGQQ"
        '403':
          description: This response is returned when your MoEngage account is suspended or blocked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed.(e.g., Your account is suspended. Please contact MoEngage team.)"
                      type:
                        type: string
                        description: "The type or category of the error (e.g., BlockedClient, Account Suspended, Account Temporarily Suspended)."
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
              examples:
                account_blocked:
                  summary: Account is blocked
                  value:
                    status: "fail"
                    error:
                      message: "Your account is blocked. Please contact MoEngage team."
                      type: "BlockedClient"
                      request_id: "Block123"
                account_suspended:
                  summary: Account is suspended
                  value:
                    status: "fail"
                    error:
                      message: "Your account is suspended. Please contact MoEngage team."
                      type: "Account Suspended"
                      request_id: "Susp123"
                temp_suspended:
                  summary: Account is temporarily suspended
                  value:
                    status: "fail"
                    error:
                      message: "Your account is temporarily suspended due to payment issues."
                      type: "Account Temporarily Suspended"
                      request_id: "TempSusp123"
        '413':
          description: This response is returned when the payload size exceeds 128 KB.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: "The type or category of the error (e.g., Payload too large)."
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
              examples:
                payload_exceeded:
                  summary: Payloads exceeding the size limit
                  value:
                    status: "fail"
                    error:
                      message: "Payload size exceeds 128 KB"
                      type: "PayloadTooLarge"
                      request_id: "PLSize123"
        '415':
          description: This response is returned when the content type is not supported.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: "The type or category of the error (e.g., Unsupported media type)."
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
              examples:
                unsupported_media_type:
                  summary: Unsupported media type
                  value:
                    status: "fail"
                    error:
                      message: "Unsupported Media Type"
                      type: "MediaTypeError"
                      request_id: "MedType123"
        '429':
          description: This response is returned when the number of requests has exceeded the rate limit.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: "The type or category of the error (e.g., Rate Limits Exceeded)."
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
              examples:
                rate_limit:
                  summary: Rate limit breach
                  value:
                    status: "fail"
                    error:
                      message: "Rate limit exceeded"
                      type: "RateLimitError"
                      request_id: "RateLim123"
        '500':
          description: This response is returned when the system runs into an unexpected error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: "The type or category of the error (e.g., Server Error)."
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
              examples:
                unknown_error:
                  summary: Unknown errors
                  value:
                    status: "fail"
                    error:
                      message: "Internal Server Error"
                      type: "ServerError"
                      request_id: "ServErr123"

  /customers/export:
    post:
      tags:
        - User
      summary: Get User Details
      x-mint:
        content: |
          The 'dc' in the API Endpoint URL refers to the MoEngage Data Center (DC). MoEngage hosts each customer in a different DC. You can find your DC number (value of X) and replace the value of 'X' in the URL by referring to the DC and API endpoint mapping.
      description: Fetches user profile data for one or more specified users.
      parameters:
        - name: Workspace_ID
          in: query
          required: true
          description: 'The Workspace ID of your MoEngage account. Found in Settings > Account > APIs.'
          schema:
            type: string
            example: VJ0GSMESHMQA3L7WV1EEK3UR
        - name: X-Forwarded-For
          in: header
          required: false
          description: "The 'X-Forwarded-For' header is used to specify the IP address of the client that made the request. This header may be added by proxy servers or load balancers. The header value must contain the IP address of the original client that initiated the request. Multiple IP addresses may be specified in the header value, separated by commas."
          schema:
            type: string
            example: "203.0.113.195"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetUserRequest'
      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: "This field contains the status of the request and specifies whether the request was successful. Supported values are : \"success\", \"failure\""
                    example: success
                  type:
                    type: string
                    description: "This field denotes the fetch type. Supported values are: \"export_users\"."
                    example: export_users
                  data:
                    type: object
                    description: |
                      This field contains the list of users who were not found in MoEngage and returns the data specified for the list of users who were found in MoEngage.
                      
                      This is the structure:
                      ```json
                      {
                          "users_not_found": [
                              {
                                  "identifier_type": "customer_id",
                                  "identifier": "<customer_id>"
                              }
                          ],
                          "users": [
                              {
                                  "user_attributes": {
                                      "<list of user attributes>"
                              } 
                              }
                          ]
                      }
                      ```
                    properties:
                      users_not_found:
                        type: array
                        description: "An array of JSON Objects that contains the list of users who were not found in MoEngage."
                        items:
                          $ref: '#/components/schemas/IdentifierObject'
                      users:
                        type: array
                        description: "Contains the user_attributes specified in the request for each user in specified in the request."
                        items:
                          type: object
                          properties:
                            user_attributes:
                              type: object
                              additionalProperties: true
                              example:
                                last_name: Doe
                                customer_id: john_doe
                                id: 62e79fb15ada55x123g987bu
              examples:
                success_response:
                  summary: Success Response
                  value:
                    status: "success"
                    type: "export_users"
                    data:
                      users_not_found:
                        - identifier_type: "customer_id"
                          identifier: "john_doe"
                      users:
                        - user_attributes:
                            last_name: "Doe"
                            customer_id: "john_doe"
                            name: "John"
                            custom_user_attr: 12345
                            id: "62e79fb15ada55x123g987bu"
        '400':
          description: "This response is returned when the required parameters APP KEY, user_id, and so on are missing from the request or when the provided params are invalid."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: "The type or category of the error (\"MissingAttributeError, Malformed JSON, LimitBreached\")."
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
                      attribute:
                        type: string
                        description: "The attribute in the payload that caused the error."
              examples:
                missing_identifiers:
                  summary: Identifiers are missing in the request
                  value:
                    status: "fail"
                    error:
                      attribute: "identifiers"
                      message: "identifiers is not found in the payload"
                      type: "MissingAttributeError"
                      request_id: "UkBwaUmU"
                data_missing:
                  summary: Data is missing in the request
                  value:
                    status: "fail"
                    error:
                      attribute: "data"
                      message: "data is not found in the payload"
                      type: "MissingAttributeError"
                      request_id: "zAsmTigV"
                incorrect_json:
                  summary: JSON is incorrect in the request
                  value:
                    status: "fail"
                    error:
                      message: "Could not decode the request body. The JSON was incorrect or not encoded as UTF-8."
                      type: "Malformed JSON"
                      request_id: "NphDCzWk"
                limit_exceeded:
                  summary: Users exceeds the allowed limit in the request
                  value:
                    status: "fail"
                    error:
                      attribute: "payload.users"
                      message: "max limit allowed is 20"
                      type: "LimitBreached"
                      request_id: "IYQXyWTP"
        '401':
          description: This response is returned when the authorization fails due to incorrect values for the APP KEY/ HTTP Auth Header..
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        description: "A descriptive error message explaining why the request failed."
                      type:
                        type: string
                        description: 'The type or category of the error (e.g., Authentication required).'
                      request_id:
                        type: string
                        description: "A unique identifier for the request, useful for debugging."
                      attribute:
                        type: string
                        description: "The attribute in the payload that caused the error."
              examples:
                auth_error:
                  summary: Authorization errors
                  value:
                    status: "fail"
                    error:
                      message: "App Secret key mismatch. Please login to the dashboard to verify key"
                      type: "Authentication required"
                      request_id: "PVUDFisO"
                missing_header:
                  summary: Missing authentication header
                  value:
                    status: "fail"
                    error:
                      message: "Authentication Header Required"
                      type: "Authentication required"
                      request_id: "PisPjGQQ"

  /customer/merge:
    post:
      tags:
        - User
      summary: Merge Users
      description: Merges two user profiles into a single profile.
      parameters:
        - name: app_id
          in: query
          required: true
          description: The Workspace ID of your MoEngage account.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeUserRequest'
      responses:
        '200':
          description: Merge request accepted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  operation:
                    type: string
                    example: created
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /customer/delete/bulk:
    post:
      tags:
        - User
      summary: Delete Users in Bulk
      description: Deletes users from MoEngage. Users are permanently deleted after a 24-hour buffer period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUserRequest'
      responses:
        '200':
          description: Delete request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  # SECTION 2: EVENT
  /event/{Workspace_ID}:
    post:
      tags:
        - Event
      summary: Create Event
      description: Tracks actions performed by a user.
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: The Workspace ID for your MoEngage account.
          schema:
            type: string
            example: OAPQQ2AMD01MJZYZX1YPG
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  # SECTION 3: DEVICE
  /device/{appId}:
    post:
      tags:
        - Device
      summary: Create or Update Device
      description: Adds a new device for an existing user or updates the properties of an existing device.
      parameters:
        - name: appId
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /devices/manage:
    post:
      tags:
        - Device
      summary: Block or Unblock Device (Opt-out)
      description: Blocks or unblocks specific devices from receiving push notifications.
      parameters:
        - name: app_id
          in: query
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceOptOutRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  # SECTION 4: TRACKING
  /installInfo:
    get:
      tags:
        - Tracking
      summary: Track App Install
      description: Provides MoEngage with install attribution data.
      security: []
      parameters:
        - name: publisher_name
          in: query
          schema:
            type: string
          description: Publisher name of the install.
        - name: campaign_name
          in: query
          schema:
            type: string
          description: Campaign name of the install.
        - name: src
          in: query
          schema:
            type: string
          description: Partner name.
        - name: appId
          in: query
          required: true
          schema:
            type: string
          description: Workspace ID of your MoEngage account.
        - name: advertising_id
          in: query
          schema:
            type: string
          description: Google Advertising ID (GAID) of the device (Android only).
        - name: idfv
          in: query
          schema:
            type: string
          description: Identifier for Vendors (IDFV) of the iOS device (iOS only).
        - name: appAttributionKey
          in: query
          required: true
          schema:
            type: string
          description: Found on the MoEngage dashboard under Settings > Analytics > Acquisition Tracking.
      responses:
        '200':
          description: Install information received.
        '400':
          description: Bad request, missing required parameters.

  # SECTION 5: UTILITIES
  /integrations/authentication:
    post:
      tags:
        - Utilities
      summary: Test API Connection
      description: Validates if the provided MoEngage endpoint details (Workspace ID, Data Key) are correct and accessible.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestConnectionRequest'
      responses:
        '200':
          description: Authentication successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  app_name:
                    type: string
                    example: PI-Prod-DC01
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  # SECTION 6: FILE IMPORT
  /fileimports/trigger/{import_id}:
    post:
      tags:
        - File Import
      summary: Trigger a File Import
      description: Triggers a pre-configured, on-demand file import job.
      parameters:
        - name: import_id
          in: path
          required: true
          description: The unique ID of the import schedule to trigger.
          schema:
            type: string
      responses:
        '200':
          description: Trigger request successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /fileimports/import/run/history:
    post:
      tags:
        - File Import
      summary: Get File Import Status
      description: Fetches the processing status of files for a specific import job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileImportStatusRequest'
      responses:
        '200':
          description: Successfully retrieved import history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileImportStatusResponse'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  # SECTION 7: BULK
  /transition/{Workspace_ID}:
    post:
      tags:
        - Bulk
      summary: Bulk Import Users and Events
      description: 'Send multiple user, device, and event updates in a single API request. Max payload size: 100 kB.'
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: 'The Workspace ID of your MoEngage account.'
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkImportRequest'
      responses:
        '200':
          description: Request accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  # SECTION 8: WEBHOOKS
  /webhooks/moengage-streams:
    post:
      tags:
        - Webhooks
      summary: MoEngage Streams Webhook
      description: |-
        This endpoint represents the incoming webhook from MoEngage Streams.
        Your server should be configured to accept POST requests with this payload format at your specified endpoint URL.
        This is not an API you call, but an event you receive from MoEngage.
      security: []
      requestBody:
        description: Payload sent from MoEngage Streams when an event occurs.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamsWebhookPayload'
      responses:
        '200':
          description: OK. Acknowledges successful receipt of the event data.
        '202':
          description: Accepted for processing.
        '204':
          description: No Content. Successful receipt acknowledged.

components:
  securitySchemes:
    Authentication:
      type: http
      scheme: basic
      description: |
        This authentication parameter, used for access control, must be passed along with the request. The API request will be authenticated through Basic Authentication. Basic Authentication sends a Base64-encoded string containing your username and password with every API request. It encodes a 'username:password' string in Base64 and appends the encoded string with 'Basic '. This string is included in the authorization header as shown below:

        `{"Authorization: Basic Base64_ENCODED_WORKSPACEID_APIKEY=="}`

        The username and password details can be obtained from the MoEngage Dashboard. If you're using the API for the first time, follow these steps:
        1. Navigate to **Settings -> Account -> APIs**.
        2. Copy the following details:
           * **Username:** Under Workspace ID (earlier app id), click the copy icon to copy the username.
           * **Password:** In the **API keys** section, click the copy icon in the **Data** tile to copy the API key.

        Use these details to authenticate the API requests.

  schemas:
    GenericSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Your request has been accepted and will be processed soon.

    GenericError:
      type: object
      properties:
        status:
          type: string
          example: fail
        error:
          type: object
          properties:
            message:
              type: string
              description: "A descriptive error message explaining why the request failed."
            type:
              type: string
              description: "The type or category of the error (e.g., MissingAttributeError)."
            request_id:
              type: string
              description: "A unique identifier for the request, useful for debugging."
            attribute:
              type: string
              description: "The attribute in the payload that caused the error."

    PlatformObject:
      type: object
      properties:
        platform:
          type: string
          enum: [ANDROID, iOS, web]
        active:
          type: string
          enum: ["true", "false"]

    UserAttributes:
      type: object
      description: |
        A dictionary containing user attributes to add / update in the user profile.
        For example, to track custom attributes of different data types like string, numeric, boolean, and date, pass the following payload where points are a number, expiry_date is a date type attribute, and super_user is a boolean attribute.

        > **Note:**
        > * "id", "_id", and "" keywords are blocked and not to be used as user attribute names.
        > * You can not use "moe_" as a prefix while naming user attributes. It is a system prefix and using it might result in periodic blacklisting without prior communication.
      properties:
        u_n:
          type: string
          description: Full name of the user.
        u_fn:
          type: string
          description: First name of the user.
        u_ln:
          type: string
          description: Last name of the user.
        u_gd:
          type: string
          description: Gender of the user.
        u_em:
          type: string
          format: email
          description: Email Address of the user (Standard).
        u_mb:
          type: string
          description: Mobile Number of the user (Standard). Example `918888444411`.
        uid:
          type: string
          description: 'A unique ID set by the client for a user.'
        u_bd:
          type: string
          format: date-time
          description: 'Birthdate of the user in ISO 8601 format (e.g., 2019-05-21T03:47:35Z).'
        moe_wa_subscription:
          type: boolean
          description: WhatsApp subscription status of a user.
      additionalProperties: true
      example:
        name: John
        points: 20
        expiry_date: '2020-05-31T03:47:35Z'
        super_user: true
        user_persona: browsers

    CreateUserRequest:
      type: object
      required:
        - type
        - customer_id
      properties:
        type:
          type: string
          description: 'Identifies the type of request. Must be "customer".'
          enum: [customer]
        customer_id:
          type: string
          description: 'Unique identifier for the user. Not mandatory in [Identity Resolution](https://help.moengage.com/hc/en-us/articles/360060565292) enabled workspaces.'
        update_existing_only:
          type: boolean
          default: false
          description: |
            This field should be passed in the request when only existing users in MoEngage should be updated.

            **If this value is passed as true:**
            1. Only those users for whom the customer_id from the request payload matches the customer identifier in MoEngage will be updated.
            2. In case of new users (customer_id in the payload does not match any of the existing customer ids in your MoEngage account), they will not be created.

            **If this value is passed as false:**
            1. The user attributes will be updated with the values present in the payload for existing customers.
            2. In case of new users (customer_id in the payload does not match any of the existing customer ids in your MoEngage account), a new customer will be created in the system with the details specified in the payload.
        attributes:
          $ref: '#/components/schemas/UserAttributes'
        platforms:
          type: array
          description: "List of dictionaries with the associated platforms out of ANDROID, iOS, and web and their status."
          items:
            $ref: '#/components/schemas/PlatformObject'

    IdentifierObject:
      type: object
      properties:
        identifier_type:
          type: string
          enum: [customer_id, id]
          description: This field specifies the identifier type. Identifier types can either be customer_id (ID field in the User Profile) or id (the MoEngageID of the user in the User Profile).
          example: customer_id
        identifier:
          type: string
          description: This field specifies the unique identifier that identifies the user.
          example: 12345moe

    GetUserRequest:
      type: object
      properties:
        identifiers:
          type: array
          description: This field is used to specify the identifiers for the users for whom the data needs to be fetched.
          items:
            $ref: '#/components/schemas/IdentifierObject'
        user_fields_to_export:
          type: array
          items:
            type: string
          description: This field is used to specify the fields that need to be fetched for the user specified in Identifiers. Tracked standard user attributes and custom attributes can be fetched using this API. For the list of tracked standard attributes in MoEngage, refer to [User Attributes](#user-attributes).
          example: ["last_name", "customer_id", "name"]

    GetUserResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        type:
          type: string
          example: export_users
        data:
          type: object
          properties:
            users_not_found:
              type: array
              items:
                $ref: '#/components/schemas/IdentifierObject'
            users:
              type: array
              items:
                type: object
                properties:
                  user_attributes:
                    type: object
                    additionalProperties: true
                    example:
                      last_name: Doe
                      customer_id: john_doe
                      id: 62e79fb15ada55x123g987bu

    MergeUserRequest:
      type: object
      properties:
        merge_data:
          type: array
          description: A list of user pairs to merge.
          items:
            type: object
            properties:
              merged_user:
                type: string
                description: The user ID to be merged and then deleted.
              retained_user:
                type: string
                description: The user ID that will remain and absorb the merged user's data.

    DeleteUserRequest:
      type: object
      description: 'Request body to delete users. Based on the Get User API structure.'
      properties:
        identifiers:
          type: array
          description: Array of user identifiers to delete.
          items:
            $ref: '#/components/schemas/IdentifierObject'

    EventAction:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          description: The name of the event to be tracked.
        attributes:
          type: object
          additionalProperties: true
          description: A dictionary of key-value pairs associated with the event.
          example:
            price: 3999
            departure_date: '2019-05-21T03:47:35Z'
            premium_seat: true
        platform:
          type: string
          enum: [ANDROID, iOS, web, unknown]
          description: The platform on which the event occurred.
        app_version:
          type: string
          description: The version of the app where the event originated.
        user_time:
          oneOf:
            - type: number
            - type: string
          description: Local time of the event (Epoch seconds or ISO 8601 string).
        current_time:
          oneOf:
            - type: number
            - type: string
          description: UTC time of the event (Epoch seconds or ISO 8601 string).
        user_timezone_offset:
          type: number
          description: 'Timezone offset from UTC in seconds (e.g., IST is 19800).'

    CreateEventRequest:
      type: object
      required:
        - type
        - customer_id
        - actions
      properties:
        type:
          type: string
          description: 'Identifies the type of request. Must be "event".'
          enum: [event]
        customer_id:
          type: string
          description: 'Identifier for the user performing the event.'
        device_id:
          type: string
          description: 'Optional device identifier. Defaults to customer_id if not provided.'
        user_identifiers:
          type: object
          description: 'Required if Identity Resolution is enabled and customer_id is not provided.'
          additionalProperties: true
          example:
            moe_mobile: "+919876543210"
        actions:
          type: array
          items:
            $ref: '#/components/schemas/EventAction'

    DeviceAttributes:
      type: object
      required:
        - platform
        - push_id
      properties:
        model:
          type: string
          description: The model of the device.
        platform:
          type: string
          enum: [ANDROID, iOS, web, TV]
          description: The platform of the device.
        push_id:
          type: string
          description: The push token of the device.
        moe_push_opted:
          type: string
          enum: ["True", "False"]
          description: Push opt-in status.
        app_version:
          type: string
          description: Version of the app on the device.
        os_version:
          type: string
          description: The device's operating system version.
        moe_gaid:
          type: string
          description: Google Advertising ID for Android devices.
        idfv:
          type: string
          description: Identifier for Vendors for iOS devices.

    CreateDeviceRequest:
      type: object
      required:
        - type
        - customer_id
        - device_id
        - attributes
      properties:
        type:
          type: string
          enum: [device]
        customer_id:
          type: string
          description: 'The unique identifier for the user who owns the device.'
        device_id:
          type: string
          description: 'A unique identifier for the device itself.'
        attributes:
          $ref: '#/components/schemas/DeviceAttributes'

    DeviceOptOutRequest:
      type: object
      required:
        - user_identifier_type
        - user_identifier_value
        - action_type
      properties:
        user_identifier_type:
          type: string
          description: The type of user identifier (e.g., 'customer_id').
        user_identifier_value:
          type: string
          description: The value of the user identifier.
        action_type:
          type: string
          enum: [block, unblock]
          description: Whether to block or unblock the device(s).
        reason:
          type: string
          description: Optional reason for the action.
        client_reference_id:
          type: string
          description: Optional client-side reference ID.
        device_identifiers:
          type: array
          description: 'Array of device identifiers to target. If omitted, all user devices are affected.'
          items:
            type: object
            properties:
              GAID: { type: string }
              IDFV: { type: string }
              unique_id: { type: string }
              device_unique_id: { type: string }
              push_id: { type: string }

    TestConnectionRequest:
      type: object
      required:
        - app_id
        - app_secret
        - source
        - region
      properties:
        app_id:
          type: string
          description: 'Your MoEngage Workspace ID.'
        app_secret:
          type: string
          description: 'Your MoEngage Data API Key.'
        source:
          type: string
          description: 'The tool from where you are sending the request.'
          example: test
        region:
          type: string
          description: 'Your MoEngage region (e.g., "01" for DC-01).'
          example: "01"

    FileImportStatusRequest:
      type: object
      properties:
        import_id:
          type: string
          description: 'The unique ID of the import job. Takes precedence over import_name if both are provided.'
        import_name:
          type: string
          description: 'The name of the import job.'
        date:
          type: object
          properties:
            start_date: { type: string, format: date-time }
            end_date: { type: string, format: date-time }
        file_status:
          type: array
          items:
            type: string
            enum: [SUCCESSFUL, FAILED, PARTIAL_SUCCESS, PROCESSING, QUEUED, WAITING]
        offset:
          type: integer
          description: 'Pagination offset. Each page returns 50 results.'
          default: 1

    FileImportStatusResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        total_count:
          type: integer
          example: 1
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              file_name: { type: string }
              scheduled_at: { type: string, format: date-time }
              completed_at: { type: string, format: date-time }
              type: { type: string, enum: [USERS, EVENTS, AUX_DATA] }
              file_size: { type: string }
              file_status: { type: string }
              total_rows: { type: integer }
              updated_rows: { type: integer }
              failed_rows: { type: integer }
        offset:
          type: integer
        more_files:
          type: boolean

    BulkImportRequest:
      type: object
      required:
        - type
        - elements
      properties:
        type:
          type: string
          enum: [transition]
        elements:
          type: array
          description: A list of customer, device, or event data points.
          items:
            oneOf:
              - $ref: '#/components/schemas/CreateUserRequest'
              - $ref: '#/components/schemas/CreateEventRequest'
              - $ref: '#/components/schemas/CreateDeviceRequest'

    StreamsWebhookPayload:
      type: object
      properties:
        app_name: { type: string }
        source: { type: string, example: "MOENGAGE" }
        moe_request_id: { type: string, format: uuid }
        events:
          type: array
          items:
            type: object
            properties:
              event_name: { type: string }
              event_code: { type: string }
              event_uuid: { type: string, format: uuid }
              event_time: { type: integer, format: int64, description: "Epoch time in seconds" }
              event_type: { type: string, enum: [CAMPAIGN_EVENT, USER_ACTION_EVENT] }
              event_source: { type: string, example: "MOENGAGE" }
              uid: { type: string, description: "MoEngage customer_id" }
              event_attributes:
                type: object
                additionalProperties: true
              user_attributes:
                type: object
                additionalProperties: true
              device_attributes:
                type: object
                additionalProperties: true