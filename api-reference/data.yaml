  # SECTION 7: BULK
  /transition/{Workspace_ID}:
    post:
      tags:
        - Bulk
      summary: Bulk Import Users and Events
      description: 'Use the Bulk Import API to send, to MoEngage, in batch multiple user and event requests using a single API request. You can send a batch request of a maximum of 100 kB in a single API call.'
      x-mint:
       content: |
          The ‘dc’ in the API Endpoint URL refers to the MoEngage Data Center (DC). MoEngage hosts each customer in a different DC. You can find your DC number (value of X) and replace the value of ‘dc’ in the URL by referring to the DC and API endpoint mapping.
          <Note>
          
          All bulk API requests return a 200 response code. Debugging should be done on the user profile on the dashboard.
            
          </Note>
          ### Example Payload
            A sample API request is as follows:

              ```json
                 {
                  "type": "transition",
                  "elements": [
                                 {
                              "type": "customer",
                              "customer_id": "john@example.com",
                              "attributes": {
                                     "name": "John",
                                     "platforms": [
                                                    {
                                                "platform": "ANDROID",
                                                "active": "true"
                                                }
                                               ]
                                             }
                                    },
                                   {
                              "type": "event",
                              "customer_id": "john@example.com",
                              "device_id": "96bd03b6-defc-4203-83d3-dc1c73080232",
                                  "actions": [
                                               {
                                      "action": "Added to Cart",
                                      "attributes": {
                                                "product": "Mobile",
                                                "color": "white",
                                                "Brand": "Apple"
                                                },
                                      "platform": "iOS",
                                      "app_version": "1.2.3",
                                      "current_time": "2020-05-31T16:33:35Z",
                                      "user_timezone_offset": 19800
                                                },
                                          {
                                      "action": "Purchase",
                                      "attributes": {
                                          "product": "MacBook Air",
                                           "Brand": "Apple"
                                             },
                                      "platform": "iOS",
                                      "app_version": "1.2.3",
                                      "current_time": 1590404615,
                                      "user_timezone_offset": 19800
                                           }
                                         ]
                                        }
                                       ]
                                     } 
                                     ```
          ### Array Support
             If you want to pass an attribute in an array, the appropriate syntax for that is:
          ```json
               "Array_attributeName":["abc","123"],
          ```
          The sample cURL for adding and removing elements in an array is:
          ```bash
           curl --location '[https://api-0X.moengage.com/v1/transition/](https://api-0X.moengage.com/v1/transition/)<Workspace_ID>' \
          --header 'Content-Type: application/json' \
          --header  "Authorization": "Basic Base64_ENCODED_APPKEY_APIKEY"}  \
          --data '{
             "type": "transition",
             "elements": [
                          {
            "type": "customer",
            "customer_id": "OTBoS",
            "attributes": {
                "name": "wtmNx",
                "first_name": "bt016",
                "last_name": "JPCUi",
                "Array_attribute":["one","two"],
                "platforms": [
                    {
                        "platform": "iOS",
                        "active": "true"
                    }
                ]
            }
          },
          {
            "type": "device",
            "customer_id": "OTBoS",
            "device_id": "OTBoS",
            "attributes": {
                "brand": "Mi",
                "platform": "Windows",
                "push_id": "pushid1186"
            }
          },
          {
            "type": "event",
            "customer_id": "OTBoS",
            "actions": [
                {
                    "action": "mOhrP",
                    "attributes": {
                        "product": "Shoe"
                    },
                    "platform": "Windows",
                    "app_version": "581",
                    "user_time": "1712568861457",
                    "current_time": "1712568861457"
                }
            ]
          }
          ]
          }'
          ```
          ### User Identity Resolution
             In MoEngage, data ingestion uses an ID to create or update a user. For workspaces in MoEngage with [Identity Resolution](https://help.moengage.com/hc/en-us/articles/24050999467284-Unified-Identity-Identity-Resolution) enabled,  Bulk Import API can be used to create or update users using a specific identifier, such as a mobile number or email ID, these identifiers need to be enabled for the workspace in Identity Resolution dashboard.
          You can: 
          
          * Create users through Server-to-Server Data APIs even when they do not have an ID (but have other identifiers).
          * Create a user or track events of a user when identifiers other than ID (for example, email ID or phone number) are known.
          ### Types of Payload in Request Body
              The sample cURL request for a Bulk Import API consisting of the following payloads: 
          * User payload:  Attribute parameters must contain at least one of the identifiers you have configured based on which users in MoEngage will be created, updated, or merged.
          * Event payload: Identifiers set up in the workspace must be mentioned within the _user_identifiers_ parameter, as shown in the below example where _moe_mobile_ is one of the identifiers in the workspace:
          ```json
          "user_identifiers":{
          "moe_mobile":"{{Mobile_Number}}"
          }
          ```
          The following Bulk Import API consists of payloads for users and events:
           
          ```json
            curl --location 'https://api-xx.moengage.com/v1/transition?app_id=O7NIHY0AT1K1FL8DR1J1' \
          --header 'Content-Type: application/json' \
          --header 'Authorization: Basic {{Authorization_Key}}' \
          --data '{
          "type": "transition",
          "elements": [
          {
          "type": "customer",
          "attributes": {
            "moe_mobile": "{{Mobile_Number}}",
            "first_name": "John"
          }
          },
          {
          "type": "event",
          "user_identifiers": {
            "moe_mobile": "{{Mobile_Number}}"
          },
          "actions": [
          {
            "action": "AddToCart",
            "attributes": {
              "product": "MacBook Air",
              "Brand": "Apple"
                }
              }
             ]
            }
           ]
          }'
          ```
      parameters:
        - name: Workspace_ID
          in: path
          required: true
          description: This is the Workspace ID of your MoEngage account that has to be passed along with the request. You can find your MoEngage Workspace ID at Settings > Account > APIs > Workspace ID (earlier app id).''
          schema:
            type: string
        - name: X-Forwarded-For
          in: header
          required: false
          description: "The 'X-Forwarded-For' header is used to specify the IP address of the client that made the request. This header may be added by proxy servers or load balancers. The header value must contain the IP address of the original client that initiated the request. Multiple IP addresses may be specified in the header value, separated by commas."
          schema:
            type: string
            example: "203.0.113.195"    
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkImportRequest'
            examples:
