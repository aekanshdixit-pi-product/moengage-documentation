  /coupon-list/{coupon_list_id}/files/{file_id}:
    get:
# ... (GET operation unchanged)
    delete:
      tags:
        - Coupon Files
      summary: Delete Coupon File
      operationId: deleteCouponFile
      description: |
        Removes a specific coupon file from a coupon list. This is useful in scenarios where a test file or an incorrect file is inadvertently uploaded, thereby ensuring the accuracy and effectiveness of your coupon list management.
      x-mint:
        content: |
          <Note>
            There is no request body or content to send for this request except for headers.
          </Note>
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
        - name: file_id
          in: path
          required: true
          description: The unique identifier for the coupon file within the list (Note: the path uses {{coupon_file_id}} in some places).
          schema:
            type: string
      responses:
        '204':
          description: The request is successful, and the coupon file is deleted. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Too Many Requests (429). Rate limit exceeded.
          headers:
            x-ratelimit-limit:
              schema: { type: integer }
              description: The maximum number of requests that the consumer is permitted to make in a given time window.
            x-ratelimit-remaining:
              schema: { type: integer }
              description: The number of requests remaining in the current rate limit window.
            x-ratelimit-reset:
              schema: { type: integer }
              description: The time at which the current rate limit window resets in UTC epoch seconds.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: "too-many-requests"
                  message: "Rate limit exceeded."
        '500':
          $ref: '#/components/responses/InternalServerError'
