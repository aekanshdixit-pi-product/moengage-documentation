components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: 'Uses **Workspace ID** as username and **API Key** as password.'
  parameters:
    AppKeyHeader:
      name: MOE-APPKEY
      in: header
      required: true
      description: |
        This is the workspace ID (earlier APP ID) of your MoEngage workspace. The MOE-APPKEY has to be passed in the request. You can find your MoEngage Workspace ID in the MoEngage Dashboard: **Settings** -> **Account** -> **APIs** -> **Workspace ID (earlier app id)**.
      schema:
        type: string
    CouponListIdPath:
      name: coupon_list_id
      in: path
      required: true
      description: The unique identifier for the coupon list.
      schema:
        type: string
    CouponFileIdPath:
      name: coupon_file_id
      in: path
      required: true
      description: The unique identifier for the coupon file.
      schema:
        type: string
  schemas:
    AlertConditions:
      type: object
      properties:
        success_alert: { type: boolean }
        failure_alert: { type: boolean }
        coupon_shortage_alert:
          type: object
          properties: { alert: { type: boolean }, threshold_count: { type: integer } }
        expiry_alert:
          type: object
          properties: { alert: { type: boolean }, days_before: { type: integer } }
    CreateCouponListRequest:
      type: object
      required: [name, label, expires_at, created_by]
      properties:
        name:
          type: string
          description: This field consists of the coupon list's unique name.
        label:
          type: string
          description: This field consists of the label name for the coupon list.
        expires_at:
          type: string
          format: date
          description: This field consists of the date the coupon list expires in yyyy-mm-dd format.
        email_alert_subscribers:
          type: array
          items: { type: string, format: email }
          description: This field consists of the email address of the coupon list subscriber. The subscriber will receive all the alerts on the coupon list in the email provided in this field.
        created_by:
          type: string
          description: This field consists of the user name who requests to create the coupon list.
        alert_conditions:
          $ref: '#/components/schemas/AlertConditions'
          description: |
            This object contains the details and types of alert conditions listed below:
            * success_alert (boolean)
            * failure_alert (boolean)
            * coupon_shortage_alert
                * alert (boolean)
                * threshold_count (integer)
            * expiry_alert
                * alert (boolean)
                * days_before (integer)
    UpdateCouponListRequest:
      type: object
      properties:
        name: { type: string }
        expires_at: { type: string, format: date }
        email_alert_subscribers: { type: array, items: { type: string, format: email } }
        alert_conditions: { $ref: '#/components/schemas/AlertConditions' }
    CouponList:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        label: { type: string }
        expires_at: { type: string, format: date-time }
        status: { type: string, enum: [ACTIVE, EXPIRED, ARCHIVED] }
        total_coupons: { type: integer }
        available_coupons: { type: integer }
    UploadCouponFileRequest:
      type: object
      required: [file_url]
      properties:
        name: { type: string }
        file_url: { type: string, format: url }
        file_url_auth_username: { type: string }
        file_url_auth_password: { type: string }
        created_by: { type: string }
        callback_url: { type: string, format: url }
    CouponFile:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        status: { type: string }
        added_coupons: { type: integer }
        file_url: { type: string }
    FetchCouponFilesResponseItem:
      type: object
      description: Representation of a coupon file in the response.
      properties:
        coupon_list_id:
          type: string
          description: This field contains the coupon list ID from which you fetched the coupon files.
        name:
          type: string
          description: This field contains the coupon file name.
        status:
          type: string
          description: |
            This field shows one of the following statuses of the fetched coupon files:
            * PENDING
        file_url:
          type: string
          description: This field consists of the file path of the coupon list.
        created_at:
          type: string
          description: This field consists of the date and time the coupon file was created.
        updated_at:
          type: string
          description: This field consists of the date and time of the most recent update to the coupon file.
        created_by:
          type: string
          description: This field consists of the name of the subscriber who uploaded the coupon file.
        _id:
          type: string
          description: This field contains the unique ID corresponding to a successful coupon file fetch request. This ID is also used to update and archive coupon files from the coupon list.
        added_coupons:
          type: integer
          description: This field consists of the available number of coupons added to the coupon list.
        callback_url:
          type: string
          description: This field consists of the callback URL.
    Error:
      type: object
      properties:
        code:
          type: string
          description: Each error codes are unique and serve as a shorthand representation for the type of error, providing a quick reference that can be used to diagnose, troubleshoot, and address the problem based on a predefined set of error conditions.
        message:
          type: string
          description: Along with the error code, a detailed message is also provided in the response, describing the specifics of the request failure and the nature of the error.
    ErrorResponse:
      type: object
      properties:
        error: { $ref: '#/components/schemas/Error' }
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "bad-request"
              message: "Possible issues include duplicates, such as coupon list names, invalid data types, or missing mandatory attributes."
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "request-unauthenticated"
              message: "Your request is unauthorized. Verify your credentials and try again."
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "request-forbidden"
              message: "Your account does not have access to the Coupon Management features. Contact the MoEngage team for further assistance."
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "not-found"
              message: "The requested resource was not found."
    TooManyRequests:
      description: |
        The following headers are returned in case of rate-limit breach:
        * `x-ratelimit-limit` (integer) - The maximum number of requests that the consumer is permitted to make in a given time window.
        * `x-ratelimit-remaining` (integer) - The number of requests remaining in the current rate limit window.
        * `x-ratelimit-reset` (integer) - The time at which the current rate limit window resets in UTC epoch seconds.
          See HTTP Headers for rate limit details.
        
      headers:
        x-ratelimit-limit:
          schema:
            type: integer
          description: The maximum number of requests that the consumer is permitted to make in a given time window.
        x-ratelimit-remaining:
          schema:
            type: integer
          description: The number of requests remaining in the current rate limit window.
        x-ratelimit-reset:
          schema:
            type: integer
          description: The time at which the current rate limit window resets in UTC epoch seconds.
      content:
        application/json:
          schema:
            type: object
            # Removed the descriptive text from the schema description to clean up the bottom of the right panel
          examples:
            headers_only:
              summary: Rate Limit Exceeded (No Body)
              value: |
                   No response body is returned for this status code.
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unexpected-error"
              message: "Something went wrong with your request. Contact the MoEngage team for further assistance."
security:
  - basicAuth: []