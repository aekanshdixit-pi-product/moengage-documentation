  /coupon-list/{coupon_list_id}/archive:
    put:
      tags:
        - Coupon Lists
      summary: Archive a Coupon List
      operationId: archiveCouponList
      description: |
        This API transitions an active coupon list to an archived status. Upon archival, the coupon codes within the list are deleted. Consequently, any campaigns that were previously dependent on this list will no longer be able to utilize the dynamic coupon allocation.
      x-mint:
        content: |
          <Note>
            **Information**
            
            Verify the usage of a given coupon list in active or planned campaigns before archiving it.
          </Note>

          ### Rate Limit
          You can archive 100 coupon lists per day.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      responses:
        '204':
          description: |
            Success (No content)
            The request is successful, and the coupon list is archived.
        '400':
          description: |
            Bad request
            Possible issues include duplicates, such as coupon list names, invalid data types, or missing mandatory attributes. For more information, refer to Error Messages.
          content:
