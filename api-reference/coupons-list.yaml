openapi: 3.0.3
info:
  title: MoEngage Coupon List API
  description: |
    API for managing coupon lists within the MoEngage system. This includes creating, fetching, updating, activating, archiving lists, uploading coupon files, managing files, and generating usage reports.
    Authentication is via Basic Auth using your **Workspace ID** as username and an **API Key** as password.
  version: '1.0'
servers:
  - url: 'https://api-{dc}.moengage.com/v1'
    description: The MoEngage Coupon Management API endpoint. Replace {dc} with your data center number.
    variables:
      dc:
        default: '01'
        description: 'The data center number for your account (e.g., 01, 02, 03). Find this on the Data Centers and API Endpoint mapping page.'
tags:
  - name: Coupon Lists
    description: Operations related to defining, managing status (active/archive), and modifying coupon list metadata.
  - name: Coupon Files
    description: Operations related to uploading coupon codes via files and checking/managing file processing status.
  - name: Reports
    description: Operations related to generating usage reports for coupon lists.
paths:
  /coupon-list:
    post:
      tags:
        - Coupon Lists
      summary: Create Coupon List
      operationId: createCouponList
      description: |
        Creates a new, organized coupon list definition to hold unique, single-use coupon codes within the system. Coupons must be added separately using the Upload Coupons via File URL API.
      x-mint:
        content: |
          <Note>
            This API creates the coupon list with basic specifications only. The coupons should be added using the **Upload Coupons via File URL API** to this coupon list before utilizing it in campaigns.
          </Note>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCouponListRequest'
            example:
              name: "signup_coupons_2024"
              label: "Signup Coupons 2024"
              created_by: "api_user@example.com"
              email_alert_subscribers: ["ops@example.com"]
              expires_at: "2024-12-31"
              alert_conditions:
                success_alert: true
                failure_alert: true
                expiry_alert:
                  alert: true
                  days_before: 7
                coupon_shortage_alert:
                  alert: true
                  threshold_count: 100
      responses:
        '201':
          description: Coupon list creation request accepted successfully. The list status will be **ACTIVE**.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Coupon Lists
      summary: Fetch All Coupon Lists
      operationId: fetchAllCouponLists
      description: |
        Retrieves all coupon lists in the workspace, optionally filtered by status (ACTIVE, ARCHIVED, EXPIRED). 
        If no status is specified, this API returns all existing coupon lists together.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - name: status
          in: query
          required: false
          description: Filter lists by status.
          schema:
            type: string
            enum: [ACTIVE, ARCHIVED, EXPIRED]
      responses:
        '200':
          description: Successfully retrieved a list of coupon lists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CouponList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupon-list/{coupon_list_id}:
    get:
      tags:
        - Coupon Lists
      summary: Fetch Coupon List Details
      operationId: fetchCouponList
      description: |
        Retrieves the specifications and status of a specific coupon list by its ID. 
        The response includes configurations, statuses, expiry dates, alert conditions, and real-time counts of total and available coupons.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      responses:
        '200':
          description: Coupon list details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Coupon list not found for the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: "coupon-list-not-found"
                  message: "Coupon list with the specified ID was not found."
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Coupon Lists
      summary: Update Coupon List
      operationId: updateCouponList
      description: |
        Modifies an existing coupon list's properties like name, expiry date, subscribers, and alert conditions.
        Crucially, this API **reactivates** an ARCHIVED or EXPIRED list if a new expiry date in the future is provided.
      x-mint:
        content: |
          <Note>
            This API reactivates the *ARCHIVED* or *EXPIRED* coupon list upon modification, provided the list has a future expiration date.
          </Note>
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCouponListRequest'
            example:
              name: "signup_coupons_updated"
              expires_at: "2025-12-31"
              email_alert_subscribers: ["new_ops@example.com"]
              alert_conditions:
                coupon_shortage_alert:
                  alert: true
                  threshold_count: 50
      responses:
        '200':
          description: Coupon list updated successfully. Returns the updated list details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupon-list/{coupon_list_id}/activate:
    put:
      tags:
        - Coupon Lists
      summary: Activate Coupon List (Reactivate Archived List)
      operationId: activateCouponList
      description: |
        Reactivates an **ARCHIVED** coupon list. This requires providing a new expiry date that is in the future.
      x-mint:
        content: |
          <Note>
            - Only active coupon lists can be utilized in campaigns.
            - If you need to modify the expiry date and activate a coupon list, you must use the **Update Coupon List (PATCH)** API.
          </Note>
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - expires_at
              properties:
                expires_at:
                  type: string
                  format: date
                  description: A new future expiry date for the coupon list (**YYYY-MM-DD** format).
                  example: "2025-12-31"
      responses:
        '204':
          description: Coupon list activated successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupon-list/{coupon_list_id}/archive:
    put:
      tags:
        - Coupon Lists
      summary: Archive Coupon List
      operationId: archiveCouponList
      description: |
        Archives an active coupon list. Upon archival, the coupon codes within the list are deleted, and campaigns can no longer use it for dynamic coupon allocation.
      x-mint:
        content: |
          <Note>
            Verify the usage of a given coupon list in active or planned campaigns before archiving it.
          </Note>
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      responses:
        '204':
          description: Coupon list archived successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupon-list/{coupon_list_id}/files:
    post:
      tags:
        - Coupon Files
      summary: Upload Coupons via File URL
      operationId: uploadCouponFile
      description: |
        Adds coupons to a list by processing a file hosted at a given URL (e.g., CSV). Processing happens asynchronously.
      x-mint:
        content: |
          <Note>
            - Upon API request, file processing begins, and the file status will be **PENDING** by default.
            - For convenience, a callback URL can be set up to trigger when the file's processing is completed.
            - The processing status can be checked using the **Fetch Coupon File Details** API.
          </Note>
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadCouponFileRequest'
            example:
              file_url: "https://example.com/path/to/coupons.csv"
              name: "October Batch"
              created_by: "uploader@example.com"
              callback_url: "https://my-system.com/webhook/coupon-upload-status"
      responses:
        '201':
          description: Coupon file upload request accepted. Processing is pending. Returns the file record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Coupon Files
      summary: Fetch All Coupon Files in List
      operationId: fetchAllCouponFiles
      description: |
        Retrieves details of all coupon files added to a specific coupon list.
        The response includes file status, added coupon count, and addition date for each file for improved management and tracking.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      responses:
        '200':
          description: Successfully retrieved list of coupon files.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CouponFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupon-list/{coupon_list_id}/files/{file_id}:
    get:
      tags:
        - Coupon Files
      summary: Fetch Coupon File Details
      operationId: fetchCouponFile
      description: |
        Retrieves details of a specific coupon file within a coupon list, including its processing status, date information, and the number of coupons added from it.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: Coupon file details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Coupon Files
      summary: Delete Coupon File
      operationId: deleteCouponFile
      description: |
        Removes a specific coupon file from a coupon list. This is useful for removing test files or incorrectly uploaded files.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '204':
          description: Coupon file deleted successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupon-list/{coupon_list_id}/usage-report:
    post:
      tags:
        - Reports
      summary: Generate Usage Report
      operationId: generateUsageReport
      description: |
        Generates a detailed usage report for a coupon list within a specified date range. The report is delivered directly to the provided email addresses.
        It provides details on which user received which coupon from which campaign at what time.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_date
                - end_date
                - email_subscribers
              properties:
                start_date:
                  type: string
                  format: date
                  description: Start date for the report (**YYYY-MM-DD**).
                  example: "2024-11-01"
                end_date:
                  type: string
                  format: date
                  description: End date for the report (**YYYY-MM-DD**).
                  example: "2024-11-21"
                email_subscribers:
                  type: array
                  description: List of email addresses to receive the generated report.
                  items:
                    type: string
                    format: email
                  example: ["reports@example.com", "manager@example.com"]
      responses:
        '200':
          description: Usage report generation request accepted and is being processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "The usage report for the CouponListName coupons is being processed and will be sent to email alert subscribers shortly."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: 'Uses **Workspace ID** as username and **API Key** (from Campaign/Business Events/Custom Templates/Catalog API tile) as password for Basic Authentication.'
  parameters:
    AppKeyHeader:
      name: MOE-APPKEY
      in: header
      required: true
      description: Your MoEngage Workspace ID.
      schema:
        type: string
    CouponListIdPath:
      name: coupon_list_id
      in: path
      required: true
      description: The unique identifier for the coupon list.
      schema:
        type: string
    FileIdPath:
      name: file_id
      in: path
      required: true
      description: The unique identifier for the coupon file within the list.
      schema:
        type: string
  schemas:
    AlertConditions:
      type: object
      description: Object defining the various alerts (success, failure, shortage, expiry) for the coupon list.
      properties:
        success_alert:
          type: boolean
          description: Set to `true` to send an alert on successful coupon upload/processing.
        failure_alert:
          type: boolean
          description: Set to `true` to send an alert on failed coupon upload/processing.
        coupon_shortage_alert:
          type: object
          description: Configuration for the alert when available coupons run low.
          properties:
            alert:
              type: boolean
              description: Enable alert when available coupons fall below the specified threshold.
            threshold_count:
              type: integer
              description: The number of available coupons below which to trigger the shortage alert.
        expiry_alert:
          type: object
          description: Configuration for the alert sent before the list expires.
          properties:
            alert:
              type: boolean
              description: Enable an alert a specified number of days before the coupon list expires.
            days_before:
              type: integer
              description: How many days before expiry to send the alert.
    CreateCouponListRequest:
      type: object
      description: Request body to create a new coupon list.
      required:
        - name
        - label
        - expires_at
        - created_by
      properties:
        name:
          type: string
          description: Unique programmatic name for the coupon list.
        label:
          type: string
          description: Display name/label for the coupon list (must be unique).
        expires_at:
          type: string
          format: date
          description: Expiry date for the list (**YYYY-MM-DD** format). Cannot be in the past.
        email_alert_subscribers:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses to receive alerts about the list status/health.
          nullable: true
        created_by:
          type: string
          description: Email or identifier of the user creating the list.
        alert_conditions:
          $ref: '#/components/schemas/AlertConditions'
          nullable: true
    UpdateCouponListRequest:
      type: object
      description: Request body to modify an existing coupon list. All fields are optional and partial updates are supported.
      properties:
        name:
          type: string
          description: New unique programmatic name for the coupon list.
        expires_at:
          type: string
          format: date
          description: New expiry date for the list (**YYYY-MM-DD** format). Cannot be in the past. Setting a future date can reactivate an expired/archived list.
        email_alert_subscribers:
          type: array
          items:
            type: string
            format: email
          description: New list of email addresses to receive alerts.
          nullable: true
        alert_conditions:
          $ref: '#/components/schemas/AlertConditions'
          nullable: true
    CouponList:
      type: object
      description: Representation of a Coupon List returned in responses.
      properties:
        _id:
          type: string
          description: Unique identifier for the coupon list.
        name:
          type: string
          description: Programmatic name of the coupon list.
        label:
          type: string
          description: Label name of the coupon list.
        expires_at:
          type: string
          format: date-time
          description: Expiry date and time of the list.
        created_by:
          type: string
          description: Identifier of the user who created the list.
        email_alert_subscribers:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses receiving alerts.
        alert_conditions:
          $ref: '#/components/schemas/AlertConditions'
        status:
          type: string
          enum: [ACTIVE, EXPIRED, ARCHIVED]
          description: Current status of the coupon list.
        total_coupons:
          type: integer
          description: Total number of coupons ever added to this list.
        available_coupons:
          type: integer
          description: Number of currently available (unassigned) coupons.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the list was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the list was last updated.
        personalization_snippet:
          type: string
          description: Jinja snippet to use in campaigns for personalization (e.g., `{{Coupons.CouponListName[signup_coupons]}}`).
    UploadCouponFileRequest:
      type: object
      description: Request body to trigger asynchronous upload of coupons from a file URL.
      required:
        - file_url
      properties:
        name:
          type: string
          description: Optional name for this specific file upload batch.
          nullable: true
        file_url:
          type: string
          format: url
          description: Publicly accessible URL of the CSV file containing coupon codes. The file must be securely accessible by the MoEngage system.
        file_url_auth_username:
          type: string
          description: Username for basic authentication if the file URL requires it.
          nullable: true
        file_url_auth_password:
          type: string
          description: Password for basic authentication if the file URL requires it.
          nullable: true
        created_by:
          type: string
          description: Email or identifier of the user uploading the file.
          nullable: true
        callback_url:
          type: string
          format: url
          description: URL to be called back upon completion (success/failure) of file processing.
          nullable: true
    CouponFile:
      type: object
      description: Details of a coupon file upload/processing record.
      properties:
        _id:
          type: string
          description: Unique identifier for the coupon file upload record.
        coupon_list_id:
          type: string
          description: ID of the coupon list this file belongs to.
        name:
          type: string
          description: Name assigned to the file upload.
          nullable: true
        file_url:
          type: string
          format: url
          description: The URL from which the coupons were uploaded.
        created_by:
          type: string
          description: Identifier of the user who requested the file upload.
          nullable: true
        status:
          type: string
          enum: [PENDING, PROCESSING, SUCCESSFUL, FAILED]
          description: Processing status of the uploaded file.
        added_coupons:
          type: integer
          description: Number of coupons successfully added from this file.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the file upload was requested.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the file status was last updated.
        callback_url:
          type: string
          format: url
          description: The callback URL provided during upload.
          nullable: true
    Error:
      type: object
      description: Standard error object containing machine- and human-readable error details.
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message describing the specifics of the failure.
    ErrorResponse:
      type: object
      description: Standard wrapper for error responses.
      properties:
        error:
          $ref: '#/components/schemas/Error'
  responses:
    BadRequest:
      description: |
        Bad Request (400).
        Possible issues include invalid input, missing mandatory fields, duplicate names/labels, or date errors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "duplicate-coupon-list-name"
              message: "The coupon list name already exists. Please enter a unique name and try again."
    Unauthorized:
      description: Unauthorized (401). Invalid authentication credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "request-unauthenticated"
              message: "Your request is unauthorized. Please verify your credentials and try again."
    Forbidden:
      description: Forbidden (403). Access to the Coupon Management features is denied for your account.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "request-forbidden"
              message: "Your account does not have access to the Coupon Management features."
    NotFound:
      description: Not Found (404). The specified Coupon List or File ID was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "coupon-list-not-found"
              message: "Coupon list with the specified ID was not found."
    TooManyRequests:
      description: Too Many Requests (429). Rate limit exceeded.
      headers:
        x-ratelimit-limit:
          schema: { type: integer }
          description: The request limit per time window.
        x-ratelimit-remaining:
          schema: { type: integer }
          description: The remaining requests in the current window.
        x-ratelimit-reset:
          schema: { type: integer }
          description: UTC epoch seconds when the limit resets.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
