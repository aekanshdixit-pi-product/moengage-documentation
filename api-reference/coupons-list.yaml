  /coupon-list/{coupon_list_id}/files:
    post:
      tags:
        - Coupon Files
      summary: Upload a Coupon File to the Coupon List
      operationId: uploadCouponFile
      description: |
        Once a coupon list is created, coupons should be added to the list to be distributed through campaigns. If a coupon list has been running for some time, it may be running low after serving several campaigns.

        Using this API, you can replenish an older list or populate a new list by providing the URL of a file containing the coupons, thereby enabling their distribution through various campaigns. These coupons can be provided through a file, and the API requires the URL where your coupon file is hosted.
      x-mint:
        content: |
          <Note>
            **Information**
            
            Upon API request, file processing begins, and the file status will be **PENDING** by default.
            * For convenience, a callback URL can be set up to trigger when the file's processing is completed.
            * The processing status can be checked using the **Fetch a Coupon File API** to get the status separately.
          </Note>

          ### Rate Limit
          You can upload:
          * 5 coupon files to a coupon list per minute or
          * 50 coupon files to a coupon list per day

          **Note:**
          * **Payload size limit**: 64 MB for manual uploads or 100 MB for URL uploads.
          * **Additional limits**: The maximum number of coupons per coupon list is 100 million.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_url
              properties:
                name:
                  type: string
                  description: |
                    This field consists of the file name of the coupon list.
                    <Note>This is an optional field.</Note>
                file_url:
                  type: string
                  description: This field consists of the file path of the coupon list.
                file_url_auth_username:
                  type: string
                  description: |
                    This field consists of the coupon file username.
                    <Note>This is an optional field.</Note>
                file_url_auth_password:
                  type: string
                  description: |
                    This field consists of the coupon file password.
                    <Note>This is an optional field.</Note>
                created_by:
                  type: string
                  description: |
                    This field consists of the name of the subscriber who uploaded the coupon file.
                    <Note>This is an optional field.</Note>
                callback_url:
                  type: string
                  description: |
                    This field consists of the coupon file callback URL.
                    <Note>This is an optional field.</Note>
      responses:
        '201':
          description: |
            Success
            The request was successful, and the coupon URL upload request was accepted.
            
            **Note**: The status of the URL upload is always PENDING.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    description: This field contains the coupon file name.
                  file_url:
                    type: string
                    description: This field consists of the file path of the coupon list.
                  created_by:
                    type: string
                    description: This field consists of the name of the subscriber who uploaded the coupon file.
                  status:
                    type: string
                    description: |
                      Once the coupon URL upload request is accepted, the response displays the following status:
                      * PENDING - The URL is waiting for approval.
                      
                      <Note>To know the status of the coupon upload, you need to trigger the **Fetch a Coupon File API**.</Note>
                  coupons_list_id:
                    type: string
                    description: This field contains the coupon list ID that you have requested to upload the coupon file to.
                  _id:
                    type: string
                    description: This field contains the coupon file ID.
        '400':
          description: |
            Bad request
            Possible issues include duplicates, such as coupon list names, invalid data types, or missing mandatory attributes. For more information, refer to Error Messages.
            
            * **invalid-request**: The requested JSON is incorrect. Verify and try again.
            * **EmptyFileUrl**: The 'file_url' can not be empty. Provide the coupon file URL and try again.
            * **MultipleFileUrl**: Multiple file URLs are not permitted. Select one file URL and try again.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: "invalid-request"
                  message: "The requested JSON is incorrect. Please verify and try again."
        '401':
          description: |
