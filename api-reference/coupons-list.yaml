    post:
      tags:
        - Reports
      summary: Generate Usage Report
      operationId: generateUsageReport
      description: Generates a detailed usage report for a coupon list.
      parameters:
        - $ref: '#/components/parameters/AppKeyHeader'
        - $ref: '#/components/parameters/CouponListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_date, end_date, email_subscribers]
              properties:
                start_date: { type: string, format: date }
                end_date: { type: string, format: date }
                email_subscribers: { type: array, items: { type: string, format: email } }
      responses:
        '200':
          description: Report generation started.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: 'Uses **Workspace ID** as username and **API Key** as password.'
  parameters:
    AppKeyHeader:
      name: MOE-APPKEY
      in: header
      required: true
      description: |
        This is the workspace ID (earlier APP ID) of your MoEngage workspace. The MOE-APPKEY has to be passed in the request. You can find your MoEngage Workspace ID in the MoEngage Dashboard: **Settings** -> **Account** -> **APIs** -> **Workspace ID (earlier app id)**.
      schema:
        type: string
    CouponListIdPath:
      name: coupon_list_id
      in: path
      required: true
      description: The unique identifier for the coupon list.
      schema:
        type: string
    CouponFileIdPath: 
      name: coupon_file_id
      in: path
      required: true
      description: The unique identifier for the coupon file.
      schema:
        type: string
  schemas:
    AlertConditions:
      type: object
      properties:
        success_alert: { type: boolean }
        failure_alert: { type: boolean }
        coupon_shortage_alert:
          type: object
          properties: { alert: { type: boolean }, threshold_count: { type: integer } }
        expiry_alert:
          type: object
          properties: { alert: { type: boolean }, days_before: { type: integer } }
    CreateCouponListRequest:
      type: object
      required: [name, label, expires_at, created_by]
      properties:
        name: { type: string }
        label: { type: string }
        expires_at: { type: string, format: date }
        email_alert_subscribers: { type: array, items: { type: string, format: email } }
        created_by: { type: string }
        alert_conditions: { $ref: '#/components/schemas/AlertConditions' }
    UpdateCouponListRequest:
      type: object
      properties:
        name: { type: string }
        expires_at: { type: string, format: date }
        email_alert_subscribers: { type: array, items: { type: string, format: email } }
        alert_conditions: { $ref: '#/components/schemas/AlertConditions' }
    CouponList:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        label: { type: string }
        expires_at: { type: string, format: date-time }
        status: { type: string, enum: [ACTIVE, EXPIRED, ARCHIVED] }
        total_coupons: { type: integer }
        available_coupons: { type: integer }
    UploadCouponFileRequest:
      type: object
      required: [file_url]
      properties:
        name: { type: string }
        file_url: { type: string, format: url }
        created_by: { type: string }
        callback_url: { type: string, format: url }
    CouponFile:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        status: { type: string }
        added_coupons: { type: integer }
        file_url: { type: string }
    FetchCouponFilesResponseItem:
      type: object
      description: Representation of a coupon file in the response.
      properties:
        coupon_list_id:
          type: string
          description: This field contains the coupon list ID from which you fetched the coupon files.
        name:
          type: string
          description: |
            This field contains the coupon file name.
            <Note>This is an optional field.</Note>
        status:
          type: string
          description: |
            This field shows one of the following statuses of the fetched coupon files:
            * PENDING
        file_url:
          type: string
          description: This field consists of the file path of the coupon list.
        created_at:
          type: string
          description: This field consists of the date and time the coupon file was created.
        updated_at:
          type: string
          description: This field consists of the date and time of the most recent update to the coupon file.
        created_by:
          type: string
          description: |
            This field consists of the name of the subscriber who uploaded the coupon file.
            <Note>This is an optional field.</Note>
        _id:
          type: string
          description: This field contains the unique ID corresponding to a successful coupon file fetch request. This ID is also used to update and archive coupon files from the coupon list.
        added_coupons:
          type: integer
          description: This field consists of the available number of coupons added to the coupon list.
        callback_url:
          type: string
          description: |
            This field consists of the callback URL.
            <Note>This is an optional field.</Note>
    Error:
      type: object
      properties:
        code:
          type: string
          description: Each error codes are unique and serve as a shorthand representation for the type of error, providing a quick reference that can be used to diagnose, troubleshoot, and address the problem based on a predefined set of error conditions.
        message:
          type: string
          description: Along with the error code, a detailed message is also provided in the response, describing the specifics of the request failure and the nature of the error.
    ErrorResponse:
      type: object
      properties:
        error: { $ref: '#/components/schemas/Error' }
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
security:
  - basicAuth: []