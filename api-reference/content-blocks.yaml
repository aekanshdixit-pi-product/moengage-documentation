openapi: 3.0.3
info:
  title: MoEngage Content Block API
  version: '1.0'
  description: |
    The Content Block API allows you to programmatically **create, update, retrieve, and search** for reusable content assets within the MoEngage platform.

    These blocks can be used across multiple channels (Email, Push, In-App, etc.) to ensure consistency and simplify content updates for campaigns.
    <Note>
    **Authentication:** All API requests require authentication. Pass your MoEngage App Key (also called Workspace ID or App ID) in the `MOE-APPKEY` header.
    </Note>
tags:
  - name: Content Blocks
    description: Operations for managing reusable content blocks for cross-channel campaigns.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1/external/campaigns'
    description: MoEngage Content Blocks API Production Server
    variables:
      dc:
        default: '1'
        description: 'Your MoEngage Data Center (DC) identifier (e.g., 1, 2, 3, etc.).'
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
security:
  - moeAppKey: []

paths:
  /content-blocks:
    post:
      tags:
        - Content Blocks
      summary: Create a New Content Block
      description: |
        Creates a new, reusable content block in your MoEngage workspace. Content blocks are used to standardize headers, footers, or CTAs across campaigns.
      requestBody:
        required: true
        description: The details and raw content for the new content block.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContentBlockRequest'
            example:
              name: "Summer_Sale_Header"
              label: "summer_sale_header_2025"
              description: "Header for all summer sale communications"
              content_type: "HTML"
              raw_content: "<h1>Huge Summer Sale!</h1>"
              images_used: []
              status: "ACTIVE"
              created_by: "marketing@example.com"
              content_block_used": []
      responses:
        '202':
          description: Success. The request has been successfully accepted for asynchronous processing.
        '400':
          description: Bad Request. The request is invalid due to missing required fields or incorrect data types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '5XX':
          description: Internal Server Error. The request may be retried.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Content Blocks
      summary: Update an Existing Content Block
      description: |
        Modifies the details, status, or raw content of an existing content block identified by its unique `id`.

        The `id`, `raw_content`, and `updated_by` fields are mandatory for an update request.
      requestBody:
        required: true
        description: The updated details for the content block. The `id`, `raw_content`, and `updated_by` fields are mandatory.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContentBlockRequest'
            example:
              id: "634fdf4db9c206ba55b8223b"
              raw_content: "<h1>Massive Summer Sale!</h1>"
              updated_by: "jane.doe@example.com"
      responses:
        '202':
          description: Success. The update request has been successfully accepted for processing.
        '400':
          description: Bad Request. Invalid ID, missing mandatory fields, or other validation errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '5XX':
          description: Internal Server Error. The request may be retried.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /content-blocks/get-by-ids:
    post:
      tags:
        - Content Blocks
      summary: Retrieve Content Blocks by ID
      description: Fetches one or more specific content blocks using a list of their unique IDs.
      requestBody:
        required: true
        description: A list of content block IDs to retrieve.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetByIdsRequest'
            example:
              ids:
                - "634fdf4db9c206ba55b8223b"
              is_raw_content_required: true
      responses:
        '202':
          description: Success. Returns the requested content blocks in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentBlockListResponse'
        '400':
          description: Bad Request. The required `ids` list is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /content-blocks/search:
    post:
      tags:
        - Content Blocks
      summary: Search Content Blocks by Filters
      description: Searches for content blocks based on specified filter criteria (e.g., tags, team, status).
      requestBody:
        required: true
        description: A set of optional filters to apply to the search query.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchContentBlockRequest'
            example:
              filters:
                content_type: ["TEXT"]
                status: ["ACTIVE"]
                search_text: "BT_non_personaliation"
      responses:
        '202':
          description: Success. Returns a list of matching content blocks in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentBlockListResponse'
        '400':
          description: Bad Request. The filter criteria provided in the request body are invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    moeAppKey:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: |
        Your MoEngage **App Key** (also referred to as App ID or Workspace ID) for authentication.
        Find this in the MoEngage Dashboard under **Settings** -> **Account** -> **APIs** -> **App ID**.

  schemas:
    ErrorResponse:
      type: object
      description: The standard error response format for Content Block API failures.
      properties:
        title:
          type: string
          description: A short, human-readable title for the error type.
          example: "Invalid Field Value"
        description:
          type: string
          description: A detailed, human-readable explanation of the error, often including the problematic field.
          example: "app_key - Some of the field values are invalid: app_key : None"
        code:
          type: string
          description: A unique error code for internal tracing or support.
          example: "nGpUNpDQ"

    CreateContentBlockRequest:
      type: object
      description: Request body to create a new content block.
      required:
        - name
        - label
        - raw_content
        - content_type
        - created_by
      properties:
        name:
          type: string
          description: Name of the content block. (Mandatory)
        label:
          type: string
          description: A unique label to identify your content block. (Mandatory)
        status:
          type: string
          enum: [ACTIVE, DRAFT]
          description: The status of the content block. (Optional)
        raw_content:
          type: string
          description: The raw HTML or Plain Text content of the block. (Mandatory)
        content_type:
          type: string
          enum: [HTML, TEXT]
          description: The type of content: `HTML` or `TEXT`. (Mandatory)
        description:
          type: string
          description: An optional, descriptive text explaining the block's usage.
        created_by:
          type: string
          format: email
          description: Email ID of the user creating the content block. (Mandatory)
        tag_ids:
          type: array
          items:
            type: string
          description: List of organizational tag IDs to associate with the block.
        team_ids:
          type: array
          items:
            type: string
          description: |
            List of team IDs that can access this block. Passing a team ID is mandatory if you are using multiple teams.
            Only applicable to accounts where the Teams feature is enabled.
        content_block_used:
          type: array
          items:
            type: string
          description: |
            If you are using nested content blocks, provide the names of the other content blocks used in this one.
            If not, pass this as an empty array: `[]`.
        images_used:
          type: array
          items:
            type: string
            format: uri
          description: List of image URLs used within the content block's `raw_content`.

    UpdateContentBlockRequest:
      type: object
      description: Request body to update an existing content block. Only provided fields will be updated.
      required:
        - id
        - raw_content
        - updated_by
      properties:
        id:
          type: string
          description: The **unique ID** of the content block to be updated, which can be retrieved from the Search API. (Mandatory)
        name:
          type: string
          description: A new name for the content block. (Optional)
        status:
          type: string
          enum: [ACTIVE, DRAFT]
          description: The new status of the content block (`ACTIVE` or `DRAFT`). (Optional)
        raw_content:
          type: string
          description: The new raw HTML or Text content for the block. (Mandatory)
        description:
          type: string
          description: A new description for the content block. (Optional)
        updated_by:
          type: string
          format: email
          description: The email ID of the user updating the content block. (Mandatory)
        tag_ids:
          type: array
          items:
            type: string
          description: A new list of tag IDs to associate with the content block. (Optional)
        team_ids:
          type: array
          items:
            type: string
          description: |
            A new list of team IDs that can access this block.
            Only applicable to accounts where the Teams feature is enabled.
        content_block_used:
          type: array
          items:
            type: string
          description: |
            A new list of names of other content blocks nested within this block.
            If not, pass this as an empty array: `[]`.
        images_used:
          type: array
          items:
            type: string
            format: uri
          description: A new list of image URLs used in the content block. (Optional)

    GetByIdsRequest:
      type: object
      description: Request body for retrieving content blocks by ID.
      required:
        - ids
      properties:
        ids:
          type: array
          items:
            type: string
          description: A list of unique content block IDs to retrieve. (Mandatory)
        is_raw_content_required:
          type: boolean
          description: |
            A boolean flag to control whether the `raw_content` field is returned.
            - `true`: Returns the non-personalized `raw_content` given during creation.
            - `false` (default): Does not return `raw_content`.
          default: false

    SearchContentBlockRequest:
      type: object
      description: Request body for searching content blocks using multiple filters.
      x-mint:
        content: |
          <Note>
          To retrieve **all** content blocks without applying specific filters, submit a request body with an empty `filters` object:

          ```json
          {
            "filters": {}
          }
          ```
          </Note>
      properties:
        filters:
          type: object
          description: An object containing various filters to narrow down the search results.
          properties:
            content_type:
              type: array
              items:
                type: string
                enum: [HTML, TEXT]
              description: Filter by the type of content blocks: `HTML` or `TEXT`.
            team_ids:
              type: array
              items:
                type: string
              description: Filter by the team IDs associated with the content blocks.
            tag_ids:
              type: array
              items:
                type: string
              description: Filter by the organizational tag IDs associated with the blocks.
            status:
              type: array
              items:
                type: string
                enum: [ACTIVE, ARCHIVED]
              description: Filter by the current status of the content blocks.
            updated_by:
              type: array
              items:
                type: string
                format: email
              description: Filter by the email ID of the user who last updated the block.
            search_text:
              type: string
              description: Search term to match against content block names.

    ContentBlockObject:
      type: object
      description: The full content block object returned in retrieval and search responses.
      properties:
        id:
          type: string
          description: The unique ID of the content block.
        name:
          type: string
          description: The user-defined name of the content block.
        label:
          type: string
          description: The unique label used to identify the content block.
        description:
          type: string
          description: An optional, detailed description of the content block's purpose.
        content_type:
          type: string
          enum: [HTML, TEXT]
          description: The type of content stored in the block: `HTML` or `TEXT`.
        content:
          type: string
          description: The rendered (personalized) content of the block.
        raw_content:
          type: string
          description: |
            The raw HTML or Text content originally provided during creation/update.
            This field is only returned when `is_raw_content_required=true` is passed in the 'Get by IDs' request.
        status:
          type: string
          enum: [ACTIVE, DRAFT, ARCHIVED]
          description: The current status of the content block.
        created_by:
          type: string
          format: email
          description: Email ID of the user who created the block.
        created_at:
          type: string
          format: date-time
          description: Timestamp of when the content block was created.
        updated_by:
          type: string
          format: email
          description: Email ID of the last user who updated the block.
        updated_at:
          type: string
          format: date-time
          description: Timestamp of when the content block was last updated.
        tag_ids:
          type: array
          items:
            type: string
          description: List of tag IDs associated with the block for organizational purposes.
        team_ids:
          type: array
          items:
            type: string
          description: |
            List of team IDs for which the content block is enabled.
            Only applicable to accounts where the Teams feature is enabled.
        images_used:
          type: array
          items:
            type: string
            format: uri
          description: List of image URLs used in the content block.

    ContentBlockListResponse:
      type: object
      description: The response structure containing a list of retrieved content blocks.
      properties:
        data:
          type: array
          description: A list of content block objects matching the request criteria.
          items:
            $ref: '#/components/schemas/ContentBlockObject'