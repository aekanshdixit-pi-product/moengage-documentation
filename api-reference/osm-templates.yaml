openapi: 3.0.0
info:
  title: OSM Templates API
  version: v1.0
  description: >-
    APIs for creating, updating, and searching On-site Messaging (OSM) templates
    in MoEngage. This API allows you to manage templates used for campaign
    creation.
servers:
  - url: 'https://api-{dataCenter}.moengage.com/v1.0'
    description: >-
      MoEngage API Endpoint. The value of 'dataCenter' depends on your data
      center (e.g., api-01, api-02).
    variables:
      dataCenter:
        default: '01'
        description: >-
          Your MoEngage data center number (e.g., 01, 02, 03). See [Data Centers
          and API endpoint mapping](https://help.moengage.com/hc/en-us/articles/360057030512).
tags:
  - name: OSM Templates
    description: Manage On-site Messaging (OSM) templates.
security:
  - basicAuth: []
paths:
  /custom-templates/osm:
    post:
      tags:
        - OSM Templates
      summary: Create OSM Template
      description: >-
        The Create OSM Template API can be used to create an OSM template in
        MoEngage. This API helps you upload templates created outside the MoEngage
        ecosystem to MoEngage and use them for campaign creation.
      x-mint:
        content: |
          ### Information
          API templates cannot be used in the Drag and Drop Editor in the MoEngage Dashboard. They are only supported for the Custom HTML Editor.

          ### Rate Limit
          The rate limit is 100 RPM. You can upload a maximum of 100 templates per minute.
      operationId: createOsmTemplate
      requestBody:
        $ref: '#/components/requestBodies/osmCreateBody'
      responses:
        '200':
          $ref: '#/components/responses/templateSuccessResponse'
        '400':
          $ref: '#/components/responses/errorResponse'
        '401':
          $ref: '#/components/responses/errorResponse'
        '415':
          $ref: '#/components/responses/errorResponse'
        '429':
          $ref: '#/components/responses/errorResponse'
        '500':
          $ref: '#/components/responses/errorResponse'
    put:
      tags:
        - OSM Templates
      summary: Update OSM Template
      description: This API allows you to update an OSM template as per your requirements.
      x-mint:
        content: |
          ### Rate Limit
          The rate limit is 100 RPM.
      operationId: updateOsmTemplate
      requestBody:
        $ref: '#/components/requestBodies/osmUpdateBody'
      responses:
        '200':
          $ref: '#/components/responses/templateSuccessResponse'
        '400':
          $ref: '#/components/responses/errorResponse'
        '500':
          $ref: '#/components/responses/errorResponse'
  /custom-templates/osm/search:
    post:
      tags:
        - OSM Templates
      summary: Search OSM Templates
      description: >-
        The Search OSM Template API can be used to look up the OSM templates
        created in your MoEngage account.
      x-mint:
        content: |
          ### Note: Mandatory Pagination
          We are introducing mandatory pagination, effective **November 15, 2025**. All calls to this API must include the following two parameters:
          - `page`: The page number of the results you wish to fetch.
          - `entries`: The number of templates to return per page, with a maximum value of *15*.

          Please update all integrations to include these parameters. API requests submitted without them after the effective date will result in an error and fail to execute.

          ### Rate Limit
          The rate limit is 100 RPM.
      operationId: searchOsmTemplates
      requestBody:
        $ref: '#/components/requestBodies/osmSearchBody'
      responses:
        '200':
          $ref: '#/components/responses/searchSuccessResponse'
        '400':
          $ref: '#/components/responses/errorResponse'
        '429':
          $ref: '#/components/responses/errorResponse'
        '500':
          $ref: '#/components/responses/errorResponse'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        The API request will be authenticated through Basic Authentication.
        Basic Authentication sends a Base64-encoded string containing your username and password with every API request. It encodes a 'username:password' string in Base64 and appends the encoded string with 'Basic '.

        Example: `{"Authorization: "Basic Base64_ENCODED_WORKSPACEID_APIKEY=="}`

        To obtain the username (Workspace ID) and password (API Key), navigate to:
        1.  **Settings > Account > APIs** on the MoEngage Dashboard.
        2.  Username = **Workspace ID**
        3.  Password = **API Key** (from the "Custom templates" tile)
  schemas:
    osmCreatePayload:
      type: object
      description: Payload for creating a new OSM template.
      required:
        - basic_details
        - meta_info
      properties:
        basic_details:
          $ref: '#/components/schemas/osmCreateBasicDetails'
        meta_info:
          $ref: '#/components/schemas/osmCreateMetaInfo'
    osmCreateBasicDetails:
      type: object
      description: Details about the template, including its payload and template type.
      required:
        - payload
        - template_type
      properties:
        payload:
          type: string
          description: The Custom HTML payload for the template.
          example: '<html>...</html>'
        template_type:
          type: string
          description: The type of On-site template.
          enum:
            - BANNER
            - POP_UP
            - NUDGE
    osmCreateMetaInfo:
      type: object
      description: >-
        Metadata about the template being created, such as its name, version,
        and creator.
      required:
        - template_name
        - template_id
        - template_version
        - created_by
      properties:
        template_name:
          type: string
          description: The name of the template.
          example: test
        template_id:
          type: string
          description: A unique identifier for the template.
          example: '123456'
        template_version:
          type: string
          description: The version of the template.
          example: '1'
        created_by:
          type: string
          description: Email of the user creating the template.
          example: test@ABC.com
          format: email
    osmUpdatePayload:
      type: object
      description: Payload for updating an existing OSM template.
      required:
        - external_template_id
        - basic_details
        - meta_info
      properties:
        external_template_id:
          type: string
          description: >-
            The unique identifier generated during the creation of the template.
          example: d05a44f0-a7cf-471a-bcb6-63054800a367
          format: uuid
        update_campaigns:
          type: boolean
          description: >-
            Flag used to update all campaigns that are currently using this
            template to the newer version.
          default: false
        basic_details:
          $ref: '#/components/schemas/osmUpdateBasicDetails'
        meta_info:
          $ref: '#/components/schemas/osmUpdateMetaInfo'
    osmUpdateBasicDetails:
      type: object
      description: The new HTML payload for the template.
      required:
        - payload
      properties:
        payload:
          type: string
          description: The new Custom HTML payload for the template.
          example: '<html>...</html>'
    osmUpdateMetaInfo:
      type: object
      description: Metadata about the template being updated.
      required:
        - template_name
        - template_id
        - template_version
        - updated_by
      properties:
        template_name:
          type: string
          description: The name of the template.
          example: test
        template_id:
          type: string
          description: The unique identifier for the template.
          example: '123456'
        template_version:
          type: string
          description: The new version of the template.
          example: '2'
        updated_by:
          type: string
          description: Email of the user updating the template.
          example: test@ABC.com
          format: email
    osmSearchPayload:
      type: object
      description: Payload for searching OSM templates.
      properties:
        page:
          type: integer
          description: The page number of the results you wish to fetch.
          example: 1
        entries:
          type: integer
          description: The number of templates to return per page.
          example: 10
          maximum: 15
        template_name:
          type: string
          description: Filter by template name.
          example: test_template
        template_id:
          type: string
          description: Filter by template ID.
          example: '45367833'
        external_template_ids:
          type: array
          description: Search multiple templates by their external ID and version.
          items:
            $ref: '#/components/schemas/osmSearchExternalId'
        template_source:
          type: array
          description: Filter by template source.
          items:
            type: string
            enum:
              - API
              - MOENGAGE
        template_type:
          type: array
          description: Filter by template type.
          items:
            type: string
            enum:
              - CUSTOM
              - PRE_BUILT
        created_by:
          type: array
          description: Filter by creator email.
          items:
            type: string
            format: email
            example: user1@moengage.com
        updated_by:
          type: array
          description: Filter by updater email.
          items:
            type: string
            format: email
            example: user2@moengage.com
        sort_params:
          type: array
          description: Sort the templates by multiple fields.
          items:
            $ref: '#/components/schemas/osmSearchSortParam'
    osmSearchExternalId:
      type: object
      description: An external_template_id and version pair.
      properties:
        external_template_id:
          type: string
          example: 904c31c4-c532-4d86-a212-963c697a1bbe
        version:
          type: integer
          example: 1
    osmSearchSortParam:
      type: object
      description: Sort the templates by a field in ASCENDING or DESCENDING order.
      minProperties: 1
      maxProperties: 1
      oneOf:
        - title: Sort by Name
          properties:
            template_name:
              type: string
              enum: [ASCENDING, DESCENDING]
        - title: Sort by Date
          properties:
            last_modified_date:
              type: string
              enum: [ASCENDING, DESCENDING]
        - title: Sort by Modifier
          properties:
            last_modified_by:
              type: string
              enum: [ASCENDING, DESCENDING]
    successResponse:
      type: object
      properties:
        external_template_id:
          type: string
          format: uuid
          description: >-
            The unique ID corresponding to a successful custom template
            creation/update.
          example: d05a44f0-a7cf-471a-bcb6-63054800a367
    searchSuccessResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/osmTemplateData'
    osmTemplateData:
      type: object
      description: Full template object data.
      properties:
        meta_info:
          $ref: '#/components/schemas/osmSearchMetaInfo'
        external_template_id:
          type: string
          format: uuid
        version:
          type: integer
        basic_details:
          $ref: '#/components/schemas/osmSearchBasicDetails'
        created_by:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_by:
          type: string
          format: email
        updated_at:
          type: string
          format: date-time
    osmSearchMetaInfo:
      type: object
      description: Metadata for a searched template.
      properties:
        template_id:
          type: string
        template_name:
          type: string
        template_version:
          type: string
        created_by:
          type: string
        channel:
          type: string
        template_source:
          type: string
        template_type:
          type: string
    osmSearchBasicDetails:
      type: object
      description: Basic details for a searched template.
      properties:
        payload:
          type: string
        preview_image:
          type: string
          format: uri
    standardError:
      title: Bad Request / Duplicate
      type: object
      properties:
        error:
          $ref: '#/components/schemas/errorDetails'
    errorDetails:
      type: object
      properties:
        code:
          type: string
          example: 400 Bad Request
        message:
          type: string
          example: Duplicate - template_id and template_version
        details:
          type: array
          items:
            $ref: '#/components/schemas/errorDetailItem'
        request_id:
          type: string
          example: xZLmJvUi
    errorDetailItem:
      type: object
      properties:
        code:
          type: string
          example: InvalidValue
        target:
          type: string
          example: Duplicate - template_id and template_version
        message:
          type: string
          example: 'template_id:13343440 template_version:1 is already present.'
    authError:
      title: Authentication/Media Error
      type: object
      properties:
        title:
          type: string
          example: Authentication required
        description:
          type: string
          example: MOE-APPKEY missing in Authentication Header
    rateLimitError:
      title: Rate Limit Error
      type: object
      properties:
        response_id:
          type: string
          example: OUkHvcn
        type:
          type: string
          example: custom_template
        error:
          $ref: '#/components/schemas/rateLimitErrorDetails'
    rateLimitErrorDetails:
      type: object
      properties:
        code:
          type: string
          example: Too Many Requests
        message:
          type: string
          example: 'API rate limit breached. Current limit: n/m mins'
    serverError:
      title: Server Error
      type: object
      properties:
        title:
          type: string
          example: Internal Server Error
        message:
          type: string
          example: >-
            An unexpected error was encountered while processing this request.
            Please contact MoEngage Team
  requestBodies:
    osmCreateBody:
      description: Request body to create a new OSM template.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/osmCreatePayload'
    osmUpdateBody:
      description: Request body to update an existing OSM template.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/osmUpdatePayload'
    osmSearchBody:
      description: Request body to search for OSM templates.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/osmSearchPayload'
  responses:
    templateSuccessResponse:
      description: Template created or updated successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/successResponse'
    searchSuccessResponse:
      description: Search results returned.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/searchSuccessResponse'
    errorResponse:
      description: An error occurred.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/standardError'
              - $ref: '#/components/schemas/authError'
              - $ref: '#/components/schemas/rateLimitError'
              - $ref: '#/components/schemas/serverError'