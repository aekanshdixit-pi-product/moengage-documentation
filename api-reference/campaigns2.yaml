  /campaigns/{campaign_id}:
    patch:
      operationId: update_campaign
      summary: Update Campaign
      description: |
        Updates an existing Push or Email campaign in MoEngage.
        
        <Info>
        **Important Information:**
        - You can only update campaigns created via the API, not campaigns created through the MoEngage Dashboard.
        - Pass only the fields you want to update. You don't need to send the complete payload.
        - If updating a field within an object, you must pass the complete object.
        - Campaigns cannot be updated when in **Stopped** or **Archived** state.
        </Info>
        
        <Warning>
        **Update Restrictions:**
        
        **For Scheduled Campaigns:**
        - Can edit all fields **except scheduling type** for One-Time campaigns
        - Can edit all fields **except scheduling type** for Periodic/Event-Triggered campaigns if no instance has been sent yet
        
        **For Active Campaigns:**
        Cannot edit the following fields:
        - Trigger Condition
        - Segmentation Details
        - Conversion Goal Details
        - Scheduling Type
        - Scheduling Start Date
        </Warning>
        
        <Note>
        For Event-Triggered campaigns, updated content is cached and takes up to 30 minutes to take effect.
        </Note>
        
        <Tip>
        Use the **Body** tabs below to select your campaign type:
        - Select **Push Campaign** tab for updating Push notifications
        - Select **Email Campaign** tab for updating Email campaigns
        </Tip>
      tags:
        - Campaigns
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: |
            The unique ID of the campaign to update.
            
            You can fetch the campaign ID using the [Get Campaign Details API](https://developers.moengage.com/hc/en-us/articles/27896777540756) by filtering with campaign name, channel, or other criteria.
          schema:
            type: string
          example: "camp_abc123xyz"
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: |
          Campaign update payload. Only include the fields you want to update.
          
          **Note:** If updating a nested field, you must pass the complete parent object. For example, to update the title of a Push notification, pass the complete campaign_content object.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdateRequest'
            examples:
              push_update_content:
                summary: Push - Update Content
                value:
                  request_id: "push_update_12345"
                  updated_by: "john.doe@example.com"
                  campaign_content:
                    content:
                      push:
                        android:
                          template_type: "BASIC"
                          basic_details:
                            notification_channel: "general"
                            title: "Updated Title - Flash Sale!"
                            message: "Updated Message - Only 2 hours left!"
                            default_click_action: "DEEPLINKING"
                            default_click_action_value: "https://example.com/flash-sale"
                        ios:
                          template_type: "BASIC"
                          basic_details:
                            title: "Updated Title - Flash Sale!"
                            message: "Updated Message - Only 2 hours left!"
                            default_click_action: "DEEPLINKING"
                            default_click_action_value: "https://example.com/flash-sale"
              email_update_content:
                summary: Email - Update Content
                value:
                  request_id: "email_update_12345"
                  updated_by: "john.doe@example.com"
                  campaign_content:
                    content:
                      email:
                        subject: "Updated Subject - Last Chance for 50% Off!"
                        preview_text: "Sale ends tonight"
                        sender_name: "MoEngage Store"
                        from_address: "noreply@example.com"
                        reply_to_address: "support@example.com"
                        html_content: "<!DOCTYPE html><html><body><h1>Last Chance!</h1><p>Sale ends tonight!</p></body></html>"
              push_update_scheduling:
                summary: Push - Update Scheduling
                value:
                  request_id: "push_sched_update"
                  updated_by: "john.doe@example.com"
                  scheduling_details:
                    expiry_time: "2026-07-20T13:55:00"
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-mint:
        metadata:
          title: "Update Campaign"
          description: "Update existing Push and Email campaigns. Only campaigns created via API can be updated."
  
  /campaigns/search:
    post:
      operationId: search_campaigns
      summary: Search Campaigns
      description: |
        Fetches a list of campaigns with all current fields and status. You can pass multiple filters to find specific campaigns.
        
        **Supported Channels:**
        - **PUSH**: Push notification campaigns
        - **EMAIL**: Email campaigns
        - **SMS**: SMS campaigns
        
        **Search Capabilities:**
        - Filter by channel, delivery type, status, tags, name, ID, created by, created date
        - Include child campaigns (flow nodes, periodic children)
        - Include archived campaigns
        - Paginated results (max 15 per page)
        
        <Info>
        If this API is not enabled for your account, contact your MoEngage Customer Success Manager (CSM) or the Support team to request enablement.
        </Info>
        
        <Tip>
        To fetch flow campaign nodes, set `include_child_campaigns` to `true`. Flow campaigns can be identified by the presence of `flow_id` and `flow_name` in the response.
        </Tip>
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: Search criteria and pagination parameters for finding campaigns.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignSearchRequest'
            examples:
              search_by_channel_email:
                summary: Search by Channel (Email)
                value:
                  request_id: "search_req_12345"
                  campaign_fields:
                    channels: ["EMAIL"]
                  limit: 15
                  page: 1
              search_by_channel_push:
                summary: Search by Channel (Push)
                value:
                  request_id: "search_req_67890"
                  campaign_fields:
                    channels: ["PUSH"]
                  limit: 15
                  page: 1
              search_by_channel_sms:
                summary: Search by Channel (SMS)
                value:
                  request_id: "search_req_sms"
                  campaign_fields:
                    channels: ["SMS"]
                  limit: 15
                  page: 1
              search_by_delivery_type:
                summary: Search by Delivery Type
                value:
                  request_id: "search_req_periodic"
                  campaign_fields:
                    delivery_type: ["PERIODIC"]
                  limit: 15
                  page: 1
              search_by_created_date:
                summary: Search by Created Date
                value:
                  request_id: "search_req_date"
                  campaign_fields:
                    created_date:
                      from_date: "2024-06-16"
                      to_date: "2024-06-21"
                  limit: 10
                  page: 1
              search_by_campaign_name:
                summary: Search by Campaign Name
                value:
                  request_id: "search_req_name"
                  campaign_fields:
                    name: "Summer Sale Campaign"
                  limit: 5
                  page: 1
              search_by_campaign_id:
                summary: Search by Campaign ID
                value:
                  request_id: "search_req_id"
                  campaign_fields:
                    id: "camp_abc123xyz"
                  limit: 1
                  page: 1
              search_all_filters:
                summary: Search with Multiple Filters
                value:
                  request_id: "search_req_all"
                  campaign_fields:
                    channels: ["PUSH"]
                    created_by: ["john.doe@example.com"]
                    created_date:
                      from_date: "2024-01-01"
                      to_date: "2024-12-31"
                    delivery_type: ["ONE_TIME"]
                    status: ["ACTIVE"]
                    tags: ["summer", "sale"]
                  include_child_campaigns: true
                  include_archive_campaigns: false
                  limit: 15
                  page: 1
      responses:
        '200':
          description: Successfully retrieved campaign list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CampaignDetailsResponse'
              examples:
                email_campaign:
                  summary: Email Campaign Response
                  value:
                    - campaign_id: "camp_email_123"
                      status: "Active"
                      channel: "EMAIL"
                      campaign_delivery_type: "PERIODIC"
                      created_by: "john.doe@example.com"
                      created_at: "2024-07-04 08:00:54.847000"
                      sent_time: "2024-07-04 20:32:00"
                      basic_details:
                        name: "Weekly Newsletter"
                        content_type: "PROMOTIONAL"
                        subscription_category: "marketing"
                        tags: ["newsletter"]
                      connector:
                        connector_type: "SENDGRID"
                        connector_name: "default"
                push_campaign:
                  summary: Push Campaign Response
                  value:
                    - campaign_id: "camp_push_456"
                      status: "Scheduled"
                      channel: "PUSH"
                      campaign_delivery_type: "ONE_TIME"
                      created_by: "jane.smith@example.com"
                      created_at: "2025-06-26 12:09:20.209000"
                      sent_time: "2025-06-26 12:47:00.196000"
                      basic_details:
                        name: "Flash Sale Notification"
                        platforms: ["ANDROID", "IOS"]
                        tags: ["sale"]
                sms_campaign:
                  summary: SMS Campaign Response
                  value:
                    - campaign_id: "camp_sms_789"
                      status: "Active"
                      channel: "SMS"
                      campaign_delivery_type: "ONE_TIME"
                      created_by: "admin@example.com"
                      created_at: "2024-05-20 06:04:50.505000"
                      sent_time: "2024-05-20 06:04:50.505000"
                      sender_name: "MoEngage"
                      basic_details:
                        name: "Discount Code SMS"
                        tags: ["discount"]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-mint:
        metadata:
          title: "Search Campaigns"
          description: "Search and retrieve campaigns across Push, Email, and SMS channels with flexible filtering options."
  
  /campaigns/test:
    post:
      operationId: test_campaign
      summary: Test Campaign
      description: |
        Send a test campaign to specific users or identifiers before launching it to your entire audience.
        
        **Supported Channels:**
        - **PUSH**: Test Push notification campaigns
        - **EMAIL**: Test Email campaigns
        
        <Info>
        **Important Information:**
        - You can only test campaigns created via the API, not campaigns created through the MoEngage Dashboard
        - For Email: Maximum 10 users can be tested at a time
        - If using EMAIL identifier, content will not be personalized with user profile data
        </Info>
        
        <Note>
        **Personalization Behavior:**
        - When you pass personalization_details, MoEngage uses those values instead of the user's actual profile data
        - The same personalization values apply to all test recipients
        - If you pass only a subset of attributes, remaining values are picked from the user profile
        </Note>
        
        <Tip>
        Use the **Body** tabs below to select your campaign type:
        - Select **Push Campaign** tab for testing Push notifications
        - Select **Email Campaign** tab for testing Email campaigns
        </Tip>
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: Test campaign configuration including content and target test users.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignTestRequest'
            examples:
              push_test_basic:
                summary: Push - Test with User ID
                value:
                  request_id: "test_push_123"
                  channel: "PUSH"
                  basic_details:
                    name: "Flash Sale Push Test"
                    platforms: ["ANDROID", "IOS"]
                    platform_specific_details:
                      android:
                        push_amp_plus_enabled: true
                      ios:
                        send_to_all_eligible_device: true
                        exclude_provisional_push_devices: false
                        send_to_only_provisional_push_enabled_devices: false
                  campaign_content:
                    content:
                      push:
                        android:
                          template_type: "BASIC"
                          basic_details:
                            notification_channel: "general"
                            title: "Test: Flash Sale!"
                            message: "Testing message content"
                            default_click_action: "DEEPLINKING"
                            default_click_action_value: "https://example.com/sale"
                        ios:
                          template_type: "BASIC"
                          basic_details:
                            title: "Test: Flash Sale!"
                            message: "Testing message content"
                            default_click_action: "DEEPLINKING"
                            default_click_action_value: "https://example.com/sale"
                  test_campaign_meta:
                    identifier: "USER_ATTRIBUTE_UNIQUE_ID"
                    identifier_values: ["user_12345"]
              email_test_with_personalization:
                summary: Email - Test with Personalization
                value:
                  request_id: "test_email_456"
                  channel: "EMAIL"
                  basic_details:
                    name: "Newsletter Test"
                    content_type: "PROMOTIONAL"
                    subscription_category: "marketing"
                    user_attribute_identifier: "MOE_EMAIL_ID"
                  connector:
                    connector_type: "SENDGRID"
                    connector_name: "default"
                  campaign_content:
                    content:
                      email:
                        subject: "Test: Weekly Newsletter"
                        preview_text: "Testing email content"
                        sender_name: "MoEngage Store"
                        from_address: "noreply@example.com"
                        reply_to_address: "support@example.com"
                        html_content: "<!DOCTYPE html><html><body><p>Hi {{UserAttribute['First Name']}},</p><p>Testing personalized content</p></body></html>"
                  personalization_details:
                    user_attributes:
                      First Name: "John"
                      Last Name: "Doe"
                    event_attributes:
                      Campaign Name: "Test Campaign"
                  test_campaign_meta:
                    identifier: "EMAIL"
                    identifier_values: ["john.doe@example.com", "jane.smith@example.com"]
              email_test_locale_variation:
                summary: Email - Test with Locale & Variation
                value:
                  request_id: "test_email_locale"
                  channel: "EMAIL"
                  basic_details:
                    name: "Multi-locale Test"
                    content_type: "PROMOTIONAL"
                    subscription_category: "marketing"
                    user_attribute_identifier: "MOE_EMAIL_ID"
                  connector:
                    connector_type: "SENDGRID"
                    connector_name: "default"
                  campaign_content:
                    locales: ["en-US", "es-ES", "default"]
                    content:
                      "en-US":
                        variation_1:
                          email:
                            subject: "Test EN"
                            sender_name: "Store"
                            from_address: "noreply@example.com"
                            reply_to_address: "support@example.com"
                            html_content: "<html><body>English content</body></html>"
                  test_campaign_meta:
                    identifier: "ID"
                    identifier_values: ["user_001"]
                    locale_name: "en-US"
                    variation: "variation_1"
      responses:
        '200':
          description: Test campaign sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCampaignSuccessResponse'
              examples:
                success:
                  summary: Successful Test
                  value:
                    data:
                      user_12345:
                        status: "success"
                    message: "Test campaign created successfully"
                partial_success:
                  summary: Partial Success
                  value:
                    data:
