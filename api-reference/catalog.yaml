openapi: 3.0.3
info:
  title: MoEngage Catalog API
  description: |
    This API allows for the management of product and item catalogs, including **creation**, **attribute definition**, and **item ingestion, updates, and deletion**.

    Authentication is handled via **Basic Auth** (using your Workspace ID as username and API Key as password), and all requests additionally require the `MOE-APPKEY` header (Workspace ID).
    
    The API has a platform-wide rate limit of **100 requests/minute OR 1000 requests/hour**, with a maximum payload size of **5MB**.
  version: '1.0'
servers:
  - url: 'https://api-{dc}.moengage.com/v1'
    variables:
      dc:
        default: '01'
        description: 'The data center number for your account (e.g., 01, 02, 03). Refer to the MoEngage documentation for mapping.'
tags:
  - name: Catalog
    description: Operations related to creating and managing catalog schemas (attributes).
  - name: Items
    description: Operations related to ingesting, updating, and deleting items within a catalog.
security:
  - basicAuth: [] # Basic Auth for API Key/Secret
  - AppKeyHeader: [] # Header for MOE-APPKEY

paths:
  /catalog:
    post:
      tags:
        - Catalog
      summary: Create a New Catalog
      operationId: createCatalog
      description: |
        This API allows you to create a new catalog with a unique name and specify the necessary attributes along with their respective data types.
      x-mint:
        content: |
          ### Mandatory Attributes
          Every catalog item must include the following attributes, all with a `string` data type:
          * **id**: Unique ID that represents the item.
          * **title**: Name of the item.
          * **link**: Web link of the item.
          * **image_link**: Image source link of the item.

          The request body accepts a maximum of **50 attributes** in total, including these 4 mandatory attributes.

          ---
          ### Rate Limit
          This API shares a platform-wide rate limit:
          * **Request limit**: 100/min OR 1000/hr.
          * **Payload size limit**: 5MB (when Content-Length header is provided).
          
          > **Note:** The limit is a COMBINED limit across all the Catalog APIs for a given user.

          ---
          ### FAQs
          
          #### What are the benefits of using the API catalog over a file-based catalog?
          API catalogs automate real-time updates such as price and quantity. They offer improved efficiency and scalability by updating only specific products, unlike file-based catalogs, which require the replacement of the whole file at each processing schedule. These APIs can be accessed and used to update from any location.
          
          #### What are the error codes?
          Each error codes are uniquely defined shorthand representation for the type of error, providing a quick reference that can be used to diagnose, troubleshoot, and address the problem based on a predefined set of error conditions.
          
          #### Is it possible to change the data type of an attribute once an API catalog is created?
          No, the datatype can not be changed once an attribute has be defined in the catalog. You can add a new attribute to the catalog with a different datatype as needed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCatalogRequest'
            examples:
              example-1:
                summary: Basic catalog creation
                value:
                  name: "SummerCollection2024"
                  price_currency: "USD"
                  attributes:
                    - name: "id"
                      type: "string"
                    - name: "title"
                      type: "string"
                    - name: "link"
                      type: "string"
                    - name: "image_link"
                      type: "string"
                    - name: "price"
                      type: "double"
                    - name: "in_stock"
                      type: "bool"
      responses:
        '201':
          description: Catalog created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalog_id:
                    type: string
                    description: |
                      The unique ID corresponding to a successful catalog creation.
                      This ID must be stored by you and used as a path parameter
                      for all subsequent item ingestion and modification requests.
                    example: "6a4d7b0f-9e3c-4b1a-8f6e-2d9c0b1a3e5d"
              example:
                catalog_id: "{{Catalog_id}}"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Conflict - A catalog with the provided name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error-code: "duplicate-catalog-name"
                message: "Catalog name already exists. Please use a different name for your catalog and try again."
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /catalog/{catalog_id}/attributes:
    patch:
      tags:
        - Catalog
      summary: Add Catalog Attributes
      operationId: addCatalogAttributes
      description: |
        You can use this API to add new attributes to the catalog. If the API request contains attributes that already exist, they will not be added again.
      x-mint:
        content: |
          ---
          ### Rate Limit
          This API shares a platform-wide rate limit:
          * **Request limit**: 100/min OR 1000/hr.
          * **Payload size limit**: 5MB (when Content-Length header is provided).

          > **Note:** The limit is a COMBINED limit across all the Catalog APIs for a given user.

          ---
          ### FAQs
          
          #### How many attributes can I add to a catalog?
          A maximum of 50 attributes can be added to the catalog.
          
          #### What are the error codes?
          Each error codes are uniquely defined shorthand representation for the type of error, providing a quick reference that can be used to diagnose, troubleshoot, and address the problem based on a predefined set of error conditions.
          
          #### Is it possible to change the data type of an attribute once an API catalog is created?
          No, the datatype can not be changed once an attribute has be defined in the catalog. You can add a new attribute to the catalog with a different datatype as needed.
      parameters:
        - $ref: '#/components/parameters/CatalogIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - attributes
              properties:
                attributes:
                  type: array
                  description: A list of new attributes to add to the catalog schema.
                  items:
                    $ref: '#/components/schemas/AttributeDefinition'
            examples:
              example-1:
                summary: Add new attributes
                value:
                  attributes:
                    - name: "color"
                      type: "string"
                    - name: "weight_kg"
                      type: "double"
      responses:
        '202':
          description: Accepted. The request was processed. The response contains a list of attributes that were already present and ignored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  duplicate-item-attributes:
                    type: array
                    description: A list of attributes that already existed in the catalog and were ignored.
                    items:
                      type: string
                    example: ["colour", "weight"]
              example:
                success: true
                duplicate-item-attributes:
                  - colour
                  - weight
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /catalog/{catalog_id}/items:
    post:
      tags:
        - Items
      summary: Ingest Catalog Items (Max 50)
      operationId: ingestCatalogItems
      description: |
        You can use this API to ingest items into an existing catalog as long as the attributes provided during ingestion match the attributes provided during catalog creation.
      x-mint:
        content: |
          ---
          ### Rate Limit
          This API shares a platform-wide rate limit:
          * **Request limit**: 100/min OR 1000/hr. You can ingest up to 50 items per request.
          * **Payload size limit**: 5MB (when Content-Length header is provided).
          
          > **Note:** The limit is a COMBINED limit across all the Catalog APIs for a given user.

          ---
          ### FAQs
          
          #### How long does it take to reflect the newly added items in MoEngage?
          All MoEngage catalog APIs operate synchronously. This means that every catalog API request is processed in real time, and you can see the changes instantly.
          
          #### What are the error codes?
          Each error codes are uniquely defined shorthand representation for the type of error, providing a quick reference that can be used to diagnose, troubleshoot, and address the problem based on a predefined set of error conditions.
          
          #### Is it possible to change the data type of an attribute once an API catalog is created?
          No, the datatype can not be changed once an attribute has be defined in the catalog. You can add a new attribute to the catalog with a different datatype as needed.
      parameters:
        - $ref: '#/components/parameters/CatalogIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  maxItems: 50
                  description: An array of item objects to add to the catalog. Each item must contain the mandatory attributes (`id`, `title`, `link`, `image_link`).
                  items:
                    $ref: '#/components/schemas/CatalogItem'
      responses:
        '200':
          description: OK. The ingestion request was processed. The response body contains details on valid and invalid item counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestUpdateResponse'
              example:
                message:
                  valid:
                    count: 1
                  invalid:
                    count: 8
                    details:
                      - error-id: duplicate-item-ids
                        message: "Item ids within a catalog must be unique. Please ensure your request contains unique item ids for the given catalog and try again."
                        count: 1
                        document_ids:
                          - '567890'
                      - error-id: missing-mandatory-attributes
                        message: "Your must include mandatory attributes: id, title, link, and image_link with string data type and try again."
                        count: 1
                        document_ids:
                          - '567890'
                      - error-id: invalid-datatype-attribute
                        message: "The provided item attribute {attribute name} with value {attribute value} can't be converted to the data type {data type} as defined in the catalog schema."
                        count: 1
                        document_ids:
                          - '7523675'
                      - error-id: invalid-item-attribute
                        message: "The provided item attribute is not part of the defined catalog schema. Please check your catalog schema and try again. Undefined attributes: shipping_price"
                        count: 2
                        document_ids:
                          - '312'
                          - '8291379'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      tags:
        - Items
      summary: Update Catalog Items (Max 50)
      operationId: updateCatalogItems
      description: |
        You can use this API to update items with new attribute values. Attributes must adhere to the data type defined and only 50 items are allowed to be updated in a single request.
      x-mint:
        content: |
          > **Prerequisite**: Before updating existing items with new attributes, you must first add the new attribute to the catalog schema using the `PATCH /catalog/{catalog_id}/attributes` API.

          ---
          ### Rate Limit
          This API shares a platform-wide rate limit:
          * **Request limit**: 100/min OR 1000/hr. You can update up to 50 items per request.
          * **Payload size limit**: 5MB (when Content-Length header is provided).
          
          > **Note:** The limit is a COMBINED limit across all the Catalog APIs for a given user.

          ---
          ### FAQs
          
          #### How long does it take to reflect the updates for the items in MoEngage?
          All MoEngage catalog APIs operate synchronously. This means that every catalog API request is processed in real time, and you can see the changes instantly.
          
          #### What are the error codes?
          Each error codes are uniquely defined shorthand representation for the type of error, providing a quick reference that can be used to diagnose, troubleshoot, and address the problem based on a predefined set of error conditions.
          
          #### Can I add a new attribute in payload while sending updates for existing items?
          Before updating existing items with new attributes, you must first add the new attribute to the catalog schema using the 'Add catalog attribute' API. Only then will your update requests for including new attributes be successful.
          
          #### Is it possible to change the data type of an attribute once an API catalog is created?
          No, the datatype can not be changed once an attribute has be defined in the catalog. You can add a new attribute to the catalog with a different datatype as needed.
      parameters:
        - $ref: '#/components/parameters/CatalogIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  maxItems: 50
                  description: An array of item updates. Each object must contain the item `id` and the `attributes` to update.
                  items:
                    $ref: '#/components/schemas/ItemUpdate'
            example:
              items:
                - id: Existing_item_ID
                  attributes:
                    attribute_name: updated_value
                - id: test2
                  attributes:
                    price: 98
      responses:
        '200':
          description: OK. The update request was processed. The response body contains details on valid and invalid item counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestUpdateResponse'
              example:
                message:
                  valid:
                    count: 1
                  invalid:
                    count: 8
                    details:
                      - error-id: item-not-found
                        message: "Item with id %s not found in the catalog. Please check the item id and try again."
                        count: 1
                        document_ids:
                          - '567890'
                      - error-id: invalid-attributes
                        message: "Some of the attributes are not defined in the catalog schema: (shipping_city)"
                        count: 2
                        document_ids:
                          - '312'
                          - '8291379'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /catalog/{catalog_id}/items/bulk-delete:
    post:
      tags:
        - Items
      summary: Bulk Delete Catalog Items (Max 50)
      operationId: deleteCatalogItems
      description: |
        You can use this API to delete existing items in a given catalog. Only 50 items are allowed to be deleted in a single request.
      x-mint:
        content: |
          ---
          ### Rate Limit
          This API shares a platform-wide rate limit:
          * **Request limit**: 100/min OR 1000/hr. You can delete up to 50 items per request.
          * **Payload size limit**: 5MB (when Content-Length header is provided).
          
          > **Note:** The limit is a COMBINED limit across all the Catalog APIs for a given user.

          ---
          ### FAQs
          
          #### What happens if my payload consist of items which are not in catalog?
          The request will be processed successfully marking such items as invalid. The response will include the count of these invalid item ids.
      parameters:
        - $ref: '#/components/parameters/CatalogIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  maxItems: 50
                  description: An array of item IDs to delete from the catalog.
                  items:
                    type: string
                    example: "item_id_123"
            example:
              items:
                - "{{item_ID}}"
      responses:
        '202':
          description: Accepted. The bulk delete request was processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      valid:
                        type: object
                        properties:
                          count:
                            type: integer
                            description: The number of items successfully deleted.
                      invalid:
                        type: object
                        properties:
                          count:
                            type: integer
                            description: The number of items that were not found and could not be deleted.
              example:
                message:
                  valid:
                    count: 0
                  invalid:
                    count: 10
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic Authentication sends a Base64-encoded string containing your username and password.
        
        You can obtain the username and password from the MoEngage Dashboard:
        1.  Navigate to **Settings > Account > APIs**.
        2.  **Username**: Copy the **Workspace ID**.
        3.  **Password**: Copy the **Catalog API** key.
    AppKeyHeader:
      type: apiKey
      in: header
      name: MOE-APPKEY
      description: |
        This is the Workspace ID (earlier APP ID) of your MoEngage workspace. This header is mandatory for all requests.
        
        You can find your MoEngage Workspace ID in the MoEngage Dashboard:
        **Settings > Account > APIs > Workspace ID**
  parameters:
    CatalogIdPath:
      name: catalog_id
      in: path
      required: true
      description: The unique identifier for the catalog, obtained during catalog creation.
      schema:
        type: string
  schemas:
    AttributeDefinition:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: The name of the attribute (e.g., 'color', 'price').
        type:
          type: string
          description: The data type of the attribute.
          enum: [string, bool, double, datetime, geopoint]
    CreateCatalogRequest:
      type: object
      required:
        - name
        - attributes
        - price_currency
      properties:
        name:
          type: string
          description: A unique name for the catalog.
          example: "ProductCatalog"
        price_currency:
          type: string
          description: The ISO 4217 currency code for prices in the catalog.
          enum: [USD, CAD, EUR, AED, AFN, ALL, AMD, AOA, ARS, AUD, AZN, BAM, BDT, BGN, BHD, BIF, BND, BOB, BRL, BWP, BYR, BZD, CDF, CHF, CLP, CNY, COP, CRC, CVE, CZK, DJF, DKK, DOP, DZD, EEK, EGP, ERN, ETB, GBP, GEL, GHS, GNF, GTQ, HKD, HNL, HRK, HUF, IDR, ILS, INR, IQD, IRR, ISK, JMD, JOD, JPY, KES, KHR, KMF, KRW, KWD, KZT, LBP, LKR, LTL, LVL, LYD, MAD, MDL, MGA, MKD, MMK, MOP, MUR, MXN, MYR, MZN, NAD, NGN, NIO, NOK, NPR, NZD, OMR, PAB, PEN, PHP, PKR, PLN, PYG, QAR, RON, RSD, RUB, RWF, SAR, SDG, SEK, SGD, SOS, SYP, THB, TND, TOP, TRY, TTD, TWD, TZS, UAH, UGX, UYU, UZS, VEF, VND, XAF, XOF, YER, ZAR, ZMK]
        attributes:
          type: array
          maxItems: 50
          description: |
            An array defining the schema of attributes for this catalog.
            'id', 'title', 'link', and 'image_link' are mandatory attributes
            and must be included here with the `string` type.
          items:
            $ref: '#/components/schemas/AttributeDefinition'
    CatalogItem:
      type: object
      required:
        - id
        - title
        - link
        - image_link
      properties:
        id:
          type: string
          description: The unique identifier for the catalog item.
        title:
          type: string
          description: The title or name of the catalog item.
        link:
          type: string
          format: uri
          description: The deep link or URL to the item's page.
        image_link:
          type: string
          format: uri
          description: The URL of the primary image for the item.
      # Allows for all other user-defined attributes based on AttributeDefinition
      additionalProperties: true
      example:
        id: "item-sku-123"
        title: "Classic T-Shirt"
        link: "https://example.com/products/item-123"
        image_link: "https://example.com/images/item-123.jpg"
        brand_attribute: "Super Tech"
        in_stock: true
        price: 19.99
    ItemUpdate:
      type: object
      required:
        - id
        - attributes
      properties:
        id:
          type: string
          description: The unique ID of the item to update.
        attributes:
          type: object
          description: |
            A key-value map of attributes to update for the item. The keys
            must match existing attributes in the catalog schema, and values
            must match the defined data types.
          additionalProperties: true
          example:
            price: 24.99
            in_stock: false
    Error:
      type: object
      properties:
        error-code:
          type: string
          description: A machine-readable error code.
        message:
          type: string
          description: A human-readable description of the error.
    IngestUpdateResponse:
      type: object
      properties:
        message:
          type: object
          properties:
            valid:
              type: object
              properties:
                count:
                  type: integer
                  description: The number of items successfully processed.
            invalid:
              type: object
              properties:
                count:
                  type: integer
                  description: The number of items that failed processing.
                details:
                  type: array
                  items:
                    type: object
                    properties:
                      error-id:
                        type: string
                        description: A unique ID indicating the type of ingestion/update failure.
                        example: "duplicate-item-ids"
                      message:
                        type: string
                        description: The reason for the failure.
                        example: "Item ids within a catalog must be unique."
                      count:
                        type: integer
                        description: The number of items that failed due to this specific error.
                        example: 1
                      document_ids:
                        type: array
                        items:
                          type: string
                        description: The IDs of the items that failed.
                        example: ["item_id_xyz"]
  responses:
    BadRequest:
      description: Bad Request - The request is improperly formatted, or contains missing/invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalid-datatype:
              value:
                error-code: "invalid-request"
                message: "The data type provided for some of the attributes is invalid."
            invalid-json:
              value:
                error-code: "invalid-request"
                message: "The request body is not a valid JSON. Please provide a valid JSON request body."
            limit-exceeded:
              value:
                error-code: "invalid-request"
                message: "items size should be greater than 0 and less than or equal to 50"
    Unauthorized:
      description: Unauthorized - The request does not have valid authentication credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error-code: "request-unauthenticated"
            message: "Your request is unauthorized. Please verify your credentials and try again."
    Forbidden:
      description: Forbidden - The client does not have access rights to the Catalog APIs.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error-code: "request-denied"
            message: "Your account does not have access to the Catalog APIs."
    NotFound:
      description: Not Found - The specified resource (catalog) could not be found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error-code: "catalog-not-found"
            message: "We could not find any API based catalog for the provided catalog id."
    PayloadTooLarge:
      description: Payload Too Large - The request payload exceeds the 5MB limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error-code: "payload-size-exceeded"
            message: "Your payload size exceeds the 5MB limit. Please reduce the payload size and try again."
    TooManyRequests:
      description: |
        Too Many Requests - The rate limit for the API has been exceeded.
        
        The following headers are returned in case of rate-limit breach:
        * **x-ratelimit-limit (integer)**: The maximum number of requests that the consumer is permitted to make in a given time window.
        * **x-ratelimit-remaining (integer)**: The number of requests remaining in the current rate limit window.
        * **x-ratelimit-reset (integer)**: The time at which the current rate limit window resets in UTC epoch seconds.