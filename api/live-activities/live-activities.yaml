openapi: 3.0.3
info:
  title: MoEngage Broadcast Live Activities API
  version: '1.0'
  description: API for starting, updating, and ending broadcast Live Activities for iOS Push Campaigns. Live Activities must be created via the Create Push Campaigns API with the `BROADCAST_LIVE_ACTIVITY` delivery type.
tags:
  - name: Live Activities
    description: Operations to manage broadcast Live Activities for iOS.
servers:
  - url: 'https://api-0{dc}.moengage.com/v1.0'
    description: "Live Activities API Server"
    variables:
      dc:
        default: '1'
        description: "Your MoEngage Data Center (DC). Can be 1, 2, 3, etc."
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
  - url: 'https://sandbox-api-0{dc}.moengage.com/v1.0'
    description: "Test/Sandbox Live Activities API Server"
    variables:
      dc:
        default: '1'
        description: "Your MoEngage Data Center (DC). Can be 1, 2, 3, etc."
        enum:
          - '1'
          - '2'
          - '3'
          - '4'
security:
  - basicAuth: []
    moeAppKey: []

paths:
  /live-activity/broadcast/start:
    post:
      tags:
        - Live Activities
      summary: Start Broadcast Live Activity
      description: |
        Initiates a shared, real-time activity for a large audience, such as a live sporting match or real-time election result tracking.
      x-mint:
        content: |
          <Note>
          You can start live activities for only push campaigns created with the BROADCAST_LIVE_ACTIVITY delivery type using the [Create Push Campaigns API](https://developers.moengage.com/hc/en-us/articles/38466364097044-Create-Push-Campaigns), not campaigns created through the MoEngage UI.
          </Note>
          #### Rate Limit
          The rate limit for this endpoint is 5 requests per minute per workspace.
      parameters:
        - name: X-MOE-APPKEY
          in: header
          required: true
          schema:
            type: string
          description: |
            This is the Workspace ID of your MoEngage account that must be passed with the request. You can find it in the MoEngage dashboard at **Settings** > **Account** > **APIs** > **Workspace ID (earlier app id)**.
          example: 'YOUR_WORKSPACE_ID_XXXX'
      requestBody:
        required: true
        description: |
          The configuration for starting the Live Activity, including the initial content and alert message.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartLiveActivityRequest'
      responses:
        '200':
          description: Success. The live activity instance was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request - Mandatory fields are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
              example:
                error:
                  code: "PayloadError"
                  message: "Mandatory fields are missing or invalid"
                  details:
                    - code: "extra_forbidden"
                      target: "ios.alert.metrics"
                      message: "Extra inputs are not permitted"
        '401':
          description: Unauthorized - Invalid credentials or missing headers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              examples:
                invalid-app-key:
                  summary: Invalid App Key
                  value:
                    error:
                      code: "AuthError"
                      message: "Invalid App Key"
                invalid-data-key:
                  summary: Invalid Data Key
                  value:
                    error:
                      code: "AuthError"
                      message: "Invalid Data Key"
                missing-headers:
                  summary: Missing Authorization Headers
                  value:
                    error:
                      code: "AuthError"
                      message: "Authorization header or X-MOE-APPKEY is missing"
        '403':
          description: Forbidden - Operation not allowed due to logic or permission constraints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              examples:
                campaign-not-found:
                  summary: Campaign Not Found
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Campaign not found for <broadcast live activity id>"
                ios-token-required:
                  summary: iOS Token Required
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Only IOS token auth is allowed, please upload .p8 file"
                duplicate-request:
                  summary: Duplicate Request
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Duplicate Request, please use different instance_id"
                limit-reached:
                  summary: Max Instances Limit Reached
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Max Instances Limit Reached"
        '413':
          description: Payload Too Large - The payload exceeds the limit (e.g., 5120 bytes for iOS).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              example:
                error:
                  code: "PayloadSizeError"
                  message: "Payload size exceeded for IOS. Max size is 5120 bytes"
        '429':
          description: Too Many Requests.
          content:
            application/json:
              schema:
                type: array
                items: {}
              example: []
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              example:
                error:
                  code: "ServerError"
                  message: "Internal Server Error, something went wrong"

  /live-activity/broadcast/update:
    post:
      tags:
        - Live Activities
      summary: Update Broadcast Live Activity
      description: |
        Pushes a single, unified update to all subscribed Live Activities, such as an updated game score or a new development in a breaking news story.
      x-mint:
        content: |
          #### Rate Limit
          The rate limit for this endpoint is 500 requests per minute per workspace and 5 requests per minute per live activity ID.
      parameters:
        - name: X-MOE-APPKEY
          in: header
          required: true
          schema:
            type: string
          description: |
            This is the Workspace ID of your MoEngage account. You must pass the X-MOE-APPKEY in the request. You can find it in the MoEngage dashboard at **Settings** > **Account** > **APIs** > **Workspace ID (earlier app id)**.
          example: 'YOUR_WORKSPACE_ID_XXXX'
        - name: X-Broadcast-Live-Activity-Id
          in: header
          required: true
          description: |
             The unique identifier for the broadcast Live Activity campaign being updated.             
          schema:
            type: string
      requestBody:
        required: true
        description: |
          The payload containing the updated content state and optional alert for the Live Activity.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLiveActivityRequest'
      responses:
        '200':
          description: Success. The live activity was updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request - Mandatory fields are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
              example:
                error:
                  code: "PayloadError"
                  message: "Mandatory fields are missing or invalid"
                  details:
                    - code: "extra_forbidden"
                      target: "ios.alert.metrics"
                      message: "Extra inputs are not permitted"
        '401':
          description: Unauthorized - Invalid credentials or missing headers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              examples:
                invalid-app-key:
                  summary: Invalid App Key
                  value:
                    error:
                      code: "AuthError"
                      message: "Invalid App Key"
                invalid-data-key:
                  summary: Invalid Data Key
                  value:
                    error:
                      code: "AuthError"
                      message: "Invalid Data Key"
                missing-headers:
                  summary: Missing Authorization Headers
                  value:
                    error:
                      code: "AuthError"
                      message: "Authorization header or X-MOE-APPKEY is missing"
        '403':
          description: Forbidden - Operation not allowed due to logic or permission constraints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              examples:
                campaign-not-found:
                  summary: Campaign Not Found
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Campaign not found for <broadcast live activity id>"
                ios-token-required:
                  summary: iOS Token Required
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Only IOS token auth is allowed, please upload .p8 file"
                invalid-action:
                  summary: Invalid Action
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Invalid Action"
                duplicate-request:
                  summary: Duplicate Request
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Duplicate Request, please use different instance_id"
                dismissal-passed:
                  summary: Dismissal Date Passed
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Dismissal date is already passed"
                limit-reached:
                  summary: Max Instances Limit Reached
                  value:
                    error:
                      code: "OperationNotAllowed"
                      message: "Max Instances Limit Reached"
        '413':
          description: Payload Too Large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              example:
                error:
                  code: "PayloadSizeError"
                  message: "Payload size exceeded for IOS. Max size is 5120 bytes"
        '429':
          description: Too Many Requests.
          content:
            application/json:
              schema:
                type: array
                items: {}
              example: []
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              example:
                error:
                  code: "ServerError"
                  message: "Internal Server Error, something went wrong"

  /live-activity/broadcast/end:
    post:
      tags:
        - Live Activities
      summary: End Broadcast Live Activity
      description: |
        Simultaneously terminates a broadcast Live Activity across all subscribed devices, with options for a final state update or immediate dismissal.
      x-mint:
        content: |
          #### Rate Limit
          The rate limit for this endpoint is 500 requests per minute per workspace and 5 requests per minute per live activity ID.
      parameters:
        - name: X-MOE-APPKEY
          in: header
          required: true
          schema:
            type: string
          description: |
            This is the Workspace ID of your MoEngage account. You must pass the the X-MOE-APPKEY in the request. You can find it in the MoEngage dashboard at **Settings** > **Account** > **APIs** > **Workspace ID (earlier app id)**.
          example: 'YOUR_WORKSPACE_ID_XXXX'
        - name: X-Broadcast-Live-Activity-Id
          in: header
          required: true
          description: |
             The unique identifier for the broadcast Live Activity campaign being ended.
          schema:
            type: string
      requestBody:
        required: true
        description: |
          The payload containing the final content state and dismissal information for the Live Activity.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndLiveActivityRequest'
      responses:
        '200':
          description: Success. The live activity was ended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request - Mandatory fields are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
              example:
                error:
                  code: "PayloadError"
                  message: "Mandatory fields are missing or invalid"
                  details:
                    - code: "extra_forbidden"
                      target: "ios.alert.metrics"
                      message: "Extra inputs are not permitted"
        '401':
          description: Unauthorized - Invalid credentials or missing headers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicErrorResponse'
              examples:
                invalid-app-key:
                  summary: Invalid App Key
                  value:
                    error:
                      code: "AuthError"
                      message: "Invalid App Key"
                invalid-data-key:
                  summary: Invalid Data Key
                  value:
                    error:
                      code: "AuthError"
