  /v5/campaigns/{campaign_id}:
    get:
      operationId: get_single_campaign_v5
      summary: Get Campaign
      description: |
        Returns the full configuration and current status of a single campaign by its ID.
      x-mint:
        content: |
          <Info>
          The campaign identifier field has been renamed in V5. V1 returned it as `campaign_id`; V5 returns it as `id`. Update your integration to read `id` from the response instead of `campaign_id`.
          </Info>

          **Migration from V1:**
          - In V1, a specific campaign was retrieved using `POST /v1/campaigns/search` with `campaign_fields.id`.
          - In V5, use this `GET` endpoint for single-campaign retrieval.
          - Use `POST /v5/campaigns/search` only when filtering across multiple campaigns.

          **SMS campaigns:**
          - SMS campaigns are returned by this endpoint; the response `channel` field will be `SMS`.
          - The `connector` and `sender_name` fields carry SMS-specific details.
          - SMS campaigns can be retrieved but must be created and managed through the MoEngage dashboard or V1 APIs in the interim.

          #### Rate Limits

          | Rate Limit Name | Rate Limit |
          | :--- | :--- |
          | Get campaign per second | The total number of get campaign requests per second per client allowed is 10. |
          | Get campaign per minute | The total number of get campaign requests per minute per client allowed is 100. |
          | Get campaign per hour | The total number of get campaign requests per hour per client allowed is 6000. |

          <Note>
            **Notes**
            * Breaching the limits will reject the request.
            * Per-hour limits use a rolling window of the last 1 hour.
          </Note>
