              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Idempotency-Key: {{idempotency_key}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "channel": "PUSH",
                "basic_details": {
                  "name": "{{campaign_name}}",
                  "platforms": ["WEB"]
                },
                "campaign_content": {
                  "content": {
                    "push": {
                      "web": {
                        "template_type": "BASIC",
                        "basic_details": {
                          "title": "{{title}}",
                          "message": "{{message}}",
                          "redirect_url": "{{redirect_url}}"
                        }
                      }
                    }
                  }
                },
                "test_campaign_meta": {
                  "identifier": "USER_ATTRIBUTE_UNIQUE_ID",
                  "identifier_values": ["{{identifier_value}}"]
                }
              }'
        - lang: Shell
          label: Email - Draft mode (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/campaigns/test' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Idempotency-Key: {{idempotency_key}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "draft_id": "{{campaign_id}}",
                "test_campaign_meta": {
                  "identifier": "EMAIL",
                  "identifier_values": ["{{recipient_email}}"]
                }
              }'
        - lang: Shell
          label: Push - Draft mode iOS (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/campaigns/test' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Idempotency-Key: {{idempotency_key}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "draft_id": "{{campaign_id}}",
                "test_campaign_meta": {
                  "identifier": "USER_ATTRIBUTE_UNIQUE_ID",
                  "identifier_values": ["{{identifier_value}}"],
                  "platform": "IOS"
                }
              }'
        - lang: Shell
          label: Push - Draft mode Web (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/campaigns/test' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Idempotency-Key: {{idempotency_key}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "draft_id": "{{campaign_id}}",
                "test_campaign_meta": {
                  "identifier": "USER_ATTRIBUTE_UNIQUE_ID",
                  "identifier_values": ["{{identifier_value}}"],
                  "platform": "WEB"
                }
              }'
      x-mint:
        content: |
          The endpoint supports two modes:

          **Inline mode**
          - Send `channel` and `campaign_content` in the request.
          - For **EMAIL** campaigns, also include `connector`.
          - Nothing is stored on the server.

          **Draft mode**
          - Send `draft_id` to load content from a saved **DRAFT**.
          - By default, the server sends one test per platform, locale, and variation.
          - To narrow the send, use `test_campaign_meta.platform`, `locale_name`, or `variation`.

          #### Rate Limits

          | Rate Limit Name | Rate Limit |
          | :--- | :--- |
          | Test campaign per second | The total number of test campaign requests per second per client allowed is 10. |
          | Test campaign per minute | The total number of test campaign requests per minute per client allowed is 100. |
          | Test campaign per hour | The total number of test campaign requests per hour per client allowed is 6000. |

          <Note>
            **Notes**
            * Breaching the limits will reject the request.
            * Per-hour and per-day limits use a rolling window of the last 1 hour and last 24 hours respectively.
          </Note>
      tags: [Test Campaigns]
      parameters:
        - $ref: '#/components/parameters/X-MOE-Tenant-ID'
        - $ref: '#/components/parameters/X-MOE-Request-Id'
        - $ref: '#/components/parameters/Idempotency-Key-Required'
      requestBody:
        description: >-
          Test campaign configuration including content and target test users.

          **Note:** Use the tabs below to select your campaign type. The schema will adapt based on the selected channel.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TestV5Request' }
      responses:
        '200':
          description: Test send result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V5SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TestCampaignResultData' }
              examples:
                push_sent:
                  summary: Push test sent successfully
                  value:
                    response_id: "abc-701"
                    type: "campaign"
                    data:
                      data:
                        ANDROID_default_variation_1:
                          status: "SENT"
                      message: "Test campaign processed"
                push_failed:
                  summary: Push test with one failed send
                  value:
                    response_id: "abc-702"
                    type: "campaign"
                    data:
                      data:
                        ANDROID_default_variation_1:
                          status: "FAILED"
                          failure_reason: "Invalid push token"
                      message: "Test campaign processed"
        '400':
          $ref: '#/components/responses/V5ValidationError'
        '401':
          $ref: '#/components/responses/V5Unauthorized'
        '409':
          description: >-
            Conflict - the `Idempotency-Key` was already used with a different request body, or a test send
            is already in progress for this key. Retry with a new `Idempotency-Key`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/V5ErrorEnvelope' }
              example:
                response_id: "abc-701"
                error:
                  code: BAD_REQUEST
                  message: "Idempotency-Key reused with a different request body."
                  details: []
        '500':
          $ref: '#/components/responses/V5InternalError'

  /v5/personalization/preview:
    post:
      operationId: preview_personalized_content_v5
      summary: Personalized Preview
      description: |
        Returns a fully resolved preview of personalised campaign content for a specific user - all user attributes, event attributes, content blocks, content APIs, product sets, and custom templates are rendered exactly as they would appear to that user at send time.

        No message is sent. This endpoint is a read-only inspection tool.

      x-mint:
        content: |

          #### Rate Limits

          | Rate Limit Name | Rate Limit |
          | :--- | :--- |
          | Personalized preview per minute | 10,000 requests per minute |

      x-codeSamples:
        - lang: Shell
          label: Push personalized preview (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/personalization/preview' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "channel": "PUSH",
                "user_identification": {
                  "type": "USER_ATTRIBUTE_UNIQUE_ID",
                  "value": "{{user_id}}"
                },
                "campaign_content": {
                  "content": {
                    "push": {
                      "android": {
                        "template_type": "BASIC",
                        "basic_details": {
                          "title": "Hello, {{ user.first_name }}!",
                          "message": "{{ event.product_name }} is waiting for you."
                        }
                      }
                    }
                  }
                },
                "event_attributes": {
                  "product_name": "{{product_name}}"
                }
              }'
        - lang: Shell
          label: Email personalized preview (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/personalization/preview' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "channel": "EMAIL",
                "user_identification": {
                  "type": "EMAIL",
                  "value": "{{user_email}}"
                },
                "campaign_content": {
                  "content": {
                    "email": {
                      "subject": "Hello, {{ user.first_name }}!",
                      "html_content": "<p>Your order {{ event.order_id }} has shipped.</p>"
                    }
                  }
                },
                "event_attributes": {
                  "order_id": "{{order_id}}"
                }
              }'
      tags: [Personalized Preview]
      parameters:
        - $ref: '#/components/parameters/X-MOE-Tenant-ID'
        - $ref: '#/components/parameters/X-MOE-Request-Id'
      requestBody:
        description: >-
          Personalization preview request. Supply the target user identification and the campaign content to resolve.
          All Jinja expressions and dynamic sources are evaluated against the specified user's profile.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id, channel, user_identification, campaign_content]
              properties:
                request_id:
                  type: string
                  description: Unique identifier for this request. Correlates with `response_id`.
                channel:
                  type: string
                  enum: [PUSH, EMAIL, SMS]
                  description: Channel of the content to preview.
                user_identification:
                  type: object
                  description: Identifies the target user whose attributes are used to resolve personalisation.
                  required: [type, value]
                  properties:
                    type:
                      type: string
                      enum: [USER_ATTRIBUTE_UNIQUE_ID, EMAIL, MOE_GAID, PUSH_ID]
                      description: Identifier type.
                    value:
                      type: string
                      description: Value of the identifier.
                event_attributes:
                  type: object
                  description: >-
                    Optional map of event attribute key-value pairs to inject into personalisation resolution.
                    Useful for previewing event-triggered campaigns where the triggering event carries attributes.
                  additionalProperties:
                    type: string
                campaign_content:
                  type: object
                  description: >-
                    The campaign content to resolve. Follows the same `campaign_content` structure as the
                    Create Campaign request. Only the content sent here is evaluated - no saved draft is loaded.
            example:
              request_id: "preview-001"
              channel: "PUSH"
              user_identification:
                type: "USER_ATTRIBUTE_UNIQUE_ID"
                value: "user_abc123"
              event_attributes:
                product_name: "Running Shoes"
                product_price: "4999"
              campaign_content:
                content:
                  push:
                    android:
                      template_type: "BASIC"
                      basic_details:
                        title: "Hello, {{ user.first_name }}!"
                        message: "{{ event.product_name }} is waiting for you."
      responses:
        '200':
          description: Preview resolved successfully. Returns the fully rendered content for the specified user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response_id:
                    type: string
                  type:
                    type: string
                    example: "personalization"
                  data:
                    type: object
                    properties:
                      personalized_content:
                        type: object
                        description: >-
                          The resolved campaign content with all Jinja expressions, user attributes,
                          event attributes, and dynamic sources substituted.
              example:
                response_id: "preview-001"
                type: "personalization"
                data:
                  personalized_content:
                    content:
                      push:
                        android:
                          template_type: "BASIC"
                          basic_details:
                            title: "Hello, Jane!"
                            message: "Running Shoes is waiting for you."
        '400':
          $ref: '#/components/responses/V5ValidationError'
        '401':
          $ref: '#/components/responses/V5Unauthorized'
        '429':
          $ref: '#/components/responses/V5RateLimited'
        '500':
          $ref: '#/components/responses/V5InternalError'

  /v5/campaigns/{parent_campaign_id}/executions:
    post:
      operationId: get_child_campaigns_v5
      summary: Get Child Campaigns
      description: |
        Retrieves the execution history of a Periodic or Business Event-triggered campaign. Each execution (child campaign) represents one run of the parent campaign and returns the child's ID, send time, status, and the total number of executions to date.


      x-mint:
        content: |
         
          **Supported campaign types:** Periodic, Business Event-triggered

          **Supported channels:** Push, Email

          #### Rate Limits

          | Rate Limit Name | Rate Limit |
          | :--- | :--- |
          | Get child campaigns per second | 10 requests per second per client |
          | Get child campaigns per minute | 100 requests per minute per client |
          | Get child campaigns per hour | 6,000 requests per hour per client |

      x-codeSamples:
        - lang: Shell
          label: First page of executions (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/campaigns/{{parent_campaign_id}}/executions' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "limit": 15,
                "page": 1
              }'
        - lang: Shell
          label: Next page of executions (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/campaigns/{{parent_campaign_id}}/executions' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "limit": 15,
                "page": 2
              }'
      tags: [Get Campaign Details]
      parameters:
        - $ref: '#/components/parameters/X-MOE-Tenant-ID'
        - $ref: '#/components/parameters/X-MOE-Request-Id'
        - name: parent_campaign_id
          in: path
          required: true
          description: The `campaign_id` of the parent Periodic or Business Event-triggered campaign.
          schema:
            type: string
          example: "64a1b2c3d4e5f6a7b8c9d0e1"
      requestBody:
        description: Pagination parameters for the executions list.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id]
              properties:
                request_id:
                  type: string
                  description: Unique identifier for this request. Correlates with `response_id`.
                limit:
                  type: integer
                  minimum: 1
                  maximum: 15
                  default: 15
                  description: Maximum number of child campaign records to return per page.
                page:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Page number for pagination (1-indexed).
            example:
              request_id: "exec-001"
              limit: 15
              page: 1
      responses:
        '200':
          description: Execution history retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response_id:
                    type: string
                  type:
                    type: string
                    example: "campaign"
                  data:
                    type: object
                    properties:
                      total_instances:
                        type: integer
                        description: Total number of times the parent campaign has executed to date.
                      executions:
                        type: array
                        items:
                          type: object
                          properties:
                            campaign_id:
                              type: string
                              description: Unique ID of the child campaign execution.
                            sent_time:
                              type: string
                              format: date-time
                              description: ISO 8601 timestamp of when this execution was sent.
                            status:
                              type: string
                              enum: [SENT, SENDING, FAILED]
                              description: Status of this child campaign execution.
              example:
                response_id: "exec-001"
                type: "campaign"
                data:
                  total_instances: 4
                  executions:
                    - campaign_id: "64b2c3d4e5f6a7b8c9d0e1f2"
                      sent_time: "2024-11-25T08:00:00Z"
                      status: "SENT"
                    - campaign_id: "64b2c3d4e5f6a7b8c9d0e2f3"
                      sent_time: "2024-11-18T08:00:00Z"
                      status: "SENT"
        '400':
          $ref: '#/components/responses/V5ValidationError'
        '401':
          $ref: '#/components/responses/V5Unauthorized'
        '500':
          $ref: '#/components/responses/V5InternalError'

  /v5/global-control-group/users:
    put:
      operationId: update_global_control_group_v5
      summary: Update Global Control Group
      description: |
        Adds or removes users from the Global Control Group (GCG) in bulk via a CSV file. The CSV must contain a single `uid` column. Once submitted, MoEngage processes the file asynchronously and sends an email summary to the `updated_by` address with counts of successfully processed and failed users.


      x-mint:
        content: |
          
           **File requirements:** Single `uid` column, under 300 MB, publicly accessible Amazon S3 URL

           <Info>
           The GCG must already be initialised using the **Upload Users** option in the MoEngage dashboard. The **Random allocation** option is not supported by this API.
           </Info>
           
           #### Rate Limits

           | Rate Limit Name | Rate Limit |
           | :--- | :--- |
           | Update GCG per minute | 10 requests per minute |

           <Note>
           Each file-processing request must complete before the next one is submitted. Submitting a second request while the first is still processing returns `429`.
           </Note>

      x-codeSamples:
        - lang: Shell
          label: Add users to GCG (cURL)
          source: |
            curl -X PUT 'https://api-{dc}.moengage.com/v5/global-control-group/users' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "file_url": "{{s3_csv_url}}",
                "action_type": "add",
                "updated_by": "{{user_email}}"
              }'
        - lang: Shell
          label: Remove users from GCG (cURL)
          source: |
            curl -X PUT 'https://api-{dc}.moengage.com/v5/global-control-group/users' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "file_url": "{{s3_csv_url}}",
                "action_type": "remove",
                "updated_by": "{{user_email}}"
              }'
      tags: [Global Control Group]
      parameters:
        - $ref: '#/components/parameters/X-MOE-Tenant-ID'
        - $ref: '#/components/parameters/X-MOE-Request-Id'
      requestBody:
        description: GCG update request specifying the CSV file location and the operation to perform.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id, file_url, action_type, updated_by]
              properties:
                request_id:
                  type: string
                  description: Unique identifier for this request. Correlates with `response_id`.
                file_url:
                  type: string
                  format: uri
                  description: >-
                    Publicly accessible URL of the CSV file containing user IDs. Currently only Amazon S3 URLs
                    are supported. The file must have a single column named `uid` and be under 300 MB.
                  example: "https://s3.amazonaws.com/my-bucket/gcg_users.csv"
                action_type:
                  type: string
                  enum: [add, remove]
                  description: Whether to add or remove the listed users from the Global Control Group.
                updated_by:
                  type: string
                  format: email
                  description: >-
                    Email address of the user initiating the update. An email summary with processed
                    and failed user counts is sent to this address once processing completes.
                  example: "marketer@example.com"
            example:
              request_id: "gcg-001"
              file_url: "https://s3.amazonaws.com/my-bucket/gcg_users.csv"
              action_type: "add"
              updated_by: "marketer@example.com"
      responses:
        '204':
          description: >-
            Request accepted. The CSV file will be processed asynchronously. An email summary is sent
            to the `updated_by` address once processing completes. No response body is returned.
        '400':
          $ref: '#/components/responses/V5ValidationError'
        '401':
          $ref: '#/components/responses/V5Unauthorized'
        '429':
          description: >-
            Rate limit exceeded or a previous file-processing request is still in progress. Wait for
            the previous request to complete before submitting a new one.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/V5ErrorEnvelope' }
              example:
                response_id: "gcg-001"
                error:
                  code: TOO_MANY_REQUESTS
                  message: "A file-processing request is already in progress. Wait for it to complete before submitting a new request."
                  details: []
        '500':
          $ref: '#/components/responses/V5InternalError'