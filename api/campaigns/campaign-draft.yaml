      parameters:
        - $ref: '#/components/parameters/X-MOE-Tenant-ID'
        - $ref: '#/components/parameters/X-MOE-Request-Id'
        - name: campaign_id
          in: path
          required: true
          description: |
            The unique ID of the campaign to update.

            You can fetch the campaign ID using the [Get Campaign Details API](/api/get-campaign-details/search-campaigns) by filtering with campaign name, channel, or other criteria.
          schema: { type: string }
        - $ref: '#/components/parameters/Idempotency-Key-Required'
      requestBody:
        description: |
          In this payload, you can include the fields you want to update.
          
          **Notes:** - Pass only the fields you want to update. You don't need to send the complete payload.
          - If updating a field within an object, you must pass the complete object.
          - If updating a nested field, you must pass the complete parent object. For example, to update the title of a Push notification, pass the complete campaign_content object.
          - Use the tabs below to select your campaign type. The schema will adapt based on the selected channel.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignPatchV5Request' }
      responses:
        '200':
          description: |
            Draft updated successfully, or campaign published.

            **Note:** V1 returned `204 No Content` for successful updates. V5 returns `200 OK` with a
            response body. Update any integration that checks for `204` to expect `200` instead.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V5SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CampaignPatchAcceptedData' }
              examples:
                component_updated:
                  summary: Component update accepted
                  value:
                    response_id: "abc-301"
                    type: "campaign"
                    data:
                      id: "64a1b2c3d4e5f6a7b8c9d0e1"
                published:
                  summary: Campaign published
                  value:
                    response_id: "abc-302"
                    type: "campaign"
                    data:
                      id: "64a1b2c3d4e5f6a7b8c9d0e1"
        '400':
          $ref: '#/components/responses/V5ValidationError'
        '401':
          $ref: '#/components/responses/V5Unauthorized'
        '403':
          description: |
            The caller does not have the required permission to update this campaign.
            This occurs when the API credential's scope does not include campaign update or publish rights,
            or when the caller attempts to publish a campaign owned by a different team with restricted access.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/V5ErrorEnvelope' }
              example:
                response_id: "abc-403"
                error:
                  code: FORBIDDEN
                  message: "Caller does not have permission to update this campaign."
                  details: []
        '409':
          description: |
            The campaign is not in a state that allows updates or publishing.
            This occurs when the campaign is not in `DRAFT` state - for example, it is `ACTIVE`, `PAUSED`,
            or `STOPPED`. Only `DRAFT` campaigns can be updated or published via this endpoint.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/V5ErrorEnvelope' }
              example:
                response_id: "abc-409"
                error:
                  code: BAD_REQUEST
                  message: "Campaign is not in DRAFT state and cannot be patched."
                  details: []
        '429':
          description: |
            The per-app rate limit for this endpoint has been exceeded. Retry after the window
            indicated in the `Retry-After` response header (in seconds).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/V5ErrorEnvelope' }
              example:
                response_id: "abc-429"
                error:
                  code: RATE_LIMITED
                  message: "Rate limit exceeded. Retry after 60 seconds."
                  details: []
        '500':
          $ref: '#/components/responses/V5InternalError'

  /v5/campaigns/{campaign_id}/validate:
    post:
      operationId: validate_draft_campaign_v5
      summary: Validate Campaign
      description: |
        Validates whether a draft would pass publish-time checks (`DRAFT_PUBLISH`) without making any changes to the draft.
      x-codeSamples:
        - lang: Shell
          label: Push (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/campaigns/{{campaign_id}}/validate' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}"
              }'
        - lang: Shell
          label: Email (cURL)
          source: |
            curl -X POST 'https://api-{dc}.moengage.com/v5/campaigns/{{campaign_id}}/validate' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}"
              }'
      x-mint:
        content: >
          <Info>
          You do not need an idempotency key for this endpoint.
          </Info>
      tags: [Create Campaigns]
      parameters:
        - $ref: '#/components/parameters/X-MOE-Tenant-ID'
        - $ref: '#/components/parameters/X-MOE-Request-Id'
        - name: campaign_id
          in: path
          required: true
          description: Raw 24-char ObjectId of the campaign to validate.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_id:
                  type: string
                  description: >-
                    Optional string (UUID v4 recommended) used to identify this validation call. Unlike other POST endpoints, this field is not required and does not enforce deduplication - the validate endpoint is read-only and safe to retry freely.
                  example: "{{request_id}}"
      responses:
        '200':
          description: Validation result - always returned regardless of whether the campaign passes or fails validation.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V5SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/V5ValidateResponse' }
              examples:
                valid:
                  summary: Campaign passes validation
                  value:
                    response_id: "abc-501"
                    type: "campaign"
                    data:
                      valid: true
                invalid:
                  summary: Campaign fails validation
                  value:
                    response_id: "abc-501"
                    type: "campaign"
                    data:
                      valid: false
                      errors:
                        - field: "campaign_content.content.push.android.basic_details.title"
                          issue: "title is required"
                        - field: "scheduling_details"
                          issue: "scheduling_details is required for publish"
        '400':
          $ref: '#/components/responses/V5ValidationError'
        '401':
          $ref: '#/components/responses/V5Unauthorized'
        '500':
          $ref: '#/components/responses/V5InternalError'

  /v5/campaigns/{campaign_id}/status:
    patch:
      operationId: change_campaign_status_v5
      summary: Update Campaign Status
      description: |
        Applies a state transition to a published campaign.

      x-mint:
        content: |
         
         <Info>
          - **Migration from V1:** In V1, `POST /v1/campaigns/status` accepted a `campaign_ids` array of up to 10 IDs per request. In V5, the campaign ID is a path parameter and only one campaign can be transitioned per request. To perform bulk status changes, call this endpoint once per campaign ID.
          - `PUBLISH` is not accepted on this endpoint. To publish a draft, use `PATCH /v5/campaigns/{campaign_id}` with `{ "status": "PUBLISH" }`.
         </Info>

          #### Rate Limits

          | Rate Limit Name | Rate Limit |
          | :--- | :--- |
          | change campaign status per second | The total number of change campaign status requests per second per client is 10. |
          | change campaign status per minute | The total number of change campaign status requests per minute per client allowed is 100. |
          | change campaign status per hour | The total number of change campaign status requests per hour per client allowed is 6000. |

          <Note>
            **Notes**
            * Breaching the limits will reject the request.
            * Per-hour and per-day limits use a rolling window of the last 1 hour and last 24 hours respectively.
          </Note>
      x-codeSamples:
        - lang: Shell
          label: Stop a campaign (cURL)
          source: |
            curl -X PATCH 'https://api-{dc}.moengage.com/v5/campaigns/{{campaign_id}}/status' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Idempotency-Key: {{idempotency_key}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "action": "STOP"
              }'
        - lang: Shell
          label: Pause a campaign (cURL)
          source: |
            curl -X PATCH 'https://api-{dc}.moengage.com/v5/campaigns/{{campaign_id}}/status' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Idempotency-Key: {{idempotency_key}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "action": "PAUSE"
              }'
        - lang: Shell
          label: Resume a campaign (cURL)
          source: |
            curl -X PATCH 'https://api-{dc}.moengage.com/v5/campaigns/{{campaign_id}}/status' \
              -H 'Authorization: Basic {{auth_token}}' \
              -H 'X-MOE-Tenant-ID: {{workspace_id}}' \
              -H 'X-MOE-Request-Id: {{request_id}}' \
              -H 'Idempotency-Key: {{idempotency_key}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "request_id": "{{request_id}}",
                "action": "RESUME"
              }'
      tags: [Update Campaigns]
      parameters:
        - $ref: '#/components/parameters/X-MOE-Tenant-ID'
        - $ref: '#/components/parameters/X-MOE-Request-Id'
        - name: campaign_id
          in: path
          required: true
          description: Raw 24-char ObjectId of the published campaign to transition.
          schema: { type: string }
        - $ref: '#/components/parameters/Idempotency-Key-Required'
      requestBody:
        description: Send campaign status change request with action.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignStatusV5Request' }
      responses:
        '200':
          description: Transition accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V5SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CampaignStatusTransitionData' }
              example:
                response_id: "abc-601"
                type: "campaign"
                data:
                  id: "64a1b2c3d4e5f6a7b8c9d0e1"
                  action: "STOP"
        '400':
          $ref: '#/components/responses/V5ValidationError'
        '401':
          $ref: '#/components/responses/V5Unauthorized'
        '422':
          description: |
            The action is not valid for the campaign's current state or delivery type. Common causes:
            - Attempting `STOP` on a Periodic campaign.
            - Attempting `PAUSE` or `RESUME` on a One-time campaign.
            - Attempting `RESUME` on a campaign that is not in `PAUSED` state.
            - Attempting `PAUSE` on a campaign that is not in `ACTIVE`, `SCHEDULED`, or `SENDING` state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/V5ErrorEnvelope' }
              example:
                response_id: "abc-422"
                error:
                  code: UNPROCESSABLE_ENTITY
                  message: "Action STOP is not valid for a PERIODIC campaign."
                  details: []
        '500':
          $ref: '#/components/responses/V5InternalError'

