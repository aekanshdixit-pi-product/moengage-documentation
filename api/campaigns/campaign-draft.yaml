    patch:
      operationId: patch_draft_campaign_v5
      summary: Update Campaign
      description: |
        Updates individual components of a campaign draft, or transitions a draft to ACTIVE by setting `status: PUBLISH`.
      x-mint:
        content: |
          The request body determines which flow runs.

          <Warning>
          V1 (`PATCH /v1/campaigns/{campaign_id}`) returns `204 No Content` with no response body on success. V5 returns `200 OK` with a response body containing `response_id`, `type`, and `data.id`. Update any integration that asserts a `204` status code to expect `200`.
          </Warning>

          <Tabs>
            <Tab title="Update draft campaign">
              Send a `PATCH` request without a `status` key in the body.

              The API merges each submitted component into the existing draft, then validates the full merged state (`DRAFT_PATCH`). After all individual components pass validation, cross-component checks run on the combined result.

              Only the fields you include in the request body are updated. Fields you omit retain their current values. For the full field reference per delivery type, see the [Create Campaign API](/api/campaigns/create-campaign).

              ```json
              {
                "request_id": "{{request_id}}",
                "campaign_content": { }
              }
              ```
            </Tab>

            <Tab title="Publish campaign">
              Send a `PATCH` request with **only** the `status` field set to `PUBLISH` - no other fields.

              The API validates the fully merged draft state (`DRAFT_PUBLISH`) and, if all checks pass, transitions the campaign from `DRAFT` to `ACTIVE` (or `SCHEDULED` for future-dated campaigns).

              ```json
              {
                "request_id": "{{request_id}}",
                "status": "PUBLISH"
              }
              ```
            </Tab>
          </Tabs>

          <Warning>
          **Status and component fields are mutually exclusive:** You cannot combine `status: PUBLISH` with any other component fields in the same request body, as doing so returns `400 Bad Request`. Send either a component update or a publish action, never both in a single request.
          </Warning>

          #### Update restrictions by campaign state

          | Campaign state | Editable fields | Non-editable fields |
          | :--- | :--- | :--- |
          | **DRAFT** | All fields | — |
          | **SCHEDULED:** One-time (no instance sent) | All fields | `scheduling_type` |
          | **SCHEDULED:** Periodic or Event-triggered (no instance sent) | All fields | `scheduling_type` |
          | **ACTIVE** | All fields except those listed as non-editable | `trigger_condition`, `segmentation_details`, `conversion_goal_details`, `scheduling_type`, `scheduling_start_date` |
          | **STOPPED** or **ARCHIVED** | — | All fields (no updates allowed) |

          <Note>
          For **Event-triggered campaigns**, updated content is cached and takes up to 30 minutes to take effect.
          </Note>

          #### Rate Limits
          | Rate Limit Name | Rate Limit |
          | :--- | :--- |
          | Update campaign per second | The total number of update campaign requests per second per client allowed is 10. |
          | Update campaign per minute | The total number of update campaign requests per minute per client allowed is 100. |
          | Update campaign per hour | The total number of update campaign requests per hour per client allowed is 6000. |

          <Note>
           **Notes**
           * Breaching the limits will reject the request.
           * Per-hour and per-day limits use a rolling window of the last 1 hour and last 24 hours respectively.
          </Note>

      tags: [Update Campaigns]
      x-codeSamples:
