  /campaigns/status:
    post:
      operationId: change_campaign_status
      summary: Change Campaign Status
      description: |
        This API updates the status of campaigns to stop, pause, or resume them.
      x-mint:
        content: |
          #### Supported Actions
          - **STOP**: Stop a scheduled One-time campaign.
          - **PAUSE**: Pause a running Periodic or Event-triggered campaign.
          - **RESUME**: Resume a paused Periodic or Event-triggered campaign.
        
          #### Supported Channels
          - **Email**: Pause and resume Periodic or Event-triggered campaigns.
          - **Push**: Pause and resume the following campaign types:
            - Periodic
            - Event-triggered
            - Device-triggered
            - Location-triggered
        
          <Note>
          **Note**
          - You can only change the status of campaigns created via the API (not dashboard-created campaigns)
          - Maximum 10 campaign IDs can be processed per request.
          - STOP action only works for **scheduled** One-time campaigns.
          - After a One-time campaign moves to Active state, it cannot be stopped.
          </Note>
        
          <Warning>
          **Action Restrictions**
          - **STOP**: Only for scheduled One-time campaigns.
          - **PAUSE**: Only for Periodic and Event-triggered campaigns.
          - **RESUME**: Only for paused Periodic and Event-triggered campaigns.
          - Periodic campaigns do NOT support STOP action
          </Warning>
      tags:
        - Update Campaigns
      parameters:
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: Campaign status change request with action and campaign IDs.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignStatusChangeRequest'
            examples:
              pause_campaign:
                summary: Pause Campaign
                value:
                  request_id: "status_change_pause"
                  action: "PAUSE"
                  campaign_ids: ["camp_periodic_123"]
              resume_campaign:
                summary: Resume Campaign
                value:
                  request_id: "status_change_resume"
                  action: "RESUME"
                  campaign_ids: ["camp_periodic_123"]
              stop_campaign:
                summary: Stop Scheduled Campaign
                value:
                  request_id: "status_change_stop"
                  action: "STOP"
                  campaign_ids: ["camp_onetime_456"]
              batch_pause:
                summary: Pause Multiple Campaigns
                value:
                  request_id: "status_batch_pause"
                  action: "PAUSE"
                  campaign_ids: 
                    - "camp_periodic_001"
                    - "camp_periodic_002"
                    - "camp_event_003"
      responses:
        '200':
          description: |
            Campaign status changed successfully. No content returned.
            
            For a successful 200 response, the API does not return any content.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  
  /campaigns/{parent_campaign_id}/executions:
    post:
      operationId: get_child_campaigns
      summary: Get Child Campaigns
      description: |
        This API retrieves child campaign execution details for Periodic or Business Event-triggered campaigns. Use this API to track execution history of recurring campaigns and monitor the performance of individual instances. You can only retrieve child campaigns for campaigns created via the API (Create Email Campaigns API or Create Push Campaigns API).
      x-mint:
        content: |
          #### Information Retrieved
          - Child campaign IDs
          - Sent time for each execution
          - Status of each child campaign
          - Total number of times the parent campaign has been executed
          
          ### Supported Campaign Types
          - **Periodic Campaigns** (Email and Push)
          - **Business Event-triggered Campaigns** (Email and Push)
          
          <Note>
          **Note**
          - This endpoint is only applicable for Periodic and Business Event-triggered campaigns.
          - Results are paginated with a maximum of 15 children per page.
          </Note>
      tags:
        - Get Campaign Details
      parameters:
        - name: parent_campaign_id
          in: path
          required: true
          description: |
            The unique ID of the parent campaign (Periodic or Business Event-triggered).
            
            You can fetch the parent campaign ID using the Search Campaigns API.
          schema:
            type: string
          example: "camp_periodic_parent_123"
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: Pagination parameters for retrieving child campaign executions.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetChildCampaignsRequest'
            examples:
              get_periodic_children:
                summary: Get Periodic Campaign Children
                value:
                  request_id: "child_req_12345"
                  page: 1
                  limit: 15
              get_business_event_children:
                summary: Get Business Event Children
                value:
                  request_id: "child_req_67890"
                  page: 1
                  limit: 10
              get_second_page:
                summary: Get Second Page of Children
                value:
                  request_id: "child_req_page2"
                  page: 2
                  limit: 15
      responses:
        '200':
          description: Successfully retrieved child campaign execution details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChildCampaignsResponse'
              examples:
                periodic_executions:
                  summary: Periodic Campaign Executions
                  value:
                    executions:
                      - campaign_id: "camp_child_001"
                        sent_time: "2024-06-24T14:30:18.908000"
                        status: "Sent"
                      - campaign_id: "camp_child_002"
                        sent_time: "2024-06-24T15:27:45.971000"
                        status: "Sent"
                      - campaign_id: "camp_child_003"
                        sent_time: "2024-06-24T15:47:43.528000"
                        status: "Sent"
                      - campaign_id: "camp_child_004"
                        sent_time: "2024-06-24T15:54:26.254000"
                        status: "Sent"
                      - campaign_id: "camp_child_005"
                        sent_time: "2024-06-24T16:35:01.834000"
                        status: "Sending"
                    total_instances: 8
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
