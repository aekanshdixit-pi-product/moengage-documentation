openapi: 3.0.3
info:
  title: MoEngage Campaigns API
  version: '2025-11-20'
  description: |
    The MoEngage Campaigns API allows you to create and manage Push and Email campaigns.
    
    **To see the Request Body preview:** Click the dropdown in the 'Request Body' section and select **PUSH** or **EMAIL**.
  contact:
    name: MoEngage Developer Team
    email: support@moengage.com
    url: https://developers.moengage.com

servers:
  - url: 'https://api-{dc}.moengage.com/core-services/v1'
    description: MoEngage Campaigns API Server
    variables:
      dc:
        default: '01'
        enum: ['01', '02', '03', '04', '05', '06']

security:
  - BasicAuth: []

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic

  parameters:
    MOE-APPKEY:
      name: MOE-APPKEY
      in: header
      required: true
      schema:
        type: string
      example: "YOUR_WORKSPACE_ID"

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimitExceeded:
      description: Rate Limit Exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ==================== Main Request Schema ====================
    CampaignCreateRequest:
      oneOf:
        - $ref: '#/components/schemas/PushCampaignRequest'
        - $ref: '#/components/schemas/EmailCampaignRequest'
      discriminator:
        propertyName: channel
        mapping:
          PUSH: '#/components/schemas/PushCampaignRequest'
          EMAIL: '#/components/schemas/EmailCampaignRequest'

    # ==================== Push Campaign Request ====================
    PushCampaignRequest:
      title: Push Campaign
      type: object
      required: [request_id, channel, campaign_delivery_type, created_by, basic_details, campaign_content, segmentation_details, scheduling_details]
      properties:
        request_id:
          type: string
          example: "push_req_12345"
        channel:
          type: string
          enum: [PUSH]
        campaign_delivery_type:
          type: string
          enum: [ONE_TIME, PERIODIC, EVENT_TRIGGERED, BUSINESS_EVENT_TRIGGERED, DEVICE_TRIGGERED, LOCATION_TRIGGERED, BROADCAST_LIVE_ACTIVITY]
        created_by:
          type: string
          format: email
        basic_details:
          $ref: '#/components/schemas/PushBasicDetails'
        trigger_condition:
          $ref: '#/components/schemas/PushTriggerCondition'
        campaign_content:
          $ref: '#/components/schemas/PushCampaignContent'
        segmentation_details:
          $ref: '#/components/schemas/SegmentationDetails'
        scheduling_details:
          $ref: '#/components/schemas/SchedulingDetails'
        delivery_controls:
          $ref: '#/components/schemas/PushDeliveryControls'
        advanced:
          $ref: '#/components/schemas/AdvancedDetails'
        conversion_goal_details:
          $ref: '#/components/schemas/ConversionGoalDetails'
        control_group_details:
          $ref: '#/components/schemas/ControlGroupDetails'
        utm_params:
          $ref: '#/components/schemas/UTMParams'

    # ==================== Email Campaign Request ====================
    EmailCampaignRequest:
      title: Email Campaign
      type: object
      required: [request_id, channel, campaign_delivery_type, created_by, basic_details, connector, campaign_content, segmentation_details, scheduling_details]
      properties:
        request_id:
          type: string
          example: "email_req_12345"
        channel:
          type: string
          enum: [EMAIL]
        campaign_delivery_type:
          type: string
          enum: [ONE_TIME, PERIODIC, EVENT_TRIGGERED, BUSINESS_EVENT_TRIGGERED]
        created_by:
          type: string
          format: email
        basic_details:
          $ref: '#/components/schemas/EmailBasicDetails'
        connector:
          $ref: '#/components/schemas/Connector'
        campaign_content:
          $ref: '#/components/schemas/EmailCampaignContent'
        segmentation_details:
          $ref: '#/components/schemas/SegmentationDetails'
        scheduling_details:
          $ref: '#/components/schemas/SchedulingDetails'
        conversion_goal_details:
          $ref: '#/components/schemas/ConversionGoalDetails'
        control_group_details:
          $ref: '#/components/schemas/ControlGroupDetails'
        utm_params:
          $ref: '#/components/schemas/UTMParams'
        campaign_audience_limit:
          $ref: '#/components/schemas/CampaignAudienceLimit'

    # ==================== Detailed Components ====================
    PushBasicDetails:
      type: object
      required: [name, platforms]
      properties:
        name: { type: string, example: "Summer Sale Push" }
        platforms: { type: array, items: { type: string, enum: [ANDROID, IOS, WEB] } }
        platform_specific_details: { $ref: '#/components/schemas/PlatformSpecificDetails' }

    EmailBasicDetails:
      type: object
      required: [name, content_type]
      properties:
        name: { type: string, example: "Summer Sale Email" }
        content_type: { type: string, enum: [PROMOTIONAL, TRANSACTIONAL] }
        subscription_category: { type: string }

    PushCampaignContent:
      type: object
      required: [content]
      properties:
        content:
          type: object
          properties:
            push:
              $ref: '#/components/schemas/PushContent'

    EmailCampaignContent:
      type: object
      required: [content]
      properties:
        content:
          type: object
          properties:
            email:
              $ref: '#/components/schemas/EmailContent'

    PushContent:
      type: object
      properties:
        android: { $ref: '#/components/schemas/AndroidPushContent' }
        ios: { $ref: '#/components/schemas/IOSPushContent' }

    AndroidPushContent:
      type: object
      required: [template_type, basic_details]
      properties:
        template_type: { type: string, enum: [BASIC, STYLIZED_BASIC, Custom] }
        basic_details:
          type: object
          required: [notification_channel, title, message]
          properties:
            notification_channel: { type: string }
            title: { type: string }
            message: { type: string }
            default_click_action: { type: string }
            default_click_action_value: { type: string }

    IOSPushContent:
      type: object
      required: [template_type, basic_details]
      properties:
        template_type: { type: string, enum: [BASIC, Custom] }
        basic_details:
          type: object
          required: [title, message]
          properties:
            title: { type: string }
            message: { type: string }

    EmailContent:
      type: object
      required: [subject, from_address, html_content]
      properties:
        subject: { type: string }
        from_address: { type: string, format: email }
        html_content: { type: string }

    SegmentationDetails:
      type: object
      properties:
        included_filters: { $ref: '#/components/schemas/FilterGroup' }

    FilterGroup:
      type: object
      required: [filter_operator, filters]
      properties:
        filter_operator: { type: string, enum: [and, or] }
        filters: { type: array, items: { type: object } }

    SchedulingDetails:
      type: object
      required: [delivery_type]
      properties:
        delivery_type: { type: string, enum: [ASAP, AT_FIXED_TIME, PERIODIC] }
        start_time: { type: string, format: date-time }

    Connector:
      type: object
      required: [connector_type, connector_name]
      properties:
        connector_type: { type: string }
        connector_name: { type: string }

    # ============= All the requested Missing Schemas =============
    ConversionGoalDetails:
      type: object
      properties:
        attribution_window_in_hours: { type: integer }
        goals: { type: array, items: { $ref: '#/components/schemas/Goal' } }

    Goal:
      type: object
      properties:
        goal_name: { type: string }
        goal_event_name: { type: string }

    ControlGroupDetails:
      type: object
      properties:
        is_campaign_control_group_enabled: { type: boolean }
        campaign_control_group_percentage: { type: integer }

    UTMParams:
      type: object
      required: [utm_source, utm_medium]
      properties:
        utm_source: { type: string }
        utm_medium: { type: string }

    CampaignAudienceLimit:
      type: object
      properties:
        limit: { type: integer }

    PushDeliveryControls:
      type: object
      properties:
        bypass_dnd: { type: boolean }
        campaign_throttle_rpm: { type: integer }

    EmailDeliveryControls:
      type: object
      properties:
        campaign_throttle_rpm: { type: integer }

    AdvancedDetails:
      type: object
      properties:
        priority: { type: string }

    PlatformSpecificDetails:
      type: object
      properties:
        android: { type: object }
        ios: { type: object }

    PushTriggerCondition:
      type: object
      properties:
        trigger_delay_type: { type: string }

    EmailTriggerCondition:
      type: object
      properties:
        trigger_delay_type: { type: string }

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }

    CampaignCreateSuccessResponse:
      type: object
      properties:
        campaign_id: { type: string, example: "camp_abc123" }

paths:
  /campaigns:
    post:
      operationId: create_campaign
      summary: Create Campaign
      tags:
        - Create Campaigns
      parameters:
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: Select PUSH or EMAIL to see the specific schema.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreateRequest'
      responses:
        '201':
          description: Campaign created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignCreateSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'