  /campaigns/test:
    post:
      operationId: test_campaign
      summary: Test Campaign
      description: |
        This API sends a test Push or Email campaign to specific users or identifiers before launching it to your entire audience. You can only test campaigns created via the API, not campaigns created through the MoEngage dashboard.
      x-mint:
        content: |
        
          <Note>
          **Notes:**
          - For Email, you can test a maximum of 10 users at a time.
          - If using EMAIL identifier, content will not be personalized with user profile data
          </Note>
        
          <Note>
          **Personalization Behavior**
          - When you pass personalization_details, MoEngage uses those values instead of the user's actual profile data.
          - The same personalization values apply to all test recipients.
          - If you pass only a subset of attributes, remaining values are picked from the user profile.
          </Note>

      tags:
        - Test Campaigns
      parameters:
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: >-
          Test campaign configuration including content and target test users.

          **Note:** Use the tabs below to select your campaign type. The schema will adapt based on the selected channel.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignTestRequest'
            examples:
              push_test_basic:
                summary: Push - Test with User ID
                value:
                  request_id: "test_push_123"
                  channel: "PUSH"
                  basic_details:
                    name: "Flash Sale Push Test"
                    platforms: ["ANDROID", "IOS"]
                    platform_specific_details:
                      android:
                        push_amp_plus_enabled: true
                      ios:
                        send_to_all_eligible_device: true
                        exclude_provisional_push_devices: false
                        send_to_only_provisional_push_enabled_devices: false
                  campaign_content:
                    content:
                      push:
                        android:
                          template_type: "BASIC"
                          basic_details:
                            notification_channel: "general"
                            title: "Test: Flash Sale!"
                            message: "Testing message content"
                            default_click_action: "DEEPLINKING"
                            default_click_action_value: "https://example.com/sale"
                        ios:
                          template_type: "BASIC"
                          basic_details:
                            title: "Test: Flash Sale!"
                            message: "Testing message content"
                            default_click_action: "DEEPLINKING"
                            default_click_action_value: "https://example.com/sale"
                  test_campaign_meta:
                    identifier: "USER_ATTRIBUTE_UNIQUE_ID"
                    identifier_values: ["user_12345"]
              email_test_with_personalization:
                summary: Email - Test with Personalization
                value:
                  request_id: "test_email_456"
                  channel: "EMAIL"
                  basic_details:
                    name: "Newsletter Test"
                    content_type: "PROMOTIONAL"
                    subscription_category: "marketing"
                    user_attribute_identifier: "MOE_EMAIL_ID"
                  connector:
                    connector_type: "SENDGRID"
                    connector_name: "default"
                  campaign_content:
                    content:
                      email:
                        subject: "Test: Weekly Newsletter"
                        preview_text: "Testing email content"
                        sender_name: "MoEngage Store"
                        from_address: "noreply@example.com"
                        reply_to_address: "support@example.com"
                        html_content: "<!DOCTYPE html><html><body><p>Hi {{UserAttribute['First Name']}},</p><p>Testing personalized content</p></body></html>"
                  personalization_details:
                    user_attributes:
                      First Name: "John"
                      Last Name: "Doe"
                    event_attributes:
                      Campaign Name: "Test Campaign"
                  test_campaign_meta:
                    identifier: "EMAIL"
                    identifier_values: ["john.doe@example.com", "jane.smith@example.com"]
              email_test_locale_variation:
                summary: Email - Test with Locale & Variation
                value:
                  request_id: "test_email_locale"
                  channel: "EMAIL"
                  basic_details:
                    name: "Multi-locale Test"
                    content_type: "PROMOTIONAL"
                    subscription_category: "marketing"
                    user_attribute_identifier: "MOE_EMAIL_ID"
                  connector:
                    connector_type: "SENDGRID"
                    connector_name: "default"
                  campaign_content:
                    locales: ["en-US", "es-ES", "default"]
                    content:
                      "en-US":
                        variation_1:
                          email:
                            subject: "Test EN"
                            sender_name: "Store"
                            from_address: "noreply@example.com"
                            reply_to_address: "support@example.com"
                            html_content: "<html><body>English content</body></html>"
                  test_campaign_meta:
                    identifier: "ID"
                    identifier_values: ["user_001"]
                    locale_name: "en-US"
                    variation: "variation_1"
      responses:
        '200':
          description: Test campaign sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCampaignSuccessResponse'
              examples:
                success:
                  summary: Successful Test
                  value:
                    data:
                      user_12345:
                        status: "success"
                    message: "Test campaign created successfully"
                partial_success:
                  summary: Partial Success
                  value:
                    data:
                      john.doe@example.com:
                        status: "success"
                      jane.smith@example.com:
                        status: "failed"
                        failure_reason: "User not found"
                    message: "Test campaign created successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  
  /personalization/preview:
    post:
      operationId: personalized_preview
      summary: Personalized Preview
      description: |
        This API shows a preview of personalized content for a specific user before sending a Push, Email, or SMS campaign. This API retrieves personalized message content with all user/event attributes resolved. Use this API to validate your personalization logic and see exactly how content will appear to specific users before launching campaigns. 
      x-mint:
        content: |
        
          #### Personalization Support
          - User attributes
          - Event attributes
          - Custom templates
          - Content blocks
          - Content APIs
          - Product sets
        
          #### Rate Limit
          The rate limit is 10,000 requests per minute.
        
          <Note>
          **Note:**
          - When you pass personalization_details, MoEngage uses those values to personalize content instead of actual user profile data.
          - Attributes must exist in the MoEngage Dashboard.
          - If an attribute doesn't exist and default value is not "MOE_NOT_SEND", it will appear empty.
          - Event attributes can be used when the same event is used for the campaign.
          - Either `payload` or `custom_template_data` must be provided in personalization_content.
          - You can use event attributes to personalize content APIs when the same event is used for the campaign.
          </Note>
      tags:
        - Test Campaigns
      parameters:
        - $ref: '#/components/parameters/MOE-APPKEY'
        - name: data-compression
          in: header
          required: false
          description: |
            Whether to pass the payload in compressed format.
            
            Set to `true` to send compressed payload.
          schema:
            type: boolean
          example: false
      requestBody:
        description: Personalization preview request with content and user details.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonalizedPreviewRequest'
            examples:
              user_attribute_preview:
                summary: Preview with User Attributes
                value:
                  request_id: "preview_req_12345"
                  personalization_details:
                    channel: "EMAIL"
                    user_attributes:
                      Gender: "Female"
                      First Name: "Jane"
                  personalization_content:
                    payload:
                      email_html: "<!DOCTYPE html><html><body><p>Hi {{UserAttribute['First Name']}}, your gender is {{UserAttribute['Gender']}}</p></body></html>"
                  user_details:
                    identifier: "ID"
                    identifier_value: "USER_001"
              event_attribute_preview:
                summary: Preview with Event Attributes
                value:
                  request_id: "preview_req_event"
                  personalization_details:
                    event_name: "App_Opened"
                    channel: "EMAIL"
                    user_attributes:
                      First Name: "John"
                    event_attributes:
                      App_Version: "1.0.2"
                  personalization_content:
                    payload:
                      message: "Hi {{UserAttribute['First Name']}}, you're using version {{EventAttribute['App_Version']}}"
                  user_details:
                    identifier: "ID"
                    identifier_value: "JOHN012"
              custom_template_preview:
                summary: Preview with Custom Template
                value:
                  request_id: "preview_req_template"
                  personalization_details:
                    channel: "PUSH"
                    user_attributes:
                      First Name: "John"
                    event_attributes:
                      App Version: "34232"
                  personalization_content:
                    custom_template_data:
                      template_id: "5b7d04c6-8ddc-4957-80d9-c67266079609"
                      version: "1"
                  user_details:
                    identifier: "ID"
                    identifier_value: "JOHN012"
              content_block_preview:
                summary: Preview with Content Block
                value:
                  request_id: "preview_req_cb"
                  personalization_details:
                    channel: "SMS"
                    user_attributes:
                      First Name: "John Doe"
                  personalization_content:
                    payload:
                      content_block: "{{ContentBlock['simple_text_cb']}}"
                  user_details:
                    identifier: "ID"
                    identifier_value: "JOHN012"
              product_set_preview:
                summary: Preview with Product Set
                value:
                  request_id: "preview_req_products"
                  personalization_details:
                    channel: "SMS"
                  personalization_content:
                    payload:
                      product_set: "{% if ProductSet.test_prod%}{% for product in ProductSet.test_prod%}{{product.title}} {% endfor %}{% else %}MOE_NOT_SEND{% endif %}"
                  user_details:
                    identifier: "ID"
                    identifier_value: "JOHN012"
      responses:
        '200':
          description: Successfully retrieved personalized content preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalizedPreviewResponse'
              examples:
                user_attribute_result:
                  summary: Personalized User Attributes
                  value:
                    personalized_content:
                      payload:
                        email_html: "<!DOCTYPE html><html><body><p>Hi Jane, your gender is Female</p></body></html>"
                event_attribute_result:
                  summary: Personalized Event Attributes
                  value:
                    personalized_content:
                      payload:
                        message: "Hi John, you're using version 1.0.2"
                custom_template_result:
                  summary: Custom Template Result
                  value:
                    personalized_content:
                      payload:
                        data:
                          - meta_info:
                              platform: ["ANDROID"]
                              template_id: "12356733"
                              template_name: "test_template"
                              channel: "PUSH"
                product_set_result:
                  summary: Product Set Result
                  value:
                    personalized_content:
                      payload:
                        product_set: "Brown Banana Chocolate Wine Honey Onion Mango Cookies Bread Toffee"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'
  
  /campaigns/meta:
    post:
      operationId: get_campaign_meta
      summary: Get Campaign Meta
      description: |
        This API retrieves campaign details and reachability information for scheduled campaigns.
      x-mint:
        content: |
          #### Supported Channels
          - EMAIL: Email campaigns
          - PUSH: Push notification campaigns
          - SMS: SMS campaigns
          - WHATSAPP: WhatsApp campaigns
          - FACEBOOK: Facebook campaigns
          - GOOGLE ADS: Google Ads campaigns
          - CONNECTORS: Connector-based campaigns
        
          #### Reachability Information
          - Available only for **scheduled** campaigns (one-time, business event-triggered, and event-triggered).
          - Provides estimated user count that will receive the campaign.
          - Calculated once daily and cached for 24 hours.
          - May vary due to app installations/uninstalls or subscription changes.
        
          <Note>
          - Reachability is an estimated value and may vary over time. It is calculated once per day and cached for 24 hours. Multiple API calls within the same day will return the cached value.
          - To fetch child campaign information (flow nodes, periodic children), set `include_child_campaigns` to `true`. Use `flow_id`, `flow_name`, or `parent_campaign_id` in the response to identify relationships.
          </Note>
      tags:
        - Get Campaign Details
      parameters:
        - $ref: '#/components/parameters/MOE-APPKEY'
      requestBody:
        description: Search criteria for retrieving campaign metadata and reachability information.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignMetaRequest'
            examples:
              meta_by_channel:
                summary: Get Meta by Channel
                value:
                  request_id: "meta_req_12345"
                  campaign_fields:
                    channels: ["EMAIL"]
                  limit: 15
                  page: 1
              meta_by_campaign_id:
                summary: Get Meta by Campaign ID
                value:
                  request_id: "meta_req_67890"
                  campaign_fields:
                    id: "camp_abc123xyz"
                  limit: 1
                  page: 1
              meta_scheduled_with_reachability:
                summary: Get Scheduled Campaign with Reachability
                value:
                  request_id: "meta_req_scheduled"
                  campaign_fields:
                    channels: ["SMS"]
                    status: ["SCHEDULED"]
                  limit: 10
                  page: 1
              meta_with_child_campaigns:
                summary: Get Meta with Child Campaigns
                value:
                  request_id: "meta_req_children"
                  campaign_fields:
                    delivery_type: ["PERIODIC"]
                  include_child_campaigns: true
                  limit: 15
                  page: 1
      responses:
        '200':
          description: Successfully retrieved campaign metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CampaignMetaResponse'
              examples:
                email_campaign_meta:
                  summary: Email Campaign Meta
                  value:
                    - campaign_id: "camp_email_123"
                      channel: "EMAIL"
                      platform: []
                      created_by: "john.doe@example.com"
                      campaign_delivery_type: "ONE_TIME"
                      campaign_name: "Weekly Newsletter"
                      campaign_team: "Marketing"
                      campaign_tags: ["newsletter", "weekly"]
                      campaign_status: "Active"
                      campaign_start_time: "2024-11-18T05:50:00"
                sms_scheduled_with_reachability:
                  summary: SMS Scheduled with Reachability
                  value:
                    - campaign_id: "camp_sms_456"
                      channel: "SMS"
                      platform: []
                      created_by: "admin@example.com"
                      campaign_delivery_type: "ONE_TIME"
                      campaign_name: "Promo Code SMS"
                      campaign_team: "Sales"
                      campaign_tags: ["promo"]
                      campaign_status: "Scheduled"
                      campaign_start_time: "2024-11-28T12:18:00"
                      reachability_details:
                        count: 18182
                        last_updated_time: "2024-11-27T09:05:42.661000"
                push_campaign_meta:
                  summary: Push Campaign Meta
                  value:
                    - campaign_id: "camp_push_789"
                      channel: "PUSH"
                      platform: ["ANDROID", "IOS"]
                      created_by: "jane.smith@example.com"
                      campaign_delivery_type: "EVENT_TRIGGERED"
