  /custom-templates/push/search:
    post:
      tags:
        - Templates
      summary: Search for Push Templates
      description: |
        The Search Push Template API can be used to look up the push templates created in your MoEngage account.
      x-mint:
        content: |
          <Note>
          We are introducing mandatory pagination, effective November 15, 2025, all calls to this API must include the following two parameters:
        
          * **page**: The page number of the results you wish to fetch.
          * **entries**: The number of templates to return per page, with a  maximum value of 15.
        
          Please update all integrations to include these parameters. API requests submitted without them after the effective date will result in an error and fail to execute.
          </Note>

        
          #### Rate Limit
          The rate limit is 100 RPM (request per minute).  
      operationId: searchPushTemplates
      requestBody:
        description: >-
          A JSON object containing filters for the search. **You can send empty filters to fetch all the push templates.**
          Searches for push templates based on a variety of filter criteria. 
        
          **Note:** 
          
          - You can send empty filters to fetch all the push templates.
          
          - You can send only template_ids if you want specific older versions of the push template. In other cases, you will receive the latest version of the template.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - page
                - entries
              properties:
                page: 
                  type: integer
                  description: "The page number of the results you wish to fetch."
                  default: 1
                entries: 
                  type: integer
                  description: "The number of templates to return per page, with a maximum value of 15."
                  default: 10
                  maximum: 15
                template_name: 
                  type: string
                  description: "This field indicates the name of the template. When this value is specified, the template that matches the name specified in this field will be returned."
                platform: 
                  type: array
                  items: 
                    type: string
                    enum: [ANDROID, IOS]
                  description: "This field indicates the list of platforms. Allowed values: ANDROID, IOS. When specified, the templates whose platform matches that specified in this list will be returned."
                template_source: 
                  type: array
                  items: 
                    type: string
                    enum: [API, MOENGAGE]
                  description: "This field indicates the template source that created the template. For example: [\"API\", \"MOENGAGE\"]. When specified, the templates whose source matches that specified in this list will be returned."
                template_style: 
                  type: array
                  items: 
                    type: string
                    enum: [BASIC, STYLIZED]
                  description: "This field indicates the template style. Allowed values: BASIC, STYLIZED. When specified, the templates whose template style matches that specified in this list will be returned."
                template_type: 
                  type: array
                  items: 
                    type: string
                    enum: [CUSTOM, PRE_BUILT]
                  description: "This field indicates whether the template is a custom one or a pre-built one. Allowed values: CUSTOM, PRE_BUILT. When specified, the templates whose template type matches that specified in this list will be returned."
                created_by: 
                  type: array
                  items: 
                    type: string
                    format: email
                  description: "This field indicates the user who created the template. When specified, the templates for which the created_by user information matches that specified in this list will be returned. Example: [\"user1@moengage.com\", \"user2@moengage.com\"]"
                updated_by: 
                  type: array
                  items: 
                    type: string
                    format: email
                  description: "This field indicates the user who updated the template. When specified, the templates for which the updated_by user information matches that specified in this list will be returned. Example: [\"user1@moengage.com\", \"user2@moengage.com\"]"
                sort_params:
                  type: array
                  items:
                    type: object
                    properties:
                      template_name: { type: string, enum: [ASCENDING, DESCENDING], description: "Sort by Template Name" }
                      last_modified_date: { type: string, enum: [ASCENDING, DESCENDING], description: "Sort by Last Modified Date" }
                      last_modified_by: { type: string, enum: [ASCENDING, DESCENDING], description: "Sort by Last Modified By" }
                  description: "This field indicates the sorting parameters for the search result and the sort order. Example: \"sort_params\":[{\"template_name\": \"ASCENDING\",\"last_modified_date\": \"ASCENDING\",\"last_modified_by\": \"ASCENDING\"}]"
                template_ids:
                  type: array
                  items:
                    type: object
                    properties:
                      external_template_id: { type: string, format: uuid, description: "The unique identifier of the template." }
                      version: { type: integer, description: "The version number of the template." }
                  description: "This field indicates the list of the template ids that must be fetched. When this value is specified, the template that matches the id specified in this field will be returned. You can send only template_ids if you want specific older versions of the push template. In other cases, you will receive the latest version of the template. Example: \"template_ids\":[{\"external_template_id\": \"e1c95cb8-4f15-4f22-ae73-e9f47c9925c8\", \"version\": 1}]"
            examples:
              ComplexSearch:
                summary: Complex Search Filter
                value:
                  page: 1
                  entries: 10
                  template_name: "NAME_OF_THE_TEMPLATE(PARTIAL SEARCH)/ID_OF_TEMPLATE"
                  platform: ["ANDROID", "IOS"]
                  template_source: ["API","MOENGAGE"]
                  template_style: ["BASIC", "STYLIZED"]
                  template_type: ["CUSTOM", "PRE_BUILT"]
                  created_by: ["user1@moengage.com", "user2@moengage.com"]
                  updated_by: ["user1@moengage.com", "user2@moengage.com"]
                  sort_params: [{"last_modified_date": "DESCENDING"}]
                  template_ids: [{"external_template_id": "ID_OF_TEMPLATE", "version": 1}]

      responses:
        '200':
          description: This response is returned when the request is processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        external_template_id: { type: string, format: uuid, description: "Unique template identifier." }
                        version: { type: integer, description: "Template version number." }
                        ANDROID: { $ref: '#/components/schemas/AndroidPayload' }
                        IOS: { $ref: '#/components/schemas/IosPayload' }
                        meta_info: 
                          type: object
                          description: "Meta information about the template."
                          properties:
                            platform: { type: array, items: { type: string }, description: "List of supported platforms." }
                            template_style: { type: string, description: "Style of the template." }
                            template_id: { type: string, description: "Template Identifier." }
                            template_name: { type: string, description: "Name of the template." }
                            template_version: { type: string, description: "Version string of the template." }
                            updated_by: { type: string, description: "User who updated the template." }
                            channel: { type: string, description: "Channel type (e.g., PUSH)." }
                            template_source: { type: string, description: "Source of the template (e.g., API)." }
                            template_type: { type: string, description: "Type of template (e.g., CUSTOM)." }
                        created_by: { type: string, description: "User who created the template." }
                        created_at: { type: string, format: date-time, description: "Creation timestamp." }
                        updated_by: { type: string, description: "User who updated the template." }
                        updated_at: { type: string, format: date-time, description: "Last update timestamp." }
                    description: "This field contains the list of push templates that satisfy the search criteria."
              example:
                data:
                  - external_template_id: "9b09875c-edda-42e9-8f9f-a7d0a9a2aa26"
                    version: 2
